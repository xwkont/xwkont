  - xwkont:ref:gum-owl
- mapping_id: xwkont:mapping:time:006
  subject: DOLCE:Temporal-region
  relation_category: overlap
  object: SUMO:TimeMeasure
  mapping_justification: semapv:ManualMappingCuration
  status: candidate
  confidence: medium
  rationale: '**Downgraded from `close-match` (2026-07-04 review pass)** — both classify Time
    as independent of their occurrent-equivalent category (DOLCE: region; SUMO: abstract quantity),
    closer to each other than either is to BFO''s occurrent classification, but "region" and
    "abstract quantity" are different formal kinds, not merely differing scope/axioms within
    the same kind (contrast `mapping-007`, where both sides are region-denoting categories).
    `close-match` per `docs/methodology/crosswalk-methodology.md` is for concepts "similar
    enough to align for many purposes but differ in scope, axioms, usage, or context" — a
    difference in formal kind is a stronger divergence than that, so `overlap` ("partially
    intersect but neither subsumes the other") is the better fit.'
  provenance:
  - xwkont:ref:dolce-lite-owl
  - xwkont:ref:sumo-niles-pease-2001
