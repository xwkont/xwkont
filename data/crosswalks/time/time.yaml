- mapping_id: xwkont:mapping:time:008
  subject: GFO:Temporal_region
  relation_category: overlap
  object: GUM:TemporalObject
  mapping_justification: semapv:ManualMappingCuration
  status: candidate
  confidence: high
  rationale: '**Downgraded from `close-match` (2026-07-04 review pass)** — both are independent,
    sui-generis-flavored top-level categories not subsumed under either occurrent-like or
    continuant-like classes, but GFO''s grounding is metaphysical (Brentano/Allen & Hayes)
    while GUM''s is linguistic (Halliday & Matthiessen) — a difference in the *kind* of independence
    claimed, not just scope or axioms within a shared formal kind. `overlap` ("partially intersect
    but neither subsumes the other," per `docs/methodology/crosswalk-methodology.md`) better
    reflects that than `close-match`. `high` confidence in the `overlap` category: the
