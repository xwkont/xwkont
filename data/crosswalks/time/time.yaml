- mapping_id: xwkont:mapping:time:005
  subject: BFO:Temporal region
  relation_category: overlap
  object: GUM:Time
  mapping_justification: semapv:ManualMappingCuration
  status: candidate
  confidence: medium
  rationale: Same classification-divergence pattern as `mapping-001`–`003`, compounded by
