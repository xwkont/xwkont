comparison_notes:
- note_id: note-001
  dimension: philosophical
  claim_type: editorial observation
  note: 'BFO alone classifies Time as a subtype of Occurrent. Every other source with a Time
    category (DOLCE, SUMO, GFO, TUpper, GUM) treats it as independent of the occurrent/continuant-equivalent
    split entirely: DOLCE files it as an abstract quality-space region; SUMO files it under
    `Abstract`/`Quantity`, disjoint from `Physical` (where `Process` sits); GFO gives it its
    own sui generis branch, explicitly disjoint from both `Presential` and `Occurrent`; TUpper
    makes it one of four flat top-level classes; GUM''s `Time` has a dual parent (`Substance`/`TemporalObject`)
    ancestor to neither its occurrent-like nor continuant-like classes. This is the sharpest
    structural divergence found in this crosswalk — a genuine disagreement about where Time
    belongs in each source''s top-level architecture, not a labeling difference.'
  supporting_references:
  - xwkont:ref:bfo-2020
  - xwkont:ref:dolce-lite-owl
  - xwkont:ref:sumo-niles-pease-2001
  - xwkont:ref:gfo
  - xwkont:ref:tupper-colore
  - xwkont:ref:gum-owl
  confidence: high
- note_id: note-002
  dimension: philosophical
  claim_type: direct quotation
  note: GFO's `Time` class definition names an explicit philosophical/formal lineage — "The
    time model of GFO is based on Brentano and the glass continuum of Allen&Hayes" — the only
    source among all 8 to embed a named theoretical grounding directly inside its Time class
    definition, rather than in a separate paper or left ungrounded.
  supporting_references:
  - xwkont:ref:gfo
  confidence: high
- note_id: note-003
  dimension: technical
  claim_type: editorial observation
  note: GUM's temporal apparatus (18 classes) is explicitly grounded in Halliday & Matthiessen's
    (1999) systemic-functional-linguistics theory of the clause — cited by page number directly
    inside multiple class definitions — modeling grammatical tense/aspect/boundedness realization,
    not time as a mind-independent feature of reality. This is the same linguistic-vs-metaphysical
    grounding pattern already found for GUM's Process (`process.md`) and Quality (`quality.md`),
    extended here to Time.
  supporting_references:
  - xwkont:ref:gum-owl
  confidence: high
- note_id: note-004
  dimension: technical
  claim_type: editorial observation
  note: SUMO's `TimeMeasure` sits on the `Abstract` side of its `Physical`/`Abstract` split,
    the same side as `Attribute` (`quality.md`) and `Relation`/`Proposition` — while SUMO's
    `Process` (its occurrent-like category) sits on the `Physical` side. This means SUMO's
    Time and Process categories are further apart in SUMO's own top-level architecture than
    any other source's equivalent pairing — a distinctive, not merely incidental, structural
    fact about SUMO's Time treatment.
  supporting_references:
  - xwkont:ref:sumo-niles-pease-2001
  confidence: high
- note_id: note-005
  dimension: technical
  claim_type: editorial observation
