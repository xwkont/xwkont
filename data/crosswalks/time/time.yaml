uncertainties:
- item_id: uncertainty-001
  uncertainty_type: open-question
  resolved: false
  description: Where should `xwkont-core:Time` subclass from once added to `data/ontology/core.ttl`?
    `note-001`'s finding (all 5 non-BFO sources with a Time category classify it as independent
    of the occurrent/continuant split) is real evidence against simply subclassing `xwkont-core:Occurrent`
    the way BFO does, but XwkOnt's own core split (Continuant/Occurrent under Entity, per
    `data/ontology/core.ttl`) has no independent third branch today — Relation and InformationArtifact
    are the only precedents for a direct-`Entity` subclass bypassing Continuant/Occurrent.
  impact: Blocks final core.ttl placement; does not block continuing this crosswalk's research/review.
  follow_up: Decide at review time, informed by this crosswalk's cross-source evidence and
    by whatever placement Space/Region (a related `0.2.0`-batch candidate) ends up using,
    since several sources treat Time and Space as siblings.
- item_id: uncertainty-002
  uncertainty_type: non-equivalence
  resolved: false
  description: UFO has no reified Time/TemporalRegion/Instant/Interval class in either the
    2021 paper or the OntoUML vocabulary fallback — confirmed by direct full-text search of
    both, not inferred from silence in a summary.
  impact: No UFO correspondence recorded (`correspondence-004`, `mapping-010`).
  follow_up: Re-check if UFO-A/UFO-C literature (already flagged as unfetched in `TODO.md`
    for `information-artifact.md`) becomes accessible — it might elaborate a temporal category
    the 2021 comprehensive paper omits.
- item_id: uncertainty-003
  uncertainty_type: open-question
  resolved: false
  description: YAMATO's absence of a Time category is confirmed only against the one fetchable
    primary document (the 2010 technical report); its OWL/Hozo files remain behind the `hozo.jp`
    registration gate and the 2022 Applied Ontology paper remains blocked by the same Cloudflare
    pattern affecting other sources' 2022 papers.
  impact: This crosswalk records "not found in the fetchable material," not "YAMATO has no
    Time category" — a scoped, not settled, absence.
  follow_up: Re-check if either the OWL/Hozo files (registration completed) or the 2022 paper
    (access resolved) become available in a future pass.
- item_id: uncertainty-004
  uncertainty_type: open-question
  resolved: false
  description: This crosswalk does not address Spatial Region/Space, though several sources
    (BFO's `spatiotemporal region`, GFO's `Space_time`) structurally pair Time with Space
    as siblings under a shared parent — a relationship worth revisiting once Space is itself
    scoped.
  impact: Scopes this crosswalk to Time only, consistent with `ADR-0018`'s one-concept-per-pass
    process.
  follow_up: Create the Spatial Region/Space concept crosswalk next (per `TODO.md`'s `0.2.0`
    batch), and cross-check whether Time/Space's sibling relationship in several sources should
    be reflected in XwkOnt's own core.ttl structure.
- item_id: uncertainty-005
  uncertainty_type: open-question
  resolved: false
  description: GUM's `Time` class has a dual parent (`Substance` and `TemporalObject`) — `Substance`
    did not appear in the 3-level-deep tree previously captured for GUM in `docs/evaluations/foundational-ontology-concept-terms-matrix.md`,
    suggesting that tree may be missing other classes beyond its stated scope, similar to
    the SUMO gap this session corrected.
  impact: Does not affect this crosswalk's own GUM correspondence (`Time`'s definition and
    both parents are directly quoted from the primary source), but flags a possible completeness
    gap in the matrix beyond Time specifically.
  follow_up: A future pass revisiting the matrix's GUM tree could check for a `Substance`
    branch and what else might sit under it.
- item_id: uncertainty-006
  uncertainty_type: non-equivalence
  resolved: false
  description: '**Correction, found via `space.md`''s research (2026-07-04):** the Source
    Definitions row above claims "Neither `Process`... nor `SimpleThing`... is an ancestor
    of any GUM temporal class." This is incorrect as to `SimpleThing`: the transitive chain
    `TemporalObject → SpatialTemporal → NonConsciousThing → SimpleThing` is directly confirmed
    in `GUM-31.owl`. The direct-parent finding (`Time`''s own `rdfs:subClassOf` is `Substance`/`TemporalObject`,
    not `Process`/`SimpleThing`) still stands and is what `note-001`''s classification argument
    actually rests on — only the stronger "no ancestor at all" phrasing was wrong.'
  impact: Does not change this crosswalk's central classification finding (`note-001`), since
    that argument is about direct parentage, not deep transitive ancestry.
  follow_up: None outstanding — recorded here for traceability; the Source Definitions row
    itself now carries an inline correction note.
