source_definitions:
- source: BFO
  term_or_identifier: Temporal region (BFO_0000008)
  dimension: technical
  source_claim_type: direct quotation
  text: '"(Elucidation) A temporal region is an occurrent over which processes can unfold."
    Subclass of Occurrent (BFO_0000003).'
  reference:
  - xwkont:ref:bfo-2020
  locator: '**verified**: `bfo-core.ttl`, class BFO_0000008, fetched and read directly 2026-07-04'
  entry_notes: The only one of the 6 sources with a Time category that classifies it as occurrent
    — see `note-001`.
- source: BFO
  term_or_identifier: One-dimensional / zero-dimensional temporal region (BFO_0000038 / BFO_0000148)
  dimension: technical
  source_claim_type: direct quotation
  text: 'One-dimensional: "a temporal region that is a whole that has a temporal interval
    and zero or more temporal intervals and temporal instants as parts... The temporal region
    during which a process occurs." Zero-dimensional: "a temporal region that is a whole consisting
    of one or more separated temporal instants as parts... A temporal region that is occupied
    by a process boundary." Mutually `owl:disjointWith`.'
  reference:
  - xwkont:ref:bfo-2020
  locator: '**verified**: `bfo-core.ttl`, fetched and read directly 2026-07-04'
- source: BFO
  term_or_identifier: Temporal interval / temporal instant (BFO_0000202 / BFO_0000203)
  dimension: technical
  source_claim_type: direct quotation
  text: 'Interval: "a one-dimensional temporal region that is continuous, thus without gaps
    or breaks... The year 2018." Instant: "a zero-dimensional temporal region that has no
    proper temporal part... The millennium."'
  reference:
  - xwkont:ref:bfo-2020
  locator: '**verified**: `bfo-core.ttl`, fetched and read directly 2026-07-04'
  entry_notes: BFO's own worked examples for interval/instant ("the year 2018"/"the millennium")
    appear swapped relative to ordinary usage (a millennium is longer than a year, and both
    examples describe a bounded span, not a durationless point) — recorded as found, not corrected,
    since the elucidation text is quoted verbatim from the primary source.
- source: DOLCE
  term_or_identifier: Temporal-region
  dimension: technical
  source_claim_type: direct quotation
  text: '"A region at which only temporal qualities can be directly located. It assumes a
    metrics for time." Subclass of `region`; `owl:disjointWith` `physical-region`.'
  reference:
  - xwkont:ref:dolce-lite-owl
  locator: '**verified**: `DOLCE-Lite.owl`, fetched and read directly 2026-07-04'
  entry_notes: Classified as a region (DOLCE's quality-space branch), not an endurant or perdurant
    — see `note-001`.
- source: DOLCE
  term_or_identifier: Time-interval
  dimension: technical
  source_claim_type: direct quotation
  text: '"A temporal region, measured according to a calendar." Subclass of `temporal-region`.'
  reference:
  - xwkont:ref:dolce-lite-owl
  locator: '**verified**: `DOLCE-Lite.owl`, fetched and read directly 2026-07-04'
  entry_notes: No `time-instant`/`time-point` class found in this module — DOLCE does not
    subdivide into instant/interval the way BFO does.
- source: SUMO
  term_or_identifier: TimeMeasure (+ TimeDuration, TimePosition)
  dimension: technical
  source_claim_type: direct quotation
  text: '"The class of temporal durations (instances of TimeDuration) and positions of TimePoints
    and TimeIntervals along the universal timeline (instances of TimePosition)." Subclass
    chain: `Entity` → `Abstract` → `Quantity` → `PhysicalQuantity` → `ConstantQuantity` →
    `TimeMeasure`.'
  reference:
  - xwkont:ref:sumo-niles-pease-2001
  locator: '**verified**: current `Merge.kif`, fetched and read directly 2026-07-04'
  entry_notes: Filed under `Abstract`, not `Physical` — a real divergence from BFO/DOLCE/GFO's
    occurrent-or-region framing; SUMO's `Process` (occurrent-like) sits on the opposite, `Physical`
    side entirely. See `note-001`.
- source: SUMO
  term_or_identifier: TimeInterval / TimePoint
  dimension: technical
  source_claim_type: direct quotation
  text: '"An interval of time... this class contains only convex time intervals." / "An extensionless
    point on the universal timeline... it doesn''t make sense to talk about how long a TimePoint
    lasts." `(partition TimePosition TimeInterval TimePoint)` — an exhaustive, disjoint partition
    of `TimePosition`.'
  reference:
  - xwkont:ref:sumo-niles-pease-2001
  locator: '**verified**: `Merge.kif`, fetched and read directly 2026-07-04'
  entry_notes: This corrects `docs/evaluations/foundational-ontology-concept-terms-matrix.md`'s
    prior claim that SUMO has no Time category — a depth-of-search miss in that document's
    shallower pass, not a real absence.
- source: SUMO
  term_or_identifier: TemporalRelation
  dimension: technical
  source_claim_type: direct quotation
  text: '`(subclass TemporalRelation Relation)`, `(subclass TemporalRelation InheritableRelation)`
    — reifies temporal *relations* (`before`, `BeginFn`, `EndFn`, `temporalPart`), distinct
    from the `TimeMeasure` branch above.'
  reference:
  - xwkont:ref:sumo-niles-pease-2001
  locator: '**verified**: `Merge.kif`, fetched and read directly 2026-07-04'
  entry_notes: Filed under Relation, not Time — noted for completeness but not treated as
    this crosswalk's SUMO correspondence (that role belongs to `TimeMeasure`/`TimeInterval`/`TimePoint`).
    Already correctly filed under Relation in [`candidate-concepts.md`](../candidate-concepts.md).
- source: UFO
  term_or_identifier: '*(no class — property of Perdurant only)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: '"Perdurants are individuals that unfold in time accumulating temporal parts." No
    reified Time/TemporalRegion/Instant/Interval class is asserted anywhere in the paper.'
  reference:
  - xwkont:ref:ufo-2021
  locator: '**verified absence**: 2021 Applied Ontology paper, already-extracted text re-searched
    2026-07-04'
  entry_notes: 'The OntoUML vocabulary TTL (`xwkont:ref:ontouml-vocabulary`) was also checked
    as a fallback: zero occurrences of "time"/"temporal"/"interval"/"duration"; its `begin`/`end`
    are `PropertyStereotype` individuals (modeling-notation annotations), not temporal-region
    classes.'
- source: GFO
  term_or_identifier: Time (+ Space_time)
  dimension: technical
  source_claim_type: direct quotation
  text: '"The time model of GFO is based on Brentano and the glass continuum of Allen&Hayes."
    `Space_time` (`rdfs:subClassOf Individual`) is GFO''s own third top-level branch, alongside
    `Presential` and `Occurrent`, all mutually `owl:disjointWith`. `Time` is `rdfs:subClassOf
    Space_time`, `owl:disjointWith Space`.'
  reference:
  - xwkont:ref:gfo
  locator: '**verified**: `modules/gfo-base.owl`, fetched and read directly 2026-07-04'
  entry_notes: The only source among all 8 whose own primary text names a specific philosophical/formal
    lineage for its Time treatment — see `note-002`.
- source: GFO
  term_or_identifier: Temporal_region / Chronoid
  dimension: technical
  source_claim_type: direct quotation
  text: 'Temporal_region: "the mereological sum of chronoids, i.e. time regions may consist
    of non-connected intervals of time." Chronoid: "entities sui generis. Every chronoid has
    exactly two extremal and infinitely many inner time boundaries which are equivalently
    called time-points."'
  reference:
  - xwkont:ref:gfo
  locator: '**verified**: `modules/gfo-base.owl`, fetched and read directly 2026-07-04'
  entry_notes: '`Chronoid`''s own gloss uses the phrase "entities sui generis" — GFO explicitly
    declines to reduce Time to either its Presential or Occurrent camp.'
- source: GFO
  term_or_identifier: Time_boundary
  dimension: technical
  source_claim_type: direct quotation
  text: '"Time boundaries depend on a chronoids (i.e. they have no independent existence)
    and can coincide." `owl:disjointWith Temporal_region`.'
  reference:
  - xwkont:ref:gfo
  locator: '**verified**: `modules/gfo-base.owl`, fetched and read directly 2026-07-04'
  entry_notes: GFO's closest analog to BFO's temporal instant, formalized as a dependent boundary
    rather than a region in its own right.
- source: YAMATO
  term_or_identifier: '*(none found in the fetchable document)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: '"Time"/"temporal"/"interval" occur repeatedly but only as ordinary, undefined vocabulary
    (e.g. things "need time and space to exist"; "an action exists in an open interval...
    while an event exists in a closed interval") — never as a defined YAMATO class.'
  reference:
  - xwkont:ref:yamato-mizoguchi-2010
  locator: '**verified absence, scoped**: 2010 technical report, full-text re-searched 2026-07-04'
  entry_notes: Scoped absence, not a flat claim about YAMATO overall — the OWL/Hozo files
    remain behind the `hozo.jp` registration gate and the 2022 paper remains blocked. See
    Uncertainty.
- source: TUpper
  term_or_identifier: Timepoint
  dimension: technical
  source_claim_type: direct quotation
  text: '"(timepoint t) is TRUE in an interpretation of TUpper if and only if t is a member
    of the class of timepoints in the universe of discourse of the interpretation. Timepoints
    form a linear ordering." One of four flat, co-equal top-level classes (`object`/`activity`/`activity_occurrence`/`timepoint`).'
  reference:
  - xwkont:ref:tupper-colore
  locator: '**verified**: `TUpper-Terms.html`, fetched and read directly 2026-07-04'
  entry_notes: TUpper's only temporal class — no interval/duration counterpart exists; `timepoint`
    denotes an instant-like entity in a linear order, not a region.
- source: GUM
  term_or_identifier: Time (+ TemporalObject)
  dimension: technical
  source_claim_type: direct quotation
  text: '`Time`: "Time as a general undecomposable substance." `rdfs:subClassOf` both `Substance`
    and `TemporalObject` (dual parentage). `TemporalObject`: "The general concept of temporal
    objects, including all points, paths, volumes, undivided wholes, etc."'
  reference:
  - xwkont:ref:gum-owl
  locator: '**verified**: `GUM-31.owl`, fetched and read directly 2026-07-04'
  entry_notes: '**Correction (2026-07-04, via `space.md`''s research):** `Process` is not
    an ancestor of `Time`, but `SimpleThing` *is*, several levels up — `TemporalObject rdfs:subClassOf
    SpatialTemporal rdfs:subClassOf NonConsciousThing rdfs:subClassOf SimpleThing`, confirmed
    by direct inspection of `GUM-31.owl`''s `NonConsciousThing` block. The original claim
    above ("neither... is an ancestor") is incorrect as to `SimpleThing` and left here struck
    by this note rather than silently edited, per this repository''s practice of recording
    corrections rather than erasing prior claims.'
- source: GUM
  term_or_identifier: TimeInterval / TimePoint (+ Past, Present, Future, TemporallyBounded,
    TemporallyUnbounded, DurationInTime, InstantaneousInTime, OneOrTwoDTime, ThreeDTime, ProfilesAndStages,
    TemporalProfile, ZeroDTime)
  dimension: technical
  source_claim_type: direct quotation
  text: '`TimeInterval`: "A time interval." `TimePoint`: "A time point." (`owl:disjointWith`
    each other.) `DurationInTime`: "A Configuration may be take time to unfold or be instantaneous
    (HM 1999: 471)."'
  reference:
  - xwkont:ref:gum-owl
  locator: '**verified**: `GUM-31.owl`, fetched and read directly 2026-07-04'
  entry_notes: 18 distinct classes total — by far the richest temporal apparatus of any of
    the 8 sources. Grounded in Halliday & Matthiessen's (1999) systemic-functional-linguistics
    theory of the clause, cited by page number directly inside multiple class definitions
    — modeling how a clause's tense/aspect/boundedness is grammatically realized, not time
    as a mind-independent feature of reality.
- source: GFO/DOLCE/SUMO/TUpper/GUM
  term_or_identifier: Independent-category convergence
  dimension: philosophical
  source_claim_type: editorial observation
  text: All 5 non-BFO sources with a Time category (DOLCE, SUMO, GFO, TUpper, GUM) each classify
    it as independent of their occurrent/continuant-equivalent split — a region, an abstract
    quantity, a sui generis branch, a flat top-level class, or a dual-parented class respectively
    — never as a subtype of their occurrent-like category. BFO alone subsumes Time under Occurrent.
  reference:
  - xwkont:ref:bfo-2020
  - xwkont:ref:dolce-lite-owl
  - xwkont:ref:sumo-niles-pease-2001
  - xwkont:ref:gfo
  - xwkont:ref:tupper-colore
  - xwkont:ref:gum-owl
  locator: inference across six sources' own stated classifications, not a single cited passage
    making the comparison explicitly
  entry_notes: See `note-001`; this is the crosswalk's central finding.
