uncertainties:
- item_id: uncertainty-001
  uncertainty_type: uncertainty
  resolved: true
  description: 'UFO''s own philosophical/metaphysical grounding for its endurant/perdurant
    split is now confirmed directly against `xwkont:ref:ufo-2021`: a conceptual-modeling origin
    (evaluating Bunge-Wand-Weber-based approaches), later merging DOLCE and GFO on the shared
    basis of a four-category ontology ("the Aristotelian Square").'
  impact: '`mapping-005` raised from medium to high; UFO''s philosophical-dimension row in
    Source Definitions now filled with a cited paraphrase.'
  follow_up: Resolved — no further action needed.
  resolved_date: "2026-07-01"
  resolution_note: resolved 2026-07-01
- item_id: uncertainty-002
  uncertainty_type: non-equivalence
  resolved: false
  description: SUMO's Object/Process pair is not asserted as equivalent to Continuant/Occurrent.
    SUMO's top-level partition criterion is physicality (`Physical` vs. `Abstract`), not temporal
    persistence.
  impact: Low confidence on all SUMO rows in this crosswalk (`mapping-006`, `mapping-007`).
  follow_up: Read SUMO's current source files directly (not just the 2001 founding paper)
    for `Process`'s exact temporal semantics before raising confidence.
