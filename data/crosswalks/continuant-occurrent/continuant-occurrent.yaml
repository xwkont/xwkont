  description: YAMATO's OWL/Hozo files were not fetched (registration-gated download requiring
    name/organization/email submission — see `xwkont:ref:yamato-mizoguchi-2010`); this crosswalk's
    YAMATO correspondences (011-012) cite section/quotation locators, not OWL class IRIs,
    unlike GFO/TUpper/GUM's correspondences (009-010, 013-016). The three new sources' dedicated
