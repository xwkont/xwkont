source_definitions:
- source: BFO
  term_or_identifier: continuant (BFO_0000002)
  dimension: technical
  source_claim_type: direct quotation
  text: '"(Elucidation) A continuant is an entity that persists, endures, or continues to
    exist through time while maintaining its identity." Examples: "A human being; a tennis
    ball; a cave; a region of space; someone''s temperature."'
  reference:
  - xwkont:ref:bfo-2020
  locator: '**verified**: `bfo-core.ttl`, class BFO_0000002, fetched and read directly 2026-07-01'
  entry_notes: Confirms the earlier secondary-source paraphrase closely.
- source: BFO
  term_or_identifier: occurrent (BFO_0000003)
  dimension: technical
  source_claim_type: direct quotation
  text: '"(Elucidation) An occurrent is an entity that unfolds itself in time or it is the
    start or end of such an entity or it is a temporal or spatiotemporal region." Examples
    given: "process, history, process boundary, spatiotemporal region, zero-dimensional temporal
    region, one-dimensional temporal region, temporal interval, temporal instant."'
  reference:
  - xwkont:ref:bfo-2020
  locator: '**verified**: `bfo-core.ttl`, class BFO_0000003, fetched and read directly 2026-07-01'
  entry_notes: Confirms the earlier paraphrase and additionally reveals a fuller definition
    (occurrent also covers temporal/spatiotemporal regions, not just "dynamic processes").
- source: BFO
  term_or_identifier: continuant/occurrent split
  dimension: philosophical
  source_claim_type: paraphrase
  text: BFO's continuant/occurrent split reflects a realist framework grounded in scientific
    practice.
  reference:
  - xwkont:ref:borgo-galton-kutz-2022
  locator: editorial framing from the special-issue editorial, not BFO's own text
  entry_notes: This is a secondary characterization, not BFO's self-description.
- source: DOLCE
  term_or_identifier: endurant
  dimension: technical
  source_claim_type: direct quotation
  text: '"Endurants are wholly present (i.e., all their proper parts are present) at any time
    they are present."'
  reference:
  - xwkont:ref:dolce-wonderweb-d18
  locator: '**verified**: WonderWeb D18 PDF, manually extracted 2026-07-01'
  entry_notes: Corrects the earlier secondary-source wording ("necessarily wholly present
    in each time interval at which they exist") to the primary text's exact phrasing — same
    meaning, now exact.
- source: DOLCE
  term_or_identifier: perdurant
  dimension: technical
  source_claim_type: direct quotation
  text: '"Perdurants, on the other hand, just extend in time by accumulating different temporal
    parts, so that, at any time they are present, they are only partially present."'
  reference:
  - xwkont:ref:dolce-wonderweb-d18
  locator: '**verified**: WonderWeb D18 PDF, manually extracted 2026-07-01'
  entry_notes: Same correction as the endurant row above.
- source: DOLCE
  term_or_identifier: endurant/perdurant split
  dimension: philosophical
  source_claim_type: direct quotation
  text: '"[W]e must emphasise that this distinction is motivated by our cognitive bias, and
    we do not commit to the fact that both these kinds of entity really exist."'
  reference:
  - xwkont:ref:dolce-wonderweb-d18
  locator: '**verified**: WonderWeb D18 PDF, manually extracted 2026-07-01'
  entry_notes: This is now DOLCE's own text, directly confirming (not just via editorial paraphrase
    from `xwkont:ref:borgo-galton-kutz-2022`) the "cognitive bias" framing in `note-002`.
- source: UFO
  term_or_identifier: endurant
  dimension: technical
  source_claim_type: direct quotation
  text: '"Endurants are individuals that exist in time with all their parts."'
  reference:
  - xwkont:ref:ufo-2021
  locator: '**verified**: Applied Ontology 2021 PDF, manually extracted 2026-07-01'
  entry_notes: Confirms the earlier paraphrase exactly; now a direct quotation.
- source: UFO
  term_or_identifier: perdurant / event
  dimension: technical
  source_claim_type: direct quotation
  text: '"Perdurants are individuals that unfold in time accumulating temporal parts. An endurant
    can change while maintaining its identity, a perdurant cannot."'
  reference:
  - xwkont:ref:ufo-2021
  locator: '**verified**: Applied Ontology 2021 PDF, manually extracted 2026-07-01'
  entry_notes: UFO's theory of events additionally covers mereology, temporal ordering, participation,
    causation, and change — see `event.md`, not elaborated here.
- source: UFO
  term_or_identifier: endurant/perdurant split (philosophical grounding)
  dimension: philosophical
  source_claim_type: paraphrase
  text: UFO's project began from evaluating conceptual-modeling languages against the Bunge-Wand-Weber
    (BWW) ontology, then merged DOLCE with the General Formal Ontology (GFO) on the shared
    basis of a four-category ontology ("the Aristotelian Square," per Lowe 2006) crossing
    individuals/types with substantials/moments.
  reference:
  - xwkont:ref:ufo-2021
  locator: '**verified**: Applied Ontology 2021 PDF, manually extracted 2026-07-01'
  entry_notes: 'Resolves `uncertainty-001`. A different lineage from BFO''s realist/scientific-practice
    grounding and DOLCE''s cognitive-bias disclaimer: UFO''s stated motivation is conceptual-modeling
    practice, informed by analytic four-category ontology.'
- source: SUMO
  term_or_identifier: Physical
  dimension: technical
  source_claim_type: direct quotation
  text: '"(subclass Physical Entity)... An entity that has a location in space-time. Note
    that locations are themselves understood to have a location in space-time." Object and
    Process are both `(subclass ... Physical)`.'
  reference:
  - xwkont:ref:sumo-niles-pease-2001
  locator: '**verified**: `Merge.kif`, `documentation Physical EnglishLanguage`, fetched and
    read directly 2026-07-01'
  entry_notes: The source contains a commented-out (inactive) `(partition Physical Object
    Process)` line — Object/Process are each independently asserted as subclasses of Physical,
    but their joint-exhaustiveness as a formal partition is not an active axiom in current
    SUMO, only an apparent intention.
- source: SUMO
  term_or_identifier: Object
  dimension: technical
  source_claim_type: paraphrase
  text: 'Object is a subclass of Physical, one branch of SUMO''s top-level `Entity` → `Physical`/`Abstract`
    partition. Confirmed directly (see `object.md`''s verified quote: "Corresponds roughly
    to the class of ordinary objects").'
  reference:
  - xwkont:ref:sumo-niles-pease-2001
  locator: '**verified** (see `object.md` for the full quotation)'
  entry_notes: Not labeled "continuant" by SUMO.
- source: SUMO
  term_or_identifier: Process
  dimension: technical
  source_claim_type: paraphrase
  text: 'Process is a subclass of Physical, the sibling branch to Object. Confirmed directly
    (see `process.md`''s verified quote: "anything that occurs in time but is not an Object").'
  reference:
  - xwkont:ref:sumo-niles-pease-2001
  locator: '**verified** (see `process.md` for the full quotation)'
  entry_notes: SUMO's partition criterion is physicality, not temporal persistence — see Uncertainty.
- source: SUMO
  term_or_identifier: Object/Process split
  dimension: philosophical
  source_claim_type: editorial observation
  text: SUMO is organized for interoperability among automated reasoning engines, an engineering-first
    purpose rather than an explicit metaphysical grounding of the kind BFO/DOLCE/UFO state.
  reference:
  - xwkont:ref:sumo-niles-pease-2001
  locator: paraphrase of the source's own stated purpose
  entry_notes: This is an observation about stated purpose, not a claim that SUMO lacks any
    philosophical basis.
- source: GFO
  term_or_identifier: Occurrent
  dimension: technical
  source_claim_type: direct quotation
  text: '"Occurrents have temporal parts and thus cannot be present at a time-boundary. Time
    belongs to them, because they happen in time and the time of the occurrent is built into
    it. The relation between an occurrent and a chronoid is determined by the projection relation.
    Occurrents are also called generalized processes in the GFO."'
  reference:
  - xwkont:ref:gfo
  locator: '**verified**: `modules/gfo-base.owl`, class `Occurrent`, fetched and read directly
    2026-07-02'
  entry_notes: '`owl:disjointWith` `Presential`. Shares the term "occurrent" with BFO/DOLCE/UFO''s
    occurrent side.'
- source: GFO
  term_or_identifier: Presential
  dimension: technical
  source_claim_type: direct quotation
  text: '"A presential exists wholly at exactly one time boundary."'
  reference:
  - xwkont:ref:gfo
  locator: '**verified**: `modules/gfo-base.owl`, class `Presential`, fetched and read directly
    2026-07-02'
  entry_notes: GFO's continuant-side term is "Presential," not "Continuant" — GFO does not
    use "continuant" anywhere in the base module.
- source: GFO
  term_or_identifier: Process
  dimension: technical
  source_claim_type: direct quotation
  text: '"Processes are a special kind of occurrent. Processes are directly in time, they
    have characteristics which cannot be captured by a collection of time boundaries."'
  reference:
  - xwkont:ref:gfo
  locator: '**verified**: `modules/gfo-base.owl`, class `Process`, fetched and read directly
    2026-07-02'
  entry_notes: Subclass of `Occurrent`, included for comparison with the other sources' Process/Occurrent
    nesting.
- source: GFO
  term_or_identifier: Presential/Occurrent split
  dimension: philosophical
  source_claim_type: editorial observation
  text: 'GFO is explicitly 4D-oriented (per YAMATO''s own comparative framing, `xwkont:ref:yamato-mizoguchi-2010`:
    "GFO is based on 4D view"), unlike DOLCE''s stated 3D orientation. GFO''s own OWL files
    carry no explicit philosophical-grounding prose comparable to DOLCE''s "cognitive bias"
    disclaimer or UFO''s four-category-ontology lineage.'
  reference:
  - xwkont:ref:gfo
  - xwkont:ref:yamato-mizoguchi-2010
  locator: secondary characterization (YAMATO's framing of GFO), not GFO's own text
  entry_notes: Included with lower confidence than the BFO/DOLCE/UFO philosophical rows, which
    are either primary-sourced or (for BFO) explicitly flagged unverified.
- source: YAMATO
  term_or_identifier: Continuant(Object)
  dimension: technical
  source_claim_type: direct quotation
  text: '"(4) Continuant(Object) vs. Occurrent(Process) ... Common sense is based on 3D model
    which consists of the 3D Euclidean space with absolute time. YAMATO is based on a solid
    theory of objects, processes and events, and it deals with them of equal importance (Galton
    2009)."'
  reference:
  - xwkont:ref:yamato-mizoguchi-2010
  locator: '**verified**: 2010 technical report PDF, manually extracted 2026-07-02'
  entry_notes: YAMATO uses "Continuant" directly as a top-level label, parenthetically glossed
    as "Object."
- source: YAMATO
  term_or_identifier: Occurrent(Process)
  dimension: technical
  source_claim_type: direct quotation
  text: '"Furthermore, it clearly identifies events are made of processes and while processes
    can change, events cannot. We do not use the term perdurant for explaining processes because
    it blocks to talk about the difference between processes and events."'
  reference:
  - xwkont:ref:yamato-mizoguchi-2010
  locator: '**verified**: 2010 technical report PDF, manually extracted 2026-07-02'
  entry_notes: YAMATO explicitly declines DOLCE/UFO's "perdurant" terminology for this reason.
- source: YAMATO
  term_or_identifier: Continuant/Occurrent split
  dimension: philosophical
  source_claim_type: direct quotation
  text: '"The standpoint taken in YAMATO consists of Newtonian world point of view and 3D-like
    modeling, that is, the world is considered as being composed of the three-dimensional
    Euclidean space with the absolute time and both object(continuant) and process (occurrent)
    exist with equal importance in a mutually-dependent manner."'
  reference:
  - xwkont:ref:yamato-mizoguchi-2010
  locator: '**verified**: 2010 technical report PDF, manually extracted 2026-07-02'
  entry_notes: 'Distinct from BFO/DOLCE/UFO: YAMATO explicitly treats continuant and occurrent
    as *mutually dependent*, rejecting the idea that either is ontologically prior to the
    other.'
- source: TUpper
  term_or_identifier: object
  dimension: technical
  source_claim_type: direct quotation
  text: '"An object is anything that is not a timepoint, nor an activity nor an activity-occurrence.
    Intuitively, an object is a concrete or abstract thing that can participate in an activity.
    Objects can come into existence (be created) and go out of existence (be ''used up'' as
    a resource) at certain points in time."'
  reference:
  - xwkont:ref:tupper-colore
  locator: '**verified**: `TUpper-Terms.html`, term `object`, fetched and read directly 2026-07-02'
  entry_notes: Defined negatively (by exclusion), not by a positive temporal-persistence criterion
    — a different definitional style from every other source in this crosswalk.
- source: TUpper
  term_or_identifier: activity_occurrence
  dimension: technical
  source_claim_type: direct quotation
  text: '"An activity occurrence is associated with a unique activity" via the `occurrence_of`
    relation; "occ is a member of the class of activity occurrences in the universe of discourse
    of the interpretation."'
  reference:
  - xwkont:ref:tupper-colore
  locator: '**verified**: `TUpper-Terms.html`, term `activity_occurrence`, fetched and read
    directly 2026-07-02'
  entry_notes: TUpper's closest analog to "occurrent" — an occurrence tied to a specific activity,
    inherited from PSL.
- source: TUpper
  term_or_identifier: object/activity_occurrence split
  dimension: philosophical
  source_claim_type: editorial observation
  text: TUpper's vocabulary is inherited from PSL (Process Specification Language), an engineering/manufacturing-process
    ontology, not a philosophical top-level ontology in the BFO/DOLCE/UFO sense — closer in
    spirit to SUMO's engineering-first framing (`note-003`) than to the three metaphysically-grounded
    sources.
  reference:
  - xwkont:ref:tupper-colore
  locator: paraphrase, based on PSL's documented purpose and TUpper's own negative-definition
    style
  entry_notes: Not a claim that TUpper lacks any theoretical grounding — ISO/IEC 21838-4:2023's
    own text (not accessed in this pass) may state one explicitly.
- source: GUM
  term_or_identifier: SimpleThing
  dimension: technical
  source_claim_type: direct quotation
  text: '"An entity which may participate in a configuration."'
  reference:
  - xwkont:ref:gum-owl
  locator: '**verified**: `GUM-31.owl`, class `SimpleThing`, fetched and read directly 2026-07-02'
  entry_notes: Subclass of `Element`; GUM's closest analog to "continuant" — a participant,
    not a temporally-persisting substance per se.
- source: GUM
  term_or_identifier: Process
  dimension: technical
  source_claim_type: direct quotation
  text: '"A Process is the linguistic construal of ''goings-on'' or events. Processes are
    similar to Configurations, but factor out Participants, Circumstances, and other elements.
    As such, entities classified under Process can be expressed as verbs and are frequently
    the main verb in a clause."'
  reference:
  - xwkont:ref:gum-owl
  locator: '**verified**: `GUM-31.owl`, class `Process`, fetched and read directly 2026-07-02'
  entry_notes: '`owl:disjointWith` `SimpleThing`; a linguistic (verb-realized) criterion,
    not temporal persistence.'
- source: GUM
  term_or_identifier: SimpleThing/Process split
  dimension: philosophical
  source_claim_type: editorial observation
  text: GUM's split is grounded in systemic-functional linguistics (Halliday & Matthiessen's
    transitivity model — participants vs. processes as clause elements), explicitly stated
    in GUM's own class comments, not in a metaphysical persistence criterion.
  reference:
  - xwkont:ref:gum-owl
  locator: direct quotation basis, editorial synthesis of the pattern across GUM's class comments
  entry_notes: Structurally the closest precedent in this crosswalk is SUMO's engineering-first
    framing (`note-003`), though GUM's motivation (linguistic mediation) differs from SUMO's
    (reasoner interoperability).
