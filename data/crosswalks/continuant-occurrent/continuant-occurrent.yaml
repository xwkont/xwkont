comparison_notes:
- note_id: note-001
  dimension: technical
  claim_type: editorial observation
  note: 'BFO, DOLCE, and UFO all use the same temporal-persistence criterion for their top-level
    split: an entity''s parts are either all present at once (continuant/endurant) or accumulated/extended
    through time (occurrent/perdurant), now confirmed directly against all three primary sources.
    SUMO''s `Physical`/`Abstract` → `Object`/`Process` split uses a different criterion (physicality),
    so structural position in the hierarchy is not identical even where the labels invite
    comparison.'
  supporting_references:
  - xwkont:ref:bfo-2020
  - xwkont:ref:dolce-wonderweb-d18
  - xwkont:ref:ufo-2021
  - xwkont:ref:sumo-niles-pease-2001
  confidence: high
- note_id: note-002
  dimension: philosophical
  claim_type: editorial observation
  note: 'BFO''s split is characterized in comparative literature as reflecting a realist framework
    grounded in scientific practice (unverified, secondary-sourced — see Uncertainty). DOLCE''s
    cognitive/linguistic orientation is now **directly confirmed** in the primary source''s
    own words: "we must emphasise that this distinction is motivated by our cognitive bias,
    and we do not commit to the fact that both these kinds of entity really exist." UFO''s
    grounding, previously unconfirmed (`uncertainty-001`), is now also directly confirmed:
    a conceptual-modeling origin (evaluating BWW-based approaches) that merged DOLCE and GFO
    on the basis of a shared four-category-ontology commitment (individuals/types × substantials/moments).
    Three different philosophical lineages for a formally similar-looking split, two now confirmed
    by primary-source quotation rather than editorial paraphrase.'
  supporting_references:
  - xwkont:ref:borgo-galton-kutz-2022
  - xwkont:ref:dolce-wonderweb-d18
  - xwkont:ref:ufo-2021
  confidence: high
  supporting_references_note: '`xwkont:ref:borgo-galton-kutz-2022` (BFO only), `xwkont:ref:dolce-wonderweb-d18`,
    `xwkont:ref:ufo-2021`'
- note_id: note-003
  dimension: technical
  claim_type: editorial observation
  note: SUMO's Object/Process pair is included as a structural analog only; Niles & Pease
    (2001) frame SUMO's purpose as interoperability among automated reasoning engines rather
    than an explicitly philosophically motivated top-level split, in contrast to BFO/DOLCE/UFO's
    stated theoretical grounding.
  supporting_references:
  - xwkont:ref:sumo-niles-pease-2001
  confidence: medium
- note_id: note-004
  dimension: technical
  claim_type: editorial observation
  note: 'The four `ADR-0015` sources use continuant/occurrent-equivalent vocabulary with markedly
    different terminological fidelity to BFO. YAMATO uses "Continuant"/"Occurrent" directly
    (the closest match of any source in this crosswalk besides BFO itself). GFO uses "Occurrent"
    for the same side but "Presential" (not "Continuant") for the other. TUpper and GUM use
    neither term: TUpper''s `object`/`activity_occurrence` (PSL-derived, engineering-oriented)
    and GUM''s `SimpleThing`/`Process` (linguistically-oriented) are structural analogs only,
    in the same sense SUMO''s `Object`/`Process` (`note-003`) already is — a pattern that
    now recurs across three of the crosswalk''s eight sources rather than being a SUMO-specific
    exception.'
  supporting_references:
  - xwkont:ref:gfo
  - xwkont:ref:yamato-mizoguchi-2010
  - xwkont:ref:tupper-colore
  - xwkont:ref:gum-owl
  confidence: high
  confidence_annotation: (terminology comparison directly verified against each source's own
    text); confidence on individual cross-source *mapping* claims is set per-mapping below,
    not uniformly here
