  uncertainty_type: open-question
  resolved: false
  description: This crosswalk does not resolve the Process/Event distinction within Occurrent,
    already flagged as an unresolved boundary in `docs/releases/core-ontology-release-notes.md`.
  impact: Scopes this crosswalk to the Continuant/Occurrent level only.
  follow_up: Create Process and Event concept crosswalks per `TODO.md`.
- item_id: uncertainty-004
  uncertainty_type: uncertainty
  resolved: true
  description: 'Scope question resolved by `ADR-0015`: GFO, YAMATO, TUpper, and GUM (the other
    ontologies in `xwkont:ref:borgo-galton-kutz-2022`''s special issue) are now in XwkOnt''s
    source-ontology scope, alongside the original BFO/DOLCE/SUMO/UFO. The content buildout
    for this crosswalk (correspondences 009-016, mappings 008-015) is also now complete, directly
    verified against each new source''s own OWL/CLIF/technical-report text.'
  impact: This crosswalk now covers all 8 `ADR-0015` sources. The remaining 7 concept crosswalks
    (`object.md`, `event.md`, `information-artifact.md`, `process.md`, `quality.md`, `relation.md`,
    `role.md`) still cover only the original 4 — tracked in `TODO.md` as ongoing work.
  follow_up: This crosswalk's buildout is done. Extend the same pattern to the remaining 7
    crosswalks in future work, per `TODO.md`'s pacing note (don't attempt all 8 at once without
    checking with the maintainer, per the precedent set for the scope decision itself).
  resolved_date: "2026-07-02"
  resolution_note: resolved 2026-07-02 (scope); content buildout also completed 2026-07-02
