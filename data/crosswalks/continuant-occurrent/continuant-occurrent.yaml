local_identifier: xwkont:concept:continuant-occurrent
slug: continuant-occurrent
title: Continuant / Occurrent
editorial_status: reviewed
created: "2026-07-01"
modified: "2026-07-06"
scope_note: 'This crosswalk compares the top-level temporal-persistence split found in BFO
  (continuant/occurrent), DOLCE (endurant/perdurant), and UFO (endurant/perdurant), and a
  structurally different but often-compared analog in SUMO (Object/Process under a Physical/Abstract
  partition). It is XwkOnt''s first concept crosswalk, chosen deliberately over a more concrete
  concept (e.g., Object) because it is the most abstract split each source ontology makes,
  is the best-evidenced in existing comparative literature, and directly validates XwkOnt''s
  own top-level scaffold (`xwkont-core:Continuant`, `xwkont-core:Occurrent` in `data/ontology/core.ttl`)
  against real source definitions.



  Exclusions: this crosswalk does not resolve the Process/Event distinction within Occurrent
  (a separate, already-flagged open question — see Uncertainty).



  **Update (2026-07-02), GFO/YAMATO/TUpper/GUM buildout:** `ADR-0015` (2026-07-02) expanded
  XwkOnt''s source-ontology scope to include GFO, YAMATO, TUpper, and GUM. This crosswalk
  is the first to receive the resulting content buildout, resolving `uncertainty-004`. None
  of the four use "continuant/occurrent" terminology identically to BFO/DOLCE/UFO:



  - **GFO** uses its own top-level pair, **Presential/Occurrent** (not "Continuant") — Occurrent
  is shared vocabulary with BFO/DOLCE/UFO''s occurrent side, but the continuant-side term
  differs.

  - **YAMATO** uses **Continuant/Occurrent** directly, parenthetically glossed as Object/Process,
  with an explicit refusal to use "perdurant."

  - **TUpper** uses no continuant/occurrent-style label at all — its PSL-derived vocabulary
  (`object`/`activity_occurrence`) defines `object` negatively (anything that is not a timepoint,
  activity, or activity-occurrence).

  - **GUM** uses no continuant/occurrent-style label either — its `SimpleThing`/`Process`
  split is grounded in systemic-functional linguistics (participant vs. verb-realized "goings-on"),
  not a metaphysical persistence criterion, structurally closer to this crosswalk''s existing
  SUMO precedent than to BFO/DOLCE/UFO.



  Each source''s OWL/CLIF files were fetched and read directly (no PDF extraction needed for
  GFO or TUpper/GUM''s OWL; a 2010 YAMATO technical report PDF was extracted for YAMATO since
  its dedicated 2022 paper and OWL/Hozo download were both inaccessible — see `note-004` and
  the relevant reference records for details).



  **Update (2026-07-01), following direct primary-source verification of DOLCE and UFO:**
  the WonderWeb D18 report and the UFO 2021 Applied Ontology paper (already fetched and extracted
  for other crosswalks — `object.md`, `role.md`, `process.md`, `relation.md`) were reused
  to verify this crosswalk''s DOLCE and UFO content directly, resolving `uncertainty-001`.
  Findings:



  - **DOLCE''s endurant/perdurant definitions are confirmed**, with more exact wording than
  the earlier secondary-source paraphrase: "Endurants are wholly present (i.e., all their
  proper parts are present) at any time they are present. Perdurants, on the other hand, just
  extend in time by accumulating different temporal parts, so that, at any time they are present,
  they are only partially present." D18 also **directly confirms** `note-002`''s claim about
  DOLCE''s cognitive orientation, in the authors'' own words: "we must emphasise that this
  distinction is motivated by our cognitive bias, and we do not commit to the fact that both
  these kinds of entity really exist."

  - **UFO''s endurant/perdurant definitions are confirmed** as originally paraphrased, now
  as a direct quotation: "UFO distinguishes between endurants and perdurants. Endurants are
  individuals that exist in time with all their parts. Perdurants are individuals that unfold
  in time accumulating temporal parts. An endurant can change while maintaining its identity,
  a perdurant cannot."

  - **`uncertainty-001` (UFO''s philosophical grounding) is resolved.** The 2021 paper traces
  UFO''s origin to conceptual-modeling ontology evaluation work (Bunge-Wand-Weber), later
  merging with DOLCE and the General Formal Ontology (GFO) on the basis of a shared commitment
  to a **four-category ontology** ("the Aristotelian Square," per Lowe 2006) distinguishing
  individuals/types crossed with substantials/moments. This is a different philosophical lineage
  from both BFO''s realist/scientific-practice grounding and DOLCE''s cognitive/linguistic
  orientation — UFO''s stated motivation is explicitly the practical requirements of conceptual
  modeling languages, informed by analytic four-category ontology, not a cognitive-bias disclaimer
  or a scientific-realist stance.



  **Epistemic note:** BFO and SUMO content is verified directly against primary sources (`bfo-core.ttl`,
  `Merge.kif`). DOLCE and UFO content is now also directly verified (2026-07-01), reusing
  extractions performed for other crosswalks in this repository. The `xwkont:ref:borgo-galton-kutz-2022`
  editorial framing (BFO''s "realist" and DOLCE''s "cognitive/linguistic" characterizations)
  remains secondary-sourced and unverified — see Future Work.'
