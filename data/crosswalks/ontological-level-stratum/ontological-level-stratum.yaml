uncertainties:
- item_id: uncertainty-001
  uncertainty_type: non-equivalence
  resolved: true
  description: 'The Codex draft proposed UFO''s UFO-A/UFO-B/UFO-C partition as a
    second positive source for this candidate. Resolved against, on directly verified
    evidence, not by editorial preference: the 2021 paper never uses "stratum"/"strata"/"layer"
    vocabulary (confirmed zero matches in a full-text search, 2026-07-07); the endurant/perdurant
    half (UFO-A/B) is already fully crosswalked in `continuant-occurrent.md`; the
    social-intentional half (UFO-C) overlaps `role.md`''s territory. This is not
    an open scope call requiring a maintainer decision, because it does not create
    a new question -- this candidate was already admitted to the `0.3.0` batch on
    single-source (GFO-only) terms on 2026-07-06 ("1 source, weak"). Excluding
    UFO simply confirms that original framing; it does not shrink an otherwise-larger
    accepted candidate.'
  impact: This candidate is a single-source (GFO-only) concept, consistent with
    its original batch admission. `xwkont:mapping:ontological-level-stratum:002`
    is set to `explicit-non-equivalence`, high confidence.
  follow_up: If a later pass on `continuant-occurrent.md` or `role.md` wants to
    cross-reference this same finding (that UFO-A/B/C's substance is fully covered
    by those two crosswalks already), that is optional documentation, not a prerequisite
    for this crosswalk to advance.
- item_id: uncertainty-002
  uncertainty_type: non-equivalence
  resolved: true
  description: 'BFO''s absence claim was not independently re-fetched in the first
    review pass -- `raw.githubusercontent.com/BFO-ontology/BFO-2020/master/src/owl/bfo-core.ttl`
    404s. Resolved 2026-07-07: the correct path is `21838-2/owl/bfo-core.ttl` (confirmed
    via the GitHub API tree listing). Re-fetched and grepped directly -- zero occurrences
    of "stratu", "layer", or "level". The same pass also closed out the parallel
    gap for DOLCE, YAMATO, TUpper, and GUM (all five sources not independently
    re-fetched in the first pass are now directly re-verified), surfacing two further
    corrections to the Codex draft''s characterization: TUpper has zero stratum/layer/level
    vocabulary at all (draft said "confined to timepoints"), and GUM''s `level`
    occurrences are descriptive-generality/clause-scope prose, not measurement
    contexts (draft said "linguistic/measurement contexts").'
  impact: All 8 sources are now independently re-verified directly against primary
    artifacts. No change to any absence conclusion, only to the precision of two
    sources' characterization (TUpper, GUM).
  follow_up: None outstanding.
- item_id: uncertainty-003
  uncertainty_type: non-equivalence
  resolved: false
  description: DOLCE's layering comment (on `specific-constant-constituent`) and
    YAMATO's `two-level reality`/representation-level language are real source
    text, but neither is a standalone `Stratum`/`Level`-style apparatus.
  impact: Prevents over-mapping DOLCE or YAMATO to GFO on the basis of adjacent
    vocabulary alone.
  follow_up: Keep both as supporting/adjacent evidence only unless a later source-side
    module reifies either as a first-class apparatus.
- item_id: uncertainty-004
  uncertainty_type: non-equivalence
  resolved: false
  description: SUMO's `Mid-level-ontology` module name is not evidence of a source-side
    ontological stratum.
  impact: Prevents conflating repository/module organization with ontological structure.
  follow_up: Leave SUMO at absence unless a source class or explicit layer theory
    appears.
