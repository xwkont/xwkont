local_identifier: xwkont:concept:ontological-level-stratum
slug: ontological-level-stratum
title: Ontological Level / Stratum
editorial_status: reviewed
created: "2026-07-07"
modified: "2026-07-07"
scope_note: "This candidate is about a source ontology's own apparatus for stratifying\
  \ reality into layers (material/physical, biological, chemical, mental, social,\
  \ etc.), not about:\n\n- a particular entity's membership in a stratum;\n- ordinary\
  \ uses of the word `level` inside a quality, measurement, representation, or\
  \ modeling passage;\n- module or document architecture that happens to use the\
  \ word `level` or `layer` in a project or paper's own organizational sense.\n\n\
  Direct verification confirms one positive source: GFO's `Ontological_layer` umbrella\
  \ class, formally split into disjoint `Stratum` and `Level` branches, each carrying\
  \ real material/mental/social (`Stratum`) and physical/chemical/biological/awareness/personality\
  \ (`Level`) content. This is a single-source candidate -- a valid, already-anticipated\
  \ outcome, since this candidate was admitted to the `0.3.0` batch on exactly those\
  \ (1-source) terms on 2026-07-06.\n\nThe Codex draft also proposed UFO's `UFO-A`/`UFO-B`/`UFO-C`\
  \ partition as a second positive source. Independent re-verification found this\
  \ does not hold up: a direct full-text search of the re-fetched 2021 paper found\
  \ zero occurrences of \"stratum\", \"strata\", or \"layer\" anywhere -- the stratification\
  \ framing was the drafting pass's own gloss, not the source's. The partition's\
  \ substance (endurants / perdurants / social-intentional entities) is also the\
  \ same distinction already crosswalked under `continuant-occurrent.md` (UFO's\
  \ endurant/perdurant split) and the social/intentional-entity territory covered\
  \ by `role.md`. UFO is therefore recorded here as `explicit-non-equivalence` --\
  \ a settled, evidence-based finding, not an open scope question -- see `uncertainty-001`\
  \ for the resolution record.\n\nAll 8 sources are independently re-verified directly\
  \ against primary artifacts, not merely accepted from the Codex draft. Two further\
  \ corrections to the draft's characterization turned up during that pass (both\
  \ recorded in Source Definitions, neither changing an absence conclusion): TUpper\
  \ has zero stratum/layer/level vocabulary at all, not merely usage \"confined\
  \ to timepoints\" as originally drafted; GUM's `level` occurrences are descriptive-generality/clause-scope\
  \ prose, not \"measurement\" contexts.\n\nThe other six sources\
  \ did not surface a comparable first-class stratification apparatus in the artifacts\
  \ checked. DOLCE and YAMATO do have level/layer language, but in the checked source\
  \ text that language stays local to specific relations, representations, or descriptions\
  \ rather than becoming a general stratification apparatus like GFO's."
