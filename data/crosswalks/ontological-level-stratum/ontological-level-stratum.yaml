comparison_notes:
- note_id: note-001
  dimension: technical
  claim_type: editorial observation
  note: GFO is the only source directly re-verified this pass to make stratification
    explicit at the ontology level through a reified class hierarchy -- an umbrella
    `Ontological_layer` split into disjoint `Stratum` and `Level` branches, each
    with named material/mental/social (Stratum) and physical/chemical/biological/awareness/personality
    (Level) sub-branches.
  supporting_references:
  - xwkont:ref:gfo
  confidence: high
- note_id: note-002
  dimension: technical
  claim_type: editorial observation
  note: UFO's candidacy as a second source is resolved against, not left open. A
    direct full-text search of the re-fetched 2021 paper found zero occurrences
    of "stratum", "strata", or "layer" -- the paper's own UFO-A/UFO-B/UFO-C partition
    is presented as a theory/document division (endurants / perdurants / social-intentional
    entities), not as a reality-stratification apparatus in GFO's sense. The endurant/perdurant
    half is already fully crosswalked in `continuant-occurrent.md`, and this candidate
    was already admitted to the `0.3.0` batch on single-source (GFO-only) terms
    on 2026-07-06, so excluding UFO does not raise a new scope question -- it confirms
    the batch's original single-source framing.
  supporting_references:
  - xwkont:ref:ufo-2021
  - xwkont:ref:gfo
  confidence: high
- note_id: note-003
  dimension: technical
  claim_type: editorial observation
  note: DOLCE and YAMATO both use level/layer language, but in the checked artifacts
    that language stays local to a particular property comment or a representation/quality
    discussion. That is adjacent evidence, not a first-class ontology-layer apparatus.
  supporting_references:
  - xwkont:ref:dolce-lite-owl
  - xwkont:ref:yamato-mizoguchi-2010
  confidence: medium
- note_id: note-004
  dimension: technical
  claim_type: editorial observation
  note: SUMO's `Mid-level-ontology` is a project/module naming convention, not a
    reified source-side layer of reality -- directly re-verified against the current
    `Merge.kif` this pass. Treating it as an ontological stratum would conflate
    architecture with ontology content. This is the same category of caveat now
    also applying to UFO-A/B/C (`note-002`).
  supporting_references:
  - xwkont:ref:sumo-niles-pease-2001
  confidence: high
- note_id: note-005
  dimension: technical
  claim_type: editorial observation
  note: BFO, TUpper, and GUM did not surface a dedicated stratification apparatus,
    directly re-verified 2026-07-07 against `bfo-core.ttl`, `TUpper-Terms.html`/`tupper.all.owl`/`tupper.clif`,
    and `GUM-31.owl.txt`. That is a scoped absence, not a claim that these sources
    never talk about levels, layers, or hierarchy in any other sense -- TUpper has
    zero stratum/layer/level vocabulary at all; GUM's handful of `level` occurrences
    are descriptive-generality/clause-scope prose, not measurement units (correcting
    the Codex draft's characterization of both).
  supporting_references:
  - xwkont:ref:bfo-2020
  - xwkont:ref:tupper-colore
  - xwkont:ref:gum-owl
  confidence: high
