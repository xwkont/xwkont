source_definitions:
- source: GFO
  term_or_identifier: Ontological_layer
  dimension: technical
  source_claim_type: direct quotation
  text: A collective term for gfo-base:Stratum and gfo-base:Level.
  reference:
  - xwkont:ref:gfo
  locator: '`modules/gfo-base.owl`, class `Ontological_layer`, re-fetched and re-read
    directly 2026-07-07'
  entry_notes: This is the seed term the backlog originally named. The class itself
    carries an `rdfs:comment` marking it and its sub-concepts "work in progress
    in a premature beta state" and an `owl:versionInfo` of "Beta" -- worth recording
    as a caveat on how mature this apparatus is within GFO's own documentation.
- source: GFO
  term_or_identifier: Stratum
  dimension: technical
  source_claim_type: direct quotation
  text: According to (Poli, 2001, 2002) (based on the philosopher Hartmann) we distinguish
    at least three ontological strata of the world's material stratum, the mental/psychological
    stratum, and the social stratum. Every entity of the world participates in certain
    strata and levels. We take the position that the layers are characterized by
    integrated systems of categories. Hence, a layer can be understood as a meta-category
    whose instances are categories of certain kinds.
  reference:
  - xwkont:ref:gfo
  locator: '`modules/gfo-base.owl`, class `Stratum`, re-fetched and re-read directly
    2026-07-07'
  entry_notes: 'Confirms GFO''s strata are not an incidental metaphor but an explicit
    ontological-layer concept, citing Poli/Hartmann directly. `owl:disjointWith
    Level` confirmed directly in the fetched file.'
- source: GFO
  term_or_identifier: Level
  dimension: technical
  source_claim_type: direct quotation
  text: An ontological level, which is sth. more restricted and "part of" some gfo:Stratum.
  reference:
  - xwkont:ref:gfo
  locator: '`modules/gfo-base.owl`, class `Level`, re-fetched and re-read directly
    2026-07-07'
  entry_notes: '`Level` is not a synonym for `Stratum`; it is a separate, disjoint
    class (`owl:disjointWith Stratum`, confirmed directly), related by `abstract_part_of`.'
- source: GFO
  term_or_identifier: Material_stratum
  dimension: technical
  source_claim_type: direct quotation
  text: According to (Poli, 2001), the basic structure of the material stratum is
    a distinction of physical, chemical and biological levels. These levels can
    be further refined.
  reference:
  - xwkont:ref:gfo
  locator: '`modules/gfo-base.owl`, class `Material_stratum`, re-fetched and re-read
    directly 2026-07-07'
  entry_notes: Confirmed `rdfs:subClassOf Stratum` directly. Makes the physical/chemical/biological
    decomposition explicit in the source itself.
- source: GFO
  term_or_identifier: Mental_stratum
  dimension: technical
  source_claim_type: direct quotation
  text: In accordance with the work of R. Poli, we divide the psychological/mental
    stratum into the layer of awareness and the layer of personality. Awareness
    comprises most of what is studied by cognitive science (perception, memory,
    reasoning, etc). Personality on the other hand concerns the phenomenon of will
    and the way in which someone reacts to her experiences.
  reference:
  - xwkont:ref:gfo
  locator: '`modules/gfo-base.owl`, class `Mental_stratum`, re-fetched and re-read
    directly 2026-07-07'
  entry_notes: Confirmed `rdfs:subClassOf Stratum` directly. Confirms the mental
    layer branch and its internal awareness/personality split. This same class
    was already surfaced as supporting evidence in `mind-conscious-being-agent.yaml`'s
    review pass (2026-07-06), used there only for GFO absence-with-caveat, not as
    a first-class apparatus.
- source: GFO
  term_or_identifier: Social_stratum
  dimension: technical
  source_claim_type: direct quotation
  text: On the one hand, the social stratum is divided into Agents and Institutions.
    Agents are the bearers of the social roles that humans play. Institutions are
    defined as systems of interrelated social components. On the other hand, a
    social system can be seen as a network in which businesses, politics, art, language
    (and many other facets) both present their own features and influence each
    other.
  reference:
  - xwkont:ref:gfo
  locator: '`modules/gfo-base.owl`, class `Social_stratum`, re-fetched and re-read
    directly 2026-07-07'
  entry_notes: Confirmed `rdfs:subClassOf Stratum` directly. Confirms the social
    layer branch and its own decomposition.
- source: GFO
  term_or_identifier: Awareness_level / Personality_level / Physical_level / Chemical_level
    / Biological_level
  dimension: technical
  source_claim_type: direct quotation
  text: All five are confirmed `rdfs:subClassOf Level` directly in the fetched file,
    each additionally restricted by `abstract_part_of` to a specific stratum -- `Awareness_level`
    and `Personality_level` to `Mental_stratum`; `Physical_level`, `Chemical_level`,
    and `Biological_level` to `Material_stratum`.
  reference:
  - xwkont:ref:gfo
  locator: '`modules/gfo-base.owl`, classes `Awareness_level`, `Personality_level`,
    `Physical_level`, `Chemical_level`, `Biological_level`, re-fetched and re-read
    directly 2026-07-07'
  entry_notes: Confirms the branch-local level apparatus under GFO's umbrella; none
    of the five classes carry their own `skos:definition` beyond the `subClassOf`/`abstract_part_of`
    restrictions.
- source: UFO
  term_or_identifier: UFO-A / UFO-B / UFO-C
  dimension: technical
  source_claim_type: direct quotation
  text: UFO-A, which is an ontology of endurants; UFO-B, which is an ontology of
    perdurants; UFO-C, which is an ontology of social and intentional entities.
  reference:
  - xwkont:ref:ufo-2021
  locator: 2021 Applied Ontology paper, introduction (re-fetched and full-text searched
    directly, 2026-07-07)
  entry_notes: '**Correction to the Codex draft''s framing, resolved (not left open)**:
    a direct full-text search of the entire re-fetched paper for "stratum", "strata",
    and "layer" returned zero matches. The paper itself never describes UFO-A/B/C
    using stratification vocabulary -- that framing was introduced by the drafting
    pass, not the source. Substantively, the UFO-A/UFO-B split is the endurant/perdurant
    distinction already crosswalked in full in `continuant-occurrent.md` (see its
    correspondence rows 005-006), and UFO-C''s "social and intentional entities"
    scope overlaps the territory covered by `role.md` and adjacent reviewed crosswalks.
    On this evidence, UFO is excluded as a positive correspondence for this candidate
    -- see `uncertainty-001` for the resolution record.'
- source: BFO
  term_or_identifier: '*(no dedicated stratification class found)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: A direct grep of the fetched `bfo-core.ttl` for "stratum", "layer", and "level"
    found no dedicated stratification class or property.
  reference:
  - xwkont:ref:bfo-2020
  locator: '`21838-2/owl/bfo-core.ttl` (`BFO-ontology/BFO-2020` repository), re-fetched
    and re-read directly 2026-07-07'
  entry_notes: Independently re-verified this pass. Corrects a fetch-path error
    from the first review attempt (`src/owl/bfo-core.ttl` 404s; the correct path
    is `21838-2/owl/bfo-core.ttl`, confirmed via the GitHub API tree listing).
    Zero occurrences of "stratu", "layer", or "level" anywhere in the file.
- source: DOLCE
  term_or_identifier: specific-constant-constituent
  dimension: technical
  source_claim_type: paraphrase
  text: DOLCE-Lite comments that `Constituent` "should depend on some layering of
    the ontology" and that "scientific granularities or ontological 'strata' are
    typical layerings."
  reference:
  - xwkont:ref:dolce-lite-owl
  locator: '`DOLCE-Lite.owl`, object property `specific-constant-constituent`, re-fetched
    and re-read directly 2026-07-07'
  entry_notes: Independently re-verified this pass -- quotation confirmed verbatim
    (including the "typical layerings" and "lower layer" phrasing). Adjacent evidence
    that DOLCE acknowledges layering/strata language, but this is a comment on a
    relation, not a first-class `Stratum`/`Level` apparatus.
- source: SUMO
  term_or_identifier: '*(no dedicated stratification class found)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: '`Merge.kif` uses `level` only in ordinary measurement contexts (e.g. `SoundPressureLevelUnit`,
    `Decibel`, `DecibelA`) and in the separate `Mid-level-ontology` module name.
    No stratification class or ontology-layer apparatus was found.'
  reference:
  - xwkont:ref:sumo-niles-pease-2001
  locator: '`Merge.kif`, re-fetched directly from `ontologyportal/sumo` and grepped
    for "stratu"/"level" 2026-07-07'
  entry_notes: Independently re-verified this pass. The separate `Mid-level-ontology`
    module name is architecture, not a reified ontology-layer class.
- source: YAMATO
  term_or_identifier: two-level reality / representation levels
  dimension: technical
  source_claim_type: non-equivalence
  text: The report speaks of a "two-level reality" in the quality-description section
    and of representation identity across content/symbol/icon/medium levels, but
    these are local modeling distinctions, not a general reality-stratification
    apparatus.
  reference:
  - xwkont:ref:yamato-mizoguchi-2010
  locator: '`YAMATO101216.pdf`, `pdftotext`-extracted directly 2026-07-07; "two-level
    reality" confirmed in the Quality-and-its-description section, content/symbol/icon/medium
    representation-level language confirmed in the representation-identity discussion'
  entry_notes: Independently re-verified this pass. Zero occurrences of "stratu"
    or "layer" (as a general apparatus) anywhere in the full extracted text -- the
    level language found is exactly the two passages the Codex draft cited, no
    more and no less. Relevant as adjacent language, but not a positive correspondence
    for this candidate.
- source: TUpper
  term_or_identifier: '*(no dedicated stratification class found)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: No explicit layer/stratum apparatus was found in `TUpper-Terms.html`, `tupper.all.owl`,
    or `tupper.clif`.
  reference:
  - xwkont:ref:tupper-colore
  locator: '`TUpper-Terms.html`, `tupper.all.owl`, `tupper.clif`, re-fetched and
    re-read directly 2026-07-07'
  entry_notes: '**Correction to the Codex draft**: independently re-verified this
    pass with a stronger finding than originally drafted -- the draft claimed "`level`
    language is used only for timepoints or other unrelated constructs," but a direct
    grep of all three files found zero occurrences of "stratu", "layer", or "level"
    at all, not merely a confined-but-present usage. No dedicated ontological layering
    terms, and no "level" vocabulary of any kind in these files.'
- source: GUM
  term_or_identifier: '*(no dedicated stratification class found)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: No explicit layer/stratum apparatus was found in `GUM-31.owl.txt`; `level`
    language appears only in local prose about descriptive generality (e.g. "at
    this most general level," "expressed at the level of the clause") or SayingANDSensing's
    two-levels-of-projection comment, not as a top-level reality partition.
  reference:
  - xwkont:ref:gum-owl
  locator: '`GUM-31.owl.txt`, re-fetched and re-read directly 2026-07-07'
  entry_notes: '**Correction to the Codex draft**: independently re-verified this
    pass with a more precise finding -- the draft characterized the `level` usage
    as "linguistic/measurement contexts," but the four actual occurrences (re-fetched
    and grepped directly) are about descriptive generality and clause-level scope,
    not measurement units. Zero occurrences of "stratu" or "layer" anywhere in the
    file. No dedicated ontological layering terms.'
