uncertainties:
- item_id: uncertainty-001
  uncertainty_type: open-question
  resolved: true
  resolved_date: "2026-07-07"
  resolution_note: 'Resolved 2026-07-07 (session-050): the maintainer confirmed a paired split
    — `xwkont-core:Continuous` and `xwkont-core:Discrete` as sibling direct `Entity` subclasses
    — mirroring the GFO source-side shape and the `0.2.0` batch''s Aggregate/Sum, Boundary/Site
    precedent. `Discrete_presential` was not separately formalized. See `data/ontology/core.ttl`
    and `docs/ontology/core-ontology.md`.'
  description: Should `xwkont-core:ContinuousDiscrete` be modeled as a single umbrella class
    or as a paired split in `data/ontology/core.ttl`? GFO itself reifies the distinction with
    two sibling classes under `Individual`, plus `Discrete_presential` on the discrete/presential
    side.
  impact: Blocks final core.ttl placement; does not block the crosswalk research itself.
  follow_up: Resolved -- no further action needed. A follow-on drift was found and fixed
    2026-07-08 (session-052) -- see `uncertainty-004`.
- item_id: uncertainty-002
  uncertainty_type: non-equivalence
  resolved: false
  description: TUpper's `atomic` class is a real source hit, but it is an activity-specific
    notion and should not be silently treated as an entity-level `Discrete`.
  impact: Prevents over-claiming a correspondence where the source side is only one-sided.
  follow_up: None needed unless a future TUpper pass finds an entity-level counterpart.
- item_id: uncertainty-003
  uncertainty_type: open-question
  resolved: true
  resolved_date: "2026-07-07"
  resolution_note: 'Resolved 2026-07-07 (session-051): a complete full-text extraction of the
    2021 paper (independently located and reused by `modality.md`,
    `non-physical-social-object.md`, and `symbol-sign-representation.md`) was full-text
    searched for "continuous," "discrete," "atomic," and "granular." Exactly one hit, informal
    only (disposition-manifestation prose); no "discrete"/"atomic"/"granular" hits at all.
    Confirmed absence, not an open gap.'
  description: UFO's absence finding for this candidate was not independently re-checked against
    the primary paper this session — the DOI (`10.3233/AO-210256`), two guessed author-page
    mirrors, and philpapers.org's Semantic-Scholar-indexed open-access copy all returned HTTP
    403, the same block `list-sequence.md`'s review hit for this exact paper earlier the same
    day (2026-07-07). Only the already-extracted 2026-07-01 Perdurant definition (reused across
    several other crosswalks) was available; no fresh full-text search for continuous/discrete/atomic/granular
    vocabulary across the whole paper was possible.
  impact: UFO's row in this crosswalk should read as an open verification gap, not a confirmed
    absence, until a future pass gets real access to the paper text.
  follow_up: Resolved -- no further action needed.
- item_id: uncertainty-004
  uncertainty_type: uncertainty
  resolved: true
  resolved_date: "2026-07-08"
  resolution_note: 'Resolved 2026-07-08 (session-052): this crosswalk''s own `mapping_assertions`
    still referenced a stale `xwkont-core:ContinuousDiscrete (candidate)` placeholder after
    `uncertainty-001`''s paired-split placement landed in `core.ttl` (session-050) -- a naming
    drift, flagged but not fixed at the time (session-051''s summary). `mapping-001` (GFO''s
    combined `Continuous`/`Discrete`/`Discrete_presential` row) split into two: `mapping-001`
    (GFO:Continuous to xwkont-core:Continuous) and `mapping-002` (GFO:Discrete/Discrete_presential
    to xwkont-core:Discrete), using evidence already fully documented in this file''s own
    Source Definitions -- no new research needed. The seven axis-wide absence rows (BFO,
    DOLCE, SUMO, UFO, YAMATO, GUM, renumbered `003`-`007`/`009`) were renamed to reference
    both classes plainly (`xwkont-core:Continuous / xwkont-core:Discrete`) rather than split
    into per-pole rows, since none of those absence findings differentiate between poles --
    splitting them would have doubled the row count without adding real information. TUpper''s
    `atomic` row (renumbered `008`) was corrected to map against `xwkont-core:Discrete` alone,
    since `atomic` is discrete-side vocabulary only, not an axis-wide absence like the other
    six.'
  description: This crosswalk's own `mapping_assertions` subject/object fields referenced
    `xwkont-core:ContinuousDiscrete (candidate)`, a class name that was never actually placed
    in `core.ttl` -- `core.ttl` has two classes (`Continuous`/`Discrete`) instead, per
    `uncertainty-001`'s own resolution.
  impact: Mapping rows pointed at a nonexistent core.ttl class name, a real (if minor) data-integrity
    defect in an already-`reviewed` crosswalk.
  follow_up: Resolved -- no further action needed.
