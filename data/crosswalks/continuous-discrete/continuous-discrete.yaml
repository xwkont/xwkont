local_identifier: xwkont:concept:continuous-discrete
slug: continuous-discrete
title: Continuous vs. Discrete
editorial_status: reviewed
created: "2026-07-07"
modified: "2026-07-08"
scope_note: 'This candidate is about GFO''s reified `Continuous` / `Discrete` split over `Individual`,
  with `Discrete_presential` as the presential-side branch on that axis. It is not about the
  already-covered source-side axioms in `quantity-amount-of-matter.md` (`Amount_of_substrate`
  / `Mass_entity`), `object.md` (`Material_object`), or `continuant-occurrent.md` (`Presential`
  as the continuant-equivalent branch with discrete time-boundary framing).



  The source-count evidence remains single-source at the inventory level: `docs/crosswalks/candidate-concepts.md`
  tags only GFO rows to this candidate. Claude''s independent review pass (2026-07-07) re-verified
  GFO, BFO, DOLCE, SUMO, YAMATO, TUpper, and GUM directly against their primary artifacts,
  confirming a direct GFO axis plus six non-GFO outcomes that are either incidental wording,
  a one-sided analogue, or a clean absence. It also corrected two defects in the original
  draft: a quote misattributed to SUMO that actually belongs to TUpper (see the Source Definitions
  table), and an unsubstantiated claim that UFO''s paper was freshly re-accessed — UFO''s
  absence is recorded as an open verification gap (`uncertainty-003`), not a confirmed absence,
  since the DOI and every mirror tried (including one indexed as open-access) returned HTTP
  403 this session.'
