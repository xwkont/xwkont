comparison_notes:
- note_id: note-001
  dimension: technical
  claim_type: editorial observation
  note: GFO is the only source here that reifies the split as a first-class axis. `Continuous`
    and `Discrete` sit directly under `Individual`, and `Continuous` is defined by complementing
    `Discrete` rather than by hanging from a single branch.
  supporting_references:
  - xwkont:ref:gfo
  confidence: high
- note_id: note-002
  dimension: technical
  claim_type: editorial observation
  note: 'Six of the other seven sources do not reify the same axis at that level. BFO, DOLCE,
    SUMO, and YAMATO use the vocabulary only locally or informally; TUpper has an `atomic`
    activity class but not an entity-level continuous/discrete split; GUM had no relevant
    hit at all — all six independently re-confirmed directly against their primary artifacts
    (2026-07-07). UFO''s status is an open verification gap, not a confirmed absence: its
    primary source was inaccessible this session (HTTP 403 on the DOI and every mirror tried,
    including one indexed as open-access by Semantic Scholar) — see `uncertainty-003`.'
  supporting_references:
  - xwkont:ref:bfo-2020
  - xwkont:ref:dolce-lite-owl
  - xwkont:ref:sumo-niles-pease-2001
  - xwkont:ref:yamato-mizoguchi-2010
  - xwkont:ref:tupper-colore
  - xwkont:ref:gum-owl
  confidence: high
- note_id: note-003
  dimension: technical
  claim_type: inference
  note: '`Discrete_presential` is the source-internal nuance that matters most for this crosswalk:
    the split is not just a bare adjective pair, but one that GFO immediately specializes
    on the presential side.'
  supporting_references:
  - xwkont:ref:gfo
  confidence: medium-high
