source_definitions:
- source: GFO
  term_or_identifier: Continuous / Discrete
  dimension: technical
  source_claim_type: paraphrase
  text: '`Continuous` and `Discrete` are the paired `Individual`-side classes. `Continuous`
    is defined as the `Individual` complement of `Discrete`; `Discrete` sits directly under
    `Individual`.'
  reference:
  - xwkont:ref:gfo
  locator: '`modules/gfo-base.owl`, classes `Continuous` and `Discrete`, fetched and read
    directly 2026-07-07'
  entry_notes: This is the axis itself. The primary source puts both classes directly under
    `Individual`, not under `Presential` or `Process`.
- source: GFO
  term_or_identifier: Discrete_presential
  dimension: technical
  source_claim_type: paraphrase
  text: '`Discrete_presential` is a class under both `Discrete` and `Presential`, further
    constrained by an `instance_of some Persistant` restriction and `owl:disjointWith Mass_entity`.'
  reference:
  - xwkont:ref:gfo
  locator: '`modules/gfo-base.owl`, class `Discrete_presential`, fetched and read directly
    2026-07-07'
  entry_notes: This is the presential-side branch on the discrete side of the axis.
- source: BFO
  term_or_identifier: temporal interval / fiat line
  dimension: technical
  source_claim_type: direct quotation
  text: '`continuous, thus without gaps or breaks` appears in the temporal-interval elucidation;
    `fiat line` also uses continuous wording.'
  reference:
  - xwkont:ref:bfo-2020
  locator: '`bfo-core.ttl`, `temporal interval` / `fiat line`, fetched and read directly 2026-07-07'
  entry_notes: Incidental wording only, not a reified continuous/discrete split.
- source: DOLCE
  term_or_identifier: atomic-part-of / atomic region / constituent layering
  dimension: technical
  source_claim_type: direct quotation
  text: '`An atomic region.` DOLCE also uses atomic/granularity language in `atomic-part-of`
    and in the comment about `scientific granularities or ontological strata`.'
  reference:
  - xwkont:ref:dolce-lite-owl
  locator: '`DOLCE-Lite.owl`, fetched and read directly 2026-07-07'
  entry_notes: Local adjective/property usage only; no dedicated continuous/discrete axis.
- source: SUMO
  term_or_identifier: TimeDependentQuantity / ContinuousFunction / Version
  dimension: technical
  source_claim_type: direct quotation
  text: '`continuous time`, `Functions which are continuous`, and `discrete stages or versions`
    are the relevant hits.'
  reference:
  - xwkont:ref:sumo-niles-pease-2001
  locator: '`Merge.kif`, fetched and read directly 2026-07-07'
  entry_notes: 'The hits are local to unrelated branches and do not amount to a reified continuous/discrete
    axis. Corrected 2026-07-07 (Claude review pass): the draft''s original row also attributed
    a fourth quote, "discrete partial ordering over the set of activities," to SUMO — a direct
    re-check of the full `Merge.kif` found no such phrase anywhere in the file. That exact
    wording is TUpper''s own ("The subactivity relation forms a discrete partial ordering
    over the set of activities," `TUpper-Terms.html`), already correctly cited in this table''s
    TUpper row; it was mistakenly cross-attributed to SUMO as well. Removed from this row.'
- source: UFO
  term_or_identifier: Perdurant
  dimension: technical
  source_claim_type: direct quotation
  text: Perdurants are individuals that unfold in time accumulating temporal parts.
  reference:
  - xwkont:ref:ufo-2021
  locator: reusing text already extracted 2026-07-01 per `xwkont:ref:ufo-2021`'s Citation
    and Locator Notes
  entry_notes: 'Corrected 2026-07-07 (Claude review pass): the draft''s original locator claimed
    this was "re-searched directly 2026-07-07" against a PDF mirror. Independent re-verification
    found the DOI (`https://doi.org/10.3233/AO-210256`), two plausible author-page mirrors,
    and philpapers.org''s indexed open-access copy (per Semantic Scholar) all return HTTP
    403 — the same block `list-sequence.md`''s review recorded for this exact paper earlier
    the same day. **Resolved 2026-07-07 (session-051):** a complete full-text extraction of
    the 2021 paper (independently located and reused by `modality.md`,
    `non-physical-social-object.md`, and `symbol-sign-representation.md`) was full-text
    searched for "continuous," "discrete," "atomic," and "granular." Exactly one hit, informal
    only: "These formulae here capture the continuous changes of life of an endurant as
    dispositions continue to manifest" — describing disposition manifestation, not a reified
    Continuous/Discrete class or category. No "discrete," "atomic," or "granular" hits at all.
    Confirmed absence, resolving `uncertainty-003`.'
