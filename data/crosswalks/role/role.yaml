local_identifier: xwkont:concept:role
slug: role
title: Role
editorial_status: reviewed
created: "2026-07-01"
modified: "2026-07-02"
scope_note: 'This crosswalk compares BFO''s `Role` (a `Realizable Entity`, the other branch
  of `Specifically Dependent Continuant` alongside Quality), DOLCE''s Role treatment (formalized
  via OntoClean meta-properties: anti-rigid, founded/dependent ã **but see correction below:
  this is not part of core DOLCE**), UFO''s `Role` (anti-rigid and relationally dependent,
  paired with `Relator`), and SUMO''s `SocialRole` (a subclass of `Attribute`), completing
  Object''s sibling pair under Continuant alongside `docs/crosswalks/concepts/quality.md`.



  **Correction (2026-07-01), following direct primary-source verification:** this crosswalk
  originally cited DOLCE''s Role treatment to `xwkont:ref:dolce-wonderweb-d18` with an acknowledged
  locator uncertainty. That uncertainty is now resolved, and the resolution is more significant
  than "which paper" ã it''s a scope correction. The 2022 comprehensive DOLCE paper (Borgo
  et al., `xwkont:ref:dolce-borgo-2022`, fetched and read directly) states explicitly: **"DOLCE
  does not formalize functions and roles."** What this crosswalk calls "DOLCE''s Role" is
  actually from separate **DOLCE-driven** literature (Borgo et al., 2010; Masolo et al., 2004)
  ã extension work built on DOLCE, not core DOLCE theory itself. This is the same kind of
  finding as `information-artifact.md`''s IAO/DOLCE-Lite-Plus situation: a real, citable analog
  exists, but it lives in extension literature, not the core specification.



  **Update (2026-07-01), following direct primary-source verification of Masolo et al. (2004)
  itself:** this crosswalk''s `uncertainty-003` (whether DOLCE-driven Role literature has
  a term equivalent to UFO''s `Relator`) is now resolved. The 2004 paper''s own apparatus
  ã `Description`, `Concept`, `Role`, and the `classification` relation `CF(x, y, t)` ã has
  no reified entity that mediates or acts as truthmaker for a relationship between specific
  bearers the way UFO''s `Relator` does. Its closest construct, `Description`, instead defines
  a `Concept`/`Role` *in general* (a "context" or "social convention"), not a particular relationship
  instance; roles here are unary predicates that classify entities (`CF`), not binary relational
  particulars. See Source Definitions and Uncertainty for the verified picture. Separately,
  this pass also noticed a citation-precision issue: the "Borgo et al., 2010" citation used
  alongside Masolo et al. (2004) for DOLCE-driven Role literature (in both this crosswalk
  and `xwkont:ref:dolce-borgo-2022`''s own text) resolves to Borgo, Carrara, Garbacz & Vermaas
  (2010), "Formalizations of functions within the DOLCE ontology" ã a paper about *functions*,
  not roles specifically. Role content should be attributed to Masolo et al. (2004) alone;
  the "Borgo et al., 2010" pairing appears to be the 2022 paper''s own imprecision, not a
  distinct roles source this crosswalk failed to check.



  **This crosswalk confirms, rather than introduces, `quality.md`''s central finding.** SUMO''s
  `SocialRole` is a subclass of `RelationalAttribute`, itself a partition of `Attribute` ã
  the same abstract-entity category `quality.md` found for SUMO''s `Quality` analog, confirmed
  directly against SUMO''s primary `Merge.kif` source (2026-07-01). This is not a coincidence
  limited to Quality: it''s a systematic pattern across SUMO''s whole dependent-particular
  family. Where BFO/DOLCE/UFO treat both Quality and Role as particulars dependent on or connected
  to a concrete bearer (via inherence, OntoClean meta-properties, or relational dependence),
  SUMO classifies both under the same abstract `Attribute` branch ã SUMO''s own documentation
  defines `SocialRole` as "the Class of all Attributes that specify the position or status
  of a CognitiveAgent within an Organization or other Group."



  Exclusions: this crosswalk does not fully formalize OntoClean''s meta-property apparatus
  (rigidity, identity, unity, dependence) or UFO''s Relator theory beyond what''s needed to
  place Role within them.



  **Update (2026-07-02), ADR-0015 buildout:** extended to GFO, YAMATO, TUpper, and GUM ã the
  eighth and last of the 8 existing concept crosswalks to receive the buildout. GFO has the
  richest Role taxonomy of any source examined in this repository: `Role` (a `Concrete` individual)
  subdivides into `Processual_role` (a dependent process, "roles with a process as context"),
  `Relational_role` (`Dependent`, `role_of` some `Relator` ã directly paralleling UFO''s own
  Role/Relator pairing found in `relation.md`), and, most strikingly, **`Social_role`, which
  GFO explicitly classifies as `Independent`** ã `owl:disjointWith` `Dependent`. This directly
  contradicts the shared foundational assumption BFO, DOLCE-driven literature, and UFO all
  make: that a role is, by its nature, a dependent particular requiring a context or bearer.
  GFO''s own Social_role says otherwise for at least that one role subtype. YAMATO''s own
  text places role squarely in the dependent-particular camp instead: "The notion of quality
  role satisfies context-dependence which is one of the most important properties of roles.
  In the case of teacher role, a school is its context in which teacher role is defined" ã
  an example directly comparable to BFO''s "student role... university." YAMATO''s text further
  states "roles are used in defining all the types in YAMATO," a more foundational role for
  the Role concept than any other source examined in this repository, though the paper itself
  defers full elaboration to a separate publication (Mizoguchi 2007, not independently fetched)
  and its Hozo implementation tool. TUpper again reifies nothing ã "role" appears only informally
  inside `participates_in`''s prose gloss ("x plays some role that is not pre-specified"),
  never as a class. GUM''s `RolePlaying` continues the same pattern already found for its
  Information-Artifact and Relation analogs (`information-artifact.md`, `relation.md`): it
  is a relation type (`rdfs:subClassOf` `Symbolization`), not an object/entity type ã GUM
  consistently reifies this whole family of content as participant-relations rather than dependent
  entities.



  **Epistemic note:** BFO, DOLCE, UFO, and SUMO content is now all verified directly against
  primary sources. BFO and SUMO: `bfo-core.ttl`, `Merge.kif` (fetched and read 2026-07-01).
  DOLCE: `xwkont:ref:dolce-borgo-2022` (arXiv preprint) and `xwkont:ref:masolo-vieu-2004`
  itself (AAAI-hosted PDF), both extracted via manual PDF-stream decompression since no PDF-text-extraction
  tool is otherwise available in this environment. UFO: the 2021 Applied Ontology paper''s
  own Role and Relator passages, extracted with the same technique (reusing the extraction
  already performed for `object.md`/`process.md`).'
