source_definitions:
- source: BFO
  term_or_identifier: Role (BFO_0000023)
  dimension: technical
  source_claim_type: direct quotation
  text: '"(Elucidation) A role b is a realizable entity such that b exists because there is
    some single bearer that is in some special physical, social, or institutional set of circumstances
    in which this bearer does not have to be & b is not such that, if it ceases to exist,
    then the physical make-up of the bearer is thereby changed." `skos:altLabel`: "externally-grounded
    realizable entity." Examples: "The priest role; the student role; the role of subject
    in a clinical trial; the role of a stone in marking a property boundary."'
  reference:
  - xwkont:ref:bfo-2020
  locator: '**verified**: `bfo-core.ttl`, class BFO_0000023, fetched and read directly 2026-07-01'
  entry_notes: Confirms the earlier paraphrase closely; "Mary bears a student role at a university"
    is this crosswalk's own illustrative gloss on BFO's "student role" example, not a direct
    quotation.
- source: DOLCE core
  term_or_identifier: '"DOLCE does not formalize functions and roles"'
  dimension: technical
  source_claim_type: direct quotation
  text: '"DOLCE does not formalize functions and roles, although these have been widely investigated
    and represented in DOLCE-driven approaches (Borgo et al., 2010; Masolo et al., 2004)."'
  reference:
  - xwkont:ref:dolce-borgo-2022
  locator: '**verified**: arXiv preprint 2308.01597, manually extracted 2026-07-01'
  entry_notes: 'This is the key correction: Role is not part of core DOLCE theory at all.'
- source: DOLCE-driven approaches (not core DOLCE)
  term_or_identifier: Role
  dimension: philosophical
  source_claim_type: direct quotation
  text: '"Roles are represented as (social) concepts, which are connected to other entities
    (like endurants, perdurants, and abstracts) by the relation of classification. In particular,
    roles are concepts that are anti-rigid and founded, meaning that (i) they have dynamic
    properties and (ii) they have a relational nature, i.e. they depend on other roles and
    on contexts."'
  reference:
  - xwkont:ref:dolce-borgo-2022
  - xwkont:ref:masolo-vieu-2004
  reference_note: '`xwkont:ref:dolce-borgo-2022`, confirmed against `xwkont:ref:masolo-vieu-2004`
    directly'
  locator: '**verified**: both `xwkont:ref:dolce-borgo-2022` (arXiv preprint) and, as of 2026-07-01,
    `xwkont:ref:masolo-vieu-2004` itself (AAAI-hosted PDF, manually extracted)'
  entry_notes: Classified `philosophical` because OntoClean's meta-properties (rigidity, dependence)
    are themselves a specific philosophical framework, not just a structural definition.
- source: DOLCE-driven approaches (not core DOLCE)
  term_or_identifier: Description (and the absence of a Relator-equivalent)
  dimension: technical
  source_claim_type: direct quotation
  text: 'Masolo et al. (2004)''s own apparatus: `Concept`, `Description`, and `Role` are introduced
    as reified "non-agentive social objects," linked by `defined-by` (DF) and `used-by` (US)
    relations; entities are connected to concepts by the `classification` relation `CF(x,
    y, t)`. A concept is a `Role` iff it is anti-rigid (D1) and founded (D2): "A concept x
    is founded if its definition involves (at least) another concept y (definitional dependence)
    such that for each entity classified by x, there is an entity classified by y which is
    external to it." No entity in this apparatus mediates or is a truthmaker for a relationship
    between two specific bearers the way a UFO `Relator` does ã `Description` defines a `Concept`/`Role`
    in general, not a particular relationship instance.'
  reference:
  - xwkont:ref:masolo-vieu-2004
  locator: '**verified**: AAAI-hosted PDF (KR2004), manually extracted 2026-07-01, checked
    directly (not just via `xwkont:ref:dolce-borgo-2022`''s report)'
  entry_notes: 'Resolves `uncertainty-003`: confirms, from the primary source itself, that
    DOLCE-driven Role literature has no Relator-equivalent term.'
- source: UFO
  term_or_identifier: Role
  dimension: technical
  source_claim_type: direct quotation
  text: '"In UFO, roles are anti-rigid types whose instantiation occur in virtue of relational
    conditions. Roles that can be instantiated by individuals of a single kind[] are simply
    termed roles, while those that can be instantiated by individuals of different kinds...
    are termed roleMixins." Examples: "employee as a role of a person in the scope of an employment
    relator, and husband as a role of a person in the scope of a marriage relator."'
  reference:
  - xwkont:ref:ufo-2021
  locator: '**verified**: Applied Ontology 2021 PDF, manually extracted 2026-07-01'
  entry_notes: 'Corrects the earlier paraphrase''s framing slightly: UFO''s Role is specifically
    an anti-rigid *sortal* (a specialization of a Kind) with *relational* contingent conditions,
    not just "a type that is anti-rigid and relationally dependent" in the abstract ã it sits
    within UFO''s broader sortal/non-sortal type taxonomy (Kind, Subkind, Phase, Role, Category,
    Phase Mixin, Role Mixin, Mixin).'
- source: UFO
  term_or_identifier: Relator
  dimension: technical
  source_claim_type: direct quotation
  text: '"[A] relator is a moment (i.e., an existentially dependent entity) that is an aggregation
    of qua individuals... For instance, John and Mary''s Marriage is composed of John-qua-husband-of-Mary
    and Mary-qua-wife-of-John. A relator is, hence, existentially dependent on multiple individuals,
    namely, the bearers of its constituting qua individuals. Examples of relators include
    marriages, enrollments, employments, contracts, and presidential mandates. Externally
    dependent modes as well as relators serve as truthmakers of material relations."'
  reference:
  - xwkont:ref:ufo-2021
  locator: '**verified**: Applied Ontology 2021 PDF, manually extracted 2026-07-01'
  entry_notes: Distinct from Role itself, but closely paired with it in UFO's theory ã the
    relational dependency a Role requires is often grounded in a Relator (e.g., "husband"
    is a role held in the scope of a "marriage" relator). Confirms the earlier paraphrase
    closely; now a direct quotation with the primary source's own worked example.
- source: SUMO
  term_or_identifier: SocialRole
  dimension: technical
  source_claim_type: direct quotation
  text: '"(subclass SocialRole RelationalAttribute)... The Class of all Attributes that specify
    the position or status of a CognitiveAgent within an Organization or other Group."'
  reference:
  - xwkont:ref:sumo-niles-pease-2001
  locator: '**verified**: `Merge.kif`, `documentation SocialRole EnglishLanguage`, fetched
    and read directly 2026-07-01'
  entry_notes: 'Corrects the earlier draft''s claimed hierarchy: SocialRole is a subclass
    of `RelationalAttribute` specifically (itself a partition of `Attribute`), not directly
    of `Attribute`. The earlier "Plumber is a subclass of SocialRole" example was not found
    in SUMO''s core `Merge.kif` in this pass ã it may exist in a domain-extension `.kif` file
    not checked, or may have been an illustrative gloss in the secondary source rather than
    an actual SUMO class; not asserted as verified.'
- source: GFO
  term_or_identifier: Role (+ Processual role, Social role, Relational role)
  dimension: technical
  source_claim_type: direct quotation
  text: '`Role`: `rdfs:subClassOf` `Concrete` (no further `skos:definition`). `Processual_role`:
    "Processual roles are dependent processes. They are roles with a process as context."
    `rdfs:subClassOf` `Process`, `Role`. `Social_role`: `rdfs:subClassOf` `Independent`, `Role`;
    `owl:disjointWith` `Processual_role`, `Relational_role`. `Relational_role`: `rdfs:subClassOf`
    `Dependent`, `Role`; defined via a restriction on `role_of` some `Relator`.'
  reference:
  - xwkont:ref:gfo
  locator: '**verified**: `modules/gfo-base.owl`, classes `Role`, `Processual_role`, `Social_role`,
    `Relational_role`, fetched and read directly 2026-07-02'
  entry_notes: '`Social_role`''s classification under `Independent` (disjoint from `Dependent`)
    directly contradicts BFO/DOLCE-driven/UFO''s shared assumption that a role is a dependent
    particular ã a genuine metaphysical divergence, not just a labeling difference. `Relational_role`,
    by contrast, is `Dependent` and `role_of` a `Relator`, directly paralleling UFO''s own
    Role/Relator pairing (see `relation.md`).'
- source: YAMATO
  term_or_identifier: Role (context-dependent, foundational to all types)
  dimension: technical
  source_claim_type: direct quotation
  text: '"The notion of quality role satisfies context-dependence which is one of the most
    important properties of roles. In the case of teacher role, a school is its context in
    which teacher role is defined." Separately: "roles are defined within a context which
    they necessarily depends on in our role theory (Mizoguchi 2007)... In fact, roles are
    used in defining all the types in YAMATO."'
  reference:
  - xwkont:ref:yamato-mizoguchi-2010
  locator: '**verified**: `YAMATO101216.pdf`, "Quality and quantity" and "Roles, functions
    and relations" sections, extracted 2026-07-02'
  entry_notes: The "teacher role... school" example directly parallels BFO's own "student
    role... university" example ã a context-dependent, non-abstract treatment, placing YAMATO
    in the same camp as BFO/DOLCE-driven/UFO rather than GFO's `Social_role`-as-Independent
    exception or SUMO's abstracta. YAMATO's own text discloses the full role theory is not
    incorporated into this paper ã it defers to Mizoguchi (2007), not independently fetched,
    and its Hozo implementation tool.
- source: TUpper
  term_or_identifier: '*(no reified Role class ã informal mention only)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: '"(participates_in x a t) is TRUE in an interpretation of TUpper if and only if x
    plays some role that is not pre-specified in an occurrence of the activity a at the timepoint
    t."'
  reference:
  - xwkont:ref:tupper-colore
  locator: '**verified absence** (of a reified class): `TUpper-Terms.html`, `participates_in`
    entry, fetched and read directly 2026-07-02'
  entry_notes: The word "role" appears only inside `participates_in`'s informal prose gloss
    ã TUpper reifies no Role entity, consistent with `quality.md`'s and `relation.md`'s TUpper
    findings across this entire dependent-particular family.
- source: GUM
  term_or_identifier: RolePlaying
  dimension: technical
  source_claim_type: direct quotation
  text: '"A circumstantial relationship that expresses a restriction in which a facet of one
    of the participants in a process is relevant for the actualization of the process... It
    is frequently realized in English by a prepositional phrase with the preposition ''as'';
    For example: ''As a president, he was terrible, although as a golfer he was not too bad.''"
    `rdfs:subClassOf` `Symbolization`; `owl:disjointWith` `Signification`.'
  reference:
  - xwkont:ref:gum-owl
  locator: '**verified**: `GUM-31.owl`, class `RolePlaying`, fetched and read directly 2026-07-02'
  entry_notes: 'A relation type (participant-role relation), not an object/entity type ã the
    same structural pattern already found for GUM''s Information-Artifact analog (`Signification`/`Symbolization`,
    `information-artifact.md`) and Relation analog (`Relating`, `relation.md`): GUM consistently
    reifies this whole family as relations, not entities.'
