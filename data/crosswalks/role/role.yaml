comparison_notes:
- note_id: note-001
  dimension: philosophical
  claim_type: editorial observation
  note: SUMO's `SocialRole` (subclass of `RelationalAttribute`, itself a partition of `Attribute`)
    confirms `quality.md`'s finding that SUMO systematically classifies dependent-particular-type
    concepts as abstract entities, not as BFO/DOLCE-driven/UFO's trope-like/relationally-dependent
    particulars. This is now a two-concept pattern (Quality and Role), not an isolated case.
  supporting_references:
  - xwkont:ref:bfo-2020
  - xwkont:ref:dolce-borgo-2022
  - xwkont:ref:ufo-2021
  - xwkont:ref:sumo-niles-pease-2001
  confidence: high
- note_id: note-002
  dimension: philosophical
  claim_type: editorial observation
  note: DOLCE-driven extension literature and UFO both ground Role in an anti-rigidity/foundation
    meta-property apparatus in the OntoClean lineage (Guarino & Welty, 2002; Masolo et al.,
    2004's own D1/D2 anti-rigidity/foundation definitions trace to the same Husserl-derived
    foundation notion); UFO explicitly states it incorporates "the Ontology of Universals
    underlying OntoClean." BFO's Role, by contrast, is defined structurally (extrinsic/externally-grounded
    realizable entity, not ceasing to change the bearer's physical make-up) without invoking
    this meta-property framework. Confirmed directly that DOLCE *core* has no Role treatment
    at all to compare against ã only its extension literature does, now independently verified
    against Masolo et al. (2004) itself.
  supporting_references:
  - xwkont:ref:bfo-2020
  - xwkont:ref:dolce-borgo-2022
  - xwkont:ref:masolo-vieu-2004
  - xwkont:ref:ufo-2021
  confidence: high
- note_id: note-003
  dimension: technical
  claim_type: editorial observation
  note: 'UFO''s `Relator` has no clearly identified counterpart in BFO''s or SUMO''s definitions
    found in this pass. DOLCE-driven extension literature (Masolo et al., 2004, confirmed
    by direct reading) has a related reification apparatus for social roles (`Concept`, `Description`,
    `Role`, the `classification` relation `CF`), but no term equivalent to Relator specifically:
    its `Description` construct defines a `Concept`/`Role` in general rather than mediating
    a specific relationship instance between particular bearers the way a `Relator` does.
    This is now a confirmed negative finding, not an open question.'
  supporting_references:
  - xwkont:ref:ufo-2021
  - xwkont:ref:masolo-vieu-2004
  confidence: high
- note_id: note-004
  dimension: technical
  claim_type: editorial observation
  note: This crosswalk's central DOLCE finding ã "DOLCE does not formalize functions and roles"
    ã parallels `information-artifact.md`'s finding that BFO's information-artifact analog
    (IAO) and DOLCE's (DOLCE Lite Plus/DUL) both live in extension literature rather than
    core specifications. Across this project's crosswalks, "core DOLCE explicitly declines
    to formalize X" is now a repeated, citable pattern for at least two concepts (Role, Information
    Object), not a one-off gap in either case.
  supporting_references:
  - xwkont:ref:dolce-borgo-2022
  confidence: high
- note_id: note-005
  dimension: philosophical
  claim_type: editorial observation
  note: 'GFO''s own Role taxonomy splits on exactly the dependent/independent axis this crosswalk''s
    other sources agree on: `Relational_role` (`Dependent`, `role_of` some `Relator`) fits
    BFO/DOLCE-driven/UFO''s shared assumption and directly parallels UFO''s own Role/Relator
    pairing (per `relation.md`''s `note-005`, on the Relator side specifically); but `Social_role`
    is explicitly classified `Independent` (`owl:disjointWith` `Dependent`) ã a genuine metaphysical
    divergence within GFO''s own apparatus, not just a labeling difference from the other
    sources. GFO is the only source in this crosswalk to treat any role subtype as independent
    of a bearer.'
  supporting_references:
