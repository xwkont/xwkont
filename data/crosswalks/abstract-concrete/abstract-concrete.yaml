source_definitions:
- source: BFO
  term_or_identifier: '*(no class — ground partially covered by generically dependent continuant,
    BFO_0000031)*'
  dimension: philosophical
  source_claim_type: non-equivalence
  text: '"(Elucidation) A generically dependent continuant is an entity that exists in virtue
    of the fact that there is at least one of what may be multiple copies which is the content
    or the pattern that multiple copies would share." Examples: "The pdf file on your laptop;
    the pdf file that is a copy thereof on my laptop... the content of a sentence; an engineering
    blueprint." `rdfs:subClassOf` continuant (BFO_0000002).'
  reference:
  - xwkont:ref:bfo-2020
  locator: '**verified absence**: `bfo-core.ttl`, full-text grep for "abstract" (case-insensitive)
    returned zero class labels or definitions, fetched and read directly 2026-07-04'
  entry_notes: BFO's generically dependent continuant is defined by *multiple-copy sharing*,
    not by absence of spatiotemporal location — a PDF file's content is generically dependent
    but each concrete copy still has a spatial location. This is a structurally different
    criterion from the other five sources' Abstract categories, not a synonym for them.
- source: DOLCE
  term_or_identifier: Abstract
  dimension: philosophical
  source_claim_type: direct quotation
  text: '"The main characteristic of abstract entities is that they do not have spatial nor
    temporal qualities, and they are not qualities themselves. The only class of abstract
    entities we consider in the present version of the upper ontology is that of quality regions
    (or simply regions)... The other examples of abstract entities (sets and facts) are only
    indicative." `rdfs:subClassOf particular`; `owl:disjointWith quality`, `owl:disjointWith
    perdurant`.'
  reference:
  - xwkont:ref:dolce-lite-owl
  locator: '**verified**: `DOLCE-Lite.owl`, class `#abstract`, fetched and read directly 2026-07-04'
  entry_notes: One of the four partition members of `particular` (alongside `endurant`, `perdurant`,
    `quality`) — `region`/`temporal-region`/`space-region` (already documented in `time.md`/`space.md`)
    are `abstract`'s only populated subtypes in this module; DOLCE's own comment flags sets/facts
    as "only indicative," i.e. not formally modeled here.
- source: SUMO
  term_or_identifier: Abstract (+ Quantity, Attribute, Relation, Proposition, List)
  dimension: technical
  source_claim_type: direct quotation
  text: '"Properties or qualities as distinguished from any particular embodiment of the properties/qualities
    in a physical medium. Instances of Abstract can be said to exist in the same sense as
    mathematical objects such as sets and relations, but they cannot exist at a particular
    place and time without some physical encoding or embodiment." `(subclass Abstract Entity)`;
    `(disjointDecomposition Abstract Quantity Attribute Relation Proposition List)` — an exhaustive,
    mutually disjoint 5-way partition.'
  reference:
  - xwkont:ref:sumo-niles-pease-2001
  locator: '**verified**: current `Merge.kif`, fetched and read directly 2026-07-04'
  entry_notes: Direct sibling of `Physical` ("An entity that has a location in space-time,"
    `Merge.kif` documentation) under `Entity` — the two are SUMO's own top-level split, already
    found in `time.md` (Time is Abstract-side) and `space.md` (Region is Physical-side) to
    place those two concepts on opposite sides of exactly this split.
- source: UFO
  term_or_identifier: '*(no class or property found)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: Full-text search of the already-extracted 2021 Applied Ontology paper (9,048 lines)
    for "abstract" (case-insensitive) returned zero matches.
  reference:
  - xwkont:ref:ufo-2021
  locator: '**verified absence**: 2021 Applied Ontology paper, already-extracted text re-searched
    directly 2026-07-04'
  entry_notes: Consistent with `time.md`'s and `space.md`'s findings that UFO's 2021 comprehensive
    paper is silent on several categories the other 7 sources treat as top-level — a recurring
    pattern for this source across all three `0.2.0`-batch concepts drafted so far.
- source: GFO
  term_or_identifier: Abstract (+ Concrete)
  dimension: philosophical
  source_claim_type: direct quotation
  text: 'Abstract: "Abstract individuals are independent from time and space (they are not
    in time and space). Examples: the number ''2'' or pi." Concrete: "Concrete individuals
    have a relation to time or space (they are in time and space)." Both `rdfs:subClassOf
    Individual`; `owl:disjointWith` each other; both also `owl:disjointWith Space_time`. An
    explicit `owl:unionOf (Abstract Concrete Space_time)` axiom asserts these three exhaust
    `Individual`.'
  reference:
  - xwkont:ref:gfo
  locator: '**verified**: `modules/gfo-base.owl`, classes `Abstract`/`Concrete`, fetched and
    read directly 2026-07-04'
  entry_notes: 'The cleanest, most explicit three-way exhaustive top-level partition of any
    source: every GFO `Individual` is Abstract, Concrete, or Space_time (itself already documented
    in `time.md`/`space.md` as Time''s and Space''s shared parent) — a directly quoted structural
    fact, not an inference.'
- source: YAMATO
  term_or_identifier: Abstract (+ semi-abstract, physical)
  dimension: philosophical
  source_claim_type: direct quotation
  text: '"We define a physical thing as something which needs time and space to exist, and
    introduce semi-abstract which needs only time to exist. Needless to say, there is nothing
    which requires only space to exist. Abstract things are defined as things that need neither
    time nor [space]."'
  reference:
  - xwkont:ref:yamato-mizoguchi-2010
  locator: '**verified**: 2010 technical report, full extracted text re-searched directly
    2026-07-04'
  entry_notes: The only source among all 8 to interpose an intermediate `semi-abstract` category
    (needs time but not space) between fully physical and fully abstract — YAMATO's own text
    explicitly rules out the fourth logical combination ("nothing... requires only space to
    exist"), a genuine asymmetry between time-dependence and space-dependence worth preserving.
- source: TUpper
  term_or_identifier: '*(informal only, no defined predicate)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: '`object`''s own informal-semantics gloss: "an object is a concrete or abstract thing
    that can participate in an activity." No `concrete`/`abstract` predicate or class is separately
    declared or defined anywhere in `TUpper-Terms.html`.'
  reference:
  - xwkont:ref:tupper-colore
  locator: '**verified absence**: `TUpper-Terms.html`, full-text grep for "abstract" returned
    exactly one hit (this sentence), fetched and read directly 2026-07-04'
  entry_notes: Unlike Time's `timepoint` or Space's `spatial_region`/`VoluminalRegion`, Abstract/Concrete
    gets no reified treatment at all in TUpper — mentioned only in passing inside a different
    class's definition.
- source: GUM
  term_or_identifier: Abstraction
  dimension: technical
  source_claim_type: direct quotation
  text: '"Something which exists in metaphorical or qualitative space rather than in physical
    space, e.g., truth." `rdfs:subClassOf NonConsciousThing`; `owl:disjointWith SpatialTemporal`,
    `owl:disjointWith Substance`.'
  reference:
  - xwkont:ref:gum-owl
  locator: '**verified**: `GUM-31.owl`, class `#Abstraction`, fetched and read directly 2026-07-04'
  entry_notes: Not credited in `TODO.md`'s seed — a genuine addition, mirroring the pattern
    already found for SUMO's/GUM's Time content in `time.md`. `Abstraction` is an explicit
    sibling of `SpatialTemporal` (the shared parent of GUM's `Space`/`Time`, per `space.md`'s
    `note-002`) under `NonConsciousThing` — the same three-way structural shape as GFO's `Abstract`/`Concrete`/`Space_time`
    partition, though GUM's is not asserted as formally exhaustive the way GFO's `owl:unionOf`
    is.
