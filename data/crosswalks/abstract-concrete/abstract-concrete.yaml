comparison_notes:
- note_id: note-001
  dimension: philosophical
  claim_type: editorial observation
  note: BFO's absence of a literal "Abstract" class is a substantive, not merely terminological,
    difference. The other five sources with an Abstract-like category (DOLCE, SUMO, GFO, YAMATO,
    GUM) all define it by the *same* criterion — absence of spatial/temporal location or physical
    embodiment. BFO's closest analog, `generically dependent continuant`, is defined by an
    entirely different criterion (capacity for multiple concrete copies to share the same
    content/pattern) and remains a Continuant throughout — it does not exclude spatiotemporal
    location the way the other five sources' Abstract categories do; a PDF file's *content*
    is generically dependent, but every copy of that content is still concretely located.
    This is the sharpest structural divergence in this crosswalk, directly comparable in kind
    (though not in shape) to the BFO-vs-rest divergence `time.md`'s `note-001` found for Time.
  supporting_references:
  - xwkont:ref:bfo-2020
  - xwkont:ref:dolce-lite-owl
  - xwkont:ref:sumo-niles-pease-2001
  - xwkont:ref:gfo
  - xwkont:ref:yamato-mizoguchi-2010
  - xwkont:ref:gum-owl
  confidence: high
- note_id: note-002
  dimension: philosophical
  claim_type: editorial observation
  note: 'Three sources (GFO, GUM, and — via `time.md`/`space.md`''s prior findings — implicitly
    SUMO through its own disjoint `Physical`/`Abstract` split) treat Abstract/Concrete as
    one half of an exhaustive top-level partition alongside their Time/Space-bearing branch:
    GFO''s `owl:unionOf (Abstract Concrete Space_time)` is explicit and formal; GUM''s `Abstraction`
    is `owl:disjointWith SpatialTemporal` (the shared Time/Space parent documented in `space.md`)
    though not asserted as jointly exhaustive with it the way GFO''s union is. This directly
    resolves part of `space.md`''s own forward-looking question about how Space/Time''s classification
    interacts with the Abstract/Concrete split — GFO and GUM both make Time/Space and Abstract
    explicit structural siblings, not overlapping or nested categories.'
  supporting_references:
  - xwkont:ref:gfo
  - xwkont:ref:gum-owl
  confidence: high
- note_id: note-003
  dimension: philosophical
  claim_type: editorial observation
  note: 'YAMATO''s three-way physical/semi-abstract/abstract split is asymmetric by the source''s
    own explicit statement: time-dependence-without-space-dependence (`semi-abstract`) is
    a real, populated category, but space-dependence-without-time-dependence is explicitly
    ruled out ("there is nothing which requires only space to exist"). This is a genuine philosophical
    claim about the relative priority of time over space for existence, not an oversight or
    missing case — worth flagging since it bears on the Time/Space parity question `space.md`''s
    `note-003` already raised for this same source (YAMATO gives Space a more load-bearing
    structural role than Time in some respects, yet here treats Time as the more fundamental
    existence-condition).'
  supporting_references:
  - xwkont:ref:yamato-mizoguchi-2010
  confidence: high
- note_id: note-004
  dimension: technical
  claim_type: editorial observation
  note: SUMO's `Abstract` is defined via an exhaustive `disjointDecomposition` into five named
    subclasses (`Quantity`, `Attribute`, `Relation`, `Proposition`, `List`) — a formally stronger
    and more explicit partition than any other source provides for its own Abstract-equivalent
    category's internal structure. `Quantity`, `Attribute`, and `Relation` are already crosswalked
    (`quality.md` for Attribute; `relation.md` for Relation); `Proposition` is a separate
    `0.2.0`-batch candidate; `List` has no XwkOnt crosswalk counterpart yet.
  supporting_references:
  - xwkont:ref:sumo-niles-pease-2001
  confidence: high
