comparison_notes:
- note_id: note-001
  dimension: technical
  claim_type: editorial observation
  note: 'The candidate is genuinely distinct from `object.md`, `role.md`, `process.md`, and
    `event.md` only after it is narrowed to the bearer-level agent/conscious-being layer.
    The raw inventory was too broad: GUM mental classes are process/event material, and YAMATO
    `mind` is semi-abstract rather than a bearer class.'
  supporting_references:
  - xwkont:ref:gum-owl
  - xwkont:ref:yamato-mizoguchi-2010
  confidence: high
  supporting_references_note: '`xwkont:ref:gum-owl`, `xwkont:ref:yamato-mizoguchi-2010`, `object.md`,
    `role.md`, `process.md`, `event.md`'
- note_id: note-002
  dimension: technical
  claim_type: editorial observation
  note: 'SUMO, GUM, YAMATO, and DOLCE all support some version of agentive or conscious-bearing
    entities, but they do so with different ontological commitments: object-level agentivity
    in DOLCE, explicit agent subclasses in SUMO, object-side `weak agent` in YAMATO, and conscious-being/personhood
    classes in GUM.'
  supporting_references:
  - xwkont:ref:sumo-niles-pease-2001
  - xwkont:ref:gum-owl
  - xwkont:ref:yamato-mizoguchi-2010
  - xwkont:ref:dolce-wonderweb-d18
  confidence: high
- note_id: note-003
  dimension: technical
  claim_type: editorial observation
  note: GUM's `Female` and `Male` are not central concepts here. They are pronominalization
    subclasses of `Person`, so they belong in the draft as a disposition note, not as peer
    correspondences to the main entity class.
  supporting_references:
  - xwkont:ref:gum-owl
  confidence: high
- note_id: note-004
  dimension: technical
  claim_type: editorial observation
  note: 'YAMATO `mind` is the key off-ramp: it is real source material, but it is semi-abstract,
    not an object/continuant-like bearer. If a future crosswalk wants to chase `mind` specifically,
    it should probably sit with abstract/semi-abstract or content, not here.'
  supporting_references:
  - xwkont:ref:yamato-mizoguchi-2010
  confidence: high
- note_id: note-005
  dimension: technical
  claim_type: editorial observation
  note: 'GUM''s mental-state terms are the opposite of this concept: the source itself describes
    them as mental processes or reactions, which makes them process/event material rather
    than bearer classes.'
  supporting_references:
  - xwkont:ref:gum-owl
  confidence: high
