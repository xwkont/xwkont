source_definitions:
- source: DOLCE
  term_or_identifier: Agentive Physical Object / Non-agentive Physical Object
  dimension: technical
  source_claim_type: paraphrase
  text: DOLCE distinguishes physical objects to which intentions, beliefs, and desires are
    ascribed from those that are not. The same passage also treats a person as an agentive
    physical object constituted by an organism.
  reference:
  - xwkont:ref:dolce-wonderweb-d18
  locator: D18, section 3.4.2
  entry_notes: This is the cleanest DOLCE-side agentivity split, but it still lives in the
    object layer, so it is adjacent to object.md rather than a separate role/process concept.
- source: DOLCE
  term_or_identifier: Social Agent / Agentive Social Object
  dimension: technical
  source_claim_type: paraphrase
  text: The later D18 discussion also distinguishes a social-agent layer, including legal
    persons and contractants, from non-agentive social objects.
  reference:
  - xwkont:ref:dolce-wonderweb-d18
  locator: D18, agentive/non-agentive social-object discussion
  entry_notes: Useful as an agentive-bearing analog, but not a mind class.
- source: SUMO
  term_or_identifier: AutonomousAgent / SentientAgent / CognitiveAgent / ArtificialIntelligenceAgent
  dimension: technical
  source_claim_type: paraphrase
  text: SUMO makes `AutonomousAgent` the superclass for entities that can act on their own
    and cause change ("Something or someone that can act on its own and produce changes in
    the world"), then refines it into sentient, cognitive, and AI-agent subtypes. Confirmed
    `(subclass AutonomousAgent Object)` directly in `Merge.kif` -- SUMO places this at the
    object layer, the same pattern found in DOLCE and YAMATO.
  reference:
  - xwkont:ref:sumo-niles-pease-2001
  locator: '`Merge.kif`, agent hierarchy around `AutonomousAgent` (verified directly against
    the current `ontologyportal/sumo` `Merge.kif`, 2026-07-06)'
  entry_notes: The strongest direct agentive-bearer family in the candidate set.
- source: YAMATO
  term_or_identifier: weak agent / mind
  dimension: technical
  source_claim_type: paraphrase
  text: The figure-based top-level taxonomy places `weak agent` under the object/functional
    branch, while `mind` sits under semi-abstract. The surrounding prose treats `mind` as
    non-continuant and the object/continuant side as mutually dependent with process.
  reference:
  - xwkont:ref:yamato-mizoguchi-2010
  locator: Fig. 2, plus Section 2.2
  entry_notes: '`weak agent` stays in scope; `mind` is retained only as an excluded label
    because it is not an entity-class bearer term in YAMATO.'
- source: GUM
  term_or_identifier: ConsciousBeing
  dimension: technical
  source_claim_type: paraphrase
  text: GUM defines `ConsciousBeing` as an active entity capable of producing information
    that may count as consciousness, with `Person` as a conscious-being subtype.
  reference:
  - xwkont:ref:gum-owl
  locator: '`GUM-31.owl`, class `ConsciousBeing`'
  entry_notes: This is the primary GUM-side entity-class anchor for the concept.
- source: GUM
  term_or_identifier: Person
  dimension: technical
  source_claim_type: paraphrase
  text: '`Person` is a conscious being that is pronominalized by `she` / `he` rather than
    `it`.'
  reference:
  - xwkont:ref:gum-owl
  locator: '`GUM-31.owl`, class `Person`'
  entry_notes: Included as a conscious-being refinement, but it is peripheral to the core
    agent/conscious-being scope.
- source: GUM
  term_or_identifier: Female / Male
  dimension: technical
  source_claim_type: paraphrase
  text: '`Female` and `Male` are subclasses of `Person` with a pronominalization purpose,
    not core bearer classes.'
  reference:
  - xwkont:ref:gum-owl
  locator: '`GUM-31.owl`, classes `Female` and `Male`'
  entry_notes: Kept as a disposition note only; not central to the crosswalk.
- source: GUM
  term_or_identifier: Believe / Cognition / Know / Perception / Think / Wanting / MentalActive
    / MentalInactive / Disliking / Fearing / Liking / ReactionAndEmotion / Striving
  dimension: technical
  source_claim_type: paraphrase
  text: 'These are explicitly mental-process or mental-reaction classes in GUM: cognition,
    perception, belief, desire, fear, liking, striving, and related categories.'
  reference:
  - xwkont:ref:gum-owl
  locator: '`GUM-31.owl`, mental-process hierarchy'
  entry_notes: Excluded from this crosswalk and routed to `process.md` / `event.md`.
- source: BFO
  term_or_identifier: '*(no dedicated class found)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: No agent/mind/conscious-being term of any kind was found in `bfo-core.ttl` (direct
    grep against the fetched file, 2026-07-06).
  reference:
  - xwkont:ref:bfo-2020
  locator: '`bfo-core.ttl` (`BFO-ontology/BFO-2020` repository)'
  entry_notes: This is a scoped absence, not a claim that BFO lacks agentive participation
    or role-bearing.
- source: UFO
  term_or_identifier: '*(no dedicated class found; `Person` used only as a worked example)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: The 2021 paper does not introduce a dedicated Agent/Mind/ConsciousBeing class -- confirmed
    by a full-text search of the paper (re-fetched and re-extracted directly, 2026-07-06),
    which finds "agent" only inside an unrelated bibliography title (Laurier et al.'s "resource-event-agent
    ontology"). `Person` does appear repeatedly as `ObjectKind(Person)` in the paper's own
    worked OntoUML examples (Teacher/Student, Jogger, Walker, Spouse sections), but this repository's
    own established precedent for this same source treats worked-example instantiations as
    distinct from formally introduced core-theory classes (cf. `process.md`'s "Jogging Process"
    finding) -- so this is recorded as absence-with-a-caveat, not a positive correspondence.
  reference:
  - xwkont:ref:ufo-2021
  locator: Guizzardi et al. 2021, full text (re-fetched from `inf.ufes.br/~gguizzardi`, since
    the DOI mirror 403s)
  entry_notes: Keep separate from role and process/event claims already covered elsewhere.
- source: GFO
  term_or_identifier: '*(no reified Agent/Person/Mind class; stratum-level material exists)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: 'No `owl:Class` named Agent, Person, or Mind was found in `modules/gfo-base.owl`,
    but the module is not silent on the topic: it declares `Mental_stratum` (subclass of `Stratum`,
    "we divide the psychological/mental stratum into the layer of awareness and the layer
    of personality"), `Awareness_level`, `Personality_level`, and `Social_stratum` ("Agents
    are the bearers of the social roles that humans play"). This is a conceptual acknowledgment
    of mind/agent without a corresponding bearer-class declaration in this module.'
  reference:
  - xwkont:ref:gfo
  locator: '`modules/gfo-base.owl` classes `Mental_stratum`, `Awareness_level`, `Personality_level`,
    `Social_stratum` (direct fetch and grep, 2026-07-06)'
  entry_notes: Later modules (only a `situation` module exists alongside base in the `Onto-Med/GFO`
    repository as of this pass) might refine this further; not fetched here since it is out
    of this candidate's declared scope. The stratum material itself is directly relevant to
    the separate "Ontological Level / Stratum" `0.3.0` candidate.
- source: TUpper
  term_or_identifier: '*(no dedicated class found)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: No agent/mind/conscious-being term found in the fetched `tupper.all.owl` or `tupper.clif`
    (direct grep, 2026-07-06, excluding the `MinDim` false-positive substring match on "mind").
  reference:
  - xwkont:ref:tupper-colore
  locator: '`tupper.all.owl`, `tupper.clif` (fetched directly from `gruninger/colore`)'
  entry_notes: Agent-like usage in action predicates is not a bearer class.
