local_identifier: xwkont:concept:mind-conscious-being-agent
slug: mind-conscious-being-agent
title: Mind / Conscious Being / Agent
editorial_status: reviewed
created: "2026-07-06"
modified: "2026-07-06"
scope_note: "This draft keeps the bearer-level entity layer for agentive or conscious beings\n\
  and explicitly off-ramps the two main false positives from the raw inventory:\n\n\n- GUM's\
  \ mental-state terms (`Believe`, `Cognition`, `Know`, `Perception`,\n  `Think`, `Wanting`,\
  \ `MentalActive`, `MentalInactive`, `Disliking`,\n  `Fearing`, `Liking`, `ReactionAndEmotion`,\
  \ `Striving`) are modeled as mental\n  processes / reactions, not as bearer classes. They\
  \ belong with\n  `process.md` / `event.md`, not here.\n- GUM's `Female` and `Male` are pronominalization\
  \ refinements under `Person`,\n  not core mind/agent classes. `Person` is kept as a peripheral\
  \ conscious-being\n  subtype, but gender-marking subclasses are not central to the concept.\n\
  - YAMATO's `mind` is a semi-abstract category in the figure, not a continuant\n  or object.\
  \ It is retained as a source-side label for audit purposes, but it is\n  not a core bearer-class\
  \ correspondence.\n\n\nThe surviving standalone scope is therefore narrower than the raw\
  \ inventory\nsuggested: conscious-being / agent as an entity class, not mental processing,\n\
  not socially conferred role, and not object-level body/organism treatment."
