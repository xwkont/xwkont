source_definitions:
- source: BFO
  term_or_identifier: disposition (BFO_0000016)
  dimension: technical
  source_claim_type: direct quotation
  text: '"A disposition is a realizable entity such that if it ceases to exist then its bearer is physically
    changed and its realization occurs when and because this bearer is in some special physical circumstances
    and this realization occurs in virtue of the bearer''s physical make-up."'
  reference:
  - xwkont:ref:bfo-2020
  locator: '`bfo-core.ttl`, class `BFO_0000016`'
  entry_notes: The core capacity-like term in BFO.
- source: BFO
  term_or_identifier: function (BFO_0000034)
  dimension: technical
  source_claim_type: direct quotation
  text: '"A function is a disposition that exists in virtue of its bearer''s physical make-up and this
    physical make-up is something the bearer possesses because it came into being either through evolution
    ... or through intentional design ... in order to realize processes of a certain sort."'
  reference:
  - xwkont:ref:bfo-2020
  locator: '`bfo-core.ttl`, class `BFO_0000034`'
  entry_notes: BFO explicitly places function under disposition.
- source: GFO
  term_or_identifier: Function
  dimension: technical
  source_claim_type: direct quotation
  text: '"A function F is a universal (conceptual structure) defined in purely teleological terms with
    respect to a given goal G which commonly is ascribed by means of has-function relation to entities
    that are the realizations of the function F, execute such a realization or are intended to do it."'
  reference:
  - xwkont:ref:gfo
  locator: '`modules/gfo-base.owl`, class `https://w3id.org/gfo/base/Function`'
  entry_notes: Teleological, but not bearer-inhering in the BFO sense.
- source: UFO / OntoUML proxy
  term_or_identifier: mode / intrinsicModeNature / extrinsicModeNature
  dimension: technical
  source_claim_type: direct quotation
  text: '`mode`: "A particular type of intrinsic property that has no structured value." `intrinsicModeNature`:
    "Indicates that the restricted type includes intrinsic mode individuals among its instances." `extrinsicModeNature`:
    "Identifies what inheres in a concrete individual and depends on others for its existence."'
  reference:
  - xwkont:ref:ufo-2021
  - xwkont:ref:ontouml-vocabulary
  locator: UFO paper extraction notes; `ontouml.ttl` classes `ontouml:mode`, `ontouml:intrinsicModeNature`,
    `ontouml:extrinsicModeNature`
  entry_notes: UFO itself has no IRI scheme; OntoUML is the machine-readable proxy.
- source: GUM
  term_or_identifier: Ability / GeneralPossibility / Intention (linguistic grounding)
  dimension: philosophical
  source_claim_type: editorial observation
  text: GUM's modal and intention classes are explicitly embedded in a systemic-functional-linguistic
    ontology of clause realization, where `Ability` and `GeneralPossibility` qualify processes and `Intention`
    captures a mental process pursuing a determinate aim.
  reference:
  - xwkont:ref:gum-owl
  locator: '`GUM-31.owl`, classes `Ability`, `GeneralPossibility`, `Intention`'
  entry_notes: This row records the source's own theoretical grounding, not a claim that these classes
    are bearer capacities.
- source: GUM
  term_or_identifier: Ability
  dimension: technical
  source_claim_type: direct quotation
  text: '"A modal qualification of the process, with respect to the ability to perform that process; typically
    realized by `can`."'
  reference:
  - xwkont:ref:gum-owl
  locator: '`GUM-31.owl`, class `Ability`'
  entry_notes: Modal/process qualification, not a bearer-inherent capacity class.
- source: GUM
  term_or_identifier: GeneralPossibility
  dimension: technical
  source_claim_type: direct quotation
  text: '"A general possibility relationship is a modal modification of a process that indicates that
    the process may occur; it is typically realized using the modal `may`."'
  reference:
  - xwkont:ref:gum-owl
  locator: '`GUM-31.owl`, class `GeneralPossibility`'
  entry_notes: Modal/process qualification, not a bearer-inherent capacity class.
- source: GUM
  term_or_identifier: Intention
  dimension: technical
  source_claim_type: direct quotation
  text: '"An Intention configuration has a mental process that captures the notion of actively pursuing
    a determinate aim."'
  reference:
  - xwkont:ref:gum-owl
  locator: '`GUM-31.owl`, class `Intention`'
  entry_notes: Mental aim/configuration, not a bearer capacity.
- source: SUMO
  term_or_identifier: Procedure
  dimension: technical
  source_claim_type: direct quotation
  text: '"A sequence-dependent specification. Some examples are ComputerPrograms, finite-state machines,
    cooking recipes, musical scores, conference schedules, driving directions, and the scripts of plays
    and movies."'
  reference:
  - xwkont:ref:sumo-niles-pease-2001
  locator: '`Merge.kif`, class `Procedure`'
  entry_notes: 'A good false friend: procedural specification, not disposition/capacity.'
- source: YAMATO
  term_or_identifier: functional ontology / roles
  dimension: philosophical
  source_claim_type: direct quotation
  text: '"The separation of what to do and how to do is the very philosophy of our functional ontology."
    The same section adds that roles are defined within a context and are used in defining all the types
    in YAMATO.'
  reference:
  - xwkont:ref:yamato-mizoguchi-2010
  locator: '`YAMATO101216.pdf`, section 6, "Roles, functions and relations"'
  entry_notes: This is the clearest YAMATO grounding relevant to the candidate. The fetchable report does
    not confirm a standalone `Function` class.
- source: YAMATO
  term_or_identifier: functional ontology (explicit exclusion)
  dimension: philosophical
  source_claim_type: direct quotation
  text: '"Although we have already developed a convincing functional ontology which is compliant with
    YAMATO, it is not incorporated into YAMATO because it is too professional for general readers."'
  reference:
  - xwkont:ref:yamato-mizoguchi-2010
  locator: '`YAMATO101216.pdf`, section 6, "Roles, functions and relations"'
  entry_notes: A direct, explicit statement that a compliant functional ontology exists but is deliberately
    not incorporated into YAMATO -- the same strength of evidence as DOLCE's "does not formalize functions
    and roles" (see `role.md`), not merely an absence-from-the-fetched-report finding.
- source: DOLCE
  term_or_identifier: '*(none confirmed in checked materials)*'
  dimension: technical
  source_claim_type: editorial observation
  text: Checked D18, DOLCE-Lite, and DUL for a bearer-capacity/disposition analogue and did not confirm
    one in the materials read for this pass. The checked DOLCE sources discuss qualities, roles, relations,
    and (in extension literature) function-like notions, but not a confirmed disposition/capacity class.
  reference:
  - xwkont:ref:dolce-wonderweb-d18
  - xwkont:ref:dolce-lite-owl
  - xwkont:ref:gangemi-dul
  locator: checked full text / grep passes; no direct term confirmed
  entry_notes: Scoped negative finding, not a universal claim about every possible DOLCE extension.
