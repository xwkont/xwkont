comparison_notes:
- note_id: note-001
  dimension: technical
  claim_type: editorial observation
  note: BFO is the only source in this pass that explicitly defines the scope term as a realizable entity
    that comes into being and is realized under special conditions. Its `function` subclass makes the
    etiological side of the hierarchy explicit, so BFO gives the cleanest bearer-capacity baseline for
    the crosswalk.
  supporting_references:
  - xwkont:ref:bfo-2020
  confidence: high
- note_id: note-002
  dimension: technical
  claim_type: editorial observation
  note: GFO's `Function` is close to the scope in that it is teleological and tied to realizations or
    intended realizations, but GFO frames it as a universal/conceptual structure rather than a bearer-inhering
    realizable entity. That is why it stays `related` rather than `close-match`.
  supporting_references:
  - xwkont:ref:gfo
  confidence: high
- note_id: note-003
  dimension: technical
  claim_type: editorial observation
  note: The UFO/OntoUML mode branch is modal/property-like, not a capacity hierarchy. `mode` is an intrinsic
    property with no structured value, `intrinsicModeNature` identifies types with intrinsic mode instances,
    and `extrinsicModeNature` identifies types that depend on others for existence. That makes the branch
    adjacent to the scope, but not a confirmed disposition/capacity equivalent.
  supporting_references:
  - xwkont:ref:ufo-2021
  - xwkont:ref:ontouml-vocabulary
  confidence: medium
- note_id: note-004
  dimension: technical
  claim_type: editorial observation
  note: GUM's `Ability` and `GeneralPossibility` are process modalities, and `Intention` is a mental configuration
    pursuing an aim. Those are linguistically useful modality classes, but they are not bearer-inherent
    capacities in the BFO sense.
  supporting_references:
  - xwkont:ref:gum-owl
  confidence: high
- note_id: note-005
  dimension: philosophical
  claim_type: direct quotation
  note: YAMATO explicitly frames its functional ontology as a distinction between "what to do" and "how
    to do", and says roles are defined within a context and used in defining all types. That is a functional-theoretic
    and role-theoretic grounding, not a standalone bearer-capacity class in the fetchable report. The same
    section goes further, stating directly that a "convincing functional ontology which is compliant with
    YAMATO" already exists but "is not incorporated into YAMATO because it is too professional for general
    readers" -- an explicit exclusion, not merely an absence of evidence.
  supporting_references:
  - xwkont:ref:yamato-mizoguchi-2010
  confidence: high
- note_id: note-006
  dimension: technical
  claim_type: editorial observation
  note: SUMO's `Procedure` is sequence-dependent specification. It is a useful false friend because it
    sounds action-oriented, but its own definition is about specification, not a bearer capacity or disposition.
    `Merge.kif` also gives `(subclass Procedure Proposition)` -- Procedure sits under SUMO's abstract `Proposition`
    branch, the same corpus-wide pattern `role.md` and `quality.md` already found for SUMO's `Attribute`
    branch (BFO/DOLCE/UFO dependent particulars land under SUMO's abstract-entity hierarchy instead).
  supporting_references:
  - xwkont:ref:sumo-niles-pease-2001
  confidence: high
- note_id: note-007
  dimension: technical
  claim_type: editorial observation
  note: The checked DOLCE materials did not surface a confirmed disposition/capacity analogue. That negative
    finding matters because it prevents the crosswalk from treating DOLCE's quality, role, or extension-literature
    function notions as if they were bearer capacities.
  supporting_references:
  - xwkont:ref:dolce-wonderweb-d18
  - xwkont:ref:dolce-lite-owl
  - xwkont:ref:gangemi-dul
  confidence: high
mapping_assertions:
- mapping_id: xwkont:mapping:disposition-capacity:001
  subject: BFO:function
  relation_category: related
  object: GFO:Function
  mapping_justification: semapv:ManualMappingCuration
  predicate_id: skos:relatedMatch
  status: candidate
  confidence: low
  rationale: Both are teleological and both connect to realizations or intended realizations, but GFO
    makes function a universal/conceptual structure rather than a bearer-inhering realizable entity. That
    is enough for a relation, not enough for a stronger match.
  provenance:
  - xwkont:ref:bfo-2020
  - xwkont:ref:gfo
- mapping_id: xwkont:mapping:disposition-capacity:002
  subject: BFO:disposition
  relation_category: unknown
  object: UFO:mode (OntoUML proxy)
  mapping_justification: semapv:ManualMappingCuration
  status: candidate
  confidence: low
  rationale: The UFO mode branch is the closest bearer-dependent property family checked here, but the
    source text and proxy vocabulary do not establish it as a capacity/tendency equivalent. Keep it open
    rather than forcing a match.
  provenance:
  - xwkont:ref:ufo-2021
  - xwkont:ref:ontouml-vocabulary
- mapping_id: xwkont:mapping:disposition-capacity:003
  subject: BFO:disposition
  relation_category: unknown
  object: GUM:Ability
  mapping_justification: semapv:ManualMappingCuration
  status: candidate
  confidence: low
  rationale: GUM's `Ability` is about the ability to perform a process, not about an enduring bearer capacity.
    It is close in ordinary language but not structurally the same thing.
  provenance:
  - xwkont:ref:gum-owl
- mapping_id: xwkont:mapping:disposition-capacity:004
  subject: BFO:disposition
  relation_category: unknown
  object: GUM:GeneralPossibility
  mapping_justification: semapv:ManualMappingCuration
  status: candidate
  confidence: low
  rationale: '`GeneralPossibility` modally qualifies a process as possible, which is still process-centered
    rather than bearer-centered.'
  provenance:
  - xwkont:ref:gum-owl
- mapping_id: xwkont:mapping:disposition-capacity:005
  subject: BFO:disposition
  relation_category: explicit-non-equivalence
  object: GUM:Intention
  mapping_justification: semapv:ManualMappingCuration
  status: candidate
  confidence: high
  rationale: '`Intention` is a mental-process configuration pursuing an aim. That is a different ontological
    kind from an intrinsic bearer capacity, so equivalence should not be asserted.'
  provenance:
  - xwkont:ref:gum-owl
- mapping_id: xwkont:mapping:disposition-capacity:006
  subject: BFO:function
  relation_category: explicit-non-equivalence
  object: SUMO:Procedure
  mapping_justification: semapv:ManualMappingCuration
  status: candidate
  confidence: high
  rationale: SUMO's `Procedure` is a sequence-dependent specification, not a bearer capacity/disposition.
    The lexical similarity is a false friend.
  provenance:
  - xwkont:ref:sumo-niles-pease-2001
- mapping_id: xwkont:mapping:disposition-capacity:007
  subject: BFO:function
  relation_category: explicit-non-equivalence
  object: YAMATO:function
  mapping_justification: semapv:ManualMappingCuration
  status: candidate
  confidence: high
  rationale: YAMATO's own paper states directly that a "convincing functional ontology which is compliant
    with YAMATO" already exists but "is not incorporated into YAMATO because it is too professional for
    general readers" -- an explicit exclusion of a standalone Function class from YAMATO itself, not merely
    an absence of evidence in the fetchable report. Equivalence should not be asserted against a class
    that YAMATO's own authors deliberately chose not to include.
  provenance:
  - xwkont:ref:yamato-mizoguchi-2010
uncertainties:
- item_id: uncertainty-001
  uncertainty_type: uncertainty
  resolved: false
  description: DOLCE core/lite/DUL did not yield a confirmed disposition/capacity analogue in the checked
    material. The closest checked concepts remain quality, role, relation, and extension-literature function
    notions, all of which are adjacent but not the same as a bearer capacity.
  impact: Prevents a false DOLCE equivalence claim.
  follow_up: Re-check any later DOLCE extension only if a source explicitly names a capacity/disposition-like
    class.
- item_id: uncertainty-002
  uncertainty_type: uncertainty
  resolved: false
  description: The UFO/OntoUML mode branch is still only a proxy-level candidate for this scope. The checked
    material shows it is intrinsic/extrinsic property language, but not a confirmed disposition/capacity
    hierarchy.
  impact: Keeps `mapping-002` at `unknown`.
  follow_up: Revisit only if a later UFO source or a more direct formalization explicitly treats mode
    as capacity-like.
- item_id: uncertainty-003
  uncertainty_type: non-equivalence
  resolved: false
  description: GFO `Function` remains only `related` because the source treats it as a universal/conceptual
    structure. Whether future review wants to keep `related` or downgrade to `unknown` is an editorial
    decision, not a source fact.
  impact: Affects `mapping-001` confidence and relation category.
  follow_up: Confirm the intended XwkOnt threshold for teleological universals versus bearer-inhering
    capacities.
- item_id: uncertainty-004
  uncertainty_type: non-equivalence
  resolved: false
  description: GUM's `Ability`, `GeneralPossibility`, and `Intention` are process/modality/mental-aim
    classes, not bearer capacities.
  impact: Supports the `unknown`/`explicit-non-equivalence` split in the mapping table.
  follow_up: None needed unless a later GUM module introduces a distinct capacity class.
- item_id: uncertainty-005
  uncertainty_type: non-equivalence
  resolved: true
  resolved_date: '2026-07-06'
  resolution_note: resolved 2026-07-06, following re-verification of the YAMATO PDF's own text
  description: YAMATO's report talks about functional ontology and roles. Original pass left this at `unknown`
    for lack of a standalone `Function` class; re-verification against the primary source found the paper
    explicitly states a compliant functional ontology exists but is deliberately not incorporated into
    YAMATO ("too professional for general readers") -- a direct exclusion, not an absence of evidence.
  impact: Resolved `mapping-007` from `unknown` to `explicit-non-equivalence`, `low` to `high` confidence.
  follow_up: Fetch YAMATO's OWL/Hozo files if the registration gate is ever completed, to check whether
    the separately-developed functional ontology (Kitamura 2006) is later formalized as an IRI-bearing
    class outside YAMATO proper.
- item_id: uncertainty-006
  uncertainty_type: non-equivalence
  resolved: false
  description: SUMO `Procedure` is a specification, not a capacity/disposition, so it stays a negative
    finding rather than a near-equivalence.
  impact: Prevents procedure/function drift.
  follow_up: None needed.
- item_id: uncertainty-007
  uncertainty_type: non-equivalence
  resolved: false
  description: BFO's `function` is safely included only because BFO itself defines it as a disposition
    subtype; no other source in this pass provided an equally direct bearer-inhering function analogue.
  impact: Supports keeping BFO function as the strongest source-side anchor in the crosswalk.
  follow_up: If a future source defines a bearer-inhering function directly, compare it against `BFO_0000034`
    first, not against a looser modal/process class.
- item_id: uncertainty-008
  uncertainty_type: open-question
  resolved: false
  description: 'GUM `Ability`/`GeneralPossibility` (`rdfs:subClassOf Possibility`, a modal-relation branch)
    and `Intention` (`rdfs:subClassOf Internal` -> `SayingAndSensing`, a mental-process branch) are both
    non-entity, non-bearer-capacity classes for structurally the same underlying reason -- neither branch
    reifies a bearer-inhering property the way BFO''s `disposition` does. `Intention` was assigned `explicit-non-equivalence`
    (mapping-005) while `Ability`/`GeneralPossibility` were left at `unknown` (mapping-003/004), without
    a stated reason for the differential treatment. This also does not yet invoke `role.md`''s own established
    finding that GUM systematically reifies this whole family (Role, Relation, Information Artifact) as
    relations rather than entities -- the same pattern plausibly extends here.'
  impact: Mapping-003/004 may be under-categorized relative to mapping-005's precedent, or mapping-005
    may be over-categorized relative to mapping-003/004 -- reviewer should pick one consistent treatment
    rather than leaving the split unexplained.
  follow_up: On review, either escalate mapping-003/004 to `explicit-non-equivalence` to match mapping-005's
    reasoning, or document explicitly why `Intention`'s mental-process framing warrants a stronger claim
    than `Ability`/`GeneralPossibility`'s modal framing.
