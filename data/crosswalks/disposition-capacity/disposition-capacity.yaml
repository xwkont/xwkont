local_identifier: xwkont:concept:disposition-capacity
slug: disposition-capacity
title: Disposition / Capacity
editorial_status: reviewed
created: '2026-07-06'
modified: '2026-07-06'
scope_note: 'This crosswalk compares bearer-inherent capacities in the BFO sense: `disposition` and its
  etiological subtype `function`, against candidate analogs in GFO, UFO/OntoUML, SUMO, YAMATO, and GUM.



  It does **not** compare Role or Relator. Those are social/relational positions or truthmakers, not intrinsic
  capacities. It also does not treat procedure, intention, or other modal-looking lexical neighbors as
  equivalent just because they sound ability-like.



  Checked DOLCE materials (`D18`, `DOLCE-Lite`, and DUL) did not yield a confirmed bearer-capacity analogue
  in the source material read for this pass. That is recorded here as a scoped negative finding, not as
  a claim about every later DOLCE extension.'
