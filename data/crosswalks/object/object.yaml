source_definitions:
- source: BFO
  term_or_identifier: Object (BFO_0000030)
  dimension: technical
  source_claim_type: direct quotation
  text: '"(Elucidation) An object is a material entity which manifests causal unity & is of
    a type instances of which are maximal relative to the sort of causal unity manifested."
    Examples: "An organism; a fish tank; a planet; a laptop; a valve; a block of marble; an
    ice cube." Scope note in the primary source: "A description of three primary sorts of
    causal unity is provided in Basic Formal Ontology 2.0. Specification and User Guide."'
  reference:
  - xwkont:ref:bfo-2020
  locator: '**verified**: `bfo-core.ttl`, class BFO_0000030, fetched and read directly 2026-07-01'
  entry_notes: Corrects earlier paraphrase's wording ("maximal relative to this criterion
    of causal unity") to the primary text's exact phrasing ("maximal relative to the sort
    of causal unity manifested") — same meaning, now exact.
- source: BFO
  term_or_identifier: Object vs. Fiat Object Part
  dimension: technical
  source_claim_type: paraphrase
  text: Objects have bona fide (mind-independent) boundaries; fiat object parts are also causally
    unified but have mind-dependent (fiat) boundaries.
  reference:
  - xwkont:ref:bfo-2020
  locator: secondary-source paraphrase; not re-verified against the primary source's Fiat
    Object Part class specifically in this pass
- source: DOLCE
  term_or_identifier: Physical Object
  dimension: technical
  source_claim_type: direct quotation
  text: '"The main characteristic of objects is that they are endurants with unity. However,
    they have no common unity criterion, since different subtypes of objects may have different
    unity criteria. Differently from aggregates, (most) objects change some of their parts
    while keeping their identity." Contrasted with Amounts of Matter: "endurants with no unity
    (... none of them is an essential whole)."'
  reference:
  - xwkont:ref:dolce-wonderweb-d18
  locator: '**verified**: WonderWeb D18 PDF, manually extracted 2026-07-01 (via the same `zlib`-stream
    technique used for the DOLCE 2022 and UFO 2021 papers)'
  entry_notes: Confirms the earlier paraphrase closely; the primary text additionally clarifies
    that DOLCE deliberately does *not* commit to one universal unity criterion across all
    Object subtypes.
- source: DOLCE
  term_or_identifier: Agentive / Non-Agentive Physical Object
  dimension: technical
  source_claim_type: paraphrase
  text: Physical Objects are further analyzed into Agentive and Non-Agentive depending on
    whether they may have intentions (e.g., a person is agentive).
  reference:
  - xwkont:ref:dolce-wonderweb-d18
  locator: secondary-source paraphrase; not re-located in the extracted D18 text in this pass
  entry_notes: Not addressed further in this crosswalk — see Uncertainty.
- source: UFO
  term_or_identifier: Substantial (genus, not itself a leaf category)
  dimension: technical
  source_claim_type: direct quotation
  text: '"UFO accounts for the existence of both independent and dependent endurants. Independent
    endurants are called substantials, while those that existentially depend on other individuals
    are dubbed moments."'
  reference:
  - xwkont:ref:ufo-2021
  locator: '**verified**: Applied Ontology 2021 PDF, manually extracted 2026-07-01'
  entry_notes: '`Substantial` is the genus (independent endurant); `Object` is one of its
    leaf species — see next row. This corrects the earlier draft''s framing of `Substantial`
    as itself the Object-equivalent.'
- source: UFO
  term_or_identifier: '**Object** (aka Functional Complex)'
  dimension: technical
  source_claim_type: direct quotation
  text: '"Objects (aka functional complexes) are entities whose parts play differentiated
    functional roles with respect to the whole, e.g., a human body, an organization, a computer,
    John''s car." Contrasted with sibling Substantial leaf categories: "Quantities are maximally-topologically-self-connected
    (e.g., pieces) of homeomerous amounts of matter" and "Collectives are entities whose parts
    play the same role with respect to the whole, e.g., the Black Forest (as a collective
    of trees)."'
  reference:
  - xwkont:ref:ufo-2021
  locator: '**verified**: Applied Ontology 2021 PDF, manually extracted 2026-07-01'
  entry_notes: '**Major correction**: UFO *does* have a formal class named "Object," contrary
    to this crosswalk''s original claim. `Object` is a leaf category of `Substantial`, alongside
    `Quantity` and `Collective`, distinguished by parts playing *differentiated* functional
    roles (vs. Quantity''s homeomeric matter or Collective''s *same*-role parts).'
- source: UFO
  term_or_identifier: Kind
  dimension: technical
  source_claim_type: paraphrase
  text: 'A Kind is a rigid sortal endurant type providing uniform principles of individuation,
    identity, and persistence to its instances. UFO''s formal apparatus pairs Kind with each
    leaf category: `ObjectKind`/`ObjectType`, `CollectiveKind`/`CollectiveType`, `QuantityKind`/`QuantityType`,
    `RelatorKind`/`RelatorType`, `ModeKind`/`ModeType`, `QualityKind`/`QualityType`.'
  reference:
  - xwkont:ref:ufo-2021
  locator: '**verified**: Applied Ontology 2021 PDF, manually extracted 2026-07-01 (paraphrased
    from the formal axiom schema, not a single prose sentence)'
  entry_notes: 'Corrects the earlier framing: `Kind` is not an alternative to `Object` — it''s
    a sortal-classification mechanism that *applies to* Object (as `ObjectKind`) and to every
    other leaf category equally.'
- source: SUMO
  term_or_identifier: Object
  dimension: technical
  source_claim_type: direct quotation
  text: '"(subclass Object Physical)... Corresponds roughly to the class of ordinary objects.
    Examples include normal physical objects, geographical regions, and locations of Processes,
    the complement of Objects in the Physical class. In a 4D ontology, an Object is something
    whose spatiotemporal extent is thought of as dividing into spatial parts roughly parallel
    to the time-axis."'
  reference:
  - xwkont:ref:sumo-niles-pease-2001
  locator: '**verified**: `Merge.kif`, `documentation Object EnglishLanguage`, fetched and
    read directly 2026-07-01'
  entry_notes: 'Resolves `uncertainty-002` partially: SUMO''s Object has no explicit unity/individuation
    axiom analogous to BFO''s causal unity — its defining criterion is the 4D spatial-parts-vs-temporal-parts
    distinction relative to Process, confirmed directly rather than absent from the record.'
- source: GFO
  term_or_identifier: Material object
  dimension: technical
  source_claim_type: direct quotation
  text: '"A material structure is an individual which satisfies the following conditions:
    it is a presential, it occupies space, it is a bearer of qualities, but other entities
    cannot have it as quality, and it consists of an amount of substrate, and it instantiates
    a persistant (''has identity'')."'
  reference:
  - xwkont:ref:gfo
  locator: '**verified**: `modules/gfo-base.owl`, class `Material_object`, fetched and read
    directly 2026-07-02 (reusing the artifact fetched for `continuant-occurrent.md`)'
  entry_notes: Subclass of `Discrete_presential`; `owl:disjointWith` `Configuration` and `Material_boundary`.
- source: GFO
  term_or_identifier: Material persistant
  dimension: technical
  source_claim_type: direct quotation
  text: '"Material persistants are particular universals whose instances are material structures;
    they are related to those entities which are called sometimes continuants or objects,
    as apples, cars or houses."'
  reference:
  - xwkont:ref:gfo
  locator: '**verified**: `modules/gfo-base.owl`, class `Material_persistant`, fetched and
    read directly 2026-07-02'
  entry_notes: GFO's own text uses "continuants or objects" to gloss this lineage — a rare
    case of a source ontology explicitly using XwkOnt's own crosswalk vocabulary.
- source: YAMATO
  term_or_identifier: Object
  dimension: technical
  source_claim_type: direct quotation
  text: '"[R]ather than trying to characterize an object in terms of its internal processes...,
    we would rather say that an object is a unity which is what enacts its external processes.
    We could indeed say that the object is the interface between its internal and external
    processes: it is a point of stability in the world in virtue of which certain processes
    are characterized as internal and others as external."'
  reference:
  - xwkont:ref:yamato-mizoguchi-2010
  locator: '**verified**: 2010 technical report PDF, Section 5 ("Objects, Processes and Events"),
    manually extracted 2026-07-02'
  entry_notes: Quotes and builds on Galton (2009)'s "the water falls, but the waterfall doesn't
    fall" example. Defines Object *relationally* (as an interface between internal/external
    processes), not by an intrinsic unity criterion like BFO's causal unity or DOLCE's unity
    criterion.
- source: TUpper
  term_or_identifier: object
  dimension: technical
  source_claim_type: direct quotation
  text: '"An object is anything that is not a timepoint, nor an activity nor an activity-occurrence.
    Intuitively, an object is a concrete or abstract thing that can participate in an activity."'
  reference:
  - xwkont:ref:tupper-colore
  locator: '**verified**: `TUpper-Terms.html`, term `object`, fetched and read directly 2026-07-02
    (reusing the artifact fetched for `continuant-occurrent.md`)'
  entry_notes: Same negative-definition term already documented in `continuant-occurrent.md`;
    TUpper has no separate, more specific "Object" concept below this top-level term.
- source: GUM
  term_or_identifier: DecomposableObject
  dimension: technical
  source_claim_type: direct quotation
  text: '"An object that is being viewed as being made up of parts that may be taken apart
    and are often given explicit linguistic recognition."'
  reference:
  - xwkont:ref:gum-owl
  locator: '**verified**: `GUM-31.owl`, class `DecomposableObject`, fetched and read directly
    2026-07-02'
  entry_notes: Subclass of `SimpleThing`; `owl:disjointWith` `NonDecomposableObject`. Criterion
    is about linguistic recognition of parts, not a metaphysical unity test.
- source: GUM
  term_or_identifier: NonDecomposableObject
  dimension: technical
  source_claim_type: direct quotation
  text: '"An object that is being regarded as not possessing significant parts, or which is
    not to be considered decomposable for present purposes."'
  reference:
  - xwkont:ref:gum-owl
  locator: '**verified**: `GUM-31.owl`, class `NonDecomposableObject`, fetched and read directly
    2026-07-02'
  entry_notes: Subclass of `SimpleThing`; the pairing (Decomposable/NonDecomposable) is GUM's
    own closest analog to "Object" as a category, not a single class named "Object."
- source: BFO/DOLCE
  term_or_identifier: philosophical framing (inherited)
  dimension: philosophical
  source_claim_type: inference
  text: The realist (BFO) vs. cognitive/linguistic (DOLCE) contrast documented for the top-level
    Continuant/Occurrent split in `continuant-occurrent.md` (citing `xwkont:ref:borgo-galton-kutz-2022`)
    is inferred to extend to the Object level (BFO's bona-fide-boundary criterion reads as
    mind-independent/realist; DOLCE's unity criterion is presented as part of a classification
    scheme, consistent with a cognitive orientation), but no source was found in this pass
    making that Object-specific comparison explicitly.
  reference:
  - xwkont:ref:borgo-galton-kutz-2022
  locator: inference, not a directly cited Object-level passage
  entry_notes: Flagged explicitly as an inference rather than a confirmed claim — see Uncertainty.
