comparison_notes:
- note_id: note-001
  dimension: technical
  claim_type: editorial observation
  note: 'BFO and DOLCE both use an explicit unity criterion to distinguish Object-like entities
    from mere amounts of matter: BFO''s causal unity (contrasted with fiat object parts by
    boundary type) and DOLCE''s unity (contrasted with Amount of Matter, which lacks it, per
    the now-verified D18 quotation). UFO''s Object is distinguished from its sibling leaf
    categories (Quantity, Collective) by a different criterion — differentiated (vs. homeomeric
    or same-role) functional parts — but all three sources converge on distinguishing Object
    from "mere stuff" via *some* structural/functional criterion. This is a genuine three-way
    structural convergence, not just similar labels.'
  supporting_references:
  - xwkont:ref:bfo-2020
  - xwkont:ref:dolce-wonderweb-d18
  - xwkont:ref:ufo-2021
  confidence: high
- note_id: note-002
  dimension: technical
  claim_type: editorial observation
  note: '**Corrected 2026-07-01**: UFO does have a formal `Object` category (a leaf species
    of `Substantial`, alongside `Quantity` and `Collective`), contrary to this crosswalk''s
    original claim. `Kind` is not an alternative to Object — it is a sortal-classification
    mechanism (`ObjectKind`, `QuantityKind`, etc.) that applies uniformly across all Substantial
    and Moment leaf categories, providing the individuation/identity criterion for whichever
    category it''s paired with.'
  supporting_references:
  - xwkont:ref:ufo-2021
  confidence: high
- note_id: note-003
  dimension: technical
  claim_type: editorial observation
  note: SUMO's Object is comparatively loose ("tangible or corporeal items") without a confirmed
    formal unity or individuation criterion analogous to BFO/DOLCE's, consistent with `continuant-occurrent.md`'s
    observation that SUMO prioritizes engineering interoperability over explicit philosophical
    criteria at the top level.
  supporting_references:
  - xwkont:ref:sumo-niles-pease-2001
  confidence: medium
- note_id: note-004
  dimension: philosophical
  claim_type: inference
  note: The realist/cognitive-linguistic contrast documented for BFO vs. DOLCE at the Continuant/Occurrent
    level plausibly extends to the Object level (bona-fide boundaries as a realist criterion
    vs. unity as a classification-scheme criterion), but this crosswalk found no source making
    that comparison explicitly at the Object level specifically — this is an inference, not
    a confirmed citation.
  supporting_references:
  - xwkont:ref:borgo-galton-kutz-2022
  confidence: low
- note_id: note-005
  dimension: technical
  claim_type: editorial observation
  note: 'Unlike BFO/DOLCE/UFO''s intrinsic unity criteria or SUMO''s loose engineering framing,
    GFO and YAMATO each define their Object-equivalent by a different route: GFO''s `Material_object`
    is defined structurally (presential + spatial occupation + quality-bearing + substrate
    + persistant-instantiation, i.e. a conjunction of independently-defined GFO categories,
    not a standalone unity test), while YAMATO defines Object *relationally* (as the interface
    between an entity''s internal and external processes, following Galton 2009). TUpper and
    GUM continue the pattern already established at the Continuant/Occurrent level (`continuant-occurrent.md`''s
    `note-004`): structural analogs only, no positive persistence/unity criterion offered.'
  supporting_references:
  - xwkont:ref:gfo
  - xwkont:ref:yamato-mizoguchi-2010
  - xwkont:ref:tupper-colore
  - xwkont:ref:gum-owl
  confidence: high
  confidence_annotation: (verified directly against each source's own text)
