uncertainties:
- item_id: uncertainty-001
  uncertainty_type: uncertainty
  resolved: true
  description: 'UFO''s primary source was read directly and in full for this concept: UFO
    *does* have a formal `Object` category (leaf species of `Substantial`), and `Kind` is
    an orthogonal sortal-classification mechanism applying to it (and every other leaf category),
    not a competing alternative to "Object." The original "labeling mismatch" framing was
    incorrect.'
  impact: '`mapping-002`/`mapping-003` raised from medium to high confidence.'
  follow_up: Resolved. OntoUML sortality literature beyond the 2021 paper itself was not additionally
    consulted, but is no longer needed to resolve this specific question.
  resolved_date: "2026-07-01"
  resolution_note: resolved 2026-07-01, as a correction
- item_id: uncertainty-002
  uncertainty_type: uncertainty
  resolved: true
  description: 'SUMO''s `Merge.kif` confirms directly: Object has no unity/individuation axiom
    analogous to BFO''s causal unity. Its actual defining criterion is 4D spatial-parts-vs-temporal-parts
    division relative to Process (i.e., Object is essentially defined by contrast with Process,
    not by an intrinsic unity test).'
  impact: '`mapping-004`/`mapping-005` confidence can stay low, but now for a confirmed reason
    (genuinely no comparable criterion exists) rather than an absence in the search results.'
  follow_up: Resolved — no further action needed.
  resolved_date: "2026-07-01"
  resolution_note: resolved 2026-07-01
- item_id: uncertainty-003
  uncertainty_type: open-question
  resolved: false
  description: Whether DOLCE's Agentive/Non-Agentive split within Physical Object has any
    analog in BFO, UFO, or SUMO is not addressed in this crosswalk.
  impact: No mapping assertion currently addresses agentivity.
  follow_up: Consider as future work, possibly its own comparison note once primary sources
    are read.
- item_id: uncertainty-004
  uncertainty_type: uncertainty
  resolved: false
  description: '`note-004`''s philosophical-dimension claim is an inference extending `continuant-occurrent.md`''s
    top-level citation to the Object level, not a directly cited Object-specific philosophical
    comparison.'
  impact: Confidence on `note-004` capped at low; no mapping assertion relies on it.
  follow_up: Find a source explicitly comparing BFO's and DOLCE's philosophical stance specifically
    at the Object/Physical-Object level.
- item_id: uncertainty-005
  uncertainty_type: open-question
  resolved: false
  description: 'Same gaps already disclosed in `continuant-occurrent.md`''s `uncertainty-005`,
    inherited here: YAMATO''s OWL/Hozo files were not fetched (registration-gated), so `correspondence-007`
    has no IRI; the three sources'' dedicated 2022 Applied Ontology papers (YAMATO, TUpper,
    GUM) were not accessed (Cloudflare block).'
  impact: Lower-precision locator for YAMATO's Object correspondence than for GFO/TUpper/GUM.
  follow_up: Same follow-up as `continuant-occurrent.md`'s `uncertainty-005` — resolving it
    there resolves it here too, since both crosswalks depend on the same underlying source
    artifacts.
