source_definitions:
- source: DOLCE
  term_or_identifier: non-physical-endurant
  dimension: technical
  source_claim_type: direct quotation
  text: '"An endurant with no mass, generically constantly depending on some agent. Non-physical
    endurants can have physical constituents (e.g. in the case of members of a collection)."
    The base file makes this the root of the non-physical endurant branch, with `rdfs:subClassOf
    endurant`, `part only non-physical-endurant`, and `has-quality only abstract-quality`.'
  reference:
  - xwkont:ref:dolce-lite-owl
  locator: '`DOLCE-Lite.owl`, `owl:Class#non-physical-endurant`, fetched and read directly
    2026-07-07'
  entry_notes: 'Corrected during independent review (2026-07-07): the draft''s original quotation
    truncated this `rdfs:comment` to "An endurant with no mass," dropping the constant-dependence-on-an-agent
    clause and the physical-constituents caveat — both restored here from the primary source.
    `owl:disjointWith` is asserted on sibling classes rather than locally on this class: `physical-endurant`
    is disjoint with `non-physical-endurant`, and `arbitrary-sum` is also disjoint with it.'
- source: DOLCE
  term_or_identifier: non-physical-object
  dimension: both
  source_claim_type: direct quotation
  text: '"Formerly known as description." The class is a unitary endurant with no mass, generically
    dependent on an agent and a communication act, and the file says that both descriptions
    and concepts are non-physical objects. `rdfs:subClassOf non-physical-endurant`; `part
    only non-physical-object`; `generically-dependent-on some physical-endurant`.'
  reference:
  - xwkont:ref:dolce-lite-owl
  locator: '`DOLCE-Lite.owl`, `owl:Class#non-physical-object`, fetched and read directly 2026-07-07'
  entry_notes: No further subclasses beneath `non-physical-object` were found in the base
    module.
- source: BFO
  term_or_identifier: generically dependent continuant
  dimension: technical
  source_claim_type: paraphrase
  text: An entity that exists because there is at least one copy whose content or pattern
    can be shared with other copies. This is the closest BFO non-physical dependent branch
    on the core-file side.
  reference:
  - xwkont:ref:bfo-2020
  locator: '`bfo-core.ttl`, class `generically dependent continuant`, fetched and read directly
    2026-07-07'
  entry_notes: '`immaterial entity` is also present in the same file, but it is a different
    class and not a social-object branch.'
- source: BFO
  term_or_identifier: immaterial entity
  dimension: technical
  source_claim_type: paraphrase
  text: An independent continuant with no material entity as continuant part. This is a non-material
    hit, but it is not the same modeling choice as DOLCE's non-physical bearer branch.
  reference:
  - xwkont:ref:bfo-2020
  locator: '`bfo-core.ttl`, class `immaterial entity`, fetched and read directly 2026-07-07'
  entry_notes: Relevant as a lexical hit only, not as a social-object analog.
- source: SUMO
  term_or_identifier: Abstract
  dimension: technical
  source_claim_type: paraphrase
  text: SUMO puts `List`, `Proposition`, `Attribute`, `Relation`, and related content-like
    classes on the abstract side of its `Entity` partition. That is the broad non-physical
    bucket closest to this candidate.
  reference:
  - xwkont:ref:sumo-niles-pease-2001
  locator: '`Merge.kif`, `Abstract`, fetched and read directly 2026-07-07'
  entry_notes: Broad abstract branch, not a social-object hierarchy.
- source: SUMO
  term_or_identifier: Proposition
  dimension: technical
  source_claim_type: direct quotation
  text: '"Propositions are Abstract entities that express a complete thought or a set of such
    thoughts... A Proposition is an abstraction that may have multiple representations: strings,
    sounds, icons, etc." This is the most content-like SUMO hit in the checked material, but
    it is still propositional content rather than a bearer-level social object.'
  reference:
  - xwkont:ref:sumo-niles-pease-2001
  locator: '`Merge.kif`, `Proposition`, fetched and read directly 2026-07-07'
  entry_notes: 'Corrected during independent review (2026-07-07): the draft''s original text
    ("An abstract entity that may have multiple representations") was a paraphrase mislabeled
    as a direct quotation — restored to `Merge.kif`''s actual documentation string, including
    the primary "complete thought" definition the paraphrase dropped. Useful as a nearby non-physical
    analog, not as an exact object branch.'
- source: UFO
  term_or_identifier: non-physical endurants
  dimension: technical
  source_claim_type: direct quotation
  text: '"We do admit, however, relations of constitution between non-physical endurants. For
    example, a software program is constituted by software code, not identical to it."'
  reference:
  - xwkont:ref:ufo-2021
  locator: complete extracted paper text reused from the 2026-07-06 extraction (footnote 8,
    in the constitution-relation discussion); live fetch attempts in this session were blocked
    by HTTP 403
  entry_notes: 'Found during independent review (2026-07-07), missed entirely by the Codex
    draft, which claimed "the searched text does not introduce a dedicated non-physical/social-object
    class" without having actually located this passage. UFO does not reify "non-physical
    endurant" as its own formal class or give it a dedicated definition the way DOLCE does
    — it appears only in this one footnote, in service of an argument about the constitution
    relation''s asymmetry — but it is a direct, literal use of the identical phrase DOLCE uses
    for its own branch root, with a worked example (a software program constituted by, but
    not identical to, its software code) that is itself a plausible non-physical-object instance.
    This is the strongest textual hit of any of the 7 non-DOLCE sources checked.'
- source: UFO
  term_or_identifier: Object / Relator / Mode / Quality
  dimension: both
  source_claim_type: editorial observation
  text: The paper builds a four-category ontology with object types, moments, and abstract
    particulars. Beyond the "non-physical endurants" footnote above, the searched text does
    not introduce a further dedicated non-physical/social-object class; the closest additional
    formal terms are `Object`, `Relator`, `Mode`, and `Quality`, plus the theoretical phrase
    `abstract particulars`.
  reference:
  - xwkont:ref:ufo-2021
  locator: complete extracted paper text reused from the 2026-07-06 extraction; live fetch
    attempts in this session were blocked by HTTP 403
  entry_notes: Formal class-level hit, but not on the requested object/social-object axis.
- source: GFO
  term_or_identifier: Material_object / Material_persistant / Social_stratum / Social_role
  dimension: both
  source_claim_type: paraphrase
  text: '`gfo-base.owl` reifies a material-object branch and a separate mental/social stratum
    apparatus, but no dedicated non-physical/social-object class. `Material_persistant` says
    these are the entities sometimes called continuants or objects; social and mental content
    is handled via `Social_stratum`, `Mental_stratum`, `Social_role`, and `Relator`.'
  reference:
  - xwkont:ref:gfo
  locator: '`modules/gfo-base.owl`, fetched and read directly 2026-07-07'
  entry_notes: Reified classes are present, but not the requested bearer-level non-physical/social-object
    branch.
- source: YAMATO
  term_or_identifier: informational object / representation
  dimension: both
  source_claim_type: paraphrase
  text: The report has a dedicated section on informational objects and another on representation.
    It treats them as content-bearing things and distinguishes representation from representing
    thing, but the fetchable report does not reify a dedicated social-object class.
  reference:
  - xwkont:ref:yamato-mizoguchi-2010
  locator: '**independently re-verified 2026-07-07** (session-051): `YAMATO101216.pdf`
    re-fetched fresh via the Wayback Machine snapshot and re-extracted with `pdftotext`,
    grepped for "social object," "non-physical," and "nonphysical" -- zero hits for all three.
    The informational-object/representation apparatus was independently confirmed present
    (section-level discussion of informational objects, representation vs. representing
    thing). Prior review flagged this row as inherited from the Codex draft, not independently
    re-checked; now confirmed.'
  entry_notes: Section-level conceptual apparatus only, confirmed absent of a social-object
    class by independent full-text search, not merely inherited from the draft.
- source: TUpper
  term_or_identifier: object
  dimension: technical
  source_claim_type: direct quotation
  text: '"An object is anything that is not a timepoint, nor an activity nor an activity-occurrence."
    The prose also says objects can be concrete or abstract things that participate in an
    activity.'
  reference:
  - xwkont:ref:tupper-colore
  locator: '`TUpper-Terms.html`, fetched and read directly 2026-07-07'
  entry_notes: Broad object class, not a social-object branch.
- source: GUM
  term_or_identifier: SimpleThing
  dimension: technical
  source_claim_type: direct quotation
  text: '"An entity which may participate in a configuration." GUM''s object-like top level
    is a linguistic `SimpleThing` / `Process` split, not a non-physical/social-object hierarchy.'
  reference:
  - xwkont:ref:gum-owl
  locator: '`GUM-31.owl.txt`, class `SimpleThing`, fetched and read directly 2026-07-07'
  entry_notes: Broad object-like class, but linguistically motivated.
