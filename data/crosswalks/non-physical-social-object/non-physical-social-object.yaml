comparison_notes:
- note_id: note-001
  dimension: technical
  claim_type: editorial observation
  note: 'DOLCE-Lite.owl is the only checked base module that directly reifies the non-physical
    endurant/object axis in the requested sense. The file''s internal structure is shallow:
    `non-physical-endurant` is the branch root, and `non-physical-object` is its only base-module
    child.'
  supporting_references:
  - xwkont:ref:dolce-lite-owl
  confidence: high
- note_id: note-002
  dimension: technical
  claim_type: editorial observation
  note: The classic DOLCE social-object leaf split is not in `DOLCE-Lite.owl` itself. That
    matters because this draft is deliberately anchored to the base module only; the extension
    material that introduces `Mental-Object` / `Social-Object` is already crosswalked elsewhere
    and should stay cited there.
  supporting_references:
  - xwkont:ref:dolce-lite-owl
  confidence: high
  supporting_references_note: '`xwkont:ref:dolce-lite-owl`, docs/crosswalks/concepts/situation-state-of-affairs.md,
    docs/crosswalks/concepts/role.md, docs/crosswalks/concepts/information-artifact.md'
- note_id: note-003
  dimension: technical
  claim_type: editorial observation
  note: BFO, SUMO, TUpper, and GUM all have broad object or content branches that can host
    non-physical entities, but none of them reifies a DOLCE-style non-physical/social-object
    hierarchy. Their best hits are broader than the candidate, not exact peers.
  supporting_references:
  - xwkont:ref:bfo-2020
  - xwkont:ref:sumo-niles-pease-2001
  - xwkont:ref:tupper-colore
  - xwkont:ref:gum-owl
  confidence: medium-high
- note_id: note-004
  dimension: both
  claim_type: editorial observation
  note: 'Corrected during independent review (2026-07-07): UFO''s own paper explicitly uses
    the phrase "non-physical endurants" (footnote 8, constitution-relation discussion), with
    a worked example (a software program constituted by, but not identical to, its software
    code) — this is a genuine second source for the candidate, not merely nearby background,
    even though UFO does not reify the phrase as its own formal class or definition the way
    DOLCE does. The paper''s broader four-category apparatus (objects, moments, abstract particulars)
    remains relevant structural context but is secondary to this direct textual hit.'
  supporting_references:
  - xwkont:ref:ufo-2021
  confidence: medium
- note_id: note-005
  dimension: technical
  claim_type: editorial observation
  note: 'GFO splits the territory differently: material objects on one side, and mental/social
    strata plus roles on the other. That gives it social vocabulary, but not a social-object
    branch.'
  supporting_references:
  - xwkont:ref:gfo
  confidence: medium-high
- note_id: note-006
  dimension: technical
  claim_type: editorial observation
  note: YAMATO's treatment of informational objects is explicitly about representation and
    content-bearing things, not a bearer-level social-object class. The report is useful as
    a conceptual analog, but it is prose-level rather than reified in the fetched artifact.
  supporting_references:
  - xwkont:ref:yamato-mizoguchi-2010
  confidence: medium
