source_definitions:
- source: BFO
  term_or_identifier: Relational Quality (BFO_0000145)
  dimension: technical
  source_claim_type: direct quotation
  text: '"b is a relational quality =Def b is a quality & there exists c and d such that c
    and d are not identical & b specifically depends on c & b specifically depends on d."
    Examples: "A marriage bond; an instance of love; an obligation between one person and
    another." Confirmed subclass of Quality (BFO_0000019), not a top-level class.'
  reference:
  - xwkont:ref:bfo-2020
  locator: '**verified**: `bfo-core.ttl`, class BFO_0000145, fetched and read directly 2026-07-01'
  entry_notes: See `quality.md` for BFO's general Quality treatment, of which this is a subtype.
    Confirms the placement mismatch (subtype of Quality, not top-level) directly rather than
    by inference.
- source: DOLCE
  term_or_identifier: immediate-relation (aka formal relation)
  dimension: technical
  source_claim_type: direct quotation
  text: '"A relation is formal if it holds as soon as its relata are given. Formal relations
    are called equivalently immediate relations, since they hold of their relata without mediating
    additional individuals... The notion of ''immediate relation'' seems to be equivalent
    to what Johansson called ground relation... This notion also equivalent to that of internal
    relation." Formalized in DOLCE-Lite+: `(DEFRELATION IMMEDIATE-RELATION (?A ?B))`, documented
    as "A relation that holds without additional mediating individuals. In logical terms,
    a non-composed relation."'
  reference:
  - xwkont:ref:dolce-wonderweb-d18
  locator: '**verified**: WonderWeb D18 PDF and DOLCE-Lite+ KIF source, manually extracted
    2026-07-01'
  entry_notes: DOLCE's own text explicitly equates immediate-relation with "internal relation"
    — directly confirms, rather than merely suggests, the pairing with UFO's formal/internal
    relation terminology.
- source: DOLCE
  term_or_identifier: mediated-relation
  dimension: technical
  source_claim_type: direct quotation
  text: 'Formalized in DOLCE-Lite+: `(DEFRELATION MEDIATED-RELATION (?A ?B) :<=> (EXISTS (?C)
    (AND (IMMEDIATE-RELATION ?A ?C) (IMMEDIATE-RELATION ?C ?B))))`, documented as "A relation
    that composes other relations. For example, a participation relation composed with a representation
    relation."'
  reference:
  - xwkont:ref:dolce-wonderweb-d18
  locator: '**verified**: WonderWeb D18 PDF and DOLCE-Lite+ KIF source, manually extracted
    2026-07-01'
  entry_notes: '**Correction**: this is a pure logical-composition device (any entity `c`
    chaining two immediate relations satisfies it) — it does not require or entail a reified,
    existentially-dependent mediating particular the way UFO''s Relator does. Not theoretically
    equivalent to UFO''s material relation; see Scope Note and `uncertainty-002` resolution.'
- source: UFO
  term_or_identifier: formal (internal) relation
  dimension: philosophical
  source_claim_type: paraphrase
  text: A relation determined by the intrinsic properties of its relata alone, requiring no
    mediating individual (e.g., "taller than," holding merely because of the relata's own
    heights). Described in the ontology-driven conceptual modeling literature as an "internal
    relation" following Guarino, Guizzardi, and colleagues.
  reference:
  - xwkont:ref:ufo-2021
  reference_note: none found in `xwkont:ref:ufo-2021` directly
  locator: secondary-source paraphrase; the 2021 Applied Ontology paper was searched in full
    in this pass and does not use "formal relation" or "internal relation" terminology — see
    Scope Note citation-precision note
  entry_notes: Classified `philosophical` because internal/external relation status is itself
    a metaphysical distinction, not merely structural. Confirmed consistent with, but not
    sourced from, `xwkont:ref:ufo-2021`.
- source: UFO
  term_or_identifier: material (external) relation
  dimension: technical
  source_claim_type: direct quotation
  text: '"Externally dependent modes as well as relators serve as truthmakers of material
    relations..., the first for one-sided relations and the second for double-sided (or multi-sided)
    ones." A relation requiring a mediating `Relator` or externally-dependent `Mode` — an
    existentially dependent individual that aggregates the externally-dependent Modes the
    relata acquire by participating in the relation.'
  reference:
  - xwkont:ref:ufo-2021
  locator: '**verified**: Applied Ontology 2021 PDF, manually extracted 2026-07-01'
  entry_notes: Directly continues `role.md`'s Relator content; now a direct quotation rather
    than a paraphrase.
- source: SUMO
  term_or_identifier: Relation
  dimension: technical
  source_claim_type: direct quotation
  text: '"(subclass Relation Abstract)... (partition Relation Predicate Function)... The Class
    of relations. There are two kinds of Relation: Predicate and Function. Predicates and
    Functions both denote sets of ordered n-tuples. The difference between these two Classes
    is that Predicates cover formula-forming operators, while Functions cover term-forming
    operators."'
  reference:
  - xwkont:ref:sumo-niles-pease-2001
  locator: '**verified**: `Merge.kif`, `documentation Relation EnglishLanguage`, fetched and
    read directly 2026-07-01'
  entry_notes: Confirms the abstract-entity classification directly. Same abstracta pattern
    as `quality.md`/`role.md`.
- source: GFO
  term_or_identifier: Relator
  dimension: technical
  source_claim_type: direct quotation
  text: 'No `skos:definition` on `Relator` itself; structural axioms only: `rdfs:subClassOf`
    `Individual`, `owl:disjointWith` `Property`. Its companion `Relational_role` (`rdfs:subClassOf`
    `Dependent`, `Role`) is defined via a restriction: `role_of` some `Relator`.'
  reference:
  - xwkont:ref:gfo
  locator: '**verified**: `modules/gfo-base.owl`, classes `Relator`, `Relational_role`, fetched
    and read directly 2026-07-02'
  entry_notes: The exact term "Relator," independently used for a dependent-individual relation-mediator
    — the same word, and structurally similar theoretical role, as UFO's own Relator. No prose
    definition to compare in detail, only structural axioms, but the terminological match
    itself is striking.
- source: YAMATO
  term_or_identifier: Relation is not abstract
  dimension: philosophical
  source_claim_type: direct quotation
  text: '"Relation is sometimes considered as abstract. But it is not true, though it is something
    in the higher order than an entity, that is, entities first exist and relations are something
    found between entities. An example is the marital-relation with Mr. A and Ms. B that is
    time-dependent and hence cannot be abstract. Although it is intangible, it exists in the
    time frame of the real world."'
  reference:
  - xwkont:ref:yamato-mizoguchi-2010
  locator: '**verified**: `YAMATO101216.pdf`, "Entity and relation" section, extracted 2026-07-02'
  entry_notes: A direct, explicit rejection of the abstract-entity treatment SUMO adopts —
    the clearest single statement of the trope-camp position found anywhere in this crosswalk,
    framed almost as a direct rebuttal of SUMO-style modeling (though not citing SUMO by name
    here).
- source: YAMATO
  term_or_identifier: Relation theory deferred to Hozo
  dimension: technical
  source_claim_type: direct quotation
  text: '"Relations are not incorporated in YAMATO... because Hozo deals with relations and
    the wholeness concepts (ordinary types) in different worlds... Hozo has three built-in
    relations: is-a, part-of and attribute-of which are exploited to define types in YAMATO."'
  reference:
  - xwkont:ref:yamato-mizoguchi-2010
  locator: '**verified**: `YAMATO101216.pdf`, "Roles, functions and relations" (concluding)
    section, extracted 2026-07-02'
  entry_notes: YAMATO's own text discloses that it does not formally elaborate a relation
    theory of its own the way DOLCE/UFO do — relation-handling is delegated to its implementation
    tool. This caps confidence on any YAMATO-relation mapping below the level DOLCE/UFO earn
    each other.
- source: TUpper
  term_or_identifier: '*(no reified relation entity — direct binary relations only)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: '`tupper.all.owl` and `TUpper-Terms.html` define relations exclusively as OWL/CLIF
    binary predicates (`occurrence_of`, `subactivity`, `precedes`, `earlier`, etc.), each
    documented in prose as "the ... relation between..." — never as an instance of a reified
    "Relation" class.'
  reference:
  - xwkont:ref:tupper-colore
  locator: '**verified absence**: both files searched directly, 2026-07-02'
  entry_notes: 'Consistent with `quality.md`''s TUpper finding: TUpper reifies neither dependent
    particulars nor abstract entities for this kind of content — it stays at the level of
    bare predicates throughout.'
- source: GUM
  term_or_identifier: Relating
  dimension: technical
  source_claim_type: direct quotation
  text: '"A configuration indicating a relation holding between two entities. A relating must
    contain at least a domain and an attribute." `rdfs:subClassOf` `BeingAndHaving`, itself
    `rdfs:subClassOf` `Configuration` ("the basic fragment of experience that embodies one
    quantum of change... potentially consist[ing] of... the Process itself, Participants...,
    and Circumstances... It unfolds through time.").'
  reference:
  - xwkont:ref:gum-owl
  locator: '**verified**: `GUM-31.owl`, classes `Relating`, `BeingAndHaving`, `Configuration`,
    fetched and read directly 2026-07-02'
  entry_notes: 'A fourth distinct modeling style: GUM reifies relation as a clause-level situation/state-of-affairs
    (containing its own `Process`), not as a dependent trope (BFO/DOLCE/UFO/GFO), an abstract
    entity (SUMO), or a bare predicate (TUpper).'
