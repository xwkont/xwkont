comparison_notes:
- note_id: note-001
  dimension: philosophical
  claim_type: editorial observation
  note: 'SUMO''s `Relation` (a top-level Abstract Entity) confirms a third instance of the
    pattern found in `quality.md` and `role.md`: SUMO systematically treats the entire dependent/relational-particular
    family as abstract entities, while BFO/DOLCE/UFO treat the same territory as tropes, mediated
    particulars (Relators), or intrinsic characterizations. Three concepts now show this pattern;
    it is a systematic feature of SUMO''s design, not a coincidence.'
  supporting_references:
  - xwkont:ref:bfo-2020
  - xwkont:ref:dolce-wonderweb-d18
  - xwkont:ref:ufo-2021
  - xwkont:ref:sumo-niles-pease-2001
  confidence: high
- note_id: note-002
  dimension: technical
  claim_type: editorial observation
  note: '**Split finding, confirmed 2026-07-01 by direct primary-source reading (resolves
    `uncertainty-002`):** the immediate/formal side of the split is a strong match — DOLCE''s
    own D18 text explicitly equates `immediate-relation` with "internal relation," the same
    term UFO''s literature uses. The mediated/material side is *not* equivalent: DOLCE''s
    `mediated-relation` is a pure logical-composition device (holds whenever some entity chains
    two immediate relations together), while UFO''s material relation specifically requires
    a reified, existentially-dependent `Relator`/`Mode` as truthmaker. Composition-through-any-entity
    and reification-via-a-dependent-particular are different mechanisms, even though both
    are informally described as "requiring a mediator."'
  supporting_references:
  - xwkont:ref:dolce-wonderweb-d18
  - xwkont:ref:ufo-2021
  confidence: high
- note_id: note-003
  dimension: technical
  claim_type: non-equivalence
  note: BFO's `Relational Quality` is nested under `Quality`, not placed as a sibling of Continuant/Occurrent
    the way `xwkont-core:Relation` (a direct child of `Entity`) is. This is a placement mismatch
    between XwkOnt's own scaffold and BFO's actual hierarchy, worth flagging rather than silently
    treating BFO's analog as if it sat at the same structural level.
  supporting_references:
  - xwkont:ref:bfo-2020
  confidence: high
- note_id: note-004
  dimension: philosophical
  claim_type: editorial observation
  note: '`note-001`''s SUMO-abstracta pattern gains an explicit, quotable fourth trope-camp
    data point: YAMATO''s own text directly denies that relations are abstract ("Relation
    is sometimes considered as abstract. But it is not true... it is time-dependent and hence
    cannot be abstract"), the clearest single statement of the trope-camp position found anywhere
    in this crosswalk. GFO''s `Relator` (a dependent `Individual`, disjoint from `Property`)
    reinforces the same camp structurally, without a comparably explicit philosophical statement.
    TUpper again declines to reify relational content at all (no trope, no abstracta — bare
    predicates only, consistent with `quality.md`''s finding), and GUM''s `Relating` introduces
    a genuinely fourth modeling style: relation reified as a clause-level situation (`Configuration`),
    neither trope nor abstracta nor bare predicate.'
  supporting_references:
  - xwkont:ref:yamato-mizoguchi-2010
  - xwkont:ref:gfo
  - xwkont:ref:tupper-colore
  - xwkont:ref:gum-owl
  confidence: high
- note_id: note-005
  dimension: technical
  claim_type: editorial observation
  note: GFO's `Relator` uses the exact same term as UFO's own Relator concept — the strongest
    direct terminological convergence found anywhere in this crosswalk. Both are individuals
    (not universals/abstracta), both structurally distinguished from properties/qualities,
    and both play the same theoretical role of mediating a relationship between other entities.
    GFO's own text carries no prose definition to compare against UFO's elaborated truthmaker
    theory in detail, so this is a structural/terminological convergence, not a confirmed
    theoretical identity.
  supporting_references:
  - xwkont:ref:gfo
  - xwkont:ref:ufo-2021
  confidence: medium-high
