    might contain more elaborated Relator content.
  impact: '`mapping-005`''s confidence is capped at medium-high partly for this reason.'
  follow_up: Check GFO's `situation` module for more elaborated Relator content if a future
    pass wants to raise `mapping-005`'s confidence past medium-high.
