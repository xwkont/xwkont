- item_id: uncertainty-002
  uncertainty_type: uncertainty
  resolved: true
  description: 'Whether DOLCE''s mediated-relation and UFO''s Relator-mediated material relation
    are theoretically equivalent, or merely structurally similar. Confirmed **not equivalent**
    by direct reading of DOLCE''s D18/DOLCE-Lite+ source and the UFO 2021 paper: DOLCE''s
    mediated-relation is a logical-composition device (no reification required); UFO''s material
    relation requires a reified `Relator`/`Mode` truthmaker. The immediate/formal half of
    the split, by contrast, is confirmed strongly equivalent (DOLCE''s own text equates `immediate-relation`
    with "internal relation").'
  impact: '`mapping-001` downgraded from `close-match`/medium to `related`/low-medium; `mapping-002`
    raised from medium to high.'
  follow_up: Resolved — no further action needed.
  resolved_date: "2026-07-01"
