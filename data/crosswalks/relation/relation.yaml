local_identifier: xwkont:concept:relation
slug: relation
title: Relation
editorial_status: reviewed
created: "2026-07-01"
modified: "2026-07-02"
scope_note: 'This crosswalk compares BFO''s `Relational Quality` (a subtype of `Quality`,
  not a top-level category), DOLCE''s `immediate-relation`/`mediated-relation` pair, UFO''s
  formal/internal vs. material/external relation distinction (paired with `Relator`, per `docs/crosswalks/concepts/role.md`),
  and SUMO''s `Relation` (a top-level Abstract Entity), as `xwkont-core:Relation` — a direct
  child of `Entity` in `data/ontology/core.ttl`, structurally different from Continuant/Occurrent''s
  other descendants.



  **This crosswalk confirms a third instance of the SUMO-abstracta pattern** already found
  in `quality.md` and `role.md`: SUMO''s `Relation` is a top-level Abstract Entity, from which
  `Predicate` and `Function` derive — the same abstracta treatment already found for `Quality`/`Attribute`
  and `Role`/`SocialRole`. This is no longer plausibly a coincidence; it is a systematic feature
  of how SUMO models the entire dependent/relational-particular family that BFO/DOLCE/UFO
  treat as tropes, mediated particulars, or intrinsic characterizations instead.



  **A second, different structural mismatch is worth flagging up front**: BFO has no top-level
  class parallel to `xwkont-core:Relation` at all. Its closest analog, `Relational Quality`,
  is a *subtype of Quality* (e.g., a parental connection) — meaning BFO folds relational content
  into its Quality hierarchy rather than treating "Relation" as a sibling of Continuant/Occurrent
  the way `xwkont-core:Relation` (a direct child of `Entity`) does. This is a placement mismatch,
  not just a labeling one, and worth remembering when reading `quality.md`''s BFO content
  alongside this crosswalk.



  Exclusions: this crosswalk does not attempt DOLCE''s or UFO''s full relation taxonomies
  beyond the immediate/mediated and formal/material top splits.



  **Update (2026-07-01), following direct primary-source verification, resolving `uncertainty-002`:**
  DOLCE''s WonderWeb D18 report and its accompanying DOLCE-Lite+ KIF source were fetched and
  read directly. Two findings replace the earlier speculative framing:



  1. **`immediate-relation` and UFO''s "formal (internal) relation" are strongly, not just
  structurally, equivalent** — D18''s own text states it explicitly: "[Formal relations] are
  called equivalently immediate relations, since they hold of their relata without mediating
  additional individuals... The notion of ''immediate relation'' seems to be equivalent to
  what Johansson called ground relation... This notion also equivalent to that of **internal
  relation**." DOLCE''s authors are drawing the identical formal/internal-relation equivalence
  that UFO''s literature draws.

  2. **`mediated-relation` and UFO''s material relation (Relator-mediated) are *not* theoretically
  equivalent — a correction to this crosswalk''s earlier framing.** DOLCE''s `mediated-relation`
  is a purely logical composition device: `MEDIATED-RELATION(a,b) ⟺ ∃c (IMMEDIATE-RELATION(a,c)
  ∧ IMMEDIATE-RELATION(c,b))`, documented with the example "a participation relation composed
  with a representation relation." The mediating `c` is just *some* existing entity that happens
  to chain two immediate relations together — DOLCE''s apparatus does not require, or even
  suggest, that `c` be a purpose-built existentially-dependent particular. UFO''s material
  relation, by contrast, specifically requires a `Relator` or externally-dependent `Mode`
  — a moment that is existentially dependent on the relation''s bearers and serves as its
  truthmaker (see `role.md`). Composition-by-chaining-through-any-entity and reification-via-a-dependent-truthmaker
  are different mechanisms; the earlier "plausibly analogous" framing overstated the similarity.



  Separately, a citation-precision note parallel to `role.md`''s "Borgo et al., 2010" finding:
  the UFO 2021 Applied Ontology paper (`xwkont:ref:ufo-2021`), now searched in full for this
  pass, **does not itself use the terms "formal relation" or "internal relation."** It discusses
  material relations and their Relator/Mode truthmakers directly (already cited in `role.md`),
  but the formal/internal-relation half of the split traces to earlier UFO-adjacent literature
  (e.g., Guarino & Guizzardi''s work on relational ontology), not to the 2021 paper. This
  crosswalk''s citation of `xwkont:ref:ufo-2021` for "formal (internal) relation" should be
  read as consistent-with, not sourced-from, that specific paper.



  **Epistemic note:** BFO and SUMO content is verified directly against primary sources (`bfo-core.ttl`,
  `Merge.kif`, fetched and read 2026-07-01). DOLCE''s immediate/mediated-relation content
  is now also directly verified (2026-07-01) against the WonderWeb D18 report and DOLCE-Lite+
  KIF source (manual PDF-stream extraction, same technique used elsewhere in this repository).
  UFO''s material-relation/Relator content is directly verified via the 2021 Applied Ontology
  paper; its formal/internal-relation terminology is not found in that paper and remains attributed
  only by consistency, not direct citation (see above).



  **Update (2026-07-02), ADR-0015 buildout:** extended to GFO, YAMATO, TUpper, and GUM. **GFO
  independently uses the exact term "Relator"** — `Relator` (`rdfs:subClassOf` `Individual`,
  `owl:disjointWith` `Property`) — for a dependent, existentially-linked mediating individual,
  the same word UFO''s literature uses for the same theoretical role; this is the single strongest
  direct terminological convergence found anywhere in this crosswalk, arguably in the whole
  `ADR-0015` buildout so far (rivaled only by `quality.md`''s Gärdenfors citations). **YAMATO''s
  own text explicitly rejects the abstract-entity treatment of relations** that SUMO adopts:
  "Relation is sometimes considered as abstract. But it is not true... entities first exist
  and relations are something found between entities... it is time-dependent and hence cannot
  be abstract," using "the marital-relation with Mr. A and Ms. B" as its own worked example
  — a direct, quotable non-equivalence with SUMO''s `Relation`, extending `note-001`''s pattern
  with an explicit rather than merely-inferred fourth trope-camp data point. YAMATO itself,
  however, does not incorporate a full formal/material relation theory of its own — its text
  explicitly defers relation-handling to its implementation tool, Hozo, which supplies three
  built-in relations (is-a, part-of, attribute-of). TUpper again reifies no relation entity
  at all — consistent with `quality.md`''s finding, its vocabulary consists entirely of direct
  OWL/CLIF binary relations (`occurrence_of`, `subactivity`, `precedes`, etc.) with no class
  representing "a relation" as a thing in its own right. GUM introduces a fourth, genuinely
  distinct modeling style: `Relating` ("a configuration indicating a relation holding between
  two entities... must contain at least a domain and an attribute") is reified, but as a subtype
  of `Configuration` — a clause-level situation/state-of-affairs construct (alongside a `Process`),
  not a trope, not an abstracta, and not a bare predicate.'
