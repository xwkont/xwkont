source_definitions:
- source: BFO
  term_or_identifier: '*(no class found)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: Full-text grep of `bfo-core.ttl` for "situation" (case-insensitive) returned zero
    matches.
  reference:
  - xwkont:ref:bfo-2020
  locator: '**verified absence**: `bfo-core.ttl`, fetched and read directly 2026-07-04'
  entry_notes: Consistent with BFO's general austerity about description-dependent/context-dependent
    categories, already observed for Quantity in `quantity-amount-of-matter.md`.
- source: DOLCE
  term_or_identifier: State (+ stative)
  dimension: technical
  source_claim_type: direct quotation
  text: '"Within stative occurrences, we distinguish between states and processes according
    to homeomericity: sitting is classified as a state but running is classified as a process,
    since there are (very short) temporal parts of a running that are not themselves runnings."
    `rdfs:subClassOf stative`; `stative` itself `rdfs:subClassOf perdurant`.'
  reference:
  - xwkont:ref:dolce-lite-owl
  locator: '**verified**: `DOLCE-Lite.owl`, class `#state`, fetched and read directly 2026-07-04'
  entry_notes: A real, formally defined class — but an occurrent (stative perdurant) category
    distinguished from `process` by homeomericity, not a "configuration of entities"/situation-like
    category. See `note-001` for the separate sense of "situation" DOLCE's own comments discuss
    but do not formalize here.
- source: DOLCE
  term_or_identifier: '*(situation — discussed in commentary, not reified in this module)*'
  dimension: philosophical
  source_claim_type: paraphrase
  text: 'The same class''s own comment continues: "states differ from situations because they
    are not assumed to have a description from which they depend... at any time, one can conceive
    a description that asserts the constraints by which a state of a certain type is such,
    and in this case, it becomes a situation... If we want to consider all the aspects of
    a process together, we need to postulate a unifying descriptive set of criteria (i.e.
    a ''description''), according to which that process is circumstantiated in a ''situation''."
    No class named `#situation` exists anywhere in the fetched `DOLCE-Lite.owl`.'
  reference:
  - xwkont:ref:dolce-lite-owl
  locator: '**verified absence in this module**: `DOLCE-Lite.owl`, full-text grep for `#situation`
    returned zero matches, fetched and read directly 2026-07-04'
  entry_notes: DOLCE's own prose explicitly attributes formal treatment of "situation" and
    "description" to a separate module (the well-known DnS — Descriptions and Situations —
    extension), not to core DOLCE-Lite. This crosswalk records the absence in the fetched
    artifact rather than assuming DnS content without fetching it separately — resolved below
    (`xwkont:ref:dolce-extendeddns-owl`).
- source: DOLCE
  term_or_identifier: situation
  dimension: technical
  source_claim_type: direct quotation
  text: '"A situation is a social object that appears in the domain of an ontology only because
    there is a description whose components can ''carve up'' a view (setting) on that domain.
    A situation has to satisfy a description..., and it has to be setting for at least one
    entity. In other words, it is the ontological counterpart... of settings (situations from
    SC, contexts, episodes, states of affairs, structures, configurations, cases, etc.). A
    perdurant is usually the only mandatory constituent of a setting." `owl:equivalentClass`
    of `non-agentive-social-object ⊓ setting-for(some particular) ⊓ satisfies(some description)`;
    `owl:disjointWith` `collection`, `concept`, `information-object`, `figure`, `description`.'
  reference:
  - xwkont:ref:dolce-extendeddns-owl
  locator: '**verified**: `ExtendedDnS.owl`, class `#situation`, fetched and read directly
    2026-07-05'
  entry_notes: 'Resolves `uncertainty-002`: DOLCE''s DnS module — not core `DOLCE-Lite.owl`
    — does formally define a `situation` class matching this concept''s core sense, and its
    own comment explicitly glosses it as the ontological counterpart of "states of affairs...
    configurations... cases." This is DOLCE''s real, previously-unfetched contribution to
    this concept — see `note-004`.'
- source: SUMO
  term_or_identifier: '*(no class — `?SITUATION` is a conventional variable name only)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: '`(holdsDuring ?TIME ?SITUATION1) ... (entails ?SITUATION1 ?SITUATION2)` — `?SITUATION`
    here is a variable of the same type as `holdsDuring`''s own documented second argument,
    `?FORMULA`: "(holdsDuring ?TIME ?FORMULA) means that the proposition denoted by ?FORMULA
    is true in the time frame ?TIME." One further prose occurrence: "permit assessment of
    the probability of an event or situation" (informal, inside a different term''s documentation).'
  reference:
  - xwkont:ref:sumo-niles-pease-2001
  locator: '**verified absence**: current `Merge.kif`, full-text grep for "situation" (case-insensitive)
    returned 12 hits, all either the `?SITUATION` variable-naming convention or incidental
    prose, fetched and read directly 2026-07-04'
  entry_notes: No `(subclass Situation ...)` or `(instance Situation ...)` assertion exists
    anywhere — `?SITUATION` is informal variable-naming sugar for a `Formula`/`Proposition`-typed
    argument, not a distinct SUMO class.
- source: UFO
  term_or_identifier: '*(no reified class in the 2021 paper; informal world-index usage only)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: All 21 occurrences of "situation" in the paper's full extracted text are informal,
    world-indexing usage — e.g. "the value of a given FlowerColor can change from situation
    to situation," "in a counterfactual situation," "in world w1... in that situation" — never
    `(instance x Situation)`-style reification or a defined `Situation` class/stereotype in
    the paper's own axioms.
  reference:
  - xwkont:ref:ufo-2021
  locator: '**verified absence in the paper itself**: 2021 Applied Ontology paper, full-text
    re-searched directly 2026-07-04 (21 occurrences individually inspected)'
  entry_notes: This is a genuine gap between the 2021 comprehensive paper (silent on a formal
    Situation class) and the wider UFO/OntoUML literature (which does formalize it) — see
    the next row and `note-002`.
- source: UFO
  term_or_identifier: situation (stereotype) / situationNature
  dimension: technical
  source_claim_type: direct quotation
  text: '`ontouml:situation`: "Can be used to represent certain configurations of entities
    that can be comprehended as a whole." `ontouml:situationNature`: "Indicates that the restricted
    type includes situation individuals among its instances."'
  reference:
  - xwkont:ref:ontouml-vocabulary
  locator: '**verified**: `ontouml.ttl`, fetched and read directly 2026-07-04'
  entry_notes: Confirms `TODO.md`'s seed naming exactly. Notably, this definition ("configurations
    of entities... comprehended as a whole") is close in spirit to GFO's `Configuration` definition
    below — the two sources' formal treatments (OntoUML's stereotype vocabulary; GFO's base
    ontology class) converge more closely with each other than either does with DOLCE's occurrent-side
    `state`.
- source: GFO
  term_or_identifier: Configuration
  dimension: technical
  source_claim_type: direct quotation
  text: '"We consider a collection of presential facts which exist at the same time-boundary.
    Such collections may be considered themselves as presentials, and we call them configurations.
    It is further required that configurations contain at least one material object." `rdfs:subClassOf
    Presential`; `owl:disjointWith Material_boundary`, `owl:disjointWith Material_object`.'
  reference:
  - xwkont:ref:gfo
  locator: '**verified**: `modules/gfo-base.owl`, class `Configuration`, fetched and read
    directly 2026-07-04'
  entry_notes: The base-ontology class; see the more specific `Situation` subclass below,
    which is the closer match to this concept's core sense.
- source: GFO
  term_or_identifier: Situation
  dimension: technical
  source_claim_type: direct quotation
  text: '"A situation is a special configuration which can be comprehended as a whole and
    satisfies certain conditions of unity, which are imposed by relations and categories associated
    with the situation. Herein, we consider situations to be the most complex kind of presentials."
    `rdfs:subClassOf Configuration`.'
  reference:
  - xwkont:ref:gfo
  locator: '**verified**: `modules/gfo-base.owl`, class `Situation`, fetched and read directly
    2026-07-05'
  entry_notes: Resolves `uncertainty-003`. Missed by the 2026-07-04 pass, which stopped at
    the parent `Configuration` class — GFO independently names its most-specific configuration-of-entities
    class `Situation`, the exact term this crosswalk targets. Sibling classes `Configuroid`
    (`rdfs:subClassOf Process` — the occurrent-side counterpart to `Configuration`) and `Situoid`
    (`rdfs:subClassOf Configuroid`; "processes whose boundaries are situations... the most
    complex integrated wholes of the world") were also found and glossed.
- source: GFO
  term_or_identifier: Situation (dedicated module)
  dimension: technical
  source_claim_type: direct quotation
  text: '`skos:definition`: "Situations as complex entities that are comprehended as wholes."
    `rdfs:subClassOf gfo-core:TimeExtendedIndividual`, plus restrictions requiring `hasParticipant
    some Object` and `hasSituationPart some Attributive`.'
  reference:
  - xwkont:ref:gfo
  locator: '**verified**: `modules/situation/gfo-situation.ttl`, class `:Situation`, fetched
    and read directly 2026-07-05'
  entry_notes: A second, independently-maintained GFO module (versioned separately, `https://w3id.org/gfo/situation`)
    dedicated entirely to situation theory — distinct superclass lineage (`TimeExtendedIndividual`,
    not `Presential`/`Configuration`) from the base-module `Situation` class above. Flagged
    as an internal GFO cross-module naming/lineage inconsistency, not resolved further in
    this pass — see `note-005`. Confirms GFO treats this concept as substantial enough to
    warrant a dedicated extension, strengthening rather than weakening GFO's correspondence.
- source: YAMATO
  term_or_identifier: '*(no class found)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: Full-text search of the extracted YAMATO 2010 technical report for "situation" and
    "configuration" (case-insensitive) found no defined class or criterial distinction matching
    this concept — the document's own top-level distinctions (Substrate/entity, Continuant/Occurrent,
    Physical/abstract, already documented in `time.md`/`space.md`/`abstract-concrete.md`)
    do not include one.
  reference:
  - xwkont:ref:yamato-mizoguchi-2010
  locator: '**verified absence**: 2010 technical report, full extracted text re-searched directly
    2026-07-04'
  entry_notes: Not part of `TODO.md`'s original seed for this concept; checked directly for
    completeness, consistent with this crosswalk's practice (and the other four `0.2.0`-batch
    crosswalks') of checking all 8 sources regardless of the seed's own coverage.
- source: TUpper
  term_or_identifier: '*(informal fluent-like usage only, no defined predicate)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: '`holds`: "(holds f occ) is TRUE in an interpretation of TUpper if and only if the
    state f is true after the activity occurrence occ." `prior`: "...the state f is true prior
    to the activity occurrence occ." No `state` or `fluent` predicate/class is separately
    declared or defined anywhere in `TUpper-Terms.html`.'
  reference:
  - xwkont:ref:tupper-colore
  locator: '**verified absence, informal only**: `TUpper-Terms.html`, full-text grep for "state"/"fluent"/"situation"/"configuration"
    returned only these two informal-gloss occurrences, fetched and read directly 2026-07-04'
  entry_notes: Corrects `TODO.md`'s seed, which listed TUpper's contribution as simply "`state`"
    without noting it is unreified — `f` here plays the role of a situation-calculus fluent
    (a proposition that can hold or not at a point), consistent with TUpper's PSL/situation-calculus
    lineage, but no `state` class or predicate is itself defined.
- source: GUM
  term_or_identifier: '*(no class found)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: Full-text grep of `GUM-31.owl` for "Situation" and "StateOfAffairs" (case-sensitive,
    matching GUM's own PascalCase convention) returned zero matches.
  reference:
  - xwkont:ref:gum-owl
  locator: '**verified absence**: `GUM-31.owl`, fetched and read directly 2026-07-04'
  entry_notes: Not part of `TODO.md`'s original seed; checked directly for completeness. Unlike
    Time, Space, Abstract, and Quantity — where GUM contributed previously-uncredited content
    in each of the prior four `0.2.0`-batch crosswalks — this is the first concept in the
    batch where GUM has confirmed nothing to add.
