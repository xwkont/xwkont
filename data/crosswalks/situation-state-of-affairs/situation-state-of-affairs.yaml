comparison_notes:
- note_id: note-001
  dimension: philosophical
  claim_type: editorial observation
  note: DOLCE's `state` (core `DOLCE-Lite.owl`) and DOLCE's `situation` (the separate DnS
    module, `xwkont:ref:dolce-extendeddns-owl`) are **not the same thing**, despite DOLCE's
    own core-module commentary discussing both in the same passage. `state` is a stative *perdurant*
    (an occurrent, distinguished from `process` by homeomericity — "sitting" vs. "running").
    DnS's `situation` is a formally defined *social object*, `equivalentClass` of `non-agentive-social-object
    ⊓ setting-for(some particular) ⊓ satisfies(some description)` — structurally much closer
    to GFO's `Configuration`/`Situation` or UFO's OntoUML `situation` stereotype than to DOLCE's
    own `state` class. As of the 2026-07-05 pass, DOLCE's DnS-module `situation` is now this
    crosswalk's DOLCE-side primary correspondence (`correspondence:004`); `state` (`correspondence:003`)
    remains recorded only because `TODO.md`'s original seed named it, with the same sense-mismatch
    caveat as before.
  supporting_references:
  - xwkont:ref:dolce-lite-owl
  - xwkont:ref:dolce-extendeddns-owl
  confidence: high
- note_id: note-002
  dimension: technical
  claim_type: editorial observation
  note: UFO's own comprehensive 2021 paper — the primary source for all of this repository's
    other UFO correspondences — never reifies a `Situation` class in its own axioms, despite
    using the word 21 times as an informal world-index. The formal treatment (`ontouml:situation`/`ontouml:situationNature`)
    lives only in the separate OntoUML vocabulary artifact, which per `docs/methodology/primary-source-verification.md`'s
    established practice is treated as a derived modeling-notation artifact, not identical
    to UFO's own theoretical claims. This is a stronger version of the `xwkont:ref:ufo-2021`/`ontouml-vocabulary`
    distinction already noted for other UFO-related crosswalk work — here, the *only* UFO-side
    evidence for this concept comes from the OntoUML side, with zero support from the paper
    itself.
  supporting_references:
  - xwkont:ref:ufo-2021
  - xwkont:ref:ontouml-vocabulary
  confidence: high
- note_id: note-003
  dimension: philosophical
  claim_type: editorial observation
  note: 'Where a formal definition exists (GFO''s `Situation`; DOLCE DnS''s `situation`; UFO''s
    OntoUML `situation`), all three converge closely in substance — each describes a collection/configuration
    of entities comprehended or existing together as a whole, neither reducible to a single
    entity nor itself an occurrent. As of the 2026-07-05 pass this is now a genuine **3-source**
    point of convergence (previously recorded as thin, 2-source), materially strengthening
    this crosswalk''s cross-source pattern relative to the batch''s other four concepts, though
    the underlying artifacts still differ in kind (GFO: base-ontology class; DOLCE: DnS-extension
    class; UFO: OntoUML-vocabulary stereotype, not the 2021 paper itself).'
  supporting_references:
  - xwkont:ref:gfo
  - xwkont:ref:dolce-extendeddns-owl
