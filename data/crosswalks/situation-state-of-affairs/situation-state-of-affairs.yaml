    module, and found: DOLCE''s DnS module *does* formally define `situation` (resolves `uncertainty-002`);
    GFO independently names its most-specific configuration class `Situation` and maintains
    a whole dedicated extension module for situation theory (resolves `uncertainty-003`).
    The cross-source pattern is now **3 of 8 sources (GFO, DOLCE, UFO)** with unambiguous
    formal classes, up from 1. **Should this concept now proceed toward `reviewed` status,
    or does the batch still hold it for other reasons (e.g., internal concept-scope instability
    flagged by the external review''s second comment — DOLCE''s `state`/DnS''s `situation`/TUpper''s
    `state` still represent three different senses that should not be collapsed)?** This is
    now a stronger evidentiary case than before, but the review''s separate "concept scope
    is unstable" comment (three different senses) was not itself resolved by this pass and
    remains a live concern independent of source-count.'
  impact: No longer blocks on missing primary-source data (both flagged fetches are done);
    the remaining blocker is a maintainer judgment call on scope stability and whether 3-source
    (with DOLCE's DnS-derived, not core-module, evidence) meets `reviewed` standards comparable
    to the batch's other concepts.
  follow_up: 'Raise at the next maintainer review, now with materially stronger evidence in
