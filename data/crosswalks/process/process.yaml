source_definitions:
- source: BFO
  term_or_identifier: Process (BFO_0000015)
  dimension: technical
  source_claim_type: direct quotation
  text: '"(Elucidation) p is a process means p is an occurrent that has some temporal proper
    part and for some time t, p has some material entity as participant." Examples: "An act
    of selling; the life of an organism; a process of sleeping; a process of cell-division;
    a beating of the heart; a process of meiosis; the taxiing of an aircraft; the programming
    of a computer."'
  reference:
  - xwkont:ref:bfo-2020
  locator: '**verified**: `bfo-core.ttl`, class BFO_0000015, fetched and read directly 2026-07-01'
- source: DOLCE
  term_or_identifier: Process
  dimension: technical
  source_claim_type: direct quotation
  text: '"An occurrence-type is stative [or] eventive according to whether it holds of the
    mereological sum of two of its instances, i.e. if it is cumulative or not... Within stative
    occurrences, we distinguish between states [and] processes according to homeomericity:
    sitting is classified as a state but running is classified as a process, since there are
    (very short) temporal parts of a running that are not themselves runnings."'
  reference:
  - xwkont:ref:dolce-wonderweb-d18
  locator: '**verified**: WonderWeb D18 PDF, manually extracted 2026-07-01'
  entry_notes: Confirms the earlier paraphrase closely, now with the primary source's exact
    cumulativity/homeomericity criteria and its own worked example (sitting vs. running).
- source: DOLCE
  term_or_identifier: Process vs. State, Vendler parallel
  dimension: philosophical
  source_claim_type: non-equivalence
  text: 'DOLCE''s four-way perdurant split (State, Process, Accomplishment, Achievement) maps
    cleanly onto Vendler''s (1957) four Aktionsart classes (state, activity, accomplishment,
    achievement) — DOLCE''s Process corresponding to Vendler''s activity. **Checked and confirmed
    absent (2026-07-01)**: D18''s own 90-item bibliography, read directly, contains no citation
    to Vendler. This is this crosswalk''s own external observation, not a connection Masolo
    et al. (2003) draw themselves — same finding as `event.md`''s `note-003`/`uncertainty-003`.'
  reference:
  - xwkont:ref:dolce-wonderweb-d18
  locator: '**verified absence**: D18''s reference list checked directly, 2026-07-01'
- source: UFO
  term_or_identifier: '"process" (informal, not a distinct class)'
  dimension: technical
  source_claim_type: direct quotation
  text: '"So, there is a special perdurant (which we may call a process, in a very particular
    sense) that is the life of an endurant, i.e., the sum of everything that is a manifestation
    of the dispositions inhering in that... perdurant."'
  reference:
  - xwkont:ref:ufo-2021
  locator: '**verified**: Applied Ontology 2021 PDF, manually extracted 2026-07-01'
  entry_notes: The author's own parenthetical ("which we may call a process, in a very particular
    sense") confirms this is a deliberately informal label, not a distinct formal category.
- source: UFO
  term_or_identifier: '"Jogging Process" (worked example)'
  dimension: technical
  source_claim_type: direct quotation
  text: 'UFO-B''s worked example: "we have Jogging Event s, which are direct manifestations
    of the dispositions constituting a [Jogger], and Jogging Process es, which are constituted...
    At each situation, we have a particular type of maximal Jogging Process (termed the life
    of a [Jogger]) that is constituted by (exactly) the sum of Jogging Event s that are manifestations
    of that [Jogger]." Formalized as `EventType(JoggingProcess)` and `EventType(JoggingEvent)`
    — both typed under `EventType`, with no separate `ProcessType`.'
  reference:
  - xwkont:ref:ufo-2021
  locator: '**verified**: Applied Ontology 2021 PDF, manually extracted 2026-07-01'
  entry_notes: 'Resolves `uncertainty-001`: even in UFO''s own most detailed "process" example,
    the formal axiomatization classifies `JoggingProcess` under `EventType`, confirming `Process`
    is not a distinct top-level formal category in UFO.'
- source: SUMO
  term_or_identifier: Process
  dimension: technical
  source_claim_type: direct quotation
  text: '"(subclass Process Physical)... The class of things that happen and have temporal
    parts or stages. Examples include extended events like a football match or a race, actions
    like Pursuing and Reading, and biological processes. The formal definition is: anything
    that occurs in time but is not an Object. Note that a Process may have participants ''inside''
    it which are Objects, such as the players in a football match."'
  reference:
  - xwkont:ref:sumo-niles-pease-2001
  locator: '**verified**: `Merge.kif`, `documentation Process EnglishLanguage`, fetched and
    read directly 2026-07-01'
  entry_notes: Resolves this crosswalk's original `uncertainty-003` (no specific defining
    criterion found) — SUMO's Process is formally defined by exclusion from Object, a genuinely
    different criterion from BFO's temporal-proper-part-and-participant test.
- source: GFO
  term_or_identifier: Process
  dimension: technical
  source_claim_type: direct quotation
  text: '"Processes are a special kind of occurrent. Processes are directly in time, they
    have characteristics which cannot be captured by a collection of time boundaries." Subclass
    of `Occurrent`; `owl:disjointWith` `Change`, `owl:disjointWith` `History`.'
  reference:
  - xwkont:ref:gfo
  locator: '**verified**: `modules/gfo-base.owl`, class `Process`, fetched and read directly
    2026-07-02'
  entry_notes: GFO's own text draws the same "not reducible to time-boundaries" criterion
    that distinguishes it from `Change`'s instantaneous case (see `event.md`'s GFO content)
    — a positive criterion, unlike DOLCE's or SUMO's which are exclusion/cumulativity-based.
- source: YAMATO
  term_or_identifier: Occurrent(Process)
  dimension: technical
  source_claim_type: direct quotation
  text: '"both object(continuant) and process (occurrent) exist with equal importance in a
    mutually-dependent manner"; "YAMATO is based on a solid theory of objects, processes and
    events, and it deals with them of equal importance (Galton 2009)."'
  reference:
  - xwkont:ref:yamato-mizoguchi-2010
  locator: '**verified**: `YAMATO101216.pdf`, Section 2.1, extracted 2026-07-02 (same passage
    as `continuant-occurrent.md`''s and `event.md`''s YAMATO content)'
  entry_notes: No finer-grained OWL class distinguishing "process-in-general" from the top-level
    Occurrent label was found in the fetched passages — "process" and "occurrent" are used
    near-interchangeably at this level of the report.
- source: TUpper
  term_or_identifier: activity
  dimension: technical
  source_claim_type: direct quotation
  text: '"(activity a) is TRUE in an interpretation of TUpper if and only if a is a member
    of the class of activities in the universe of discourse of the interpretation."'
  reference:
  - xwkont:ref:tupper-colore
  locator: '**verified**: `TUpper-Terms.html`, term `activity`, fetched and read directly
    2026-07-02'
  entry_notes: A minimal, circular-looking informal semantics (typical of PSL's axiomatic
    style, where the substantive content lives in the CLIF axioms, not the English gloss)
    — `activity` is the repeatable type of which `activity_occurrence` (used in `event.md`)
    is a token occurrence.
- source: GUM
  term_or_identifier: Process
  dimension: technical
  source_claim_type: direct quotation
  text: '"A Process is the linguistic construal of ''goings-on'' or events. Processes are
    similar to Configurations, but factor out Participants, Circumstances, and other elements.
    As such, entities classified under Process can be expressed as verbs and are frequently
    the main verb in a clause."'
  reference:
  - xwkont:ref:gum-owl
  locator: '**verified**: `GUM-31.owl`, class `Process`, fetched and read directly 2026-07-02
    (same class as `event.md`''s correspondence row 010)'
  entry_notes: The only new source whose class is literally named "Process" — the strongest
    terminological match of the four, though the underlying criterion (verb-realizability)
    is linguistic, not temporal/metaphysical.
