uncertainties:
- item_id: uncertainty-001
  uncertainty_type: non-equivalence
  resolved: true
  description: 'UFO has no distinct formal `Process` class; its informal "life of an endurant"
    notion is conceptually different from BFO/DOLCE/SUMO''s `Process`. Confirmed directly
    against the UFO 2021 Applied Ontology paper: the text explicitly calls "process" an informal
    label, and the paper''s own "Jogging Process" worked example is formally typed under `EventType`,
    not any separate `ProcessType`. Resolves `event.md`''s `uncertainty-004` by clarifying
    (not eliminating) the asymmetry: each source picks a different primary perdurant-with-duration
    term.'
  impact: Confidence on `mapping-004` raised from low to low-medium.
  follow_up: Resolved — no further action needed. If a dedicated UFO-B events paper (e.g.,
    Guizzardi et al.'s conceptual-modeling-of-events work) is read in a future pass, confirm
    this finding is consistent there too.
  resolved_date: "2026-07-01"
  resolution_note: resolved 2026-07-01
- item_id: uncertainty-002
  uncertainty_type: uncertainty
  resolved: true
  description: '`note-002`''s stronger Vendler (1957) parallel (all four DOLCE perdurant subtypes
    mapping onto all four Vendler classes) is not confirmed against Masolo et al.''s own citations
    — D18''s own bibliography, read directly, contains **no citation to Vendler**, same finding
    as `event.md`''s `uncertainty-003`.'
  impact: Confidence on `note-002` reduced to low, now for a confirmed reason (checked absence)
    rather than an unchecked one.
  follow_up: Resolved — no further action needed. A Vendler (1957) reference record is not
    warranted unless a future pass needs Vendler's own paper directly, independent of any
    DOLCE citation.
  resolved_date: "2026-07-01"
  resolution_note: resolved 2026-07-01, as a confirmed negative finding
- item_id: uncertainty-003
  uncertainty_type: uncertainty
  resolved: true
  description: 'SUMO''s formal defining criterion for `Process` is confirmed directly against
    `Merge.kif`: "anything that occurs in time but is not an Object." A genuinely different
    criterion from BFO''s temporal-proper-part-and-participant test (exclusion-based vs. inclusion-based).'
  impact: '`mapping-001`/`mapping-003`''s rationale can now cite this precisely rather than
    noting the criterion as unknown.'
  follow_up: Resolved — no further action needed.
  resolved_date: "2026-07-01"
  resolution_note: resolved 2026-07-01
- item_id: uncertainty-004
  uncertainty_type: open-question
  resolved: false
  description: YAMATO's own OWL/Hozo files were not fetched in this pass (registration-gated
    download; see `xwkont:ref:yamato-mizoguchi-2010`), so `correspondence-006`/`mapping-008`
    are cited by quotation from the 2010 technical report, not by class IRI, and it remains
    unconfirmed whether a later or more detailed YAMATO source (the gated OWL, or the blocked
    2022 paper) subdivides Occurrent/Process further the way GFO does.
  impact: '`mapping-008`''s high confidence rests on the same evidence already used in `continuant-occurrent.md`,
    not new finer-grained evidence.'
  follow_up: Fetch YAMATO's OWL/Hozo files if the registration gate is completed later.
- item_id: uncertainty-005
  uncertainty_type: non-equivalence
  resolved: false
  description: TUpper's `activity`/`activity_occurrence` type/token pair has no single clean
    analog to BFO's Process, which denotes particulars directly (not a type with instances
    in TUpper's sense). `mapping-009` treats `activity` as the closer-by-convention correspondence,
    but this is a judgment call, not a settled equivalence — a case could also be made for
    `activity_occurrence` (already used for Event in `event.md`) depending on how strictly
    "Process" is read as type vs. token in a given downstream use.
  impact: Confidence on `mapping-009` is capped at low partly for this reason, not only the
    type/token mismatch itself.
  follow_up: No further action needed unless a future pass wants to formally resolve which
    TUpper term is the "correct" Process correspondence.
