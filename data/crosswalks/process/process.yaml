comparison_notes:
- note_id: note-001
  dimension: technical
  claim_type: editorial observation
  note: BFO and SUMO both treat `Process` as a genuine top-level formal category (siblings
    of Process Boundary and Object, respectively). DOLCE nests `Process` one level down as
    a `Stative` subtype. UFO has no distinct `Process` class at all, using `Event` as its
    general perdurant category instead — confirmed 2026-07-01 by direct primary-source reading,
    including UFO's own worked "Jogging Process" example, which is formally typed under `EventType`
    rather than any separate `ProcessType`. This is the mirror image of `event.md`'s finding
    (there, BFO/SUMO lacked "Event"; here, UFO lacks "Process") — each source picks a different
    primary term for the same conceptual territory.
  supporting_references:
  - xwkont:ref:bfo-2020
  - xwkont:ref:dolce-wonderweb-d18
  - xwkont:ref:ufo-2021
  - xwkont:ref:sumo-niles-pease-2001
  confidence: high
- note_id: note-003
  dimension: technical
  claim_type: editorial observation
  note: 'UFO''s 2021 paper uses "Jogging Process" as a named, recurring term across its worked
    example (contrasted with "Jogging Event"), which could read as a distinct formal category
    on a casual pass. Close reading shows this is not the case: the paper explicitly flags
    "process" as an informal label ("which we may call a process, in a very particular sense"),
    and the accompanying axioms type the example instance as `EventType(JoggingProcess)`,
    not any separate `ProcessType`. The term names a *pattern* (a maximal cumulative sum of
    manifestation events) applied within `Event`, not a new top-level class.'
  supporting_references:
  - xwkont:ref:ufo-2021
  confidence: high
- note_id: note-002
  dimension: philosophical
  claim_type: inference
  note: DOLCE's four-way perdurant classification (State, Process, Accomplishment, Achievement)
    parallels Vendler's (1957) four-way linguistic Aktionsart classification exactly, one
    category per category. Direct reading of D18's own 90-item bibliography confirms **no
    citation to Vendler exists in the primary source** — this remains this crosswalk's own
    external observation, not something DOLCE's authors themselves draw. Same finding as `event.md`'s
    `note-003`.
  supporting_references:
  - xwkont:ref:dolce-wonderweb-d18
  confidence: low
  claim_type_annotation: checked and unconfirmed, 2026-07-01
- note_id: note-004
  dimension: technical
  claim_type: editorial observation
  note: Unlike UFO, all four `ADR-0015` sources positively name a Process-equivalent term
    — this crosswalk's central "no distinct Process class" finding does not recur among the
    new sources. GFO's `Process` is the closest structural match to BFO (a genuine `Occurrent`
    subclass with a positive, non-boundary-reducible criterion). GUM's is the closest terminological
    match (a class literally named "Process"), though grounded in verb-realizability rather
    than temporal extension. YAMATO does not subdivide its top-level Occurrent(Process) label
    further in the passages reviewed, so its "process" content here largely restates `continuant-occurrent.md`'s
    existing YAMATO finding rather than adding a new one. TUpper's `activity` (type) is a
    different correspondence from `event.md`'s `activity_occurrence` (token) — a type/token
    pair with no single clean analog to BFO's particular-denoting Process.
  supporting_references:
  - xwkont:ref:gfo
  - xwkont:ref:yamato-mizoguchi-2010
  - xwkont:ref:tupper-colore
  - xwkont:ref:gum-owl
  confidence: high
