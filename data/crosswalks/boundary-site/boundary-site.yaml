uncertainties:
- item_id: uncertainty-001
  uncertainty_type: open-question
  resolved: false
  description: Where should `xwkont-core:Boundary`/`Site` subclass from once added to `data/ontology/core.ttl`?
    BFO's and DOLCE's converging two-way split (part-of-host boundary vs. not-part-of-host
    dependent place, `note-001`) is the strongest evidence in this crosswalk, but GFO's and
    TUpper's contributions are narrower/less-documented and don't clearly map onto either
    half of that split without further sourcing. **Recommendation recorded 2026-07-04, in
    response to external review:** model both halves explicitly as two sibling sub-concepts
    â€” a part-of-host `Boundary` (BFO `fiat point`/`line`/`surface`, DOLCE `relevant-part`)
    and a not-part-of-host dependent `Site`/`Place` (BFO `site`, DOLCE `dependent-place`)
    â€” rather than one undifferentiated class, since `note-001` is this crosswalk's strongest
    and most convergent finding and a single class would lose that distinction. GFO's `Material_boundary`
    and TUpper's undocumented `edge`/`ridge`/`border`/`outer` don't clearly map onto either
    half yet (`uncertainty-003`) and shouldn't block adopting the two-sub-concept structure
    for the BFO/DOLCE core. This mirrors the same two-sub-concept resolution recorded for
    `mereology-parthood-aggregate.md`'s own `uncertainty-002` (strict `Aggregate` vs. permissive
    `Sum`) â€” both are cases in this batch where the strongest evidence is a real two-way split,
    not a single converging class.
  impact: Blocks final core.ttl placement; does not block continuing this crosswalk's research/review.
    Recorded recommendation resolves the "decide two-subconcept model" item flagged by the
    2026-07-04 external review.
  follow_up: Confirm or override this recommendation at review time, jointly with `mereology-parthood-aggregate.md`'s
    own two-sub-concept recommendation.
- item_id: uncertainty-002
  uncertainty_type: non-equivalence
  resolved: false
  description: BFO's `process boundary` (occurrent-side) and `continuant fiat boundary` (continuant-side)
    share only the English word "boundary," not any formal relationship â€” see `note-002`.
    This crosswalk's own correspondences (`correspondence-001`/`002`) are built entirely on
    the continuant-side family; `process boundary` is recorded here only as a citation-precision
    flag, not as part of this concept's own cross-source comparison.
  impact: Prevents a future reader from conflating BFO's two "boundary"-named categories when
    consulting this crosswalk.
  follow_up: None outstanding; recorded here and in `note-002` for traceability.
- item_id: uncertainty-003
  uncertainty_type: non-equivalence
  resolved: false
  description: TUpper's `edge`/`ridge`/`border`/`outer` have no prose definition anywhere
    in either fetched artifact (`TUpper-Terms.html` or `owl/tupper.all.owl`) â€” their comparison
    to BFO's/DOLCE's definitions (`mapping-004`) rests only on structural role (connection
    to `poly`/`point`/`surface`/`box` via `in`/`part`), not on any confirmed shared meaning.
  impact: This crosswalk's TUpper correspondence (`correspondence-005`) is the least well-evidenced
    of the four recorded.
  follow_up: Re-check if TUpper's `tupper.clif` file (not yet fetched in this pass, per `space.md`'s
    own equivalent follow-up for `MaterialObject`/`ShapedObject`) contains axioms or comments
    clarifying these four terms' intended meaning.
