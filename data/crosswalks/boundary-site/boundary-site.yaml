comparison_notes:
- note_id: note-001
  dimension: philosophical
  claim_type: editorial observation
  note: 'BFO and DOLCE independently converge on the same two-way split despite entirely different
    vocabulary: a *part-of-host* boundary (BFO''s dimensional `fiat point`/`line`/`surface`;
    DOLCE''s `relevant-part`, worked example "a bump or an edge" â€” the identical word BFO''s
    own fiat-surface/line examples evoke) versus a *not-part-of-host* dependent region (BFO''s
    `site`; DOLCE''s `dependent-place`, worked examples "a hole in a piece of cheese... the
    shadow of a tree," closely paralleling BFO''s own `site` framing of a boundary "determined
    in relation to" a material entity without being part of it). This is the closest cross-source
    structural and even lexical convergence found in this crosswalk â€” stronger than the equivalent
    convergence found for Mereology/Parthood/Aggregate''s two unity-strictness sub-patterns
    (`mereology-parthood-aggregate.md`''s `note-001`).'
  supporting_references:
  - xwkont:ref:bfo-2020
  - xwkont:ref:dolce-lite-owl
  confidence: high
- note_id: note-002
  dimension: technical
  claim_type: editorial observation
  note: 'BFO uses the English word "boundary" for two structurally unrelated categories: `continuant
    fiat boundary` (a dimensionally-reduced, fiat-demarcated *continuant*, this crosswalk''s
    main subject) and `process boundary` (a durationless temporal part of a process, an *occurrent*).
    These share no formal relationship in `bfo-core.ttl` beyond the word itself â€” a citation-precision
    trap of the same kind already found for YAMATO''s "quantity" (`quantity-amount-of-matter.md`''s
    `note-002`) and UFO''s/GFO''s "category" (`universal-type.md`''s `note-002`), here occurring
    *within* a single source rather than across two.'
  supporting_references:
  - xwkont:ref:bfo-2020
  confidence: high
- note_id: note-003
  dimension: technical
  claim_type: editorial observation
  note: GFO's `Material_boundary` and TUpper's `edge`/`ridge`/`border`/`outer` are the second
    and third instances in this `0.2.0` batch of a source contributing a real, structurally-positioned
    class or IRI with zero natural-language definition anywhere in the fetched primary artifact
    (after GFO's own `Amount_of_substrate` in `quantity-amount-of-matter.md`, and TUpper's
    own `MaterialObject`/`ShapedObject` in `space.md`). This is now a confirmed recurring
    pattern for both sources specifically, not a one-off gap â€” worth treating as an expected,
    not exceptional, finding in any future crosswalk that reaches GFO's or TUpper's less-central
    classes.
  supporting_references:
  - xwkont:ref:gfo
  - xwkont:ref:tupper-colore
  confidence: high
