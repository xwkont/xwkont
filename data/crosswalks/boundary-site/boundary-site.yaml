source_definitions:
- source: BFO
  term_or_identifier: Continuant fiat boundary (BFO_0000140)
  dimension: technical
  source_claim_type: direct quotation
  text: '"(Elucidation) A continuant fiat boundary b is an immaterial entity that is of zero,
    one or two dimensions & such that there is no time t when b has a spatial region as continuant
    part & whose location is determined in relation to some material entity." `dc11:identifier
    "029-BFO"`. `rdfs:subClassOf` immaterial entity (BFO_0000141).'
  reference:
  - xwkont:ref:bfo-2020
  locator: '**verified**: `bfo-core.ttl`, class BFO_0000140, fetched and read directly 2026-07-04'
  entry_notes: 'The parent class for `fiat point`/`fiat line`/`fiat surface` below; example
    list in the same block: "As for fiat point, fiat line, fiat surface."'
- source: BFO
  term_or_identifier: Fiat point / fiat line / fiat surface (BFO_0000147 / BFO_0000142 / BFO_0000146)
  dimension: technical
  source_claim_type: direct quotation
  text: 'Fiat point: "a zero-dimensional continuant fiat boundary that consists of a single
    point" â€” e.g. "the geographic North Pole." Fiat line: "a one-dimensional continuant fiat
    boundary that is continuous" â€” e.g. "the Equator; all geopolitical boundaries." Fiat surface:
    "a two-dimensional continuant fiat boundary that is self-connected" â€” e.g. "the surface
    of the Earth." All three `rdfs:subClassOf` continuant fiat boundary (BFO_0000140).'
  reference:
  - xwkont:ref:bfo-2020
  locator: '**verified**: `bfo-core.ttl`, fetched and read directly 2026-07-04'
  entry_notes: The direct structural analog to DOLCE's `relevant-part` ("a bump or an edge")
    â€” both denote a lower-dimensional entity that is a genuine (if non-natural, fiat-demarcated)
    part of its host, not a separately-existing dependent place.
- source: BFO
  term_or_identifier: Site (BFO_0000029)
  dimension: technical
  source_claim_type: direct quotation
  text: '"(Elucidation) A site is a three-dimensional immaterial entity whose boundaries either
    (partially or wholly) coincide with the boundaries of one or more material entities or
    have locations determined in relation to some material entity." `dc11:identifier "034-BFO"`.
    `rdfs:subClassOf` immaterial entity (BFO_0000141).'
  reference:
  - xwkont:ref:bfo-2020
  locator: '**verified**: `bfo-core.ttl`, class BFO_0000029, fetched and read directly 2026-07-04
    (already noted in `space.md`''s BFO row as a related-but-distinct category, cross-referenced
    here as this crosswalk''s primary subject)'
  entry_notes: The direct structural analog to DOLCE's `dependent-place` ("a hole in a piece
    of cheese... the shadow of a tree") â€” both denote a three-dimensional (or otherwise extended)
    dependent region that is *not* a part of its host, only located relative to it.
- source: BFO
  term_or_identifier: Process boundary (BFO_0000035)
  dimension: technical
  source_claim_type: direct quotation
  text: '"p is a process boundary =Def p is a temporal part of a process & p has no proper
    temporal parts." Example: "The boundary between the 2nd and 3rd year of your life." `dc11:identifier
    "084-BFO"`. `rdfs:subClassOf` occurrent (BFO_0000003).'
  reference:
  - xwkont:ref:bfo-2020
  locator: '**verified**: `bfo-core.ttl`, class BFO_0000035, fetched and read directly 2026-07-04'
  entry_notes: 'Occurrent-side, not continuant-side â€” structurally unrelated to `continuant
    fiat boundary`/`site` despite the shared English word "boundary." A citation-precision
    trap worth flagging explicitly: BFO uses "boundary" for two entirely different top-level
    categories (a durationless temporal part of a process, vs. a dimensionally-reduced dependent
    continuant), not one concept split two ways.'
- source: DOLCE
  term_or_identifier: Feature (+ relevant-part, dependent-place)
  dimension: technical
  source_claim_type: direct quotation
  text: '"Features are ''parasitic entities'', that exist insofar their host exists. Typical
    examples of features are holes, bumps, boundaries, or spots of color. Features may be
    relevant parts of their host, like a bump or an edge, or dependent regions like a hole
    in a piece of cheese, the underneath of a table, the front of a house, or the shadow of
    a tree, which are not parts of their host. All features are essential wholes, but no common
    unity criterion may exist for all of them." `rdfs:subClassOf physical-endurant`; `owl:disjointWith
    amount-of-matter`; requires a `host` that is `someValuesFrom physical-endurant`. `relevant-part`:
    "Features that are relevant parts of their host, like a bump or an edge." `dependent-place`:
    "A feature that is not part of its host, like a hole in a piece of cheese, the underneath
    of a table, the front of a house, or the shadow of a tree."'
  reference:
  - xwkont:ref:dolce-lite-owl
  locator: '**verified**: `DOLCE-Lite.owl`, classes `#feature`/`#relevant-part`/`#dependent-place`,
    fetched and read directly 2026-07-04'
  entry_notes: 'Not part of `TODO.md`''s original seed â€” a genuine addition, and the closest
    structural match to BFO''s own boundary/site split found anywhere in this crosswalk: DOLCE''s
    own worked example for `relevant-part` ("a bump or an edge") uses the identical English
    word BFO''s `fiat surface`/`fiat line` examples evoke, and `dependent-place`''s examples
    (hole, shadow) match BFO''s `site` almost example-for-example. See `note-001`.'
