local_identifier: xwkont:concept:boundary-site
slug: boundary-site
title: Boundary / Site
editorial_status: reviewed
created: "2026-07-04"
modified: "2026-07-06"
scope_note: '**Selection rationale (per `ADR-0018`''s admission bar):** Boundary / Site is
  the eighth concept drafted from the `0.2.0` batch. Direct primary-source verification this
  session found a nameable category in **4 of 8 sources** (BFO `continuant fiat boundary`/`site`/`process
  boundary`, GFO `Material_boundary`, TUpper `edge`/`ridge`/`border`/`outer`, and DOLCE `feature`
  â€” this last one not in `TODO.md`''s original seed, a genuine addition). SUMO, UFO, YAMATO,
  and GUM were confirmed to have no reified boundary/site category. TUpper''s claimed terms
  exist as real IRIs but, like `space.md`''s `MaterialObject`/`ShapedObject` finding, are
  entirely undocumented â€” zero `rdfs:comment` or prose gloss anywhere in the fetched OWL artifact.



  This crosswalk compares each source ontology''s own treatment of dependent, boundary-like,
  or fiat-demarcated entities â€” mereotopological boundaries (edges, surfaces, points) and
  dependent places/regions (holes, sites) that exist only in virtue of a host entity, as distinct
  from Mereology/Parthood/Aggregate (already drafted, `mereology-parthood-aggregate.md`, which
  flagged BFO''s `fiat object part` as directly relevant background for this crosswalk) and
  from Spatial Region/Space (already drafted, `space.md`, which covers extended regions rather
  than lower-dimensional dependent boundaries). Sources compared: BFO, DOLCE, SUMO, UFO, GFO,
  YAMATO, TUpper, GUM (per `ADR-0015`''s 8-source scope).



  **Cross-cutting finding, established this session:** BFO and DOLCE converge closely, despite
  using entirely different vocabulary, on a two-way split between *part-of-host* boundaries
  (BFO''s `fiat point`/`line`/`surface`, demarcating a whole without being separately-existing
  material; DOLCE''s `relevant-part`, "like a bump or an edge") and *not-part-of-host* dependent
  places (BFO''s `site`, whose "boundaries... have locations determined in relation to some
  material entity"; DOLCE''s `dependent-place`, "like a hole in a piece of cheese... or the
  shadow of a tree"). GFO''s `Material_boundary` and BFO''s `process boundary` each occupy
  a narrower, more specific niche (a boundary dependent on one specific material object; the
  durationless final/initial temporal part of a process, respectively) with no exact counterpart
  elsewhere. TUpper''s `edge`/`ridge`/`border`/`outer` occupy a related mereotopological role
  (connected via `in`/`part` object properties to `poly`/`point`/`surface`/`box`) but cannot
  be compared in *content* to the other sources'' definitions, since no prose gloss for any
  of them exists in either fetched TUpper artifact. See `note-001`, `note-002`.



  Exclusions: this crosswalk does not address Mereology/Parthood/Aggregate (already drafted;
  BFO''s `fiat object part` â€” a *whole-dividing* category distinct from this crosswalk''s
  *boundary-demarcating* one â€” was flagged there as directly relevant background and is cross-referenced
  here, not re-litigated) or Spatial Region/Space (already drafted; BFO''s own `spatial region`
  dimensional apparatus is the un-fiat-demarcated counterpart to this crosswalk''s fiat boundaries).



  **Core.ttl placement is deliberately left open at this `draft` stage** â€” see Uncertainty.'
