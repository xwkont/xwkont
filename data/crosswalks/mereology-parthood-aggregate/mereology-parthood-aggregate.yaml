comparison_notes:
- note_id: note-001
  dimension: philosophical
  claim_type: editorial observation
  note: 'The four confirmed sources split into two unity-strictness sub-patterns. BFO''s `object
    aggregate` and UFO''s `Collective` both require member parts to play a *uniform* role
    with respect to the whole — BFO: "a plurality... as member parts which together form a
    unit"; UFO: "parts play the same role with respect to the whole." DOLCE''s `arbitrary-sum`
    and SUMO''s `Collection` instead permit a genuinely unrestricted sum — DOLCE explicitly
    states arbitrary sums "have no unity criterion (they are ''extensional'')"; SUMO''s own
    documentation allows "members [to] be added and subtracted without thereby changing the
    identity of the Collection." This is a real, citable difference in how strict a "no full
    Object-unity" category is allowed to be, not just a naming variation — worth preserving
    as two distinguishable sub-senses rather than collapsing all four into one undifferentiated
    correspondence.'
  supporting_references:
  - xwkont:ref:bfo-2020
  - xwkont:ref:ufo-2021
  - xwkont:ref:dolce-lite-owl
  - xwkont:ref:sumo-niles-pease-2001
  confidence: high
- note_id: note-002
  dimension: technical
  claim_type: editorial observation
  note: BFO's `fiat object part` has no counterpart in any of the other 7 sources checked
    — it is about *dividing* an already-unified whole via non-natural (fiat) boundaries ("demarcated
    from the remainder of c by one or more fiat surfaces"), the structural opposite of *summing*
    discrete, separately-existing members into a plurality. This is directly relevant background
    for the planned Boundary/Site crosswalk (`TODO.md`'s `0.2.0` batch item 8), which will
    cover BFO's fiat-boundary apparatus (`continuant fiat boundary`, `fiat point`/`line`/`surface`)
    in its own right.
  supporting_references:
  - xwkont:ref:bfo-2020
  confidence: high
- note_id: note-003
  dimension: technical
  claim_type: editorial observation
  note: UFO's `Substantial` partition (`Object`/`Collective`/`Quantity`) maps onto XwkOnt's
    own concept boundaries more cleanly than any other source's treatment across the three
    related `0.2.0`-batch concepts touching this territory (Object, already `reviewed`; this
    concept; Quantity/Amount of Matter, `quantity-amount-of-matter.md`) — UFO draws exactly
    the same three-way distinction XwkOnt's own crosswalk scoping already does, while BFO,
    DOLCE, and SUMO each split the same territory differently (e.g. DOLCE's `arbitrary-sum`
    cuts across both physical and non-physical endurants, unlike UFO's `Collective`, which
    — like `Object` and `Quantity` — is a `Substantial`, i.e. implicitly physical/concrete).
  supporting_references:
  - xwkont:ref:ufo-2021
  confidence: medium-high
