- item_id: uncertainty-001
  uncertainty_type: non-equivalence
  resolved: false
  description: '`TODO.md`''s seed claimed "YAMATO (`non-unitary`)" as a correspondence for
    this concept. Direct full-text search of the one fetchable YAMATO primary document (the
    2010 technical report) found zero occurrences of "non-unitary"/"nonunitary"/"non unitary."
    A related but distinct discussion of process/event "unity" exists in the same document,
    but on the occurrent (temporal-parts) side, not as an endurant-side aggregate/plurality
    category.'
  impact: '`TODO.md`''s seed for this concept is not fully supported by the fetchable primary
    source; no YAMATO correspondence is recorded in this crosswalk.'
  follow_up: Re-check if YAMATO's OWL/Hozo files (still registration-gated) or the blocked
    2022 paper become accessible — "non-unitary" may be a term from one of those, not the
    2010 report.
- item_id: uncertainty-002
  uncertainty_type: open-question
  resolved: false
  description: Where should `xwkont-core:Aggregate` subclass from once added to `data/ontology/core.ttl`?
    BFO and UFO both treat this as a material/substantial-side category with a uniform-member-role
    criterion; DOLCE and SUMO treat it more permissively and, in DOLCE's case, deliberately
    orthogonal to the physical/non-physical split. **Recommendation recorded 2026-07-04, in
    response to external review:** model both sub-patterns explicitly as two sibling sub-concepts
    rather than one undifferentiated `Aggregate` class — a strict, uniform-member-role `Aggregate`
    (BFO `object aggregate`/UFO `Collective`) and a permissive, criterion-free `Sum` (DOLCE
    `arbitrary-sum`/SUMO `Collection`) — because `note-001` establishes this is a real, citable
    strictness difference across all four confirmed sources (2 sources per pattern, an even
    split, not a majority/minority case that would justify picking one and treating the other
