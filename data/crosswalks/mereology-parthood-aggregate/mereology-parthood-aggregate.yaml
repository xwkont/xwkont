source_definitions:
- source: BFO
  term_or_identifier: Object aggregate (BFO_0000027)
  dimension: technical
  source_claim_type: direct quotation
  text: '"(Elucidation) An object aggregate is a material entity consisting exactly of a plurality
    (≥1) of objects as member parts which together form a unit." Example: "The aggregate of
    the musicians in a symphony orchestra and their instruments; the aggregate of bearings
    in a constant velocity axle joint; the nitrogen atoms in the atmosphere; a collection
    of cells in a blood biobank." `rdfs:subClassOf` material entity (BFO_0000040). `dc11:identifier
    "025-BFO"`.'
  reference:
  - xwkont:ref:bfo-2020
  locator: '**verified**: `bfo-core.ttl`, class BFO_0000027, fetched and read directly 2026-07-04'
  entry_notes: BFO's own scope note (already noted when `time.md`/`space.md` fetched this
    same region of the file) clarifies "exactly" excludes any parts beyond the member parts,
    and that the plurality can transiently shrink to one member while still counting as the
    same aggregate.
- source: BFO
  term_or_identifier: Fiat object part (BFO_0000024)
  dimension: technical
  source_claim_type: direct quotation
  text: '"(Elucidation) A fiat object part b is a material entity & such that if b exists
    then it is continuant part of some object c & demarcated from the remainder of c by one
    or more fiat surfaces." Example: "The upper and lower lobes of the left lung; the dorsal
    and ventral surfaces of the body; the Western hemisphere of the Earth." `rdfs:subClassOf`
    material entity (BFO_0000040). `dc11:identifier "027-BFO"`.'
  reference:
  - xwkont:ref:bfo-2020
  locator: '**verified**: `bfo-core.ttl`, class BFO_0000024, fetched and read directly 2026-07-04'
  entry_notes: A structurally distinct category from `object aggregate` — this one *divides*
    a unified whole via non-natural (fiat) boundaries rather than *summing* discrete members.
    No counterpart to this specific division-not-summation category was found in any other
    of the 8 sources — see `note-002`.
- source: DOLCE
  term_or_identifier: Arbitrary-sum
  dimension: technical
  source_claim_type: direct quotation
  text: '"AKA arbitrary-collection. The mereological sum of any two or more endurants (physical
    or not). Arbitrary sums have no unity criterion (they are ''extensional'')." `rdfs:subClassOf
    endurant`; `owl:disjointWith physical-endurant`, `owl:disjointWith non-physical-endurant`.'
  reference:
  - xwkont:ref:dolce-lite-owl
  locator: '**verified**: `DOLCE-Lite.owl`, class `#arbitrary-sum`, fetched and read directly
    2026-07-04'
  entry_notes: The most permissive of the four correspondences — any sum of two or more endurants
    qualifies, with no member-role-uniformity requirement, unlike BFO's `object aggregate`
    or UFO's `Collective`. Disjoint from *both* physical- and non-physical-endurant, i.e.
    a third, orthogonal endurant category alongside those two branches.
- source: SUMO
  term_or_identifier: Collection
  dimension: technical
  source_claim_type: direct quotation
  text: '"Collections have members like Classes, but, unlike Classes, they have a position
    in space-time and members can be added and subtracted without thereby changing the identity
    of the Collection. Some examples are toolkits, repeated actions, football teams, and flocks
    of sheep." `(subclass Collection Physical)`; `(disjoint Collection SelfConnectedObject)`.'
  reference:
  - xwkont:ref:sumo-niles-pease-2001
  locator: '**verified**: current `Merge.kif`, fetched and read directly 2026-07-04'
  entry_notes: SUMO's own documentation explicitly contrasts `Collection` with `Class` (already
    crosswalked in `universal-type.md` as SUMO's Abstract-side classifier) — a `Collection`
    is `Physical`, has spatiotemporal location, and tolerates membership change without identity
    change, the opposite of a `Class`'s intensional, condition-defined membership.
- source: UFO
  term_or_identifier: Collective
  dimension: technical
  source_claim_type: direct quotation
  text: '"Collectives are entities whose parts play the same role with respect to the whole,
    e.g., the Black Forest (as a collective of trees), a deck of cards, the Dutch-speaking
    group in the crowd." Contrasted in the same passage with `Quantities` ("maximally-topologically-self-connected...
    homeomerous amounts of matter") and `Objects` ("aka functional complexes... parts play
    differentiated functional roles"). One of three partition members of `Substantial`.'
  reference:
  - xwkont:ref:ufo-2021
  locator: '**verified**: 2021 Applied Ontology paper, already-extracted text re-searched
    directly 2026-07-04'
  entry_notes: Not part of `TODO.md`'s original seed for this concept — a genuine addition.
    UFO's own three-way `Substantial` partition (Object/Collective/Quantity) directly parallels
    this crosswalk's own three-concept adjacency (Object, this concept, Quantity/Amount of
    Matter, per `quantity-amount-of-matter.md`) — the cleanest structural fit of any source
    to XwkOnt's own concept boundaries.
- source: GFO
  term_or_identifier: '*(no aggregate/collection class found)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: Full-text grep of `modules/gfo-base.owl` for "aggregate," "mereolog," "sum" (as a
    class name), and "heap" returned zero class declarations; the sole "collection" hits are
    XML/RDF `rdf:parseType="Collection"` syntax (unrelated) and `Configuration`'s own informal
    gloss ("we consider a collection of presential facts," already documented in `situation-state-of-affairs.md`).
  reference:
  - xwkont:ref:gfo
  locator: '**verified absence**: `modules/gfo-base.owl`, fetched and read directly 2026-07-04'
  entry_notes: Not part of `TODO.md`'s original seed for this concept; checked directly for
    completeness. This is the second `0.2.0`-batch concept (after Situation/State of Affairs)
    where GFO's usual pattern of contributing a formally exhaustive top-level category does
    not hold — GFO has no counterpart at all here.
- source: YAMATO
  term_or_identifier: '*(claimed term "non-unitary" not found; related but distinct occurrent-side
    discussion exists)*'
  dimension: philosophical
  source_claim_type: non-equivalence
  text: 'Full-text search of the extracted YAMATO 2010 technical report for "non-unitary,"
    "nonunitary," and "non unitary" (case-insensitive) returned zero matches. The document
    does discuss unity in a related but distinct, occurrent-side sense: "Processes are dissective
    and hence they have no unity. It has no whole, and hence it has no (temporal) part...
    an event exists with unity in the temporal space, that is, it must be always viewed as
    a whole."'
  reference:
  - xwkont:ref:yamato-mizoguchi-2010
  locator: '**verified absence of the claimed term; distinct related content found**: 2010
    technical report, full extracted text re-searched directly 2026-07-04'
  entry_notes: '`TODO.md`''s seed claim is not supported by the one fetchable YAMATO primary
    document — this may be a term from YAMATO''s OWL/Hozo files (still registration-gated,
    per the same limitation already noted for Time/Space/Abstract) or the blocked 2022 paper,
    not the 2010 report. The unity discussion that *does* exist in this document concerns
    process/event dissectiveness (an occurrent-side, temporal-parts question, already adjacent
    to `event.md`/`process.md`), not an endurant-side aggregate/plurality category — a different
    question from this concept''s own scope.'
- source: TUpper
  term_or_identifier: '*(mereotopology relations only, no aggregate entity class)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: '`spatial_part`/`spatial_C` and `physical_part`/`physical_C` (already quoted in full
    in `space.md`''s Source Definitions) define parthood and connection *relations* over spatial
    regions and physical bodies respectively — no separate `Aggregate`, `Collection`, or `Sum`
    predicate/class is declared anywhere in `TUpper-Terms.html`.'
  reference:
  - xwkont:ref:tupper-colore
  locator: '**verified absence of an entity class; relations confirmed**: `TUpper-Terms.html`,
    fetched and read directly 2026-07-04'
  entry_notes: TUpper formalizes *parthood as a relation* thoroughly (a full mereotopology,
    per `space.md`) but never reifies "the sum/aggregate of some parts" as its own kind of
    thing — a structurally different modeling choice from BFO's/DOLCE's/SUMO's/UFO's entity-class
    approach.
- source: GUM
  term_or_identifier: '*(no class found)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: Full-text grep of `GUM-31.owl` for `#Aggregate`, `#Collection`, `#Collective`, `#Sum`,
    and `#Group` (GUM's own PascalCase convention) returned zero matches.
  reference:
  - xwkont:ref:gum-owl
  locator: '**verified absence**: `GUM-31.owl`, fetched and read directly 2026-07-04'
  entry_notes: The third `0.2.0`-batch concept (after Situation/State of Affairs and Universal/Type)
    where GUM contributes nothing previously uncredited.
