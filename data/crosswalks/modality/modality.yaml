  predicate_id: skos:relatedMatch
uncertainties:
- item_id: uncertainty-001
  uncertainty_type: open-question
  resolved: false
  description: SUMO's modal layer is explicit, but it is propositional and alethic rather
    than process-quality based. That makes `mapping-001` and `mapping-002` intentionally conservative.
  impact: Prevents a false equivalence between two real modal formalisms.
  follow_up: Keep `related` unless a maintainer wants a stricter "same semantic field, different
    level" policy.
- item_id: uncertainty-002
  uncertainty_type: non-equivalence
  resolved: false
  description: '`GUM:Possibility` / `GUM:Necessity` are classes, while SUMO''s `Possibility`
    / `Necessity` are instances of `AlethicAttribute`. The same lexical labels are not enough
    to collapse that difference.'
  impact: Keeps `mapping-003` / `mapping-004` out of `exact-equivalence-candidate`.
  follow_up: None unless the source-side modeling changes.
- item_id: uncertainty-003
  uncertainty_type: open-question
  resolved: false
  description: 'UFO''s modal logic is theoretically relevant and substantively documented
    (Section 3''s formalization, plus the "modally fragile" event characterization), but it
    is formalization/theory machinery, not a source-term correspondence in the same sense
    as GUM''s `ModalQuality` or SUMO''s `AlethicAttribute`. Separately: this session''s own
    live fetch attempts (DOI `10.3233/AO-210256`, SageJournals, philpapers.org''s Semantic-Scholar-indexed
    mirror) all returned HTTP 403, the same recurring block `continuous-discrete.md`''s and
    `list-sequence.md`''s reviews hit for this exact paper earlier the same week — this row''s
    verification relies on a complete extraction from a day earlier (2026-07-06), not a fresh
    fetch today, so the finding is grounded but the access problem itself is ongoing.'
  impact: Keeps UFO out of a misleading class-level mapping while still recording its real
    modal-formalization content.
  follow_up: Revisit only if a later UFO artifact introduces a dedicated modality-of-the-subject-matter
    class or operator; separately, the DOI/mirror access block should be rechecked next time
    this paper is needed, per the recurring problem already logged in `list-sequence.yaml`,
    `change.yaml`, and `continuous-discrete.yaml`.
- item_id: uncertainty-004
  uncertainty_type: open-question
  resolved: false
  description: TUpper's `poss` is the only explicit modal predicate found in that source.
    It is close enough to keep in the draft, but not close enough to claim equivalence to
    GUM's process-quality branch.
  impact: Supports `related`, not `close-match`.
  follow_up: Revisit only if a deeper PSL module adds a stronger modal class or if the maintainer
    wants a stricter operator-level comparison.
- item_id: uncertainty-005
  uncertainty_type: uncertainty
  resolved: true
  description: 'Corrected during Claude''s independent review pass (2026-07-07): `PropertyAscription`
    (the shared superclass) itself is `owl:disjointWith` only `QuantityAscription` — it does
    not disjoin `ModalPropertyAscription` from its sibling `*PropertyAscription` classes,
    and no such disjointness is inherited. The real additional disjointness is declared reciprocally
    on `LogicalPropertyAscription`''s own class block (`owl:disjointWith ModalPropertyAscription`,
    alongside `MaterialPropertyAscription`, `ProvenancePropertyAscription`, `ScaledComparison`),
    not on `ModalPropertyAscription`''s own block or on the superclass. So `ModalPropertyAscription`
    is `owl:disjointWith` five classes total, not four: `ProvenancePropertyAscription`, `ScaledComparison`,
    `SizePropertyAscription`, `UsePropertyAscription` (declared on its own block) plus `LogicalPropertyAscription`
    (declared reciprocally on that class''s block).'
  impact: Row 51 in Source Definitions understated the disjointness by one class; corrected
    there.
  follow_up: None — resolved by direct verification against `GUM-31.owl`.
