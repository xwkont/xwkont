comparison_notes:
- note_id: note-001
  dimension: technical
  claim_type: editorial observation
  note: 'GUM and SUMO are both explicit about modality, but they model it at different levels:
    GUM treats modal qualification as a quality of a process and a dedicated ascription relation;
    SUMO treats it as an alethic attribute of propositions plus a predicate that assigns the
    attribute. That makes `ModalQuality` and `AlethicAttribute` comparable, but not interchangeable.'
  supporting_references:
  - xwkont:ref:gum-owl
  - xwkont:ref:sumo-niles-pease-2001
  confidence: high
- note_id: note-002
  dimension: technical
  claim_type: editorial observation
  note: 'GUM''s modal branch is two-tiered: `Conditional` / `NonConditional` / `NonVolitional`
    / `Volitional` are direct children of `ModalQuality`, while `Necessity` and `Possibility`
    sit one level lower under `NonVolitional`. That is structurally different from a flat
    "possible/necessary" pair and should not be flattened in comparison.'
  supporting_references:
  - xwkont:ref:gum-owl
  confidence: high
- note_id: note-003
  dimension: technical
  claim_type: editorial observation
  note: TUpper's `poss` is an operator-level possibility predicate over activity and occurrence
    structure. It is closer to a process-trajectory constraint than to a bearer-side quality,
    so it is relevant to this crosswalk but not a direct class-level match to GUM's `ModalQuality`.
  supporting_references:
  - xwkont:ref:tupper-colore
  confidence: high
- note_id: note-004
  dimension: both
  claim_type: editorial observation
  note: 'UFO does use modal vocabulary substantively, not just incidentally: Section 3 of
    the paper is a first-order modal-logic formalization of UFO''s own axioms (QS5 plus the
    Barcan formula, explicit necessity/possibility operators), and the paper separately uses
    "modally fragile" to characterize perdurants/events. That vocabulary sits inside the paper''s
    formalization and theory narrative, though — the checked UFO source does not introduce
    a dedicated modality-of-the-subject-matter class or operator analogous to GUM''s branch
    or SUMO''s `AlethicAttribute`/`modalAttribute`.'
  supporting_references:
  - xwkont:ref:ufo-2021
  confidence: high
- note_id: note-005
  dimension: technical
  claim_type: editorial observation
  note: 'BFO, DOLCE, GFO, and YAMATO did not yield a dedicated modality branch in the checked
    artifacts. Their hits were lexical only: ordinary "possible"/"necessary" wording in comments
    or prose, not a reified modal category.'
  supporting_references:
  - xwkont:ref:bfo-2020
  - xwkont:ref:dolce-lite-owl
  - xwkont:ref:gfo
  - xwkont:ref:yamato-mizoguchi-2010
  confidence: high
- note_id: note-006
  dimension: philosophical
  claim_type: editorial observation
  note: GUM is the only source here that explicitly combines modal qualification with volitional
    framing in the same branch. The source's `Conditional` / `NonConditional` split sits beside
    `NonVolitional` / `Volitional`, which makes the modal family both semantically richer
    and more linguistically motivated than the other sources' modal machinery.
  supporting_references:
  - xwkont:ref:gum-owl
  confidence: high
