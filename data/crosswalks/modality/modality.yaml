local_identifier: xwkont:concept:modality
slug: modality
title: Modality
editorial_status: reviewed
created: "2026-07-07"
modified: "2026-07-07"
scope_note: 'This crosswalk compares how the source ontologies represent modal qualification:
  necessity, possibility, conditionality, and volitional/non-volitional framing when those
  are attached to a process, state of affairs, proposition, or related bearer.



  GUM is the only source here that reifies that space as a dedicated quality branch, `ModalQuality`,
  paired with a dedicated ascription relation, `ModalPropertyAscription`. SUMO also reifies
  modality, but at a different level: an alethic attribute layer on propositions (`AlethicAttribute`
  with `modalAttribute`, plus `Possibility` and `Necessity`). TUpper provides an explicit
  possibility predicate (`poss`). UFO uses modal logic substantively — a dedicated first-order
  modal-logic formalization section for its own axioms, plus a "modally fragile" characterization
  of perdurants/events — but does not introduce a dedicated modality-of-the-subject-matter
  class in the ontology vocabulary itself, the way GUM and SUMO do. BFO, DOLCE, GFO, and YAMATO
  yielded only incidental uses of "possible" / "necessary" in comments or prose, independently
  re-verified directly against their primary artifacts.



  This draft does not re-derive `quality.md`''s `SimpleQuality` finding (`xwkont:correspondence:quality:007`,
  `xwkont:mapping:quality:012`) and does not re-map `disposition-capacity.md`''s `GeneralPossibility`
  / `Ability` findings (`xwkont:correspondence:disposition-capacity:005-006`, `xwkont:mapping:disposition-capacity:003-004`).'
