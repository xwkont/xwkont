  entry_notes: No modality branch was found.
- source: DOLCE
  term_or_identifier: '*(no dedicated modality class or operator)*'
  dimension: technical
  source_claim_type: editorial observation
  text: The checked base file uses ordinary language only, e.g. "possibilia" and "as large
    as possible," and one unrelated comment mentions a "necessary axiom of compresence." No
    modal class/operator was found.
  reference:
  - xwkont:ref:dolce-lite-owl
  locator: '**verified absence**: `DOLCE-Lite.owl`, searched directly 2026-07-07'
  entry_notes: Lexical hits only, not a reified modality layer.
- source: UFO
  term_or_identifier: Formal semantics in a modal logic
  dimension: both
  source_claim_type: direct quotation
  text: 'The paper names "a formal semantics in a sortal quantified modal logic" among UFO''s
    constituent theories, and Section 3 ("The formalization of UFO in First-Order Modal Logic")
    states: "the first-order modal logic QS5 plus the Barcan formula and its converse suffices...
    The modal operators of necessity (2) and possibility (3) are used with their usual meaning."
    Perdurants/events are separately characterized as "modally fragile... there is no cross-world
    identity between them."'
  reference:
  - xwkont:ref:ufo-2021
  locator: '**verified**: full paper text, checked against a complete extraction dated 2026-07-06
    (a day before this session; today''s own DOI/mirror fetch attempts returned HTTP 403,
    so this session reused that extraction rather than a fresh fetch)'
  entry_notes: This is formalization/theory machinery (a modal logic used to state UFO's own
    axioms), not a dedicated modality-of-the-subject-matter class the way GUM's `ModalQuality`
    or SUMO's `AlethicAttribute` are.
- source: SUMO
  term_or_identifier: AlethicAttribute / modalAttribute / Possibility / Necessity
  dimension: technical
  source_claim_type: paraphrase
  text: 'SUMO reifies an alethic modal layer: `AlethicAttribute` is the class of attributes
    relating to possibility and necessity; `Possibility` and `Necessity` are instances of
    it; `modalAttribute` carries the normative force of a proposition. SUMO also has a separate
    deontic branch under `NormativeAttribute`.'
  reference:
  - xwkont:ref:sumo-niles-pease-2001
  locator: '**verified**: `Merge.kif`, searched directly 2026-07-07'
  entry_notes: This is the clearest explicit modal reification outside GUM.
- source: GFO
  term_or_identifier: '*(no dedicated modality class or operator)*'
  dimension: technical
  source_claim_type: editorial observation
  text: The only hits were `necessary` inside the `Material_persistant` definition and the
    property name `necessary_for`; both are relational or ordinary uses, not a modal branch.
  reference:
  - xwkont:ref:gfo
  locator: '**verified absence**: `gfo-base.owl`, searched directly 2026-07-07'
  entry_notes: No modality class/operator was found.
