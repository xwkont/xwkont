uncertainties:
- item_id: uncertainty-001
  uncertainty_type: non-equivalence
  resolved: true
  description: '~~BFO has no core class named "Event"~~ — corrected: BFO''s `bfo-core.ttl`
    registers "event" as an `skos:altLabel` on `Process` (BFO_0000015), confirmed by direct
    primary-source read. BFO''s Occurrent split remains Process (extended) vs. Process Boundary
    (instantaneous) as a distinct axis from DOLCE/UFO''s Event-as-a-named-category, but the
    original "no Event term at all" claim was too strong and has been corrected throughout
    this document.'
  impact: Confidence on BFO-involving mappings (`event-002`, `event-003`) can be reassessed
    now that the underlying claim is verified rather than inferred from absence.
  follow_up: Resolved — no further action needed on this specific item.
  resolved_date: "2026-07-01"
  resolution_note: resolved 2026-07-01
- item_id: uncertainty-002
  uncertainty_type: non-equivalence
  resolved: true
  description: 'SUMO has no top-level "Event" sibling to Process; confirmed directly against
    `Merge.kif`: Process''s formal definition is "anything that occurs in time but is not
    an Object," with "events" (e.g., a football match) used only as informal examples, not
    a separate class.'
  impact: '`event-004`''s low confidence was based on an unverified secondary claim; the underlying
    structural finding is now confirmed, though the specific `IntentionalProcess`/`LifeEvent`
    subclass chain from the original draft was not re-verified in this pass.'
  follow_up: Resolved for the core finding. Re-verify `IntentionalProcess`/`LifeEvent` specifically
    if that detail is relied upon elsewhere.
  resolved_date: "2026-07-01"
  resolution_note: resolved 2026-07-01
- item_id: uncertainty-003
  uncertainty_type: uncertainty
  resolved: true
  description: '`note-003`''s Vendler (1957) connection for DOLCE''s Event/Stative split is
    plausible and well-documented in general aspectual-linguistics literature, but D18''s
    own 90-item bibliography, read directly, contains **no citation to Vendler**. This is
    not Masolo et al.''s own connection to draw — only this crosswalk''s external observation.'
  impact: Confidence on `note-003` remains capped at low, now for a confirmed reason (checked
    absence) rather than an unchecked one; no mapping assertion relies on it.
  follow_up: Resolved — no further action needed. A Vendler (1957) reference record is not
    warranted unless a future pass needs to cite Vendler's own paper directly for the aspectual-linguistics
    parallel itself (independent of any DOLCE citation).
  resolved_date: "2026-07-01"
  resolution_note: resolved 2026-07-01, as a confirmed negative finding
- item_id: uncertainty-004
  uncertainty_type: open-question
  resolved: false
  description: This crosswalk does not resolve Process on its own terms — it treats BFO:Process
    and SUMO's Process-as-umbrella only in relation to Event.
  impact: Process needs its own crosswalk (already tracked in `TODO.md`) to be treated fairly
    as a concept in its own right, not just as Event's foil.
  follow_up: Create the Process concept crosswalk next.
- item_id: uncertainty-005
  uncertainty_type: open-question
  resolved: false
  description: YAMATO's own OWL/Hozo files were not fetched in this pass (registration-gated
    download; see `xwkont:ref:yamato-mizoguchi-2010`), so `event-007`/`event-008`'s YAMATO
    side is cited by quotation from the 2010 technical report, not by class IRI, and YAMATO's
    more detailed event-mereology treatment (if any) referenced only briefly in Section 5
    of the report has not been checked.
  impact: Confidence on `event-007`/`event-008` (capped at medium-high) could rise if the
    OWL is fetched and a formal `Event` class definition is found matching the report's prose
    criterion.
  follow_up: Fetch YAMATO's OWL/Hozo files if the registration gate is completed later (e.g.,
    by the maintainer).
- item_id: uncertainty-006
  uncertainty_type: non-equivalence
  resolved: true
  resolved_date: "2026-07-07"
  resolution_note: 'resolved 2026-07-07, session-044: the broader `Change` class''s remaining
    extended-process reading is now covered by `docs/crosswalks/concepts/change.md` (`0.3.0`
    batch), not left permanently unmapped.'
  description: GFO's `Change` class spans both the instantaneous case ("instantaneous event")
    and the extended case ("a process of arbitrary extension") — it is not a clean Event-only
    class the way DOLCE's `Achievement`/`Accomplishment` pair is. Only the `Instantaneous_change`
    subtype was judged a close match to atomic Event-analogs (`event-005`/`event-006`); the
    broader `Change` class itself was not mapped.
  impact: None of this crosswalk's mapping assertions rely on the broader `Change` class directly
    — only its `Instantaneous_change` subtype.
  follow_up: 'Resolved: see `docs/crosswalks/concepts/change.md` for the extended-process reading.
    Mapping GFO:Change''s extended-case reading against DOLCE:Accomplishment specifically remains
    optional future work for that crosswalk, not this one.'
