comparison_notes:
- note_id: note-001
  dimension: technical
  claim_type: editorial observation
  note: 'BFO and SUMO both lack a top-level "Event" *category* distinct from Process — BFO
    registers "event" only as an alt-label synonym for `Process` itself (verified directly,
    BFO_0000015), while SUMO nests event-like notions *inside* Process (verified directly:
    "anything that occurs in time but is not an Object," with "events" used only as informal
    examples). DOLCE and UFO both have "Event" as an explicit, separate top category, now
    also verified directly. This is a genuine four-way split in how the same conceptual territory
    is carved up, not just a labeling difference.'
  supporting_references:
  - xwkont:ref:bfo-2020
  - xwkont:ref:sumo-niles-pease-2001
  - xwkont:ref:dolce-wonderweb-d18
  - xwkont:ref:ufo-2021
  confidence: high
  supporting_references_note: '`xwkont:ref:bfo-2020`, `xwkont:ref:sumo-niles-pease-2001`,
    `xwkont:ref:dolce-wonderweb-d18`, `xwkont:ref:ufo-2021` (all verified)'
- note_id: note-002
  dimension: technical
  claim_type: editorial observation
  note: 'BFO''s `Process Boundary` (instantaneous, zero-dimensional) and DOLCE''s `Achievement`
    (atomic event, confirmed directly: "achievements... if they are atomic") both isolate
    a "point-like" occurrent as distinct from an extended one, despite sitting in structurally
    different hierarchies (BFO: sibling of Process under Occurrent; DOLCE: subtype of Event
    under Perdurant). This is a plausible conceptual convergence, not confirmed by a source
    explicitly drawing this comparison — that remains this crosswalk''s own editorial observation,
    now resting on verified primary-source definitions rather than secondary paraphrase.'
  supporting_references:
  - xwkont:ref:bfo-2020
  - xwkont:ref:dolce-wonderweb-d18
  confidence: medium
- note_id: note-003
  dimension: philosophical
  claim_type: inference
  note: DOLCE's Event/Stative split resembles Vendler's (1957) linguistic aspect classification
    (state, activity, accomplishment, achievement), consistent with DOLCE's documented cognitive/linguistic
    orientation (`continuant-occurrent.md` `note-002`). Direct reading of D18's own 90-item
    bibliography confirms **no citation to Vendler exists in the primary source** — this remains
    this crosswalk's own external observation, not something DOLCE's authors themselves draw.
  supporting_references:
  - xwkont:ref:dolce-wonderweb-d18
  confidence: low
  claim_type_annotation: checked and unconfirmed, 2026-07-01
- note_id: note-004
  dimension: technical
  claim_type: editorial observation
  note: Of the four ADR-0015 sources, only YAMATO gives a positive, named process/event distinction
    with an explicit criterion (events are made of processes; events cannot themselves change)
    — closer in spirit to DOLCE/UFO's named-category approach than to BFO/SUMO's synonym/umbrella
    approach. GFO and GUM both use the literal word "event(s)" only inside another class's
    definition text (`Change`'s gloss; `Process`'s gloss, respectively), echoing BFO's altLabel
    pattern rather than introducing a separate category. TUpper names no "event" term at all
    — its closest structural analog, `activity_occurrence`, is a type/token distinction (occurrence-of-an-activity),
    not a process/event category split, and its own documentation explicitly denies the instance-of
    reading a reader might assume.
  supporting_references:
  - xwkont:ref:gfo
  - xwkont:ref:yamato-mizoguchi-2010
  - xwkont:ref:tupper-colore
  - xwkont:ref:gum-owl
  confidence: high
- note_id: note-005
  dimension: technical
  claim_type: editorial observation
  note: 'GFO''s `Instantaneous_change` and BFO''s `Process Boundary`/DOLCE''s `Achievement`
    (per `note-002`) form a three-way convergence on isolating an atomic/punctual occurrent,
    despite three structurally different hierarchies (GFO: subtype of `Change`, itself a distinct
    branch from `Occurrent`''s `Process`/`Action` subtypes; BFO: sibling of `Process` under
    `Occurrent`; DOLCE: subtype of `Event` under `Perdurant`). This extends `note-002`''s
    observation rather than replacing it — still an editorial observation, not a comparison
    any source draws itself.'
  supporting_references:
  - xwkont:ref:gfo
  - xwkont:ref:bfo-2020
  - xwkont:ref:dolce-wonderweb-d18
  confidence: medium
