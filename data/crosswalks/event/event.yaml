source_definitions:
- source: BFO
  term_or_identifier: Process (BFO_0000015)
  dimension: technical
  source_claim_type: direct quotation
  text: '"(Elucidation) p is a process means p is an occurrent that has some temporal proper
    part and for some time t, p has some material entity as participant." Examples given:
    "An act of selling; the life of an organism; a process of sleeping; a process of cell-division;
    a beating of the heart; a process of meiosis; the taxiing of an aircraft; the programming
    of a computer."'
  reference:
  - xwkont:ref:bfo-2020
  locator: '**verified**: `bfo-core.ttl`, class BFO_0000015, fetched and read directly 2026-07-01'
- source: BFO
  term_or_identifier: Process Boundary (BFO_0000035)
  dimension: technical
  source_claim_type: direct quotation
  text: '"p is a process boundary =Def p is a temporal part of a process & p has no proper
    temporal parts." Example: "The boundary between the 2nd and 3rd year of your life."'
  reference:
  - xwkont:ref:bfo-2020
  locator: '**verified**: `bfo-core.ttl`, class BFO_0000035, fetched and read directly 2026-07-01'
- source: BFO
  term_or_identifier: '"event" as altLabel on Process'
  dimension: technical
  source_claim_type: direct quotation
  text: BFO_0000015 ("process") carries `skos:altLabel "event"@en` directly in the primary
    OWL/TTL source — "event" is a registered synonym for Process, not a separate BFO class.
  reference:
  - xwkont:ref:bfo-2020
  locator: '**verified**: `bfo-core.ttl`, class BFO_0000015, fetched and read directly 2026-07-01'
  entry_notes: This corrects the crosswalk's original claim that BFO has no "Event" term at
    all — see Scope Note correction.
- source: DOLCE
  term_or_identifier: Event (Eventive)
  dimension: technical
  source_claim_type: direct quotation
  text: '"An occurrence-type is stative [or] eventive according to whether it holds of the
    mereological sum of two of its instances, i.e. if it is cumulative or not." Stative types
    further split into states and processes by homeomericity; "eventive occurrences (events)..."
    are the non-cumulative branch.'
  reference:
  - xwkont:ref:dolce-wonderweb-d18
  locator: '**verified**: WonderWeb D18 PDF, manually extracted 2026-07-01'
  entry_notes: Confirms the earlier paraphrase closely, now with the primary source's exact
    cumulativity criterion.
- source: DOLCE
  term_or_identifier: Achievement
  dimension: technical
  source_claim_type: direct quotation
  text: '"Eventive occurrences (events) are called achievements if they are atomic, otherwise
    they are accomplishments."'
  reference:
  - xwkont:ref:dolce-wonderweb-d18
  locator: '**verified**: WonderWeb D18 PDF, manually extracted 2026-07-01'
- source: DOLCE
  term_or_identifier: Accomplishment
  dimension: technical
  source_claim_type: direct quotation
  text: Same source sentence as Achievement above — accomplishment is defined simply as the
    non-atomic case ("otherwise they are accomplishments"), not given a separate positive
    definition in this passage.
  reference:
  - xwkont:ref:dolce-wonderweb-d18
  locator: '**verified**: WonderWeb D18 PDF, manually extracted 2026-07-01'
- source: DOLCE
  term_or_identifier: Stative/Event split, linguistic origin
  dimension: philosophical
  source_claim_type: non-equivalence
  text: '**Checked and confirmed absent (2026-07-01)**: D18''s own bibliography (90 numbered
    references) was read directly and contains no citation to Vendler (1957). The Event/Stative
    and Achievement/Accomplishment split closely parallels Vendler''s four-way Aktionsart
    classification, but this is an external observation this crosswalk is making, not a connection
    Masolo et al. (2003) draw themselves.'
  reference:
  - xwkont:ref:dolce-wonderweb-d18
  locator: '**verified absence**: D18''s reference list checked directly, 2026-07-01'
  entry_notes: Resolves `uncertainty-003`/`note-003` as a confirmed negative finding rather
    than an open question.
- source: UFO
  term_or_identifier: Event
  dimension: technical
  source_claim_type: direct quotation
  text: UFO's theory of events covers "event mereology, temporal ordering of events, object
    participation in events, causation, change, and the connection between events and endurants
    via dispositions." Events are manifestations of the dispositions inhering in endurants,
    and are treated as "modally fragile entities" that "cannot genuinely change... while maintaining
    their numerical identity."
  reference:
  - xwkont:ref:ufo-2021
  locator: '**verified**: Applied Ontology 2021 PDF, manually extracted 2026-07-01'
  entry_notes: Confirms the earlier paraphrase closely; now a direct quotation with UFO's
    own list of theoretical scope and its modal-fragility characterization (also used in `process.md`).
- source: SUMO
  term_or_identifier: Process as umbrella (no separate Event)
  dimension: technical
  source_claim_type: direct quotation
  text: '"(subclass Process Physical)... The class of things that happen and have temporal
    parts or stages. Examples include extended events like a football match or a race, actions
    like Pursuing and Reading, and biological processes. The formal definition is: anything
    that occurs in time but is not an Object."'
  reference:
  - xwkont:ref:sumo-niles-pease-2001
  locator: '**verified**: `Merge.kif`, `documentation Process EnglishLanguage`, fetched and
    read directly 2026-07-01'
  entry_notes: SUMO's own documentation uses the word "events" as informal examples of Process,
    but does not define a separate `Event` class — confirms the original finding with a precise
    formal definition ("anything that occurs in time but is not an Object"), which was previously
    unconfirmed. `IntentionalProcess`/`LifeEvent` nesting (from the earlier draft) not re-verified
    in this pass but not contradicted.
- source: GFO
  term_or_identifier: Change
  dimension: technical
  source_claim_type: direct quotation
  text: '"A change in the technical sense refers to a pair of process boundaries. Either at
    coinciding boundaries (then it comes close to notions like ``punctual'''' or ``instantaneous
    event'''' as well as ``moment'''' -- in a temporal reading), or at boundaries at the opposite
    ends of a process of arbitrary extension."'
  reference:
  - xwkont:ref:gfo
  locator: '**verified**: `modules/gfo-base.owl`, class `Change`, fetched and read directly
    2026-07-02'
  entry_notes: GFO's own text explicitly names "instantaneous event" as a gloss on one technical
    sense of `Change` — the strongest direct terminological hook to "event" found in GFO's
    base module, though `Change` itself is not restricted to the instantaneous case (an extended-process
    reading is also given).
- source: GFO
  term_or_identifier: Instantaneous change
  dimension: technical
  source_claim_type: direct quotation
  text: '"Instantaneous changes are represented by change(e1,e2, u1, u2, u), where e1 and
    e2 are a pair of coincident process boundaries... Instantaneous changes are therefore
    changes of properties on two coinciding time boundaries." Subclass of `Change`.'
  reference:
  - xwkont:ref:gfo
  locator: '**verified**: `modules/gfo-base.owl`, class `Instantaneous_change`, fetched and
    read directly 2026-07-02'
  entry_notes: The specific atomic/punctual subtype of `Change` — closest single-class analog
    to DOLCE's Achievement or BFO's Process Boundary.
- source: YAMATO
  term_or_identifier: Continuant(Object) vs. Occurrent(Process), Events
  dimension: technical
  source_claim_type: direct quotation
  text: '"YAMATO is based on a solid theory of objects, processes and events, and it deals
    with them of equal importance (Galton 2009). Furthermore, it clearly identifies events
    are made of processes and while processes can change, events cannot. We do not use the
    term perdurant for explaining processes because it blocks to talk about the difference
    between processes and events."'
  reference:
  - xwkont:ref:yamato-mizoguchi-2010
  locator: '**verified**: `YAMATO101216.pdf`, Section 2.1, extracted 2026-07-02'
  entry_notes: 'The most explicit "process vs. event" criterion of any of the four new sources:
    events are composed of processes, and events (unlike processes) cannot themselves change.
    No OWL class IRI available (registration-gated download; see `xwkont:ref:yamato-mizoguchi-2010`).'
- source: TUpper
  term_or_identifier: activity_occurrence
  dimension: technical
  source_claim_type: direct quotation
  text: '"(activity_occurrence occ) is TRUE in an interpretation of TUpper if and only if
    occ is a member of the class of activity occurrences in the universe of discourse of the
    interpretation. An activity occurrence is associated with a unique activity and begins
    and ends at specific points in time. NOTE An activity occurrence is not an instance of
    an activity."'
  reference:
  - xwkont:ref:tupper-colore
  locator: '**verified**: `TUpper-Terms.html`, term `activity_occurrence`, fetched and read
    directly 2026-07-02'
  entry_notes: Explicitly not an instance-of relation to `activity` (a type/token distinction,
    per the source's own NOTE) — a different axis from Process/Event, so treated as a structural
    analog only, consistent with `object.md`'s TUpper precedent (`unknown` confidence).
- source: GUM
  term_or_identifier: Process (glossed "goings-on or events")
  dimension: technical
  source_claim_type: direct quotation
  text: '"A Process is the linguistic construal of ''goings-on'' or events. Processes are
    similar to Configurations, but factor out Participants, Circumstances, and other elements.
    As such, entities classified under Process can be expressed as verbs and are frequently
    the main verb in a clause."'
  reference:
  - xwkont:ref:gum-owl
  locator: '**verified**: `GUM-31.owl`, class `Process`, fetched and read directly 2026-07-02'
  entry_notes: GUM's own definition text is the only one of the four new sources to use the
    literal word "events" in a class definition — but, like BFO, it treats "event" as informally
    synonymous with its general occurrent-side class rather than naming a separate category.
