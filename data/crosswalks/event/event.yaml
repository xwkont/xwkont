local_identifier: xwkont:concept:event
slug: event
title: Event
editorial_status: reviewed
created: "2026-07-01"
modified: "2026-07-07"
scope_note: 'This crosswalk compares how BFO, DOLCE, UFO, and SUMO treat "Event" on the occurrent/perdurant
  side of each source ontology''s top-level split, building directly on `docs/crosswalks/concepts/continuant-occurrent.md`.
  It also directly addresses that crosswalk''s `uncertainty-003` (the unresolved Process/Event
  boundary).



  **Update (2026-07-02), ADR-0015 buildout:** extended to GFO, YAMATO, TUpper, and GUM, per
  `ADR-0015`''s source-ontology scope expansion. GFO has no class literally named "Event"
  but its `Change` class explicitly glosses "instantaneous event" as one of two technical
  senses of change — the closest formal analog to BFO''s Process Boundary / DOLCE''s Achievement.
  YAMATO is the most explicit of the four new sources: it names "processes and events" as
  distinct categories directly, and states a positive criterion for the difference ("events
  are made of processes and while processes can change, events cannot"). TUpper''s `activity_occurrence`
  is a token/particular occurrence of an `activity` (type), which is a different type/token
  distinction than continuant-occurrent, not a category split parallel to Process/Event —
  treated as a structural analog only, consistent with `object.md`''s TUpper precedent. GUM''s
  `Process` class is explicitly glossed as "the linguistic construal of ''goings-on'' or events,"
  making it, unusually, the one new source whose own definition text uses the word "events"
  directly (alongside BFO''s altLabel usage) despite not naming a separate Event class.



  **Correction (2026-07-01), following direct primary-source verification:** this crosswalk
  originally claimed BFO''s core vocabulary has no class or label named "Event" at all. That
  claim was **too strong** and has been corrected after fetching BFO-2020''s actual primary
  OWL/TTL source (`bfo-core.ttl`) directly. BFO_0000015 ("process") explicitly carries `skos:altLabel
  "event"@en` — meaning BFO''s own core release *does* register "event" as an alternate label
  for `Process`, not a term absent from BFO entirely. The corrected finding: **BFO treats
  "event" as a synonym for Process, not as a separate category** — which is still a real difference
  from DOLCE and UFO (where Event is a distinct category, not a synonym for Process/Perdurant-as-a-whole),
  but it is a different and more precise claim than "BFO doesn''t use the word." SUMO''s side
  of the asymmetry (event-like notions nested under `Process` via `IntentionalProcess`) was
  independently confirmed against SUMO''s actual `Merge.kif` source and holds as originally
  stated — see Source Definitions.



  Exclusions: this crosswalk does not resolve Process on its own terms (see `docs/crosswalks/concepts/process.md`)
  and does not attempt a full account of DOLCE''s Achievement/Accomplishment mereology or
  UFO''s event-causation theory.



  **Update (2026-07-01), following direct primary-source verification of DOLCE and UFO:**
  the WonderWeb D18 report and UFO 2021 paper (already fetched and extracted for other crosswalks)
  were reused to verify this crosswalk''s DOLCE and UFO Event content directly. Findings:



  - **DOLCE''s Achievement/Accomplishment definitions are confirmed almost verbatim**: "eventive
  occurrences (events) are called achievements if they are atomic, otherwise they are accomplishments,"
  with the stative/eventive split itself defined by cumulativity ("according to whether it
  holds of the mereological sum of two of its instances, i.e. if it is cumulative or not").

  - **UFO''s Event content is confirmed** as originally paraphrased, now a direct quotation
  drawing on the paper''s own list of theoretical contributions and its treatment of events
  as manifestations of endurant dispositions.

  - **`note-003`''s Vendler (1957) connection for DOLCE is resolved as a confirmed negative
  finding, not left open.** D18''s own bibliography (90 numbered references, checked directly)
  contains **no citation to Vendler at all**. The Event/Stative-Achievement/Accomplishment
  parallel to Vendler''s (1957) four-way Aktionsart classification remains a plausible external
  observation, but it is not something Masolo et al. (2003) draw themselves — this crosswalk
  should stop describing it as merely "not yet confirmed" and instead record it as checked-and-absent.
  The same applies to `process.md`''s parallel `uncertainty-002`.



  **Epistemic note:** BFO and SUMO content is verified directly against primary sources (`bfo-core.ttl`,
  `Merge.kif`, fetched and grepped 2026-07-01). DOLCE and UFO content is now also directly
  verified (2026-07-01), reusing extractions performed for other crosswalks in this repository.'
