comparison_notes:
- note_id: note-001
  dimension: philosophical
  claim_type: editorial observation
  note: 'Three of the four sources with a "physical stuff" reading (DOLCE, UFO, GFO) converge
    on classifying Quantity/Amount-of-matter as physical/concrete — DOLCE''s `physical-endurant`,
    UFO''s `Substantial`, GFO''s `Presential`/`Continuous`. SUMO alone classifies its `Quantity`
    as `Abstract`. This is the same divergence *shape* already found for Time (`time.md`''s
    `note-001`, BFO the lone occurrent-classifying holdout) and partially for Space (`space.md`''s
    `note-001`, a 3-way split) — but here it is SUMO, not BFO, that is the outlier, and the
    outlier sits on the abstract side rather than a special third branch. SUMO''s own documentation
    explains why: `PhysicalQuantity` "need not be material" (currency is the worked example)
    — SUMO''s Quantity is defined by measurement/specification, not by physical stuff-hood,
    a genuinely different criterion from the other three sources''.'
  supporting_references:
  - xwkont:ref:dolce-lite-owl
  - xwkont:ref:ufo-2021
  - xwkont:ref:gfo
  - xwkont:ref:sumo-niles-pease-2001
  confidence: high
- note_id: note-002
  dimension: philosophical
  claim_type: editorial observation
  note: 'YAMATO''s "quantity" is a citation-precision trap: its own text defines quantity
    as a generically-dependent, unit-independent *value*-like entity ("true quantity... independent
    of how long 1m is"), explicitly contrasted with its own measurement — this is structurally
    much closer to DOLCE''s `quale`/quality-value machinery (an atomic region within a quality
    space) than to DOLCE''s own `amount-of-matter` (mass-noun stuff like gold or sand) or
    to UFO''s/GFO''s matter-denoting categories. Naively mapping YAMATO''s "quantity" onto
    DOLCE''s/UFO''s "Quantity"/"amount-of-matter" by name alone would conflate two different
    concepts; this crosswalk records the correspondence (`correspondence-005`) but flags the
    sense mismatch explicitly rather than silently treating them as equivalent.'
  supporting_references:
  - xwkont:ref:yamato-mizoguchi-2010
  - xwkont:ref:dolce-lite-owl
  confidence: high
- note_id: note-003
  dimension: technical
  claim_type: editorial observation
  note: GUM's `Quantity` is a linguistic ascription *relation* (the relation of predicating
    a quantity of an entity within a clause), not an entity-denoting class — GUM has no class
    analogous to DOLCE's `amount-of-matter` or UFO's `Quantity` as a kind of thing that exists.
    This is the same relation-not-entity pattern already implicit in GUM's clause-grounded
    apparatus for other `0.2.0`-batch concepts (its Time/Space content is at least entity-shaped;
    here even that is absent) — GUM's own ontology is oriented toward how language *ascribes*
    quantities, not toward reifying quantities or amounts of matter as things in the world.
  supporting_references:
  - xwkont:ref:gum-owl
  confidence: medium-high
- note_id: note-004
  dimension: technical
  claim_type: editorial observation
  note: 'DOLCE''s and UFO''s own worked examples converge closely: DOLCE''s "gold," "iron,"
    "wood," "sand," "meat" (mass nouns) and UFO''s "puddle of water," "pile of sand" both
    illustrate homeomerous, no-unity physical stuff, and both sources independently invoke
    a mereological/topological unity criterion (DOLCE: "mereologically invariant... change
    identity when they change some parts"; UFO: "maximally-topologically-self-connected...
    homeomerous amounts of matter") to distinguish this category from Object. This is the
    closest cross-source terminological and conceptual convergence found in this crosswalk,
    directly relevant background for the planned Mereology/Parthood/Aggregate crosswalk.'
  supporting_references:
  - xwkont:ref:dolce-lite-owl
  - xwkont:ref:ufo-2021
  confidence: high
