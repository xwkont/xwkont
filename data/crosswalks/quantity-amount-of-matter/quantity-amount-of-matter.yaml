    a quantity to an entity in a clause.
source_definitions:
- source: BFO
  term_or_identifier: '*(no class found)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: Full-text grep of `bfo-core.ttl` for "quantity" and "amount" (case-insensitive) returned
    zero matches anywhere in the file.
  reference:
  - xwkont:ref:bfo-2020
  locator: '**verified absence**: `bfo-core.ttl`, fetched and read directly 2026-07-04'
  entry_notes: Consistent with BFO's general austerity about quantitative/measurement machinery
    — no Number, Quantity, or Amount-of-matter class exists at all in this module.
- source: DOLCE
  term_or_identifier: Amount-of-matter
  dimension: technical
  source_claim_type: direct quotation
  text: '"The common trait of amounts of matter is that they are endurants with no unity (according
    to Gangemi et al. 2001 none of them is an essential whole). Amounts of matter — ''stuffs''
    referred to by mass nouns like ''gold'', ''iron'', ''wood'', ''sand'', ''meat'', etc.
    — are mereologically invariant, in the sense that they change their identity when they
    change some parts." `rdfs:subClassOf physical-endurant`.'
  reference:
  - xwkont:ref:dolce-lite-owl
  locator: '**verified**: `DOLCE-Lite.owl`, class `#amount-of-matter`, fetched and read directly
    2026-07-04'
  entry_notes: A `physical-endurant` — the physical/concrete side, not DOLCE's own `abstract`
    branch (already documented in `abstract-concrete.md`). "Mereologically invariant... change
    identity when they change some parts" is a genuine no-unity criterion, directly relevant
    to the planned Mereology/Parthood/Aggregate crosswalk.
- source: SUMO
  term_or_identifier: Quantity (+ Number, PhysicalQuantity)
  dimension: technical
  source_claim_type: direct quotation
  text: '"Any specification of how many or how much of something there is. Accordingly, there
    are two subclasses of Quantity: Number (how many) and PhysicalQuantity (how much)." `(subclass
    Quantity Abstract)`. PhysicalQuantity: "a measure of some quantifiable aspect of the modeled
    world... Although the name and definition of PhysicalQuantity is borrowed from physics,
    a PhysicalQuantity need not be material... nonphysical dimensions such as currency are
    also possible." `(partition PhysicalQuantity ConstantQuantity FunctionQuantity)`.'
  reference:
  - xwkont:ref:sumo-niles-pease-2001
  locator: '**verified**: current `Merge.kif`, fetched and read directly 2026-07-04'
  entry_notes: The only source classifying this concept as Abstract, not physical/concrete
    — the opposite orientation from DOLCE/UFO/GFO. SUMO's own documentation explicitly notes
    PhysicalQuantity "need not be material" (currency is a worked example) — a broader, measurement-centric
    reading than DOLCE's/UFO's mass-noun-stuff sense.
- source: UFO
  term_or_identifier: Quantity
  dimension: technical
  source_claim_type: direct quotation
  text: '"The term quantity is reserved for substantials that are maximally-topologically-self-connected
    of homeomerous amounts of matter, e.g., that puddle of water, this particular pile of
    sand." One of three partition members of `Substantial` (`Object`, `Collective`, `Quantity`),
    themselves one of six leaf categories that jointly partition `Endurant`.'
  reference:
  - xwkont:ref:ufo-2021
  locator: '**verified**: 2021 Applied Ontology paper, already-extracted text re-searched
    directly 2026-07-04'
  entry_notes: A `Substantial` — UFO's endurant-equivalent branch — not an abstract category.
    Near-identical worked examples to DOLCE's ("puddle of water"/"pile of sand" vs. DOLCE's
    "gold"/"iron"/"wood"/"sand"/"meat"), both converging on homeomerous, unity-lacking physical
    stuff.
- source: UFO
  term_or_identifier: quantity (stereotype) / quantityNature
  dimension: technical
  source_claim_type: direct quotation
  text: '`ontouml:quantity`: "Construct used to represent rigid concepts that provide an identity
    principle for their instances." `ontouml:quantityNature`: "Indicates that the restricted
    type includes quantity individuals among its instances."'
  reference:
  - xwkont:ref:ontouml-vocabulary
  locator: '**verified**: `ontouml.ttl`, fetched and read directly 2026-07-04'
  entry_notes: Confirms `TODO.md`'s seed naming exactly (`quantity` stereotype, `quantityNature`)
    — these are OntoUML's own modeling-notation vocabulary terms, not the 2021 paper's own
    prose (which uses plain "Quantity"), consistent with `docs/methodology/primary-source-verification.md`'s
    established UFO/gUFO/OntoUML distinction.
- source: GFO
  term_or_identifier: Amount of substrate (+ Mass_entity)
  dimension: technical
  source_claim_type: direct quotation
  text: 'No `rdfs:comment`/`skos:definition` prose exists for this class in the fetched module
    — only the label, subclass axioms, and an `owl:equivalentClass` link. `rdfs:subClassOf`
    both `Continuous` and `Presential`; `owl:equivalentClass Mass_entity`. `Mass_entity` itself:
    `rdfs:subClassOf Continuous`, `Presential`; `owl:disjointWith Discrete_presential`.'
  reference:
  - xwkont:ref:gfo
  locator: '**verified**: `modules/gfo-base.owl`, class `Amount_of_substrate`, fetched and
    read directly 2026-07-04'
  entry_notes: A `Presential` (GFO's endurant-equivalent branch, per the established `time.md`/`space.md`
    findings) — not `Abstract`. GFO is the only source among the four "physical stuff" sources
    to leave this class without prose definition, relying entirely on its equivalence to `Mass_entity`
    and its position in the `Continuous`/`Discrete` split.
- source: YAMATO
  term_or_identifier: Quantity
  dimension: philosophical
  source_claim_type: direct quotation
  text: '"Now, what is quantity? Philosophically speaking, quantity is generically-dependent
    entity in the sense that while it is not specifically-dependent on any physical entity,
    it cannot exist if all physical objects... disappear from the world... There are two kinds
    of quantity: true quantity and its measurement... True quantity is unit-independent. A
    length quantity is independent of how long 1m is." Further subdivided into `quantitative
    quantity` and `qualitative quantity`.'
  reference:
  - xwkont:ref:yamato-mizoguchi-2010
  locator: '**verified**: 2010 technical report, full extracted text re-searched directly
    2026-07-04'
  entry_notes: '**Not the same sense as DOLCE''s/UFO''s/GFO''s mass-noun-stuff Quantity**
    — see `note-002`. YAMATO''s own text explicitly frames quantity as a generically-dependent,
    unit-independent *value*-like entity (a "true quantity" distinct from its measurement),
    structurally much closer to DOLCE''s `quale`/quality-value apparatus than to DOLCE''s
    own `amount-of-matter`.'
- source: TUpper
  term_or_identifier: '*(informal predicates only, no reified class)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: '`amount`: "d is a member of the class of quantities used to measure the amount of
    some chunk of matter... The set of amounts forms a vector space." `mass`/`physical_mass`:
    "d is the amount of the chunk of matter m" / "...that constitutes x." `constitutes`: "m
    is the matter that constitutes the material object x."'
  reference:
  - xwkont:ref:tupper-colore
  locator: '**verified absence, informal only**: `TUpper-Terms.html`, fetched and read directly
    2026-07-04'
  entry_notes: No `Quantity`/`AmountOfMatter` predicate or class is separately declared —
    `amount`/`mass`/`constitutes` are relations connecting a matter-quantity value to a material
    object, not a reified stuff-category the way DOLCE's/UFO's/GFO's classes are.
- source: GUM
  term_or_identifier: Quantity (+ QuantityAscription)
  dimension: technical
  source_claim_type: direct quotation
  text: '`Quantity`: "The relation of ascribing a quantity to some entity. This contrasts
    with NumberFocusing, which provides information additional to the value of the quantity
    being ascribed, e.g. a range bounded by some value." `rdfs:subClassOf QuantityAscription`.
    `QuantityAscription`: "The relation of ascribing a quantity to an entity." `rdfs:subClassOf
    Ascription`.'
  reference:
  - xwkont:ref:gum-owl
  locator: '**verified**: `GUM-31.owl`, classes `#Quantity`/`#QuantityAscription`, fetched
    and read directly 2026-07-04'
  entry_notes: Not credited in `TODO.md`'s seed. A linguistic ascription *relation* (how a
    clause predicates a quantity of something), not an entity-denoting class — the same relation-not-entity
    pattern already found for other GUM classes across this batch; there is no GUM entity
    class analogous to DOLCE's `amount-of-matter` or UFO's `Quantity`.
