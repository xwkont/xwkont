uncertainties:
- item_id: uncertainty-001
  uncertainty_type: open-question
  resolved: false
  description: Where should `xwkont-core:Quantity`/`AmountOfMatter` subclass from once added
    to `data/ontology/core.ttl`? Three of four "physical stuff" sources (DOLCE, UFO, GFO)
    treat it as physical/concrete, but SUMO's Abstract-side placement and YAMATO's distinct
    quality-value-like sense mean there is no clean majority the way there almost was for
    Abstract vs. Concrete's own placement question.
  impact: Blocks final core.ttl placement; does not block continuing this crosswalk's research/review.
  follow_up: Decide at review time, likely informed by how `abstract-concrete.md`'s own still-open
    placement question (`uncertainty-001` there) resolves, since this concept sits astride
    that split in different ways per source.
- item_id: uncertainty-002
  uncertainty_type: non-equivalence
  resolved: false
  description: YAMATO's "quantity" denotes a quality-value-like generically-dependent entity,
    not mass-noun stuff — a genuine sense divergence from DOLCE's/UFO's/GFO's usage, confirmed
    by direct quotation (`note-002`). This crosswalk records the correspondence with an explicit
    non-equivalence caveat rather than omitting it, since the identical English label makes
    silent conflation a real risk for future readers.
  impact: Affects how `mapping-005`/`mapping-006` should be read — not a straightforward cross-source
    correspondence.
  follow_up: None outstanding; recorded here and in `note-002` for traceability.
- item_id: uncertainty-003
  uncertainty_type: non-equivalence
  resolved: false
  description: BFO has no reified Quantity/Number/Amount-of-matter class anywhere in `bfo-core.ttl`
    — confirmed by a full-text grep for both terms (case-insensitive), returning zero matches.
  impact: No BFO correspondence recorded.
  follow_up: None outstanding; this is treated as a confirmed, structural absence, not a gap
    needing further fetching — consistent with BFO's general minimalism about quantitative/measurement
    machinery already observed across this batch.
- item_id: uncertainty-004
  uncertainty_type: non-equivalence
  resolved: false
  description: '**Policy decided 2026-07-04, in response to external review:** a source''s
    relation-only treatment of a concept (GUM''s `Quantity`/`QuantityAscription`) stays recorded
    in the Source Ontology Correspondences table, with an explicit type-mismatch caveat in
    both the Inclusion Rationale column and a supporting Semantic Comparison Note — it is
    not moved to Source Definitions/Semantic Notes only. Rationale: omitting it from Correspondences
    would silently under-represent GUM''s actual coverage of this concept (it does address
    quantity, just relationally, not as an entity), and this repository''s established practice
    (`docs/methodology/primary-source-verification.md`) is to record negative/partial findings
    explicitly rather than omit them — a relation-only correspondence with a caveat is the
    partial-finding case, not a new category needing its own claim type.'
  impact: Resolves the "decide relation-only correspondence policy" item flagged by the 2026-07-04
    external review; no change needed to `correspondence-006`'s
    existing caveat, which already implements this policy.
  follow_up: If a future crosswalk needs a *third* mapping-table row shape (neither entity-correspondence
    nor the existing caveated-relation pattern), revisit `docs/methodology/crosswalk-methodology.md`
    then — not needed for the pattern seen so far (GUM across Time, Space, Quantity).
