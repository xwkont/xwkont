local_identifier: xwkont:concept:quantity-amount-of-matter
slug: quantity-amount-of-matter
title: Quantity / Amount of Matter
editorial_status: reviewed
created: "2026-07-04"
modified: "2026-07-05"
scope_note: '**Selection rationale (per `ADR-0018`''s admission bar):** Quantity / Amount
  of Matter is the fourth concept drafted from the `0.2.0` batch. Direct primary-source verification
  this session found a nameable category in **6 of the 8 source ontologies** (DOLCE `amount-of-matter`,
  SUMO `Quantity`, UFO `Quantity`, GFO `Amount_of_substrate`, YAMATO `quantity`, GUM `Quantity`)
  — two more sources than `TODO.md`''s seed credited (the seed listed only SUMO, DOLCE, GFO,
  UFO; this pass additionally found YAMATO''s own elaborate quantity apparatus and GUM''s
  `Quantity`, both previously uncredited). BFO and TUpper were confirmed to have no reified
  class of this kind.



  This crosswalk compares each source ontology''s own treatment of quantity/amount-of-matter
  as a category — mass-noun-denoted stuff ("gold," "water," "sand") or a measured/graded quantitative
  entity — distinct from Quality (already `reviewed` in `quality.md`, which covers qualitative
  *properties* like color or shape, not amount-like entities) and from Number/measurement
  machinery treated as a sub-branch where a source has one. Sources compared: BFO, DOLCE,
  SUMO, UFO, GFO, YAMATO, TUpper, GUM (per `ADR-0015`''s 8-source scope).



  **This label covers (at least) four distinct senses across the 6 sources with content, made
  explicit here per a 2026-07-04 external review pass
  rather than left implicit in the notes below:**

  1. **mass-noun stuff / amount of matter** — a physical, no-unity, mereologically-invariant
  category: DOLCE `amount-of-matter`, UFO `Quantity`, GFO `Amount_of_substrate` (`note-001`,
  `note-004`).

  2. **measurement/specification quantity** — an Abstract, "how many/how much" category that
  need not be material (SUMO''s own worked example is currency): SUMO `Quantity`/`PhysicalQuantity`
  (`note-001`).

  3. **value-like true quantity** — a generically-dependent, unit-independent value distinct
  from its own measurement, closer to a quale than to mass-noun stuff: YAMATO `quantity` (`note-002`).

  4. **linguistic quantity-ascription relation** — not an entity at all, but the clause-level
  relation of predicating a quantity of something: GUM `Quantity`/`QuantityAscription` (`note-003`).



  These four senses are related by family resemblance and a shared English label, not by a
  single underlying commitment — this crosswalk records all four under one `xwkont:concept:quantity-amount-of-matter`
  identifier because `TODO.md`''s seed and `ADR-0018`''s admission bar treat them as one candidate,
  but the eventual core.ttl placement (`uncertainty-001`) should not assume they resolve to
  one class.



  **Cross-cutting finding, established this session:** three of the four sources with a "physical
  stuff" reading of this concept (DOLCE, UFO, GFO) converge on classifying it as **physical/concrete**,
  alongside or under their own material-endurant-equivalent branch — DOLCE''s `amount-of-matter`
  is a `physical-endurant`; UFO''s `Quantity` is a leaf of `Substantial` (endurant-equivalent),
  defined as "maximally-topologically-self-connected... of homeomerous amounts of matter";
  GFO''s `Amount_of_substrate` is `Continuous`+`Presential` (equivalent to `Mass_entity`).
  **SUMO alone classifies `Quantity` as Abstract** — the opposite side of its own top-level
  split from where the other three sources'' equivalent categories sit — a divergence structurally
  parallel to (though the reverse orientation of) the BFO-vs-rest pattern `time.md` found
  for Time. YAMATO''s own "quantity" is a genuine citation-precision trap: it denotes a *quality-value*-like
  generically-dependent entity (closer to DOLCE''s `quale`/quality-value machinery than to
  DOLCE''s/UFO''s/GFO''s amount-of-matter sense), not a mass-noun-stuff category — see `note-002`.
  GUM''s `Quantity` is a linguistic *ascription relation* (how a quantity is predicated of
  an entity in a clause), not an entity class at all — the same relation-not-entity pattern
  GUM showed for other `0.2.0`-batch concepts. See `note-001`.



  Exclusions: this crosswalk does not address Quality (already `reviewed`; `quality.md` already
  covers the qualitative-property side of the Quality/Quantity distinction that both SUMO''s
  and YAMATO''s own documentation explicitly discuss) or Mereology/Parthood/Aggregate (a separate
  `0.2.0`-batch candidate; DOLCE''s `amount-of-matter`''s "mereologically invariant" character
  and UFO''s "maximally-topologically-self-connected" criterion are directly relevant background,
  noted below but not crosswalked here).



  **Core.ttl placement is deliberately left open at this `draft` stage**, for the same reasons
  as the three prior `0.2.0`-batch crosswalks. No `xwkont-core:Quantity`/`AmountOfMatter`
  class exists yet in `data/ontology/core.ttl` — see Uncertainty.'
