comparison_notes:
- note_id: note-001
  dimension: philosophical
  claim_type: editorial observation
  note: 'Unlike Time (where 5 of 6 sources with a Time category converged on treating it as
    independent of the occurrent/continuant split, per `time.md`''s `note-001`), Space shows
    no comparable majority: BFO classifies `spatial region` as a **Continuant**; DOLCE files
    `space-region` as an independent abstract region (same pattern as its own Time treatment);
    SUMO files `Region` under `Object`/`Physical`, opposite `TimeMeasure`''s `Abstract` side;
    GFO makes `Space` an explicit sibling of `Time` under `Space_time` (same pattern as its
    own Time treatment); GUM gives `Space` the same dual-parented, `SpatialTemporal`-descended
    structure as `Time` (same pattern). Only BFO and SUMO treat Space and Time as occupying
    genuinely opposed top-level branches; DOLCE, GFO, and GUM instead treat them as siblings
    of the same kind. This is a different, more fragmented divergence pattern than Time''s
    own central finding, not a simple restatement of it.'
  supporting_references:
  - xwkont:ref:bfo-2020
  - xwkont:ref:dolce-lite-owl
  - xwkont:ref:sumo-niles-pease-2001
  - xwkont:ref:gfo
  - xwkont:ref:gum-owl
  confidence: high
- note_id: note-002
  dimension: philosophical
  claim_type: editorial observation
  note: Three sources (DOLCE, GFO, GUM) give Space and Time an explicit shared parent category
    (`region`/`abstract`, `Space_time`, `SpatialTemporal` respectively) — resolving `time.md`'s
    `uncertainty-004` affirmatively for exactly these three sources. BFO and SUMO instead
    place Space and Time on opposite, non-sibling branches (Continuant/Occurrent; Physical/Abstract
    respectively), connected in BFO's case only via a defined cross-branch relation (`spatially
    projects onto`), not a shared ancestor.
  supporting_references:
  - xwkont:ref:dolce-lite-owl
  - xwkont:ref:gfo
  - xwkont:ref:gum-owl
  - xwkont:ref:bfo-2020
  - xwkont:ref:sumo-niles-pease-2001
  confidence: high
- note_id: note-003
  dimension: philosophical
  claim_type: editorial observation
  note: 'YAMATO''s informal treatment of Space is more load-bearing than its treatment of
    Time: Space is a named criterial term in two of YAMATO''s own top-level distinctions ("Substrate
    and entity" — space and time are jointly indispensable and entity-independent; the Physical/semi-abstract/abstract
    split, where "nothing... requires only space to exist" is itself a defining disjunction),
    whereas Time''s mentions in the same document (per the existing `time.md`/`ref-yamato-mizoguchi-2010.md`
    record) were purely incidental usage ("an action exists in an open interval..."). Neither
    is a reified class, but Space''s absence is a materially different kind of absence — informally
    load-bearing vs. informally incidental.'
  supporting_references:
  - xwkont:ref:yamato-mizoguchi-2010
  confidence: medium
- note_id: note-004
  dimension: technical
  claim_type: editorial observation
  note: 'GUM''s Space apparatus is split across two artifacts: the small, Time-parallel core
    (`Space`/`SpaceInterval`/`SpacePoint`/`SpatialObject` in `GUM-3.owl`) and a much larger
    separate module (`GUM-3-space.owl`, 60+ classes) elaborating directional, topological,
    and deictic relations (`GeneralizedLocation`, named projections, cardinal directions)
    with no Time-side counterpart at all. This is a genuine structural asymmetry between GUM''s
    Time and Space treatment, not merely a difference in verbosity — Time has no analogous
    second module.'
  supporting_references:
  - xwkont:ref:gum-owl
  confidence: high
- note_id: note-005
  dimension: technical
  claim_type: editorial observation
  note: TUpper's spatial predicates (`spatial_region`, `Curve`, `ArealRegion`, `VoluminalRegion`)
    are documented with informal-semantics prose but are not shown, in either the HTML terms
    document or the OWL rendering, as formal subclasses of TUpper's four flat top-level classes
    — unlike `timepoint`, which `time.md` found explicitly named inside the top-level `owl:Thing`
    union axiom. Space did not receive the same top-level promotion Time did in this source.
  supporting_references:
  - xwkont:ref:tupper-colore
  confidence: high
