uncertainties:
- item_id: uncertainty-001
  uncertainty_type: non-equivalence
  resolved: false
  description: This crosswalk's own research found that GUM's `NonConsciousThing` (an ancestor
    of `SpatialTemporal`, hence of both `SpatialObject`/`Space` and `TemporalObject`/`Time`)
    is itself `rdfs:subClassOf SimpleThing`. This **corrects `time.md`'s existing claim**
    ("Neither `Process` ... nor `SimpleThing`/`DecomposableObject` ... is an ancestor of any
    GUM temporal class") — `SimpleThing` *is* an ancestor of GUM's `Time`, several levels
    up via `TemporalObject → SpatialTemporal → NonConsciousThing → SimpleThing`, confirmed
    by direct inspection of `GUM-31.owl`'s `NonConsciousThing` block this session. By the
    same chain, GUM's `Space` also descends from `SimpleThing`.
  impact: '`time.md`''s Source Definitions row and `note-003` (GUM) state the ancestor claim
    incorrectly; does not affect this crosswalk''s own GUM correspondence, which cites the
    correct chain.'
  follow_up: Correct `time.md`'s GUM row and its `note-003` at that document's next revision,
    referencing this crosswalk's directly-verified ancestor chain.
- item_id: uncertainty-002
  uncertainty_type: open-question
  resolved: false
  description: 'Where should `xwkont-core:Space` subclass from once added to `data/ontology/core.ttl`?
    Unlike Time (where `uncertainty-001` there posed one open question against one dominant
    non-BFO pattern), Space''s classification evidence is three-way split (BFO: continuant;
    DOLCE/GFO/GUM: independent sibling-of-Time category; SUMO: physical/concrete) with no
    clear majority to lean on. Whatever placement is chosen should be made jointly with (or
    at least cross-checked against) `time.md`''s own eventual placement, given how many sources
    treat Space and Time as siblings.'
  impact: Blocks final core.ttl placement; does not block continuing this crosswalk's research/review.
  follow_up: Decide at review time, jointly with `time.md`'s own still-open `uncertainty-001`.
- item_id: uncertainty-003
  uncertainty_type: non-equivalence
  resolved: false
  description: UFO has no reified Space/SpatialRegion/Location class — confirmed this session
    by direct full-text search of the already-extracted 2021 paper (zero occurrences of six
    candidate terms) and the OntoUML vocabulary TTL fallback (also zero). A prior research
    pass on this same concept, run in parallel, reported being unable to access the paper
    at all and left UFO's status formally unresolved — that report is superseded by this session's
    own direct, successful full-text search of the cached extraction already on file for `xwkont:ref:ufo-2021`.
  impact: No UFO correspondence recorded (`correspondence-004`, `mapping-009`).
  follow_up: Re-check if UFO-A/UFO-C literature (already flagged as unfetched for `information-artifact.md`
    and `time.md`) becomes accessible.
- item_id: uncertainty-004
  uncertainty_type: open-question
  resolved: false
  description: This crosswalk does not address Boundary/Site (a separate `0.2.0`-batch candidate),
    though BFO's `site` (an immaterial entity closely related to but distinct from `spatial
    region`) and GFO's `Spatial_boundary`/`Surface` are directly relevant background for that
    future crosswalk.
  impact: Scopes this crosswalk to Space only, consistent with `ADR-0018`'s one-concept-per-pass
    process.
  follow_up: Create the Boundary/Site concept crosswalk later in the `0.2.0` batch (per `TODO.md`),
    and cross-check BFO's `site`/GFO's `Spatial_boundary` against this crosswalk's `spatial
    region`/`Space` findings.
- item_id: uncertainty-005
  uncertainty_type: open-question
  resolved: false
  description: TUpper's `MaterialObject`/`ShapedObject` classes exist as bare OWL declarations
    in `owl/tupper.all.owl` with no prose gloss in either the OWL file's comments or `TUpper-Terms.html`.
    Their exact relationship to `spatial_region`/`physical_body` is not stated anywhere fetched.
  impact: Does not affect this crosswalk's own TUpper correspondence (`spatial_region`/`Curve`/`ArealRegion`/`VoluminalRegion`,
    all of which do have prose definitions), but flags an incompleteness in TUpper's own public
    documentation.
  follow_up: Re-check if TUpper gains fuller documentation, or if the CLIF file (`tupper.clif`)
    contains axioms connecting these classes that the OWL rendering omits.
