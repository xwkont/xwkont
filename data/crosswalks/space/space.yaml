source_definitions:
- source: BFO
  term_or_identifier: Spatial region (BFO_0000006)
  dimension: technical
  source_claim_type: direct quotation
  text: '"(Elucidation) A spatial region is a continuant entity that is a continuant part
    of the spatial projection of a portion of spacetime at a given time." `dc11:identifier
    "035-BFO"`. `rdfs:subClassOf` immaterial entity (BFO_0000141) → independent continuant
    (BFO_0000004) → continuant (BFO_0000002).'
  reference:
  - xwkont:ref:bfo-2020
  locator: '**verified**: `bfo-core.ttl`, class BFO_0000006, fetched and read directly 2026-07-04'
  entry_notes: The formal axioms place spatial region squarely as a Continuant — the direct
    structural opposite of BFO's own `temporal region` (Occurrent, per `time.md`). `independent
    continuant`'s own elucidation lists "a spatial region" as a worked example, reinforcing
    this.
- source: BFO
  term_or_identifier: Zero-/one-/two-/three-dimensional spatial region (BFO_0000018 / BFO_0000026
    / BFO_0000009 / BFO_0000028)
  dimension: technical
  source_claim_type: direct quotation
  text: 'Zero-dim: "one or a collection of more than one spatially disjoint points in space"
    (id `037-BFO`). One-dim: "a whole consisting of a line together with zero or more lines
    which may have points as parts" (id `038-BFO`). Two-dim: "a spatial region that is a whole
    consisting of a surface together with zero or more surfaces which may have spatial regions
    of lower dimension as parts" (id `039-BFO`). Three-dim: "a whole consisting of a spatial
    volume together with zero or more spatial volumes which may have spatial regions of lower
    dimension as parts" (id `040-BFO`). All four `rdfs:subClassOf` BFO_0000006.'
  reference:
  - xwkont:ref:bfo-2020
  locator: '**verified**: `bfo-core.ttl`, fetched and read directly 2026-07-04; each class''s
    `dc11:identifier` and label individually confirmed against the surrounding `###` block
    header'
  entry_notes: Mirrors `time.md`'s BFO row structure exactly (four dimensional subtypes each),
    the same shape found for Time.
- source: BFO
  term_or_identifier: Site (BFO_0000029) / spatiotemporal region (BFO_0000011)
  dimension: technical
  source_claim_type: direct quotation
  text: 'Site: "a three-dimensional immaterial entity whose boundaries either (partially or
    wholly) coincide with the boundaries of one or more material entities or have locations
    determined in relation to some material entity" (id `034-BFO`), `rdfs:subClassOf` immaterial
    entity — a related but distinct three-dimensional category from `spatial region` (out
    of scope here, see Boundary/Site exclusion). Spatiotemporal region: "an occurrent that
    is an occurrent part of spacetime" (id `095-BFO`), `rdfs:subClassOf` occurrent. A `spatially
    projects onto` relation connects a spatiotemporal region to a spatial region: "spatially
    projects onto is a relation between some spatiotemporal region b and spatial region c
    such that at some time t, c is the spatial extent of b at t."'
  reference:
  - xwkont:ref:bfo-2020
  locator: '**verified**: `bfo-core.ttl`, fetched and read directly 2026-07-04'
  entry_notes: Confirms BFO keeps Space (continuant) and spatiotemporal/Time (occurrent) on
    opposite sides of its top split, connected only via a defined cross-branch relation, not
    a shared ancestor — the opposite pattern from GFO's shared `Space_time` branch.
- source: DOLCE
  term_or_identifier: Space-region
  dimension: technical
  source_claim_type: direct quotation
  text: '"An ordinary space: geographical, cosmological, anatomical, topographic, etc." `rdfs:subClassOf
    physical-region`.'
  reference:
  - xwkont:ref:dolce-lite-owl
  locator: '**verified**: `DOLCE-Lite.owl`, fetched and read directly 2026-07-04'
  entry_notes: Corrects an implicit slash-notation reading of the TODO.md seed ("`physical-region`/`space-region`")
    — these are not two independent alternatives but parent (`physical-region`) and child
    (`space-region`).
- source: DOLCE
  term_or_identifier: Physical-region (+ region, abstract-region)
  dimension: technical
  source_claim_type: direct quotation
  text: 'Physical-region: "A region at which only physical qualities can be directly located.
    It assumes some metrics for physical properties." `rdfs:subClassOf region`; `owl:disjointWith
    temporal-region`, `owl:disjointWith abstract-region`. `region` itself is one of the four
    partition members of DOLCE''s root `particular` category, alongside `endurant`, `perdurant`,
    and `quality`.'
  reference:
  - xwkont:ref:dolce-lite-owl
  locator: '**verified**: `DOLCE-Lite.owl`, fetched and read directly 2026-07-04'
  entry_notes: Same `region`/`abstract` branch already documented for `time.md`'s `temporal-region`
    — Space and Time are explicit siblings here, `owl:disjointWith` each other but structurally
    identical in kind (both abstract quality-space regions).
- source: DOLCE
  term_or_identifier: Spatio-temporal-region
  dimension: technical
  source_claim_type: direct quotation
  text: '"Any region resulting from the composition of a space region with a temporal region,
    i.e. being present in region r at time t." `rdfs:subClassOf space-region` — filed under
    the spatial side, not as an equal-parentage sibling of both.'
  reference:
  - xwkont:ref:dolce-lite-owl
  locator: '**verified**: `DOLCE-Lite.owl`, fetched and read directly 2026-07-04'
  entry_notes: An asymmetric combination class (space-region's child, not a neutral joint
    child of both), unlike BFO's `spatiotemporal region` which sits entirely on the occurrent
    side.
- source: SUMO
  term_or_identifier: Region (+ GeographicArea, HoleRegion, Transitway)
  dimension: technical
  source_claim_type: direct quotation
  text: '"A topographic location. Regions encompass surfaces of Objects, imaginary places,
    and GeographicAreas. Note that a Region is the only kind of Object which can be located
    at itself. Note too that Region is not a subclass of SelfConnectedObject, because some
    Regions, e.g. archipelagos, have parts which are not connected with one another." `(subclass
    Region Object)` — a literal, direct assertion. Subclass chain: `Entity → Physical → Object
    → Region`.'
  reference:
  - xwkont:ref:sumo-niles-pease-2001
  locator: '**verified**: current `Merge.kif`, fetched and read directly 2026-07-04'
  entry_notes: Confirms the TODO.md seed's flagged divergence exactly. `Region` sits alongside
    `SelfConnectedObject` as an `Object` subtype (the documentation explicitly disclaims Region
    being a subtype of SelfConnectedObject) — Region and Time's `TimeMeasure` are on opposite
    sides of SUMO's `Physical`/`Abstract` split, mirroring (via a different distinction) BFO's
    continuant/occurrent opposition.
- source: UFO
  term_or_identifier: '*(no class — zero occurrences of spatial vocabulary)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: Full-text search of the already-extracted 2021 Applied Ontology paper text (9,048
    lines) for "spatial," "region," "location," "place," "topology," and "space" (word-boundary
    match) returned **zero matches for all six terms**.
  reference:
  - xwkont:ref:ufo-2021
  locator: '**verified absence**: 2021 Applied Ontology paper, already-extracted text re-searched
    directly 2026-07-04'
  entry_notes: 'The OntoUML vocabulary TTL (`xwkont:ref:ontouml-vocabulary`) was also checked
    as a fallback by the research pass: zero occurrences of "space"/"spatial"/"region" there
    either. Both UFO''s Time and Space content are confirmed fully absent from the reified
    class structure — a stronger, cleaner absence finding than Time''s (which had at least
    a "unfold in time" property reference).'
- source: GFO
  term_or_identifier: Space (+ Space_time)
  dimension: technical
  source_claim_type: direct quotation
  text: '"GFO uses Brentano space." `rdfs:subClassOf Space_time`; `owl:disjointWith Time`.
    `Space_time` (`rdfs:subClassOf Individual`, `owl:disjointWith Abstract`, `owl:disjointWith
    Concrete`) is the same sui generis third top-level branch already documented in `time.md`
    for GFO''s `Time`.'
  reference:
  - xwkont:ref:gfo
  locator: '**verified**: `modules/gfo-base.owl`, fetched and read directly 2026-07-04'
  entry_notes: The cleanest, most literal Space/Time sibling-pairing found among all 8 sources
    — both are direct children of the same named parent class, mutually disjoint, neither
    reducible to the other.
- source: GFO
  term_or_identifier: Spatial_region / Spatial_boundary / Topoid / Surface
  dimension: technical
  source_claim_type: direct quotation
  text: 'Spatial_region (source''s own `rdfs:label` reads "Spacial region" — sic, a typo in
    the primary file itself, not a transcription error introduced here): "Space regions are
    mereological sums of topoids." `rdfs:subClassOf Space`; `owl:disjointWith Spatial_boundary`.
    Spatial_boundary: "Boundaries of regions are surfaces, boundaries of surfaces are lines,
    and boundaries of lines are points. As in the case of time-boundaries, spatial boundaries
    have no independent existence, i.e. they depend on the spatial entity of which they are
    boundaries." Topoid: "Topoids are connected compact regions of space. They have spatial
    boundaries." `rdfs:subClassOf Spatial_region`. Surface: `rdfs:subClassOf Spatial_boundary`.'
  reference:
  - xwkont:ref:gfo
  locator: '**verified**: `modules/gfo-base.owl`, fetched and read directly 2026-07-04'
  entry_notes: Near-exact structural mirror of GFO's already-documented Time apparatus (`Temporal_region`/`Time_boundary`/`Chronoid`)
    — `Topoid` is GFO's spatial analog of `Chronoid`.
- source: YAMATO
  term_or_identifier: '*(none found in the fetchable document, but a load-bearing informal
    role)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: '"Space and time are indispensable for things to exist in the world, while these two
    can exist independently of entities" (heading: "Substrate and entity" — one of YAMATO''s
    named basic distinctions). "We define a physical thing as something which needs time and
    space to exist, and introduce semi-abstract which needs only time to exist. Needless to
    say, there is nothing which requires only space to exist." (Physical/semi-abstract/abstract
    split.) No defined `Space`/`SpatialRegion` class anywhere in the extracted text; the one
    hit for "region" is YAMATO''s own description of DOLCE''s "Quality space(region)," not
    a YAMATO class.'
  reference:
  - xwkont:ref:yamato-mizoguchi-2010
  locator: '**verified absence, scoped**: 2010 technical report, full-text re-searched 2026-07-04'
  entry_notes: Same scoped-absence pattern as Time, but Space is given a materially richer
    informal role — it is one criterial term in two of YAMATO's own named top-level distinctions,
    where Time appears only as incidental usage. See `note-003`.
- source: TUpper
  term_or_identifier: Spatial_region (+ spatial_part, spatial_C, occupies)
  dimension: technical
  source_claim_type: direct quotation
  text: '"(spatial_region r) is TRUE in an interpretation of TUpper if and only if r is a
    member of the class of spatial regions in the universe of discourse of the interpretation.
    The set of spatial regions forms a mereotopology." `occupies`: "the physical body x is
    located in the spatial region r. The mereotopology of physical bodies is preserved by
    this relation."'
  reference:
  - xwkont:ref:tupper-colore
  locator: '**verified**: `TUpper-Terms.html`, "Spatial Modules" section, fetched and read
    directly 2026-07-04'
  entry_notes: Expressed as CLiF unary/binary predicates with informal-semantics glosses,
    not `rdfs:subClassOf` axioms — no explicit subclass link to TUpper's four flat top-level
    classes (`object`/`activity`/`activity_occurrence`/`timepoint`) exists in this document,
    unlike `timepoint`'s own explicit top-level-union membership documented in `time.md`.
- source: TUpper
  term_or_identifier: Curve / ArealRegion / VoluminalRegion
  dimension: technical
  source_claim_type: direct quotation
  text: 'Curve: "x is a member of the class of one-dimensional spatial entities in the universe
    of discourse of the interpretation." ArealRegion: "...two-dimensional spatial entities..."
    VoluminalRegion: "...three-dimensional spatial entities...".'
  reference:
  - xwkont:ref:tupper-colore
  locator: '**verified**: `TUpper-Terms.html`, "FOUnt Modules" section, fetched and read directly
    2026-07-04'
  entry_notes: Confirms 3 of the 5 class names in TODO.md's seed exactly.
- source: TUpper
  term_or_identifier: MaterialObject / ShapedObject
  dimension: technical
  source_claim_type: direct quotation
  text: 'Neither term has any prose gloss in `TUpper-Terms.html` — both are absent from that
    document entirely. Both exist only as bare, undocumented `Declaration`s in the separate
    OWL rendering `owl/tupper.all.owl`: `<Declaration><Class IRI="MaterialObject"/></Declaration>`
    (with a `SubClassOf` restriction on the inverse of `constitutes`), and `<Declaration><Class
    IRI="ShapedObject"/></Declaration>` (with a `SubClassOf` restriction via `bounds`/`ShapeFeature`).'
  reference:
  - xwkont:ref:tupper-colore
  locator: '**verified, corrected**: `owl/tupper.all.owl`, fetched and read directly 2026-07-04
    (path now live, correcting `ref-tupper-colore.md`''s prior 404 note)'
  entry_notes: Corrects TODO.md's seed, which listed these alongside `VoluminalRegion`/`ArealRegion`/`Curve`
    as though equally documented — they are real IRIs but carry no primary-source prose definition
    anywhere fetched, unlike the other three. Record as existing-but-undefined, not on equal
    footing.
- source: GUM
  term_or_identifier: Space (+ SpaceInterval, SpacePoint)
  dimension: technical
  source_claim_type: direct quotation
  text: 'Space: "Space as an undecomposable mass." `rdfs:subClassOf` both `SpatialObject`
    and `Substance` (dual parentage, exactly mirroring `Time`''s dual parentage under `Substance`/`TemporalObject`);
    `owl:disjointWith SpaceInterval`, `SpacePoint`, `Time`. SpaceInterval: "Space as a decomposible
    set of points, intervals, or volumes." `rdfs:subClassOf OrderedObject`, `SpatialObject`;
    `owl:disjointWith SpacePoint`, `TimeInterval`. SpacePoint: "Space as a point." `rdfs:subClassOf
    NonDecomposableObject`, `SpatialObject`; `owl:disjointWith Substance`, `TimePoint`.'
  reference:
  - xwkont:ref:gum-owl
  locator: '**verified**: `GUM-31.owl`, fetched and read directly 2026-07-04 (Wayback snapshot
    re-fetched and re-confirmed directly this session after an initial contradictory research-pass
    report; resolved in this crosswalk''s favor by direct re-inspection)'
  entry_notes: Each Space class is explicitly `owl:disjointWith` its Time counterpart (`Space`/`Time`,
    `SpaceInterval`/`TimeInterval`, `SpacePoint`/`TimePoint`) — a systematic, class-by-class
    disjointness pairing not found in any other source.
- source: GUM
  term_or_identifier: SpatialObject / SpatialTemporal
  dimension: technical
  source_claim_type: direct quotation
  text: 'SpatialObject: "The general concept of spatial objects, including all points, paths,
    volumes, undivided wholes, etc." `rdfs:subClassOf SpatialTemporal`; `owl:disjointWith
    TemporalObject`. SpatialTemporal: "The generalized timespace object, under which all time
    and space objects lie." `rdfs:subClassOf NonConsciousThing`. `TemporalObject` (Time''s
    own parent, per `time.md`) is confirmed `rdfs:subClassOf SpatialTemporal` also — i.e.
    `SpatialObject` and `TemporalObject` are siblings under the shared `SpatialTemporal` parent.'
  reference:
  - xwkont:ref:gum-owl
  locator: '**verified**: `GUM-31.owl`, fetched and read directly 2026-07-04'
  entry_notes: '`SpatialTemporal` functions as GUM''s own explicit Space/Time common-parent
    category, directly analogous to GFO''s `Space_time` — see `note-002`. This also surfaces
    a correction to `time.md` — see `uncertainty-001`.'
- source: GUM
  term_or_identifier: GeneralizedLocation (+ the separate `GUM-3-space.owl` module)
  dimension: technical
  source_claim_type: direct quotation
  text: '`GUM-3-space.owl`''s own header: "This is the spatial module of GUM 3.0 which extends
    ''GUM-3.owl'' with spatial notions." Defines 60+ classes, almost entirely directional/topological
    relation types (`DirectionalRelation`, `Containment`, `Connection`, named projections
    such as `AboveProjection`/`FrontProjection`, cardinal directions, etc.), not a dimensionality
    typology. `GeneralizedLocation` functions as the general spatial-extent node (`rdfs:range`
    of properties like `destination`, `direction`), the closest functional analog to a generic
    "spatial region," though never named `Space`/`SpatialRegion` itself.'
  reference:
  - xwkont:ref:gum-owl
  locator: '**verified**: `GUM-3-space.owl` (Wayback snapshot, a separate module from core
    `GUM-3.owl`), fetched and read directly 2026-07-04'
  entry_notes: No parallel to Time's small `OneOrTwoDTime`/`ThreeDTime` dimensional typology
    exists on the Space side — GUM's spatial elaboration is oriented around directional/deictic
    relations (grounded, like its Time apparatus, in Halliday & Matthiessen's systemic-functional-linguistics
    clause theory) rather than region dimensionality. A genuine structural asymmetry between
    GUM's Time and Space modules, worth preserving rather than glossing over.
