- source: UFO
  term_or_identifier: '*(no dedicated change class found)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: 'The checked UFO 2021 paper uses `change` extensively in prose -- including two whole
    subsections, "4.3. Property change" and "4.4. Event change" -- but never introduces a
    dedicated `Change` class or formal definition (`grep`-confirmed: zero occurrences of
    "Change ::" or any capitalized standalone "Change" term). The subsections instead model
    change using UFO''s existing apparatus (Quality, Situation, Kind), e.g.: "Events are past
    entities in UFO and cannot genuinely change. Alleged change in a perdurant is thus either
    a reflection of a perdurant having temporal parts with different properties, or, a change
    in the underlying endurant that is the focus of that event."'
  reference:
  - xwkont:ref:ufo-2021
  locator: '**independently re-verified 2026-07-07** (session-051) against a complete full-text
    extraction of the 2021 paper (the DOI-linked source returned HTTP 403 again this session,
    the same recurring block recorded elsewhere in this repository; the extraction reused
    here is the same one `modality.md`, `non-physical-social-object.md`,
    `symbol-sign-representation.md`, `list-sequence.md`, and `continuous-discrete.md`
    independently located and reused for their own UFO checks). Prior review flagged this
    row as inherited from the Codex draft, not independently re-checked; now confirmed.'
  entry_notes: Prose-only usage, confirmed by independent full-text search, not merely inherited
    from the draft.
- source: YAMATO
  term_or_identifier: '*(no dedicated change class found)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: 'The checked YAMATO report has a dedicated prose subsection, "3.2.3 On change" ("in
    order to talk about change properly, we need a non-changing thing keeping its identity
    during the change process, otherwise, there cannot exist a change but just a difference"),
    but this motivates the following quality-role discussion rather than defining a first-class
    `Change` category -- no capitalized standalone "Change" term or formal definition found.'
  reference:
  - xwkont:ref:yamato-mizoguchi-2010
  locator: '**independently re-verified 2026-07-07** (session-051): `YAMATO101216.pdf`
    re-fetched fresh via the Wayback Machine snapshot and re-extracted with `pdftotext`. Prior
    review flagged this row as inherited from the Codex draft, not independently re-checked;
    now confirmed.'
  entry_notes: Prose-only usage, confirmed by independent full-text search, not merely inherited
    from the draft.
- source: TUpper
  term_or_identifier: '*(no dedicated change class found)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: No dedicated change class was found in the fetched TUpper artifacts.
  reference:
  - xwkont:ref:tupper-colore
  locator: '`TUpper-Terms.html`, `tupper.all.owl`, `tupper.clif`, fetched and read directly
    2026-07-07'
  entry_notes: Scoped absence.
- source: GUM
  term_or_identifier: '*(no dedicated change class found)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: 'Change language appears inside other class glosses (`DoingANDHappening`: "It also
