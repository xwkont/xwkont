slug: change
title: Change
editorial_status: reviewed
created: "2026-07-07"
modified: "2026-07-07"
scope_note: 'This candidate is about a source ontology''s own change apparatus, meaning change
  as a reified class or explicit family of classes, not about:



  - the instantaneous-reading case of GFO `Change` already handled in `docs/crosswalks/concepts/event.md`
  (`event:006` / `event:007`);

  - GFO `Process` versus `Change` disjointness already handled in `docs/crosswalks/concepts/process.md`;

  - ordinary prose uses of `change`, `alter`, `transform`, or `modify` inside unrelated class
  glosses.



  Direct verification leaves two positive sources, not one: GFO and SUMO. In GFO, the remaining
  uncrosswalked thread after `event.md` is the extended-process reading of `Change`, surfaced
  as `Continuous_change` and its deprecated equivalent `Intrinsic_change`, plus the source-internal
  deprecated pair `Extrinsic_change` / `Instantaneous_change`. In SUMO, `InternalChange` is
  a real subclass of `Process` with its own change family underneath it, including `StateChange`,
  `QuantityChange`, `SurfaceChange`, `ShapeChange`, `ChemicalProcess`, `BiologicalProcess`,
  and `Creation`.



  The other six sources did not surface a dedicated change class in the artifacts checked
  today. DOLCE, UFO, YAMATO, TUpper, and GUM do use change language, but in the checked source
  text that language stays local to other class glosses or prose rather than becoming a first-class
  change apparatus. BFO does not reify change separately in the checked core artifact.



  No source-side explicit equivalence or alternate-label assertion was found that would off-ramp
  this candidate into `event.md` or `process.md`. The source-side structure remains distinct
  enough to keep this as a standalone crosswalk.'
