comparison_notes:
- note_id: note-001
  dimension: technical
  claim_type: editorial observation
  note: 'GFO''s change apparatus is internally split along two source-side axes: one axis
    distinguishes the instantaneous reading already handled in `event.md` from the remaining
    extended-process reading, and the other axis distinguishes intrinsic from extrinsic change.
    The deprecated names are explicit source history, not separate conceptual territory.'
  supporting_references:
  - xwkont:ref:gfo
  confidence: high
  supporting_references_note: '`xwkont:ref:gfo`, `docs/crosswalks/concepts/event.md`'
- note_id: note-002
  dimension: technical
  claim_type: editorial observation
  note: SUMO's `InternalChange` is a real family under `Process`, not a prose-only gloss.
    Its defining criterion is internal-property alteration, which excludes changes that only
    alter spatial or temporal location. That makes it a genuine source-side change apparatus,
    but with a different organizing principle from GFO's chronoid-based split.
  supporting_references:
  - xwkont:ref:sumo-niles-pease-2001
  confidence: high
- note_id: note-003
  dimension: technical
  claim_type: editorial observation
  note: The other six sources remain scoped absences for this candidate. DOLCE, UFO, YAMATO,
    TUpper, and GUM use change language in other contexts, but none of the checked artifacts
    reify a dedicated change class; BFO's checked core artifact also does not.
  supporting_references:
  - xwkont:ref:bfo-2020
  - xwkont:ref:dolce-lite-owl
  - xwkont:ref:ufo-2021
  - xwkont:ref:yamato-mizoguchi-2010
  - xwkont:ref:tupper-colore
  - xwkont:ref:gum-owl
  confidence: high
- note_id: note-004
  dimension: technical
  claim_type: editorial observation
  note: This is a multi-source crosswalk, but the second source does not come from an explicit
    source-side equivalence assertion. It survives as a standalone scope because SUMO reifies
    `InternalChange` directly; `event.md` and `process.md` do not already settle that material.
  supporting_references:
  - xwkont:ref:gfo
  - xwkont:ref:sumo-niles-pease-2001
  confidence: high
