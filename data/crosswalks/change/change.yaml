source_definitions:
- source: GFO
  term_or_identifier: Change
  dimension: technical
  source_claim_type: editorial observation
  text: The broad GFO `Change` class already has its instantaneous-reading case mapped in
    `event.md` (`event:006` / `event:007`). This draft keeps the remaining extended-process
    reading in view rather than restating that already-reviewed content.
  reference:
  - xwkont:ref:gfo
  locator: '`modules/gfo-base.owl`, class `Change`, fetched and read directly 2026-07-07'
  entry_notes: '`Process` is separately `owl:disjointWith Change` in the same module, a relation
    already recorded in `process.md`.'
- source: GFO
  term_or_identifier: Continuous_change
  dimension: technical
  source_claim_type: direct quotation
  text: For the purpose of formalizing continuous changes, a minimal chronoid universal `D(c)`
    is employed in order to capture the idea of observable differences during certain chronoids,
    whereas the change itself does not allow the observation of a difference. The predicate
    `change(e1,e2, u1, u2, u, D(c))` is intended to formalize this approach. Continuous changes
    occur over time (a chronoid).
  reference:
  - xwkont:ref:gfo
  locator: '`modules/gfo-base.owl`, class `Continuous_change`, fetched and read directly 2026-07-07'
  entry_notes: The source makes this a subclass of `Change` and explicitly pairs it with deprecated
    `Intrinsic_change`.
- source: GFO
  term_or_identifier: Intrinsic_change
  dimension: technical
  source_claim_type: direct quotation
  text: For the purpose of formalizing intrinsic changes, a minimal chronoid universal `D(c)`
    is employed in order to capture the idea of observable differences during certain chronoids,
    whereas the change itself does not allow the observation of a difference. The predicate
    `change(e1,e2, u1, u2, u, D(c))` is intended to formalize this approach.
  reference:
  - xwkont:ref:gfo
  locator: '`modules/gfo-base.owl`, class `Intrinsic_change`, fetched and read directly 2026-07-07'
  entry_notes: Marked `owl:deprecated true` in source and `owl:equivalentClass` to `Continuous_change`.
    Keep as source history, not live primary terminology.
- source: GFO
  term_or_identifier: Extrinsic_change
  dimension: technical
  source_claim_type: direct quotation
  text: Extrinsic changes are represented by `change(e1,e2, u1, u2, u)`, where `e1` and `e2`
    are a pair of coincident process boundaries, and `u1` and `u2` are disjoint sub-universals
    of `u`.
  reference:
  - xwkont:ref:gfo
  locator: '`modules/gfo-base.owl`, class `Extrinsic_change`, fetched and read directly 2026-07-07'
  entry_notes: Marked `owl:deprecated true` in source and `owl:equivalentClass` to `Instantaneous_change`;
    the instantaneous branch is already handled in `event.md`.
- source: SUMO
  term_or_identifier: InternalChange
  dimension: technical
  source_claim_type: direct quotation
  text: Processes which involve altering an internal property of an Object, e.g. the shape
    of the Object, its coloring, its structure, etc. Processes that are not instances of this
    class include changes that only affect the relationship to other objects, e.g. changes
    in spatial or temporal location.
  reference:
  - xwkont:ref:sumo-niles-pease-2001
  locator: '`Merge.kif`, class `InternalChange`, fetched and read directly 2026-07-07'
  entry_notes: A real subclass of `Process`; the source also places `StateChange`, `QuantityChange`,
    `SurfaceChange`, `ShapeChange`, `ChemicalProcess`, `BiologicalProcess`, and `Creation`
    under this family.
- source: SUMO
  term_or_identifier: StateChange
  dimension: technical
  source_claim_type: direct quotation
  text: Any `Process` where the `PhysicalState` of part of the patient of the `Process` changes.
  reference:
  - xwkont:ref:sumo-niles-pease-2001
  locator: '`Merge.kif`, class `StateChange`, fetched and read directly 2026-07-07'
  entry_notes: A concrete `InternalChange` subtype, useful as a witness to the family structure.
