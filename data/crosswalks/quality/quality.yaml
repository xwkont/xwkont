source_definitions:
- source: BFO
  term_or_identifier: Quality (BFO_0000019)
  dimension: technical
  source_claim_type: direct quotation
  text: '"(Elucidation) A quality is a specifically dependent continuant that, in contrast
    to roles and dispositions, does not require any further process in order to be realized."
    Examples: "The colour of a tomato; the ambient temperature of this portion of air; the
    length of the circumference of your waist; the shape of your nose; the shape of your nostril;
    the mass of this piece of gold."'
  reference:
  - xwkont:ref:bfo-2020
  locator: '**verified**: `bfo-core.ttl`, class BFO_0000019, fetched and read directly 2026-07-01'
  entry_notes: Corrects the earlier paraphrase's framing ("fully manifested whenever they
    exist") to the primary text's actual contrast criterion ("does not require any further
    process in order to be realized," vs. roles/dispositions).
- source: DOLCE
  term_or_identifier: Quality
  dimension: technical
  source_claim_type: direct quotation
  text: '"Qualities are particulars, properties are universals. Qualities inhere to entities:
    every entity (including qualities themselves) comes with certain qualities, which exist
    as long as the entity exists... each quality is specifically constantly dependent on the
    entity it inheres in."'
  reference:
  - xwkont:ref:dolce-wonderweb-d18
  locator: '**verified**: WonderWeb D18 PDF, manually extracted 2026-07-01'
  entry_notes: Confirms the earlier paraphrase closely, now with the primary source's own
    exact wording.
- source: DOLCE
  term_or_identifier: Quale
  dimension: technical
  source_claim_type: direct quotation
  text: '"To compare qualities of the same kind, e.g., the color of a rose and the color of
    a book cover, the category of quale is introduced. A quale is the position occupied by
    an individual quality within a quality space. ... if the rose and the book cover exhibit
    the same shade of red, their individual colors occupy the same position (quale) in the
    color space. Hence, the two qualities are distinct but they have the same quale (within
    the same color space)."'
  reference:
  - xwkont:ref:dolce-borgo-2022
  - xwkont:ref:dolce-wonderweb-d18
  reference_note: '`xwkont:ref:dolce-borgo-2022`, confirmed against `xwkont:ref:dolce-wonderweb-d18`
    directly'
  locator: '**verified**: both the 2022 arXiv preprint and, as of 2026-07-01, D18 itself (manually
    extracted); D18''s own wording is near-identical, describing quale as "the position of
    an individual quality within a certain conceptual space (called here quality space)"'
  entry_notes: Confirms and sharpens the earlier paraphrase with the exact rose/book-cover
    example, now traced to both the current restatement and the 2003 original.
- source: UFO
  term_or_identifier: Moment
  dimension: technical
  source_claim_type: direct quotation
  text: '"[P]articularized properties, i.e., existentially dependent entities [or] moments,
    these last ones termed aspects, abstract particulars, or variable tropes (Moltmann, 2020).
    Moments are parasitic entities and can only exist by inhering in other entities. Intrinsic
    moments are existentially dependent on a single individual."'
  reference:
  - xwkont:ref:ufo-2021
  locator: '**verified**: Applied Ontology 2021 PDF, manually extracted 2026-07-01'
  entry_notes: Confirms the earlier paraphrase closely; the "Husserl's Momente" etymology
    was not re-found verbatim in this pass but is not contradicted.
- source: UFO
  term_or_identifier: Quality (subtype of intrinsic Moment)
  dimension: technical
  source_claim_type: direct quotation
  text: '"These include qualities, i.e., reifications of categorical properties such as color,
    height, weight, electrical charge. Qualities are entities that can be directly projected
    into certain value spaces. The latter, termed quality structures, are abstract entities
    delimiting the space of possible values (qualia, singular quale) for qualities of a given
    quality type."'
  reference:
  - xwkont:ref:ufo-2021
  locator: '**verified**: Applied Ontology 2021 PDF, manually extracted 2026-07-01'
  entry_notes: Parallels DOLCE's Quality/Quale pair closely enough that UFO uses the identical
    term "quale" for the value; see Uncertainty — the shared-theory question is now resolved
    (both sources cite Gärdenfors independently).
- source: SUMO
  term_or_identifier: Attribute
  dimension: technical
  source_claim_type: direct quotation
  text: '"(subclass Attribute Abstract)... (partition Attribute InternalAttribute RelationalAttribute)...
    Qualities which we cannot or choose not to reify into subclasses of."'
  reference:
  - xwkont:ref:sumo-niles-pease-2001
  locator: '**verified**: `Merge.kif`, `documentation Attribute EnglishLanguage`, fetched
    and read directly 2026-07-01'
  entry_notes: Confirms the abstract-entity classification directly (`subclass Attribute Abstract`)
    rather than from an inferred secondary summary. This is the sharpest divergence found
    in any crosswalk so far — see Scope Note.
- source: BFO/DOLCE/UFO
  term_or_identifier: trope-theoretic convergence
  dimension: philosophical
  source_claim_type: editorial observation
  text: 'BFO, DOLCE, and UFO all treat qualities/moments as particulars dependent on a specific
    bearer (tropes in the philosophical-literature sense), a shared metaphysical commitment
    despite differing formal apparatus (BFO: inherence; DOLCE: quale/region, citing Goodman
    1951 and Campbell 1990 by name; UFO: variable tropes, citing Moltmann 2020). SUMO does
    not share this commitment, per its own Attribute definition.'
  reference:
  - xwkont:ref:bfo-2020
  - xwkont:ref:dolce-wonderweb-d18
  - xwkont:ref:ufo-2021
  - xwkont:ref:sumo-niles-pease-2001
  locator: inference across four sources' own stated definitions, not a single cited passage
    making the comparison explicitly
- source: GFO
  term_or_identifier: Property
  dimension: technical
  source_claim_type: direct quotation
  text: '`Property` is `rdfs:subClassOf` `Concrete` and `Dependent` (no separate `skos:definition`
    on `Property` itself; inherited from its declared superclasses — `Concrete`: "have a relation
    to time or space"; `Dependent`, per its `owl:equivalentClass` restriction, existentially
    depends on a bearer). `owl:disjointWith` `Relator`.'
  reference:
  - xwkont:ref:gfo
  locator: '**verified**: `modules/gfo-base.owl`, class `Property`, fetched and read directly
    2026-07-02'
  entry_notes: A trope-theoretic, dependent-particular treatment, joining BFO/DOLCE/UFO's
    camp rather than SUMO's abstract-entity camp.
- source: GFO
  term_or_identifier: Property value / Value space
  dimension: technical
  source_claim_type: direct quotation
  text: '`Property_value`: "The concept of a property value reflects a relationship between
    the property of x and the same property as exhibited by another entity y" (`owl:equivalentClass`
    a restriction on `value_of` some `Property`). `Value_space`: "Property values usually
    appear in groups which are called value structures, value spaces or measurement systems...
    The notion of a value structure of a property is similar to a quality dimension in (Gardenfors,
    2000). Further, value structures are related to quality spaces in DOLCE (Masolo, 2003).
    A quality space consists of all ''quales'' (our property values) of some ''quality'' (our
    property)."'
  reference:
  - xwkont:ref:gfo
  locator: '**verified**: `modules/gfo-base.owl`, classes `Property_value`, `Value_space`,
    fetched and read directly 2026-07-02'
  entry_notes: GFO's own text independently cites both Gärdenfors (2000) *and* DOLCE (Masolo,
    2003) by name — a third source grounding its value-space apparatus in Gärdenfors' conceptual-spaces
    theory (per `note-002`), and the first source in this crosswalk to explicitly cite another
    already-covered source.
- source: YAMATO
  term_or_identifier: Quality apparatus (Generic quality type / Quality role type / Quality
    / Quality instance)
  dimension: technical
  source_claim_type: direct quotation
  text: '"A quality must be a certain dependent property possessed by an entity and keeps
    its identity while its value changes." "Quality: It is a property associated with an individual
    entity and is a generic name to denote each instance of quality role type: e.g., Johns
    height, Toms weight... Quality instance: A realization of quality: e.g., Johns height
    of 160cm long."'
  reference:
  - xwkont:ref:yamato-mizoguchi-2010
  locator: '**verified**: `YAMATO101216.pdf`, "Quality and quantity" section, extracted 2026-07-02'
  entry_notes: A four-tier apparatus distinguishing the generic property type, the context-associated
    role type, the individual entity-tied quality, and its value-bearing realization — more
    elaborated than BFO's single Quality class, structurally comparable to DOLCE/UFO's Quality/Quale
    split but organized differently (role-theoretic rather than positional-in-a-space).
- source: YAMATO
  term_or_identifier: Critique of DOLCE's quality-space coverage
  dimension: philosophical
  source_claim_type: direct quotation
  text: '"One of the most sophisticated property ontologies is found in DOLCE. It specifies
    value space for each quality type under the name of Quality space(region)... However,
    there are other ways of quality description such as `<patient_1, diarrhea>`, `<cupper,
    conductive>`, and `<rose_1, redness, faint>` which seem not to be covered by DOLCEs quality
    ontology."'
  reference:
  - xwkont:ref:yamato-mizoguchi-2010
  locator: '**verified**: `YAMATO101216.pdf`, same section, extracted 2026-07-02'
  entry_notes: YAMATO's own text explicitly engages DOLCE's quality-space concept by name
    and critiques its coverage — a direct, source-authored comparison to a source already
    cited in this crosswalk, similar in kind to `information-artifact.md`'s YAMATO-critiques-BFO
    finding.
- source: TUpper
  term_or_identifier: '*(no reified Quality class — direct measurement properties)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: '`tupper.all.owl` defines `mass`, `volume`, `physical_length`, `physical_area`, `physical_density`
    etc. as `FunctionalObjectProperty` relations directly from an object (or activity occurrence)
    to a value, with no class representing the quality/property itself as an individual.'
  reference:
  - xwkont:ref:tupper-colore
  locator: '**verified absence** (of a reified class): `tupper.all.owl`, searched directly,
    2026-07-02'
  entry_notes: 'A third modeling style, distinct from both BFO/DOLCE/UFO/GFO/YAMATO''s trope-theoretic
    reification and SUMO''s abstract-entity reification: TUpper reifies neither a particular
    quality nor an abstract attribute, only a direct relation to a value.'
- source: GUM
  term_or_identifier: SimpleQuality
  dimension: technical
  source_claim_type: direct quotation
  text: '"Qualities are properties of SimpleThings and Processes. They participate in property
    ascription relations. Roughly speaking, qualities include anything that can be expressed
    as an English adjective." `rdfs:subClassOf` `Element`; `owl:disjointWith` `SimpleThing`.'
  reference:
  - xwkont:ref:gum-owl
  locator: '**verified**: `GUM-31.owl`, class `SimpleQuality`, fetched and read directly 2026-07-02'
  entry_notes: The only one of the four new sources with a class literally named "Quality"
    (via its subclass naming, e.g. `MaterialWorldQuality`, `ModalQuality`, `LogicalQuality`)
    — the strongest terminological match, though grounded in adjectival/linguistic realization
    rather than metaphysical inherence.
