comparison_notes:
- note_id: note-001
  dimension: philosophical
  claim_type: editorial observation
  note: BFO, DOLCE, and UFO converge on treating qualities as particulars (tropes) existentially
    dependent on a bearer — a genuine shared metaphysical commitment, not just similar labels.
    SUMO's `Attribute` is classified as an abstract entity instead, a real fork between trope-theoretic
    and abstracta-based treatments of properties. This is the sharpest divergence identified
    across all crosswalks completed so far (compare `object.md`'s and `event.md`'s labeling
    mismatches, which were about category boundaries, not this deep a metaphysical split).
  supporting_references:
  - xwkont:ref:bfo-2020
  - xwkont:ref:dolce-wonderweb-d18
  - xwkont:ref:ufo-2021
  - xwkont:ref:sumo-niles-pease-2001
  confidence: high
- note_id: note-002
  dimension: technical
  claim_type: editorial observation
  note: 'DOLCE''s Quality/Quale pair and UFO''s Quality-as-measurable-Moment both separate
    a particular property instance from its value/position in a conceptual space, and now
    confirmed to share a theoretical origin: DOLCE''s D18 cites Gärdenfors (2000), *Conceptual
    Spaces: the Geometry of Thought*, by name for the quality-space notion, and UFO''s 2021
    paper independently cites "Gärdenfors, 2004" for "integral dimensions" in its quality-structure
    apparatus. Different publication years from the same author/theory, cited independently
    by each source rather than one copying the other.'
  supporting_references:
  - xwkont:ref:dolce-wonderweb-d18
  - xwkont:ref:ufo-2021
  confidence: high
  claim_type_annotation: confirmed 2026-07-01
- note_id: note-003
  dimension: technical
  claim_type: editorial observation
  note: SUMO does not use the word "Quality" for this category at all — its term is `Attribute`.
    This is a labeling difference layered on top of the deeper metaphysical divergence in
    `note-001`, similar in kind (though not in magnitude) to `object.md`'s UFO/Substantial-Kind
    and `event.md`'s BFO-SUMO/Event mismatches.
  supporting_references:
  - xwkont:ref:sumo-niles-pease-2001
  confidence: high
- note_id: note-004
  dimension: philosophical
  claim_type: editorial observation
  note: The trope-vs-abstracta fork (`note-001`) gains a third data point on the trope side
    (GFO's `Property`, YAMATO's `Quality`, both `Concrete`/entity-dependent, particular-denoting)
    and a genuinely new third modeling style from TUpper, which reifies neither a particular
    quality nor an abstract attribute — it attaches values to objects via direct OWL properties
    (`mass`, `length`, etc.) with no intervening entity class at all. GUM's `SimpleQuality`
    is entity-like (joining the reified camp structurally) but its criterion is linguistic
    (adjectival realizability), not metaphysical, so it does not cleanly join either the trope
    or abstracta side on the same grounds as the others.
  supporting_references:
  - xwkont:ref:gfo
  - xwkont:ref:yamato-mizoguchi-2010
  - xwkont:ref:tupper-colore
  - xwkont:ref:gum-owl
  confidence: high
- note_id: note-005
  dimension: technical
  claim_type: editorial observation
  note: GFO's `Value_space` class independently cites both Gärdenfors (2000) and DOLCE (Masolo,
    2003) by name in its own definition text, extending `note-002`'s finding to a third independent
    citation of Gärdenfors' conceptual-spaces theory and adding a rare case of one source
    ontology's own primary text explicitly citing another source already covered in this crosswalk.
