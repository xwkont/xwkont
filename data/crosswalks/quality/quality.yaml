local_identifier: xwkont:concept:quality
slug: quality
title: Quality
editorial_status: reviewed
created: "2026-07-01"
modified: "2026-07-06"
scope_note: 'This crosswalk compares BFO''s `Quality` (a `Specifically Dependent Continuant`),
  DOLCE''s `Quality`/`Quale` pair, UFO''s `Moment`/`Quality`, and SUMO''s `Attribute`, as
  Object''s sibling under Continuant in `data/ontology/core.ttl`.



  **This crosswalk surfaces the sharpest metaphysical divergence found across all crosswalks
  so far, not just a labeling difference.** BFO, DOLCE, and UFO all treat a quality as a **particular**
  (a "trope" in the philosophical-literature sense) that existentially depends on a specific
  bearer — the redness of *this* apple is its own particular entity, distinct from the redness
  of any other apple, even though both are the same type of quality. **SUMO breaks with this
  entirely**: its analog, `Attribute`, is classified as an **abstract entity**, not a particular
  dependent on a bearer. This is a genuine fork between trope-theoretic and abstracta-based
  treatments of properties, not merely a different word for the same thing. SUMO also does
  not use the word "Quality" at all for this category — its term is `Attribute`.



  DOLCE and UFO additionally share a further layer BFO doesn''t appear to formalize the same
  way: both distinguish the particular quality/moment itself from its **value or position
  within a conceptual space** (DOLCE: `quale`; UFO: measurement via a "value space" for the
  subtype of Moment it calls `Quality`). This parallel is noted but not confirmed as a shared
  theoretical source (e.g., Gärdenfors'' conceptual spaces) — see Uncertainty.



  Exclusions: this crosswalk does not address Role (Object''s other sibling under Continuant,
  planned next) and does not attempt UFO''s full Moment typology (intrinsic vs. relational,
  further subtypes) beyond what''s needed to place Quality within it.



  **Update (2026-07-01), following direct primary-source verification of DOLCE''s D18 report
  and UFO''s 2021 paper, fully resolving `uncertainty-002`:** both were fetched and read directly
  (reusing extractions already performed for other crosswalks). Findings:



  - **DOLCE''s own primary text (not just the 2022 restatement) confirms the Quality/Quale
  definitions closely**: "qualities are particulars, properties are universals. Qualities
  inhere to entities... each quality is specifically constantly dependent on the entity it
  inheres in." Qualia are "the position of an individual quality within a certain conceptual
  space (called here quality space)."

  - **The Gärdenfors/Goodman citation is now confirmed at the exact sentence level, not just
  via a bibliography key search.** D18''s own text cites its sources inline: the quality-space
  notion is footnoted directly to Gärdenfors (2000), *Conceptual Spaces: the Geometry of Thought*
  (reference [39]), and "this distinction between qualities and qualia" is footnoted to Goodman
  (1951), *The Structure of Appearance* (reference [40]), alongside "the so-called trope theory,"
  citing Campbell (1990), *Abstract Particulars* (reference [9]).

  - **UFO independently cites Gärdenfors too**, resolving the previously-unconfirmed UFO side
  of `uncertainty-002`: "quality structures... can be either one-dimensional, in which case
  they are termed quality dimensions, or composed of multiple co-dependent dimensions (see
  also integral dimensions, Gärdenfors, 2004)." This is a different Gärdenfors publication
  year (2004, not DOLCE''s 2000 citation) but the same conceptual-spaces theory — both sources
  independently ground their value-space/quality-space apparatus in Gärdenfors'' work, not
  just structurally resembling each other by coincidence.



  **Epistemic note:** BFO, DOLCE, UFO, and SUMO content is all now verified directly against
  primary sources (`bfo-core.ttl`, WonderWeb D18, the 2021 Applied Ontology paper, and `Merge.kif`,
  respectively).



  **Update (2026-07-02), ADR-0015 buildout:** extended to GFO, YAMATO, TUpper, and GUM. The
  trope-vs-abstracta fork found between BFO/DOLCE/UFO and SUMO gains two more data points
  on the trope side and a genuinely new third modeling style: **GFO''s `Property` (a `Concrete`,
  `Dependent` individual) and YAMATO''s `Quality` (a "property associated with an individual
  entity," part of a four-tier Generic-quality-type/Quality-role-type/Quality/Quality-instance
  apparatus) both join the trope-theoretic camp with BFO/DOLCE/UFO, not SUMO''s abstracta
  camp.** More strikingly, GFO''s own `Value_space` class independently cites *both* Gärdenfors
  (2000) *and* DOLCE by name ("Masolo, 2003") for the same value-space/quality-space parallel
  this crosswalk''s `note-002` already documents between DOLCE and UFO — a third source citing
  Gärdenfors, and the first source in this crosswalk to cite another already-covered source
  by name. YAMATO''s own text similarly engages DOLCE''s quality-space concept directly, calling
  it "one of the most sophisticated property ontologies" but arguing it doesn''t cover all
  quality-description patterns it identifies (`<E,A>`, `<E,A,V>`, `<E,P,V>`). TUpper introduces
  a genuinely different, third modeling style: it does not reify qualities as dependent-particular
  entities at all — no `Quality`/`Attribute`/`Property` class exists in its fetched files.
  Instead, physical measurements (`mass`, `volume`, `physical_length`, `physical_area`, `physical_density`)
  are direct OWL object properties relating an object straight to a value, with no intervening
  trope or abstracta layer. GUM''s `SimpleQuality` ("properties of SimpleThings and Processes...
  anything that can be expressed as an English adjective") is a genuine entity-level class,
  terminologically the closest match of the four new sources ("Quality" itself), but grounded
  in linguistic realization rather than metaphysical inherence — the same terminological-match-without-matching-criterion
  pattern already found for GUM''s Process in `process.md`.'
