uncertainties:
- item_id: uncertainty-001
  uncertainty_type: open-question
  resolved: false
  description: Where should `xwkont-core:Proposition` subclass from once added to `data/ontology/core.ttl`?
    All three confirmed sources file it under/alongside their own Abstract category, so this
    concept's placement is likely to follow directly from however `abstract-concrete.md`'s
    own still-open placement question (`uncertainty-001` there) resolves — this is the cleanest
    "downstream" placement dependency of any `0.2.0`-batch concept.
  impact: Blocks final core.ttl placement; does not block continuing this crosswalk's research/review.
  follow_up: Decide at review time, after (or alongside) `abstract-concrete.md`'s own placement
    decision, given the direct subtype relationship all three sources assert.
- item_id: uncertainty-002
  uncertainty_type: non-equivalence
  resolved: false
  description: BFO's/IAO's absence of a reified Proposition (`note-002`) is a direct architectural
    consequence of BFO's already-documented absence of any literal "Abstract" category (`abstract-concrete.md`'s
    `note-001`) — not an independent gap requiring further sourcing.
  impact: None — this is a confirmed, well-explained structural absence.
  follow_up: None outstanding; recorded here and in `note-002` for traceability.
- item_id: uncertainty-003
  uncertainty_type: open-question
  resolved: false
  description: Across the full `0.2.0` batch, GUM contributed new content in exactly 4 of
    9 concepts (`note-003`). Whether this reflects a genuine difference in GUM's own ontological
    coverage (its clause/linguistic grounding naturally elaborates temporal/spatial/qualitative
    categories more than mereological/classificatory/propositional ones) or an artifact of
    this session's search strategy (case-sensitive PascalCase grepping, which could miss content
    named unexpectedly) is unresolved.
  impact: Affects confidence in "GUM has nothing for this concept" claims specifically, and
    by extension for `situation-state-of-affairs.md`, `universal-type.md`, `mereology-parthood-aggregate.md`,
    and `boundary-site.md`.
  follow_up: Consider a dedicated pass cross-checking each of those four crosswalks' GUM-absence
    findings against a case-insensitive, synonym-aware search of `GUM-31.owl`, given the genuine
    pattern noted in `note-003`, before treating any of them as fully settled.
