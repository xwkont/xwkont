comparison_notes:
- note_id: note-001
  dimension: philosophical
  claim_type: editorial observation
  note: 'All three confirmed sources converge on the same core distinction: a proposition/content
    is the abstract, representation-independent thing meant, sharply distinguished from any
    concrete representation of it. SUMO''s own documentation states this most explicitly by
    naming both sides (`Proposition` vs. `ContentBearingObject`) and giving a worked multi-representation
    example (strings, sounds, icons); DOLCE frames the same idea more formally ("purely combinatorial...
    reified abstracts"); YAMATO embeds it directly into its own representation theory ("many
    ways to code the same content into different forms"). All three also file this concept
    as, or directly alongside, their own Abstract category (DOLCE: `rdfs:subClassOf abstract`;
    SUMO: `subclass Proposition Abstract`; YAMATO: propositions are explicitly non-physical/non-temporal
    per the source''s own Physical/semi-abstract/abstract split already documented in `abstract-concrete.md`).
    This is the strongest, most consistent 3-source convergence of any `0.2.0`-batch concept
    drafted with only 3 sources (contrast Situation/State of Affairs, `situation-state-of-affairs.md`,
    where even the sources that did have content diverged sharply in sense and formality).'
  supporting_references:
  - xwkont:ref:dolce-lite-owl
  - xwkont:ref:sumo-niles-pease-2001
  - xwkont:ref:yamato-mizoguchi-2010
  confidence: high
- note_id: note-002
  dimension: technical
  claim_type: editorial observation
  note: BFO/IAO's own approach to information/content (`information content entity`, already
    the primary subject of the `reviewed` `information-artifact.md`) does not reify a representation-independent
    Proposition the way DOLCE/SUMO/YAMATO do — BFO/IAO ties content directly to a bearer relation
    (a generically dependent continuant borne by some concrete artifact) rather than treating
    the content itself as an independent abstract entity capable of existing across multiple
    representations. This is a genuine, structural non-equivalence, not a gap in this crosswalk's
    sourcing — BFO's own architecture (per `abstract-concrete.md`'s `note-001`) already lacks
    an Abstract category at all, and Proposition's absence here is a direct consequence of
    that same, already-documented architectural choice.
  supporting_references:
  - xwkont:ref:bfo-2020
  - xwkont:ref:iao-owl
  confidence: high
- note_id: note-003
  dimension: technical
  claim_type: editorial observation
  note: Across the full 9-concept `0.2.0` batch, GUM has now contributed genuinely new (previously
    uncredited) content in exactly 4 concepts (Time, Space, Abstract vs. Concrete, Quantity/Amount
    of Matter — all among the first four drafted) and nothing at all in the remaining 5 (Situation/State
    of Affairs, Universal/Type, Mereology/Parthood/Aggregate, Boundary/Site, and this concept).
    This even split is worth recording as a summary finding for the batch as a whole, complementing
    the per-concept observations already made in `abstract-concrete.md`'s `uncertainty-004`
    and `quantity-amount-of-matter.md`'s `uncertainty-004` about GUM's uneven documentation
    coverage relative to the matrix.
  supporting_references:
  - '*(cross-cutting across this crosswalk and the other 8 `0.2.0`-batch concepts)*'
  confidence: medium
