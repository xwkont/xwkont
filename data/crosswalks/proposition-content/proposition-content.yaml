source_definitions:
- source: BFO
  term_or_identifier: '*(no class found)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: Full-text grep of `bfo-core.ttl` for "proposition" (case-insensitive) returned zero
    matches; a separately fetched copy of the IAO (Information Artifact Ontology) extension
    module — the standard BFO-adjacent module for content-bearing/information entities, already
    relevant background for `information-artifact.md` — was also checked and returned zero
    matches.
  reference:
  - xwkont:ref:bfo-2020
  - xwkont:ref:iao-owl
  locator: '**verified absence**: `bfo-core.ttl` and IAO OWL module, fetched and read directly
    2026-07-04'
  entry_notes: BFO/IAO's own approach to content (`information content entity`, a generically
    dependent continuant, already the primary subject of `information-artifact.md`) does not
    distinguish a separate, representation-independent Proposition the way DOLCE/SUMO/YAMATO
    do — content in BFO/IAO is always tied to its bearer relation, not reified as an independent
    abstract entity in its own right.
- source: DOLCE
  term_or_identifier: Proposition
  dimension: philosophical
  source_claim_type: direct quotation
  text: '"The abstract content of a proposition. Abstract content is purely combinatorial:
    from this viewpoint, any content that can be generated by means of combinatorial rules
    is assumed to exist in the domain of quantification (reified abstracts)." `rdfs:subClassOf
    abstract`.'
  reference:
  - xwkont:ref:dolce-lite-owl
  locator: '**verified**: `DOLCE-Lite.owl`, class `#proposition`, fetched and read directly
    2026-07-04'
  entry_notes: A direct subtype of DOLCE's own `abstract` (per `abstract-concrete.md`'s own
    findings) — DOLCE's own comment frames propositional content as combinatorially generated,
    a more formal/logical framing than SUMO's or YAMATO's own prose.
- source: SUMO
  term_or_identifier: Proposition
  dimension: technical
  source_claim_type: direct quotation
  text: '"Propositions are Abstract entities that express a complete thought or a set of such
    thoughts. As an example, the formula ''(instance Yojo Cat)'' expresses the Proposition
    that the entity named Yojo is an element of the Class of Cats... It is important to distinguish
    Propositions from the ContentBearingObjects that express them. A Proposition is a piece
    of information, e.g. that the cat is on the mat, but a ContentBearingObject is an Object
    that represents this information. A Proposition is an abstraction that may have multiple
    representations: strings, sounds, icons, etc." `(subclass Proposition Abstract)`.'
  reference:
  - xwkont:ref:sumo-niles-pease-2001
  locator: '**verified**: current `Merge.kif`, fetched and read directly 2026-07-04'
  entry_notes: The most explicit bearer/content distinction of any source in this crosswalk
    — SUMO's own documentation names both sides of the distinction (`Proposition` vs. `ContentBearingObject`)
    and gives a worked multi-representation example (the same content as strings, sounds,
    or icons), directly paralleling YAMATO's own framing below.
- source: UFO
  term_or_identifier: '*(no reified class; one incidental bibliographic mention)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: 'The paper''s only occurrence of "proposition" is inside a citation to separate literature:
    "...including a proposal for Weak Truthmaking (Guarino et al., 2019) connecting particularized
    properties to propositions." No `Proposition` class is defined anywhere in UFO''s own
    axioms.'
  reference:
  - xwkont:ref:ufo-2021
  locator: '**verified absence (one incidental mention)**: 2021 Applied Ontology paper, already-extracted
    text re-searched directly 2026-07-04'
  entry_notes: This single hit is a pointer to *other* researchers' work building on UFO (Guarino
    et al.'s Weak Truthmaking theory), not a UFO-internal Proposition construct — consistent
    with this crosswalk's practice (already applied to YAMATO's "quantity" and UFO's/GFO's
    "category") of not inflating an incidental mention into a correspondence.
- source: GFO
  term_or_identifier: '*(no class found)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: Full-text grep of `modules/gfo-base.owl` for "proposition" (case-insensitive) returned
    zero matches.
  reference:
  - xwkont:ref:gfo
  locator: '**verified absence**: `modules/gfo-base.owl`, fetched and read directly 2026-07-04'
  entry_notes: The third `0.2.0`-batch concept (after Situation/State of Affairs and Mereology/Parthood/Aggregate)
    where GFO — otherwise a consistent contributor of formally exhaustive top-level splits
    across this batch — has no counterpart category at all.
- source: YAMATO
  term_or_identifier: Proposition (+ Content)
  dimension: philosophical
  source_claim_type: direct quotation
  text: '"Content is the hidden part of representation and it is a proposition which the author
    of the representation would like to convey through the representation. Apparently, there
    can be many ways to code the same content into different forms to produce different representations."
    "Proposition is what is to be represented and is divided into representation-primary and
    representation-secondary. The latter includes fact, data and thought, etc." Further subdivided:
    "Representation-primary proposition has two subclasses: designed proposition, product
    proposition."'
  reference:
  - xwkont:ref:yamato-mizoguchi-2010
  locator: '**verified**: 2010 technical report, full extracted text re-searched directly
    2026-07-04'
  entry_notes: The richest treatment of any of the three confirmed sources — embedded directly
    in YAMATO's own form/content/proposition representation theory (already touched on informally
    when `quantity-amount-of-matter.md`'s YAMATO row discussed "quantity... made accessible
    as a proposition as a result of measuring"). Confirms both halves of `TODO.md`'s seed
    naming (`proposition` and `content`) as genuinely distinct but related YAMATO terms —
    "content" is the informal, representation-relative name for what "proposition" names formally
    as a class.
