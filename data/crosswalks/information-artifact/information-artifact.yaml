local_identifier: xwkont:concept:information-artifact
slug: information-artifact
title: Information Artifact
editorial_status: reviewed
created: "2026-07-01"
modified: "2026-07-07"
scope_note: 'This crosswalk asks the original inventory question directly: does `xwkont-core:InformationArtifact`
  (a direct child of `Entity`, described in `data/ontology/core.ttl` as XwkOnt''s own "candidate
  support concept") correspond to anything in BFO, DOLCE, UFO, or SUMO, or is it purely XwkOnt-introduced
  and out of crosswalk scope?



  **Finding: not purely XwkOnt-introduced.** Real analogs exist for three of four sources
  — but two of those three are sourced through *extension or later literature*, not the same
  core specification documents already cited elsewhere in this repository:



  - **BFO**: no information-artifact class exists in BFO''s own core release. The analog,
  `Information Content Entity` (ICE), comes from the **Information Artifact Ontology (IAO)**
  — a separate, actively maintained OBO Foundry ontology *built on* BFO (Ceusters & Smith),
  not part of BFO-2020 itself.

  - **DOLCE**: the 2003 WonderWeb D18 deliverable (`xwkont:ref:dolce-wonderweb-d18`, cited
  throughout this repository''s other crosswalks) does not appear to be the primary source
  for DOLCE''s `Information Object`. That term is documented in **DOLCE+DnS Ultralite (DUL)**,
  the actively-maintained OWL successor to the original DOLCE Lite Plus (DLP) module bundle,
  built by the same DOLCE lineage (Aldo Gangemi).

  - **SUMO**: has a genuine core-specification analog: `ContentBearingPhysical` (a direct
  subclass of `Physical`, covering both Objects and Processes that express content) and its
  further subclass `ContentBearingObject` (specifically for Object-like content bearers) —
  confirmed directly against SUMO''s primary `Merge.kif` source, 2026-07-01.

  - **UFO**: no distinct "Information Object" formal category was found with confidence in
  this pass — UFO-A treats "document" only as an example of an `Endurant`, without further
  formal specification found. This is recorded as a research gap, not a confirmed absence.



  **Update (2026-07-01), following direct primary-source verification of BFO(IAO) and DOLCE(DUL),
  resolving `uncertainty-001`:** both `xwkont:ref:ceusters-smith-2015` (the IAO foundational
  paper) and `xwkont:ref:gangemi-dul` (the DUL OWL ontology, directly fetchable as plain-text
  RDF — no PDF-extraction workaround needed) were fetched and read directly.



  - **BFO(IAO)''s formal ICE definition is confirmed verbatim**: "INFORMATION CONTENT ENTITY
  =def. an ENTITY which is (1) GENERICALLY DEPENDENT on (2) some MATERIAL ENTITY and which
  (3) stands in a relation of ABOUTNESS to some ENTITY." The paper also clarifies "ICEs themselves
  are not material entities" (only dependent on one), confirming the earlier paraphrase closely.

  - **DOLCE''s `InformationObject` is confirmed, with a corrected class hierarchy.** The earlier
  draft claimed "Information Object and Description are both subsumed by Social Object, itself
  a subclass of Non-Physical Object" — DUL''s actual OWL source shows a different chain: `InformationObject
  rdfs:subClassOf InformationEntity, SocialObject` (not through any class literally named
  "Non-Physical Object"), where `InformationEntity` is DOLCE''s abstract catchall ("a piece
  of information, be it concretely realized or not") and its sibling `InformationRealization`
  (subclass of the union of `Event`/`PhysicalObject`/`Quality`) is the concrete-realization
  counterpart, connected via a `realizes` relation. The underlying substance of the earlier
  claim (generic dependence, social/non-physical classification, independent of physical carrier)
  holds; the specific class-name chain has been corrected.

  - **DUL is confirmed to be DOLCE Lite Plus''s direct successor, not an unrelated artifact**
  — DUL''s own header states: "The DOLCE+DnS Ultralite ontology... is a simplification of
  some parts of the DOLCE Lite-Plus library," authored by Aldo Gangemi (also a co-author of
  `xwkont:ref:dolce-borgo-2022`).

  - **UFO re-checked (2026-07-01) against the already-extracted 2021 paper''s full text**:
  zero occurrences of "document" or "information object" anywhere in the comprehensive paper.
  This strengthens, but does not fully resolve, `uncertainty-002` — the 2021 paper is UFO''s
  general/comprehensive account, not the UFO-A/UFO-C papers specifically, so a genuine absence
  in this one paper is suggestive rather than conclusive.



  **A structurally interesting parallel to XwkOnt''s own posture**: `data/ontology/core.ttl`
  already calls `InformationArtifact` a "candidate support concept" that "may later move to
  metadata or provenance infrastructure" — i.e., XwkOnt itself treats this concept as peripheral
  to its core scaffold. BFO does the same thing architecturally: it relegates information-artifact
  content to a separate extension ontology (IAO) rather than its own core. That''s a genuine
  structural echo, not just a coincidence of wording.



  **Also worth noting: this is a different kind of divergence than Quality/Role/Relation''s
  SUMO-abstracta pattern, not a repeat of it.** There, SUMO consistently chose the *abstract*
  branch. Here, SUMO''s `ContentBearingPhysical` sits under the *Physical* branch (tying informational
  content directly to a physical carrier), while BFO''s IAO and DOLCE''s Information Object
  both use *generic dependence*/non-physical classification (content that can be "copied"
  across multiple physical carriers, independent of any one of them). So SUMO''s distinctive
  move isn''t "always abstract" — it''s concept-specific, and here it goes the opposite direction
  from Quality/Role/Relation. This finding, and the pattern it complicates, is now written
  up together at `docs/methodology/sumo-modeling-patterns.md`.



  **Epistemic note:** SUMO content is verified directly against its primary `Merge.kif` source.
  BFO(IAO) and DOLCE(DUL) content is now also directly verified (2026-07-01) against their
  own primary sources — `xwkont:ref:ceusters-smith-2015` (manually extracted PDF) and `xwkont:ref:gangemi-dul`
  (directly fetchable OWL/Turtle). UFO content remains a research gap rather than a confirmed
  absence, now somewhat strengthened by a full-text check of the 2021 paper — see Uncertainty
  and Future Work.



  **Update (2026-07-02), ADR-0015 buildout:** extended to GFO, YAMATO, TUpper, and GUM. The
  pattern found among the original four sources — real analogs exist, but only via extension/later
  literature, and one source (UFO) has none with confidence — turns out to recur even more
  starkly among the new sources: **three of the four (GFO, TUpper, GUM) have no confident
  Information-Object-equivalent entity class, and one (YAMATO) has the single most developed
  treatment of any source examined in this crosswalk, original four included.** YAMATO''s
  2010 technical report devotes an entire dedicated subsection ("Ontology of informational
  objects") to exactly this question, works through multiple examples (a novel, a piece of
  music, a procedure), positively defines a `Representation`/`Representing thing` split (abstract
  form-and-content pair vs. its concrete physical realization — directly paralleling DOLCE(DUL)''s
  `InformationObject`/`InformationRealization` split), and explicitly critiques BFO''s own
  treatment as too coarse: "BFO deals with representation (informational object) only at the
  highest level. It is called generically-dependent entity and it is not further elaborated
  what they are." GFO''s `Symbol`/`Symbol_structure` classes were considered and rejected
  as a correspondence — they sit on GFO''s `Category` (universal/type) side of its Category/Individual
  split, a formal-language-symbol concept (closer to a predicate or sign-type in logic) rather
  than a content-bearing individual artifact with aboutness, a different concept from BFO(IAO)/DOLCE(DUL)''s
  target. TUpper''s fetched files (`tupper.all.owl`, `TUpper-Terms.html`) contain zero occurrences
  of "information," "content," or "represent" — confirming its already-established minimal
  PSL vocabulary (`object`/`activity`/`timepoint`) has no information-artifact hook at all.
  GUM''s OWL file has no dedicated Information-Object-equivalent entity class either; its
  only relevant hooks, `Signification` and `Symbolization`, are *relation* types (subclasses
  of `Intensive`, GUM''s participant-relation category), not object/entity types — a categorically
  different kind of thing than BFO(IAO)/DOLCE(DUL)/SUMO/YAMATO''s class-level analogs.'
