comparison_notes:
- note_id: note-001
  dimension: technical
  claim_type: editorial observation
  note: 'BFO''s IAO and DOLCE''s Information Object both use generic dependence / non-physical
    classification, treating informational content as independent of any single physical carrier
    (copyable, multiply-realizable) — now confirmed directly: IAO''s ICE is "generically dependent
    on some material entity," and DUL''s `InformationObject` is "independently from how it
    is concretely realized," paired with a separate `InformationRealization` class for the
    concrete side. SUMO''s ContentBearingPhysical instead ties content directly to a physical
    carrier. This is a different divergence than Quality/Role/Relation''s SUMO-abstracta pattern
    — here SUMO goes *physical*, not abstract, showing that pattern is concept-specific rather
    than a blanket rule.'
  supporting_references:
  - xwkont:ref:ceusters-smith-2015
  - xwkont:ref:gangemi-dul
  - xwkont:ref:sumo-niles-pease-2001
  confidence: high
- note_id: note-002
  dimension: technical
  claim_type: editorial observation
  note: Both XwkOnt's own core.ttl (calling InformationArtifact a "candidate support concept"
    that "may later move to metadata or provenance infrastructure") and BFO (relegating this
    content to the separate IAO extension ontology rather than its own core) treat information-artifact
    content as architecturally peripheral to the main foundational scaffold. This is a structural
    echo worth noting, not a claim that XwkOnt was modeled on BFO's choice here.
  supporting_references:
  - xwkont:ref:ceusters-smith-2015
  confidence: medium
- note_id: note-003
  dimension: technical
  claim_type: editorial observation
  note: 'Among the four `ADR-0015` sources, coverage of Information Artifact is the most polarized
    of any concept crosswalked in this repository: YAMATO has the single most developed treatment
    found anywhere in this crosswalk (original four sources included) — a dedicated subsection,
    multiple worked examples, and a positive form/content vs. concrete-realization split —
    while GFO, TUpper, and GUM all lack a confident entity-level analog. This mirrors, and
    sharpens, the original four-source finding (BFO/DOLCE/SUMO have real analogs, UFO does
    not): here it''s 1-of-4 with a genuine class-level analog rather than 3-of-4.'
  supporting_references:
  - xwkont:ref:gfo
  - xwkont:ref:yamato-mizoguchi-2010
  - xwkont:ref:tupper-colore
  - xwkont:ref:gum-owl
