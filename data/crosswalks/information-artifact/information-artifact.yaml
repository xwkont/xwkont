- note_id: note-004
  dimension: philosophical
  claim_type: editorial observation
  note: YAMATO's `Representation` (abstract, form-and-content) vs. `Representing thing` (concrete
    realization) split is structurally the same move as DOLCE(DUL)'s `InformationObject`/`InformationRealization`
    pair — both separate the informational content from any one physical carrier while still
    connecting the two via a realization-style relation. This is an independent convergence
    between two source ontologies' own theoretical apparatus, not something either source's
    authors cite the other for.
  supporting_references:
