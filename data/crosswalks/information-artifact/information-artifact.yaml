source_definitions:
- source: BFO (IAO extension)
  term_or_identifier: Information Content Entity
  dimension: technical
  source_claim_type: direct quotation
  text: '"INFORMATION CONTENT ENTITY =def. an ENTITY which is (1) GENERICALLY DEPENDENT on
    (2) some MATERIAL ENTITY and which (3) stands in a relation of ABOUTNESS to some ENTITY."
    "While every ICE is dependent upon some material entity that is its bearer, ICEs themselves
    are not material entities." The ontology''s own class definition (`IAO_0000030`) states
    it more tersely: "A generically dependent continuant that is about some thing," `rdfs:subClassOf`
    BFO''s `Generically Dependent Continuant` (BFO_0000031).'
  reference:
  - xwkont:ref:ceusters-smith-2015
  - xwkont:ref:iao-owl
  locator: '**verified**: CEUR-WS PDF and `iao.owl`, manually extracted / fetched directly
    2026-07-01'
  entry_notes: Confirms the earlier paraphrase closely, now with both IAO's theoretical paper
    and the ontology's own formal class definition rather than a secondary summary.
- source: BFO (IAO extension)
  term_or_identifier: aboutness relation
  dimension: philosophical
  source_claim_type: direct quotation
  text: 'Aboutness is grounded in cognitive acts: "acts of thinking, speaking, hearing, writing
    and reading... through which ICEs are created, understood, and communicated." The paper
    also proposes (not yet implemented in IAO itself) broadening aboutness''s target from
    "entity" to "portion of reality," to admit universals, relations, other ICEs, and configurations
    as things an ICE can be about.'
  reference:
  - xwkont:ref:ceusters-smith-2015
  locator: '**verified**: CEUR-WS PDF, manually extracted 2026-07-01'
  entry_notes: Classified `philosophical` because grounding informational content in mental
    acts is itself a substantive theoretical commitment.
- source: DOLCE (DUL, successor to Lite Plus)
  term_or_identifier: Information Object
  dimension: technical
  source_claim_type: direct quotation
  text: '`InformationObject rdfs:subClassOf InformationEntity, SocialObject`, `owl:disjointWith
    SocialAgent`. Comment: "A piece of information, such as a musical composition, a text,
    a word, a picture, independently from how it is concretely realized." `InformationEntity`
    (its superclass, shared with `InformationRealization`) is DOLCE''s "catchall class...
    a piece of information, be it concretely realized or not."'
  reference:
  - xwkont:ref:gangemi-dul
  locator: '**verified**: DUL.owl fetched directly as plain-text RDF/Turtle, 2026-07-01 (no
    PDF-extraction workaround needed)'
  entry_notes: '**Corrects** the earlier draft''s claimed hierarchy ("Information Object...
    subclass of Social Object, itself a subclass of Non-Physical Object"): the actual chain
    is `InformationObject` → `InformationEntity` (and separately `SocialObject`), not through
    a class literally named "Non-Physical Object." The underlying substance (generic dependence,
    non-physical/social classification) still holds.'
- source: UFO
  term_or_identifier: '"document" as an Endurant example only'
  dimension: technical
  source_claim_type: editorial observation
  text: 'UFO-A discusses endurants (entities not dependent on time for identification) using
    "a document" as an example, alongside "a person." No distinct formal Information Object/Content
    category was found with confidence in this pass. Re-checked 2026-07-01 against the full
    text of the already-extracted 2021 Applied Ontology paper: zero occurrences of "document"
    or "information object" anywhere in it.'
  reference:
  - xwkont:ref:ufo-2021
  locator: '**partially verified**: full-text search of the manually-extracted 2021 paper
    confirms no mention, but UFO-A/UFO-C themselves were not independently fetched'
  entry_notes: Strengthens, but does not fully resolve, the research-gap finding — see Uncertainty.
- source: SUMO
  term_or_identifier: ContentBearingPhysical / ContentBearingObject
  dimension: technical
  source_claim_type: direct quotation
  text: '"(subclass ContentBearingPhysical Physical)... Any Object or Process that expresses
    content. This covers Objects that contain a Proposition, such as a book, as well as ManualSignLanguage,
    which may similarly contain a Proposition." And: "(subclass ContentBearingObject ContentBearingPhysical)...
    Any SelfConnectedObject that expresses content. This content may be a Proposition, e.g.
    when the ContentBearingObject is a Sentence or Text, or it may be a representation of
    an abstract or physical object, as with an Icon, a Word or a Phrase."'
  reference:
  - xwkont:ref:sumo-niles-pease-2001
  locator: '**verified**: `Merge.kif`, `documentation ContentBearingPhysical/ContentBearingObject
    EnglishLanguage`, fetched and read directly 2026-07-01'
  entry_notes: '**Corrects the earlier draft''s hierarchy claim**: `ContentBearingPhysical`
    is a direct subclass of `Physical` (covering both Objects and Processes that express content),
    not nested specifically under `Object` as originally stated. `ContentBearingObject` is
    a further subclass of `ContentBearingPhysical`, specifically for the Object-like (not
    Process-like) content bearers. Still ties content directly to a physical carrier, unlike
    BFO(IAO)/DOLCE''s generic-dependence treatment.'
- source: GFO
  term_or_identifier: Symbol / Symbol structure (considered, rejected)
  dimension: technical
  source_claim_type: direct quotation
  text: '`Symbol_structure`: "Categories satisfy the following conditions: (1) Categories
    can be instantiated; (2) Categories can be predicated of other entities. Categories are
    defined intensional-with-an-s. They are, therefore, closely related to language." (inherited
    from `Category`, its declared superclass, since `Symbol_structure` itself carries no `skos:definition`).
    `owl:disjointWith` `Concept` and `Universal`; `Category` is `owl:disjointWith` `Individual`.'
  reference:
  - xwkont:ref:gfo
  locator: '**verified**: `modules/gfo-base.owl`, classes `Symbol`, `Symbol_sequence`, `Symbol_structure`,
    `Category`, fetched and read directly 2026-07-02'
  entry_notes: Sits on GFO's universal/type side (`Category`, disjoint from `Individual`)
    — a formal-language-symbol concept, not a content-bearing individual artifact with aboutness.
    A genuinely different concept from BFO(IAO)'s ICE or DOLCE(DUL)'s InformationObject, both
    of which are (or depend on) individuals. No correspondence recorded, following the same
    standard already set for UFO in this crosswalk (a considered candidate is not automatically
    a correspondence).
- source: YAMATO
  term_or_identifier: Representation (Representing thing)
  dimension: technical
  source_claim_type: direct quotation
  text: '"By representation, we here mean content-bearing thing. That is, anything which has
    content as its essentials rather than itself which is playing the role of carrier/bearer
    of the content... there exist quite a few representations in the real world: novel, poem,
    painting, music, procedure, symbol, etc." And: "A representation is composed of two parts,
    form and content... A representation is not concrete yet as it is. It becomes a physical
    individual only when it becomes a representing thing... Content is the hidden part of
    representation and it is a proposition which the author of the representation would like
    to convey through the representation."'
  reference:
  - xwkont:ref:yamato-mizoguchi-2010
  locator: '**verified**: `YAMATO101216.pdf`, Section "Ontology of informational objects"
    / "A conceptual model of representation," extracted 2026-07-02'
  entry_notes: The most developed Information-Object treatment of any source in this crosswalk
    — an entire dedicated subsection, with worked examples (novel, music, procedure) and a
    positive `Representation`/`Representing thing` (abstract form-and-content vs. concrete
    realization) split that directly parallels DOLCE(DUL)'s `InformationObject`/`InformationRealization`
    pair.
- source: YAMATO
  term_or_identifier: Critique of BFO's coarse treatment
  dimension: philosophical
  source_claim_type: direct quotation
  text: '"As usual, BFO deals with representation (informational object) only at the highest
    level. It is called generically-dependent entity and it is not further elaborated what
    they are."'
  reference:
  - xwkont:ref:yamato-mizoguchi-2010
  locator: '**verified**: `YAMATO101216.pdf`, same section, extracted 2026-07-02'
  entry_notes: YAMATO's own text explicitly names BFO's generically-dependent-entity treatment
    (i.e., IAO's ICE, per this crosswalk's BFO row) as the point of comparison and criticizes
    it as under-elaborated — a rare case of a source ontology's own literature directly engaging
    with another source already cited in this crosswalk, rather than this crosswalk drawing
    the comparison itself.
- source: TUpper
  term_or_identifier: '*(no information/content/representation term found)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: '`tupper.all.owl` and `TUpper-Terms.html`, searched directly, contain zero occurrences
    of "information," "content," or "represent."'
  reference:
  - xwkont:ref:tupper-colore
  locator: '**verified absence**: both fetched files searched directly, 2026-07-02'
  entry_notes: Consistent with TUpper's already-established minimal PSL-derived vocabulary
    (`object`/`activity`/`activity_occurrence`/`timepoint`) — there is no fourth term in this
    area to be found.
- source: GUM
  term_or_identifier: Signification / Symbolization (relation types, considered, rejected)
  dimension: technical
  source_claim_type: direct quotation
  text: '`Symbolization`: no `rdfs:comment` on the class itself; subclass of `Intensive` (GUM''s
    Ascription/Identity-adjacent relation category). `Signification` (a `Symbolization` subclass):
    "Relations concerned with Signification are linguistically realized by verbs like ''represent'',
    ''mean'', ''express'', e.g., ''green means go''."'
  reference:
  - xwkont:ref:gum-owl
  locator: '**verified**: `GUM-31.owl`, classes `Symbolization`, `Signification`, fetched
    and read directly 2026-07-02'
  entry_notes: Both are relation types (participant-role/configuration classes), not object/entity
    types — a categorically different kind of thing than BFO(IAO)'s ICE, DOLCE(DUL)'s InformationObject,
    SUMO's ContentBearingObject, or YAMATO's Representation, all of which are entity classes.
    No correspondence recorded, same standard as GFO above.
- source: GUM
  term_or_identifier: Name
  dimension: technical
  source_claim_type: direct quotation
  text: '`Name`: "An accepted but possibly arbitrary label for some entity." `rdfs:subClassOf`
    `Word`, itself `rdfs:subClassOf Abstraction`.'
  reference:
  - xwkont:ref:gum-owl
  locator: '**verified**: `GUM-31.owl`, class `Name` (and its `Word`/`Abstraction` ancestry),
    fetched and read directly 2026-07-07'
  entry_notes: Added 2026-07-07, checking `symbol-sign-representation.yaml`''s own Future Work
    item. Unlike `Signification`/`Symbolization` above, this is a genuine object/entity-level
    class — a narrow correspondence recorded as `mapping-009`, not a rejected candidate.
