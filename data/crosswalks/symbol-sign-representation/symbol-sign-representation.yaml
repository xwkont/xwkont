source_definitions:
- source: BFO
  term_or_identifier: '*(no class found)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: Core BFO uses the word "representation" only incidentally in examples and scope notes,
    not as a dedicated symbol/sign/representation class. A direct search for `symbol`, `sign`,
    `representation`, `name`, and `word` found no formal sign-vehicle term.
  reference:
  - xwkont:ref:bfo-2020
  locator: '**verified absence**: `bfo-core.ttl`, fetched and read directly 2026-07-06'
  entry_notes: The content-bearing side in BFO belongs to the separate information-artifact
    / IAO lineage, not to a formal symbol/sign class in BFO core.
- source: DOLCE
  term_or_identifier: '*(no class found)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: Core DOLCE-Lite mentions "representation" in commentary about situations and processes,
    but the module does not formalize a dedicated symbol/sign/representation class.
  reference:
  - xwkont:ref:dolce-lite-owl
  locator: '**verified absence**: `DOLCE-Lite.owl`, fetched and read directly 2026-07-06'
  entry_notes: The sign/representation vehicle layer is not reified in core DOLCE-Lite.
- source: UFO
  term_or_identifier: '*(no class found)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: The 2021 UFO paper discusses representation in the broad conceptual-modeling sense,
    but a direct search for `symbol`, `sign`, `representation`, `name`, and `word` found no
    dedicated sign/signifier class.
  reference:
  - xwkont:ref:ufo-2021
  locator: '**verified absence**: UFO PDF text extraction, fetched and read directly 2026-07-06'
  entry_notes: UFO's reified content is elsewhere (e.g. relation theory, social entities),
    not in a standalone symbol/sign class.
- source: SUMO
  term_or_identifier: SymbolicString / Icon / LinguisticExpression / Word
  dimension: technical
  source_claim_type: direct quotation
  text: '`SymbolicString`: "The Class of alphanumeric sequences." `Icon`: subclass of `ContentBearingPhysical`;
    its examples include "symbolic roadway signs, representational art works, photographs."
    `LinguisticExpression`: language-related `ContentBearingPhysical`, encompassing "Language
    and the elements of Languages, e.g. Words." `Word`: "A term of a Language that represents
    a concept."'
  reference:
  - xwkont:ref:sumo-niles-pease-2001
  locator: '**verified**: current `Merge.kif`, fetched and read directly 2026-07-06'
  entry_notes: '**Excluded from this crosswalk''s correspondences (2026-07-06,
    maintainer decision).** All four terms are confirmed `rdfs:subClassOf ContentBearingPhysical`,
    the same SUMO class `information-artifact.md` already crosswalks -- a subclass of an already-crosswalked
    class, not a different kind of thing. See `information-artifact.md`''s own Future Work cross-reference
    note for the other side of this record.'
- source: GFO
  term_or_identifier: Symbol / Symbol sequence / Symbol structure
  dimension: technical
  source_claim_type: direct quotation
  text: '`Symbol` and `Symbol_sequence` are subclasses of `Symbol_structure`; `Symbol_structure`
    is a `Category`, and `Category`''s own definition says categories are "closely related
    to language."'
  reference:
  - xwkont:ref:gfo
  locator: '**verified**: `modules/gfo-base.owl`, fetched and read directly 2026-07-06'
  entry_notes: GFO formalizes symbol structure on the universal/type side, not as an individual
    artifact.
- source: YAMATO
  term_or_identifier: Representation / representation form / representing thing
  dimension: technical
  source_claim_type: direct quotation
  text: '"By representation, we here mean content-bearing thing." "A representation is composed
    of two parts, form and content." "It becomes a physical individual only when it becomes
    a representing thing." The report also says representation form includes language as a
    symbol sequence.'
  reference:
  - xwkont:ref:yamato-mizoguchi-2010
  locator: '**verified**: `YAMATO101216.pdf`, "Ontology of informational objects" section,
    extracted 2026-07-06'
  entry_notes: 'Excluded from this crosswalk (2026-07-06). `information-artifact.md`''s
    own YAMATO correspondence quotes the same passage in full, including "A representation
    is composed of two parts, form and content." The one line not in that quote — that representation
    form includes language as a symbol sequence — is a paraphrase, not a direct quotation, and
    was not independently re-verified. See `uncertainty-005`.'
- source: TUpper
  term_or_identifier: '*(no class found)*'
  dimension: technical
  source_claim_type: non-equivalence
  text: Search of `tupper.all.owl` and `TUpper-Terms.html` for `symbol`, `sign`, `representation`,
    `name`, `word`, `icon`, and `linguistic` returned no formal sign/signifier class.
  reference:
  - xwkont:ref:tupper-colore
  locator: '**verified absence**: fetched TUpper files, read directly 2026-07-06'
  entry_notes: TUpper does not formalize a sign/representation layer in the fetched artifacts.
- source: GUM
  term_or_identifier: Name / NameEvent / NameOf / NameRelation / Symbolization / Signification
  dimension: technical
  source_claim_type: direct quotation
  text: '`Name`: "An accepted but possibly arbitrary label for some entity." `rdfs:subClassOf`
    `Word`. `NameEvent`: "The process of giving something a name. It does not intrinsically
    require an addressee (non-addressee-oriented)." `rdfs:subClassOf` `DispositiveMaterialAction`
    and `External`. `NameOf`: "The relation that holds betwen a name and its bearer." [sic
    — "betwen" in the source file itself]. `NameRelation`: "The relation that holds between a
    name''s bearer and that name." `rdfs:subClassOf` `Symbolization`. `Symbolization`: "This
    category contains relations that hold between entities and other entities they `symbolize''.
    Concepts in this class logically have two roles: SYMBOL (the domain) and SYMBOLIZED (the
    range). One relation in this category is the relation between an object and a name which
    identifies that object." `rdfs:subClassOf` `Intensive`. `Signification`: "Relations
    concerned with Signification are linguistically realized by verbs like ''represent'',
    ''mean'', ''express'', e.g., ''green means go''." `rdfs:subClassOf` `Symbolization`.'
  reference:
  - xwkont:ref:gum-owl
  locator: '**verified**: `GUM-31.owl`, re-fetched and read directly 2026-07-07 (session-049,
    independent re-verification; corrected two truncated quotations from the prior 2026-07-06
    pass — `Symbolization`''s comment dropped its SYMBOL/SYMBOLIZED domain-range framing and
    worked example, and `Signification`''s comment dropped its "green means go" example and
    "linguistically realized" framing)'
  entry_notes: 'Narrowed 2026-07-06. `NameOf`/`NameRelation`/`Symbolization`/`Signification`
    are relation-types, retained in this crosswalk. `Name` has a stated definition comparable
    in form to `information-artifact.md`''s BFO(IAO) Information Content Entity definition
    (generically dependent, aboutness toward an entity); excluded from this crosswalk, not added
    to `information-artifact.md` by this pass. `NameEvent` is a process/event term; excluded
    from this crosswalk, not checked against `process.md`/`event.md` by this pass. See
    `uncertainty-006`.'
