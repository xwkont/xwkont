uncertainties:
- item_id: uncertainty-001
  uncertainty_type: open-question
  resolved: true
  resolved_date: "2026-07-08"
  resolution_note: 'Maintainer-confirmed (session-059): class-plus-relation-family, directly
    following the class-vs-relation kind split `note-001` already observed in this crosswalk''s
    remaining evidence (GFO type-side vs. GUM relation-type). `xwkont-core:SymbolSignRepresentation`
    was added to `data/ontology/core.ttl` as a class under `xwkont-core:Universal`, mirroring
    GFO''s own `Symbol_structure rdfs:subClassOf Category` treatment (the same GFO-Category
    parallel already used for `Universal` itself, per `docs/crosswalks/concepts/universal-type.md`).
    A new `xwkont-core:symbolizes`/`symbolizedBy` relation pair (domain/range Entity) was added
    to cover GUM''s `Symbolization` family, mirroring the existing Role/`bearsRole`/`roleOf`
    pattern. `mapping-002` (GUM) was retargeted from the class to the new `symbolizes` property
    accordingly; `mapping-001` (GFO) is unchanged, still targeting the class. `docs/ontology/core-ontology.md`,
    `core-axioms.md`, `core-ontology.mmd`, and `docs/publication/validation-commands.md`/`.github/workflows/validate.yml`''s
    structural-fallback `required_terms` lists were kept in sync in the same pass.'
  description: 'The evidence suggests at least three formal kinds inside the candidate family:
    symbol-structure types, content-bearing physicals / linguistic expressions, and naming/signification
    relations. It is not yet settled whether XwkOnt should model these as one class, a class
    plus relation(s), or multiple sibling concepts.'
  impact: This affects eventual `core.ttl` placement and the granularity of any future review
    decision.
  follow_up: Resolved; this concept is now placed in `core.ttl`. No further follow-up.
- item_id: uncertainty-002
  uncertainty_type: open-question
  resolved: false
  description: BFO, DOLCE, UFO, and TUpper all lack a confident dedicated symbol/sign/representation
    class in the artifacts searched for this draft. That may be a genuine absence, or it may
    reflect a need to search adjacent modules / narrower literature more deeply.
  impact: Keeps those rows at `unknown` rather than forcing a false equivalence.
  follow_up: Revisit only if later scope work pulls in a broader BFO extension, a DOLCE successor
    module, or UFO-adjacent literature that formalizes a signifier layer.
- item_id: uncertainty-003
  uncertainty_type: open-question
  resolved: false
  description: GUM's `Word` exists, but its definition as an abstraction referring to a numerical
    value is not clearly the right kind of symbol/representation class for this crosswalk,
    so it is not treated as a primary correspondence.
  impact: Prevents overclaiming a lexical term that may belong to a different part of GUM's
    vocabulary.
  follow_up: Reconsider only if a later pass broadens the symbol/representation scope to numeric
    or token-level abstractions.
- item_id: uncertainty-004
  uncertainty_type: open-question
  resolved: true
  resolved_date: "2026-07-06"
  resolution_note: 'Maintainer decision : narrow, not off-ramp or keep-as-is.
    Applying the rule discussed with the maintainer -- two terms picking out the same referent
    under different words is an alternate label (e.g. "I"/"me" both denoting self-reference),
    not a distinct concept; two terms of a genuinely different ontological kind (type vs.
    individual, relation vs. entity) are not an alternate label even when evidentially adjacent
    -- YAMATO''s `representing thing` and SUMO''s `SymbolicString`/`Icon`/`LinguisticExpression`
    were excluded as duplicative (same referent/class as `information-artifact.md`''s own
    evidence). GFO''s `Symbol_structure` and GUM''s `Symbolization`/`Signification` were
    retained: `information-artifact.md` itself explicitly rejected them as the wrong *kind*
    (type-side category; relation-type), which is precisely why they are not duplicative of
    it. `mapping-001` (GFO) and `mapping-003` (GUM, renumbered from `mapping-004`) survive;
    the former `mapping-002` (SUMO) was removed; the former `mapping-003` (YAMATO) was narrowed
    to exclude `representing thing`, retaining only `representation`/`representation form`
    at low confidence pending `uncertainty-005`.'
  description: 'Independent re-verification (2026-07-06) found that this crosswalk''s
    original `mapping-003` (YAMATO `Representation`/`representation form`/`representing thing`,
    `close-match`, medium-high confidence) cited the same primary-source passage
    already used as `information-artifact.md`''s own flagship YAMATO correspondence
    (`xwkont:correspondence:information-artifact:004`, `close-match`/medium-high to
    BFO(IAO)/DOLCE(DUL)) -- both crosswalks quote "A representation is composed of
    two parts, form and content... It becomes a physical individual only when it
    becomes a representing thing" verbatim. Separately, the original `correspondence-002`
    (SUMO `SymbolicString`/`Icon`/`LinguisticExpression`) are, on direct verification against
    `Merge.kif`, literal `rdfs:subClassOf ContentBearingPhysical` -- the same SUMO
    class `information-artifact.md` already crosswalks via its parent. This repo has
    an existing precedent for subclasses of an already-crosswalked class not getting
    their own concept (UFO''s ~19 `RelationStereotype` entries, ruled sub-kinds of
    the already-crosswalked Relation concept, per `TODO.md`). By contrast, GFO''s
    `Symbol_structure` and GUM''s `Symbolization`/`Signification` were explicitly
    considered and *rejected* by `information-artifact.md` (wrong kind: type-side,
    not individual-side; relation-type, not entity-type) -- those are not in conflict,
    the same reuse pattern already established for SUMO''s `Attribute` across
    Role/Quality/Relation.'
  impact: Resolved the scope question that previously blocked any advance past `draft`.
    Affected the former `mapping-001` (GFO, retained), `mapping-002` (SUMO, removed), and
    `mapping-003` (YAMATO, narrowed) directly. Two narrower open questions followed
    (`uncertainty-005`, `uncertainty-006`); both are now also resolved.
  follow_up: Resolved by explicit maintainer confirmation , per this repo's
    standing practice of routing this class of decision rather than self-closing it.
- item_id: uncertainty-005
  uncertainty_type: open-question
  resolved: true
  resolved_date: "2026-07-06"
  resolution_note: Checked `information-artifact.md`'s own YAMATO source_definition text
    directly. It quotes "A representation is composed of two parts, form and content... It
    becomes a physical individual only when it becomes a representing thing" in full — the
    same passage this crosswalk cited for `representation`/`representation form`, not a
    narrower excerpt. The one YAMATO claim not in that quote (representation form includes
    language as a symbol sequence) is a paraphrase, not a direct quotation, and was not
    independently re-verified. YAMATO is excluded from this crosswalk's correspondences and
    mappings; `mapping-002` (formerly YAMATO) is removed.
  description: YAMATO's `representation`/`representation form` (the type/pattern half of
    the form-content split, prior to physical embodiment as a `representing thing`) was
    retained as this crosswalk's evidence pending a check of whether `information-artifact.md`'s
    own Information Content Entity scope already reaches that type-level form, or stops at
    the individual/embodied side (`representing thing`, already excluded per `uncertainty-004`'s
    resolution).
  impact: Removes this crosswalk's only YAMATO evidence. Remaining evidence is GFO's
    `Symbol_structure` and GUM's `Symbolization`/`Signification`/`NameOf`/`NameRelation`.
  follow_up: None — resolved by direct comparison against `information-artifact.md`'s own
    Source Definitions text.
- item_id: uncertainty-006
  uncertainty_type: open-question
  resolved: true
  resolved_date: "2026-07-06"
  resolution_note: 'Checked all four terms'' stated definitions (already directly verified
    against `GUM-31.owl`) against `information-artifact.md`''s own evidence. `NameOf` ("the
    relation that holds between a name and its bearer") and `NameRelation` (its inverse) are
    relation-types, the same kind as `Symbolization`/`Signification` — added to this crosswalk''s
    correspondence and mapping. `Name` ("an accepted but possibly arbitrary label for some
    entity") has a definition comparable in form to `information-artifact.md`''s BFO(IAO)
    Information Content Entity definition ("generically dependent... stands in a relation of
    aboutness to some entity") — excluded from this crosswalk; not added to `information-artifact.md`
    by this pass, recorded in Future Work instead. `NameEvent` ("the process of giving something
    a name") is a process/event term, not checked against `process.md`/`event.md` — excluded
