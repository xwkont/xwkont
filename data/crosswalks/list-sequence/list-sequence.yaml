comparison_notes:
- note_id: note-001
  dimension: technical
  claim_type: editorial observation
  note: SUMO's `List` is not a prose-only sequence idea; it is a reified abstract class with
    an explicit ordered-n-tuple definition. `UniqueList` is not a separate peer concept but
    a stricter subtype. That makes the source-side family clear enough to stand on its own,
    even though the candidate label uses "Sequence" as project shorthand.
  supporting_references:
  - xwkont:ref:sumo-niles-pease-2001
  confidence: high
- note_id: note-002
  dimension: technical
  claim_type: editorial observation
  note: The candidate label's `Sequence` half does not correspond to a separate SUMO class
    in the checked artifact. The word appears elsewhere in SUMO's prose and documentation
    (`Procedure`, `Plan`, `BinaryNumber`, `SymbolicString`, `successorClass`), but those are
    different notions of sequence, not the ordered-list apparatus under `Abstract`.
  supporting_references:
  - xwkont:ref:sumo-niles-pease-2001
  confidence: high
- note_id: note-003
  dimension: technical
  claim_type: editorial observation
  note: '`abstract-concrete.md` already records SUMO `List` under `Abstract` and notes that
    `List` had no XwkOnt counterpart yet. This crosswalk is the dedicated home for that residual
    branch, not a duplicate of the broader abstract/concrete split.'
  supporting_references:
  - docs/crosswalks/concepts/abstract-concrete.md
  confidence: high
- note_id: note-004
  dimension: technical
  claim_type: editorial observation
  note: GUM's `OrderedObject` ("a type of decomposable object whose parts have an intrinsic
    ordering of their own; for example, the elements of a list, the carriages of a train, etc.")
    and `OrderedSet` ("a set whose elements are ordered") are a genuine second source, missed
    by the Codex draft entirely -- its Provenance section names only SUMO, with no record of
    checking the other 7 sources. GUM's own comment uses "the elements of a list" as its worked
    example, a direct terminological hook to this candidate's scope.
  supporting_references:
  - xwkont:ref:gum-owl
  confidence: high
- note_id: note-005
  dimension: technical
  claim_type: editorial observation
  note: This is the fourth session in a row where a candidate's seed or drafting pass undercounted
    GUM content that direct verification of `GUM-31.owl` found -- `time.md`, `space.md`, and
    `abstract-concrete.md` (whose own `uncertainty-004` first named this as a possible pattern)
    each found the same thing. `abstract-concrete.md`'s suggestion that "GUM's OWL file may be
    systematically under-surveyed relative to the other 7 sources" is now supported by a fourth
    independent data point.
  supporting_references:
  - docs/crosswalks/concepts/abstract-concrete.md
  - xwkont:ref:gum-owl
  confidence: high
mapping_assertions:
- mapping_id: xwkont:mapping:list-sequence:001
  subject: SUMO:List / UniqueList
  relation_category: close-match
  object: GUM:OrderedObject / OrderedSet
  mapping_justification: semapv:ManualMappingCuration
  status: candidate
  confidence: high
  rationale: Both are direct, reified ordered-collection apparatuses (SUMO's `List` under `Abstract`;
    GUM's `OrderedObject` under `DecomposableObject`), each with a narrower subtype forbidding/imposing
    an additional constraint (`UniqueList` forbids repeats; `OrderedSet` is a `UMSet` whose
    elements are ordered). `close-match`, not a stronger exact-equivalence claim, because the
    two sit in structurally different type hierarchies (SUMO's abstract/physical split vs. GUM's
    decomposable-object apparatus) and no source itself asserts an equivalence between them.
  provenance:
  - xwkont:ref:sumo-niles-pease-2001
  - xwkont:ref:gum-owl
  predicate_id: skos:closeMatch
mapping_assertions_note: Per `ADR-0009`, each mapping records a `predicate_id` (SSSOM/SKOS
  predicate, or none for XwkOnt-only categories) and a `mapping_justification` (SEMAPV term,
  e.g. `semapv:ManualMappingCuration`) in addition to the free-text rationale.
uncertainties:
- item_id: uncertainty-001
  uncertainty_type: open-question
  resolved: false
  description: 'Where should `xwkont-core:ListSequence` be placed once this candidate is reviewed:
    directly under `Abstract` (matching SUMO''s source hierarchy), under GUM''s `DecomposableObject`
    lineage, or under a more specific ordered-collection branch if the repository later introduces
    one?'
  impact: Blocks final core.ttl placement; does not block the crosswalk research itself.
  follow_up: Confirm at review time; for now, note that SUMO places `List` under `Abstract`
    and GUM places `OrderedObject` under `DecomposableObject` -- two different type-hierarchy
    lineages for the same descriptive idea.
- item_id: uncertainty-002
  uncertainty_type: non-equivalence
  resolved: false
  description: The candidate label's `Sequence` half is not a reified class in any source checked
    this session. It is project shorthand only, and should not be treated as an additional
    source-side correspondence.
  impact: Prevents over-counting the source-side family or fabricating an additional source
    term.
  follow_up: None needed; recorded here for traceability.
- item_id: uncertainty-003
  uncertainty_type: uncertainty
  resolved: false
  description: UFO was not independently re-checked this session -- the DOI-linked primary source
    (`https://doi.org/10.3233/AO-210256`) returned HTTP 403, and no other accessible mirror was
    found. The Codex draft did not check this source either.
  impact: This crosswalk's absence claim for UFO is unverified, not confirmed, unlike the other
    6 non-positive sources (BFO, DOLCE, GFO, YAMATO, TUpper independently re-checked this session).
  follow_up: Fetch the UFO 2021 paper via an accessible mirror (or ask the maintainer for one)
    and full-text search for "list," "sequence," "tuple," and "ordered" before treating this
    source as a confirmed absence.
