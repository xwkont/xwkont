local_identifier: xwkont:concept:list-sequence
slug: list-sequence
title: List / Sequence
editorial_status: reviewed
created: "2026-07-07"
modified: "2026-07-07"
scope_note: 'This candidate is about a source ontology''s own reified ordered-collection
  apparatus, centered on SUMO''s `List`/`UniqueList` and GUM''s `OrderedObject`/`OrderedSet`,
  not about:



  - the unrelated `sequence` wording used inside other SUMO classes such as `Procedure`, `Plan`,
  `BinaryNumber`, `SymbolicString`, or `successorClass`;

  - GFO''s `Symbol_sequence` and YAMATO''s "symbol sequence" language, both symbol-vehicle
  sequence material already claimed by `symbol-sign-representation.md` (still `draft`, not
  yet `reviewed`) -- a sequence of symbols/signs is a different kind of thing from a general
  ordered collection of arbitrary items, and this crosswalk does not re-litigate that claim;

  - GUM''s `ElementList` relation, a part-whole relation type (subclass of `Part`) between a
  list and its elements, not an entity class -- `mereology-parthood-aggregate.md`''s territory,
  not this candidate''s;

  - the broader `Abstract` split already noted in `abstract-concrete.md`, which already records
  `List` as one of SUMO''s abstract-side branches.



  Independent re-verification this session found this is a two-source candidate, not the
  single-source (SUMO-only) framing the Codex draft recorded: GUM''s `OrderedObject`
  ("a type of decomposable object whose parts have an intrinsic ordering of their own; for
  example, the elements of a list, the carriages of a train, etc.") and its subtype `OrderedSet`
  ("a set whose elements are ordered") were missed by the drafting pass entirely -- it checked
  only SUMO''s `Merge.kif` and recorded no attempt to check the other 7 sources, contrary to
  this repository''s standing requirement that every crosswalk check all 8. This is now the
  fourth session in a row (after `time.md`, `space.md`, and `abstract-concrete.md`, per that
  crosswalk''s own `uncertainty-004`) where a candidate''s seed or drafting pass undercounted
  GUM content that direct verification of `GUM-31.owl` found.



  BFO, DOLCE, YAMATO, and TUpper were independently checked this session and confirmed absent
  (informal "sequence" usage only, no dedicated ordered-collection class). UFO was not
  independently re-checked this session -- the DOI-linked primary source returned HTTP 403 and
  no other accessible mirror was found; see Future Work.'
