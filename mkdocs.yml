# yaml-language-server: $schema=https://squidfunk.github.io/mkdocs-material/schema.json
site_name: XwkOnt
site_description: The Crosswalk of Foundational Ontologies
site_url: https://xwkont.github.io/xwkont/
site_author: XwkOnt
repo_url: https://github.com/xwkont/xwkont
repo_name: xwkont/xwkont
edit_uri: edit/main/docs/
copyright: Copyright &copy; XwkOnt contributors — docs CC BY 4.0, code MIT
docs_dir: docs

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/xwkont/xwkont
    - icon: fontawesome/solid/link
      link: https://w3id.org/xwkont/
  generator: false

extra_css:
  - stylesheets/explore.css

extra_javascript:
  - javascripts/xwk-explore.3.js

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Explore:
    - explore/index.md
    - Coverage matrix: explore/coverage.md
    - Mapping network: explore/mappings.md
    - Concept word cloud: explore/cloud.md
    - Core hierarchy: explore/core.md
  - Concepts:
    - crosswalks/concepts/README.md
    - Continuant / Occurrent: crosswalks/concepts/continuant-occurrent.md
    - Object: crosswalks/concepts/object.md
    - Event: crosswalks/concepts/event.md
    - Process: crosswalks/concepts/process.md
    - Quality: crosswalks/concepts/quality.md
    - Role: crosswalks/concepts/role.md
    - Relation: crosswalks/concepts/relation.md
    - Information Artifact: crosswalks/concepts/information-artifact.md
    - Time: crosswalks/concepts/time.md
    - Space: crosswalks/concepts/space.md
    - Abstract / Concrete: crosswalks/concepts/abstract-concrete.md
    - Quantity / Amount of Matter: crosswalks/concepts/quantity-amount-of-matter.md
    - Situation / State of Affairs: crosswalks/concepts/situation-state-of-affairs.md
    - Universal / Type: crosswalks/concepts/universal-type.md
    - Mereology / Parthood / Aggregate: crosswalks/concepts/mereology-parthood-aggregate.md
    - Boundary / Site: crosswalks/concepts/boundary-site.md
    - Proposition / Content: crosswalks/concepts/proposition-content.md
    - Disposition / Capacity: crosswalks/concepts/disposition-capacity.md
    - Symbol / Sign / Representation: crosswalks/concepts/symbol-sign-representation.md
    - Mind / Conscious Being / Agent: crosswalks/concepts/mind-conscious-being-agent.md
    - Ontological Level / Stratum: crosswalks/concepts/ontological-level-stratum.md
    - Change: crosswalks/concepts/change.md
    - List / Sequence: crosswalks/concepts/list-sequence.md
    - Continuous vs. Discrete: crosswalks/concepts/continuous-discrete.md
    - Modality: crosswalks/concepts/modality.md
    - Non-physical / Social Object: crosswalks/concepts/non-physical-social-object.md
    - Candidate backlog: crosswalks/candidate-concepts.md
    - 0.4.0 batch selection: crosswalks/batch-0.4.0-selection.md
  - Core ontology:
