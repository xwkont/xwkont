    - Founding principles: FOUNDING_PRINCIPLES.md
    - Architectural principles: ARCHITECTURAL_PRINCIPLES.md
    - Editorial policy: EDITORIAL_POLICY.md
    - Project lifecycle: PROJECT_LIFECYCLE.md
